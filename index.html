<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2eaf6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;font-size:14px}

::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:#0d111e}::-webkit-scrollbar-thumb{background:#1e2a3d;border-radius:2px}
.hdr{background:#0d111e;border-bottom:1px solid #161e2e;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 4px 24px rgba(0,0,0,.5)}

.hdr-title{font-size:16px;font-weight:700;letter-spacing:-.01em}
.hdr-sub{font-size:11px;color:#3d5472;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:10px}
.tabs{background:#0d111e;border-bottom:1px solid #161e2e;padding:0 16px;display:flex;overflow-x:auto;position:sticky;top:62px;z-index:9}

.tab{background:none;border:none;border-bottom:2px solid transparent;color:#3d5472;padding:11px 14px;font-size:13px;white-space:nowrap;transition:all .2s}

.wrap{padding:20px;max-width:1100px;margin:0 auto}
@media(max-width:640px){.wrap{padding:14px}}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:16px}
.card{background:#0d111e;border:1px solid #161e2e;border-radius:12px;padding:14px 16px;transition:border-color .2s,box-shadow .2s}
.card.al{border-left:3px solid}.card:hover{border-color:#1e2a3d;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.cl{font-size:10px;color:#3d5472;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.cv{font-size:21px;font-weight:700;margin-bottom:2px;letter-spacing:-.02em}.cs{font-size:11px;color:#2e3f58}
.tw{background:#0d111e;border:1px solid #161e2e;border-radius:12px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.25)}
.ts{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:560px}
thead tr{background:#090c15}
th{padding:9px 12px;text-align:left;color:#3d5472;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #161e2e}
td{padding:9px 12px;border-bottom:1px solid #0f1520;color:#b8c8de}
tbody tr{transition:background .1s}tbody tr:hover{background:#0f1728}tbody tr:last-child td{border-bottom:none}
.bdg{border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600}
.bac{background:rgba(52,211,153,.08);color:#34d399;border:1px solid rgba(52,211,153,.18)}
.bfi{background:rgba(96,165,250,.08);color:#60a5fa;border:1px solid rgba(96,165,250,.18)}
.bet{background:rgba(167,139,250,.08);color:#a78bfa;border:1px solid rgba(167,139,250,.18)}
.bxx{background:rgba(148,163,184,.05);color:#64748b;border:1px solid rgba(148,163,184,.12)}
.btn{border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:600;transition:all .15s}
.btn:hover{opacity:.85;transform:translateY(-1px)}.btn:active{transform:translateY(0)}
.bp{background:linear-gradient(135deg,#3730a3,#4f46e5);color:#c7d2fe;box-shadow:0 2px 14px rgba(99,102,241,.3)}
.bsv{background:linear-gradient(135deg,#065f46,#047857);color:#6ee7b7;box-shadow:0 2px 14px rgba(16,185,129,.2)}
.bgh{background:#111828;color:#64748b;border:1px solid #1e2a3d}
.bexp{background:#111828;color:#fbbf24;border:1px solid rgba(251,191,36,.2);font-size:12px;padding:7px 12px}
.bimp{background:#111828;color:#60a5fa;border:1px solid rgba(96,165,250,.2);font-size:12px;padding:7px 12px}
.bi{background:transparent;border:1px solid #1e2a3d;border-radius:7px;padding:3px 9px;color:#64748b;font-size:13px}
.bdi{background:transparent;border:1px solid rgba(127,29,29,.5);border-radius:7px;padding:3px 9px;color:#f87171;font-size:13px}
.fc{background:#090c15;border:1px solid #312e81;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 4px 20px rgba(99,102,241,.08)}
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.fl{font-size:11px;color:#3d5472;margin-bottom:4px;font-weight:500}
input,select{background:#0d111e;border:1px solid #1e2a3d;border-radius:9px;padding:8px 11px;color:#e2eaf6;font-size:13px;width:100%;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus{border-color:#4f46e5;outline:none;box-shadow:0 0 0 3px rgba(79,70,229,.15)}
input::placeholder{color:#2e3f58}select option{background:#0d111e}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.cg{grid-template-columns:1fr}}
.cc{background:#0d111e;border:1px solid #161e2e;border-radius:12px;padding:14px 16px}
.ct{font-size:11px;font-weight:600;color:#3d5472;margin-bottom:12px;text-transform:uppercase;letter-spacing:.07em}
.db{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.dbl{font-size:12px;color:#c0cce0;min-width:62px;font-weight:600}
.dbt{flex:1;background:#111828;border-radius:4px;height:6px;overflow:hidden}
.dbf{height:100%;border-radius:4px}.dbv{font-size:12px;color:#64748b;min-width:70px;text-align:right}
.pleg{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.pli{display:flex;align-items:center;gap:5px;font-size:12px;color:#64748b}
.pd{width:8px;height:8px;border-radius:2px}
.gn{color:#34d399}.rd{color:#f87171}.am{color:#fbbf24}.pu{color:#818cf8}.bl{color:#60a5fa}.mu{color:#64748b}.di{color:#3d5472}
.bwr{background:#111828;border-radius:3px;height:5px;width:70px;overflow:hidden;display:inline-block}
.bfr{height:100%;background:#fbbf24}
.es{text-align:center;padding:40px 20px;color:#3d5472;line-height:1.7}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.st{font-size:15px;font-weight:700}
.qdot{width:7px;height:7px;border-radius:50%;background:#34d399;display:inline-block;box-shadow:0 0 6px rgba(52,211,153,.6)}
.qdot.spin{background:#fbbf24;box-shadow:0 0 6px rgba(251,191,36,.6);animation:pulse 1s ease-in-out infinite}
.aic{background:#090c15;border:1px solid #2d2a7a;border-radius:12px;padding:20px;box-shadow:0 4px 24px rgba(99,102,241,.12)}
.air{font-size:13px;line-height:1.9;color:#b8c8de;white-space:pre-wrap}
.bkp{background:#090c15;border:1px solid #1e2a3d;border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.bkp-info{font-size:12px;color:#3d5472}
.bkp-btns{display:flex;gap:8px;align-items:center}
.syncbox{background:#111828;border:1px solid rgba(251,191,36,.25);border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.syncbox strong{color:#fbbf24}
.syncbox span{font-size:12px;color:#8fa3bd}
.goalbox{background:#090c15;border:1px solid #1e2a3d;border-radius:12px;padding:14px 16px;margin-bottom:16px;display:grid;grid-template-columns:1.2fr .8fr;gap:14px;align-items:end}
.goalbox small{display:block;color:#3d5472;font-size:11px;margin-top:6px;line-height:1.5}
.goalbar{height:8px;background:#111828;border-radius:6px;overflow:hidden;margin-top:10px}
.goalfill{height:100%;background:linear-gradient(90deg,#4f46e5,#34d399);border-radius:6px}
@media(max-width:640px){.goalbox{grid-template-columns:1fr}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes rota{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spn{display:inline-block;animation:rota 1s linear infinite}
</style>
</head>
<body>
<div id="root"></div>
<input type="file" id="imp-file" accept=".json" style="display:none">
<script>
const QI     = 60;
const CLRS   = ['#818cf8','#34d399','#fbbf24','#f472b6','#60a5fa','#a3e635','#fb923c','#a78bfa'];

let S = {
  assets:[], aportes:[], quotes:{}, lastUpdate:null,
  tab:'dashboard', qLoad:false, cd:QI,
  brapiToken:'',
  divGoal:4000,
  aiText:'', aiLoad:false,
  editId:null, showA:false, showP:false, _fa:null, _fp:null,
};

// ── Storage ──────────────────────────────────────────────
function load(){
  try{
    const d=JSON.parse(localStorage.getItem('civ4')||'{}');
    if(d.assets)  S.assets  = d.assets;
    if(d.aportes) S.aportes = d.aportes;
    const c=JSON.parse(localStorage.getItem('civ4_config')||'{}');
    if(c.brapiToken) S.brapiToken = c.brapiToken;
    if(c.divGoal!==undefined && c.divGoal!==null && c.divGoal!=='') S.divGoal = Number(c.divGoal)||4000;
  }catch(e){}
}
function save(){
  try{ localStorage.setItem('civ4', JSON.stringify({assets:S.assets, aportes:S.aportes})); }catch(e){}
}
function saveConfig(){
  try{ localStorage.setItem('civ4_config', JSON.stringify({brapiToken:S.brapiToken, divGoal:S.divGoal})); }catch(e){}
}
function configBrapi(){
  const atual = S.brapiToken ? '********' : '';
  const token = prompt('Cole aqui seu token gratuito da brapi.dev para atualizar cotações. Deixe em branco para remover.', atual);
  if(token === null) return;
  S.brapiToken = token.trim()==='********' ? S.brapiToken : token.trim();
  saveConfig();
  alert(S.brapiToken ? '✅ Token salvo neste navegador.' : 'Token removido. As cotações automáticas ficarão desativadas.');
  fetchQuotes(true);
}

// ── Backup ───────────────────────────────────────────────
function exportBackup(){
  const data = JSON.stringify({assets:S.assets, aportes:S.aportes, exportedAt:new Date().toISOString()}, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `carteira-backup-${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.json`;
  a.click();
}
function importBackup(){
  document.getElementById('imp-file').click();
}
document.getElementById('imp-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try{
      const d = JSON.parse(ev.target.result);
      if(d.assets)  S.assets  = d.assets;
      if(d.aportes) S.aportes = d.aportes;
      save(); render();
      alert(`✅ Backup importado! ${S.assets.length} ativos e ${S.aportes.length} aportes carregados.`);
    }catch(err){ alert('Erro ao importar. Verifique o arquivo.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ── Helpers ───────────────────────────────────────────────
const fmt  = v => v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fmtP = v => `${v>=0?'+':''}${v.toFixed(2)}%`;
const esc  = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
const bdg  = t => t==='Ação'?'bac':t==='FII'?'bfi':t==='ETF'?'bet':'bxx';

function cx(){
  const tI=S.assets.reduce((s,a)=>s+a.qty*a.avg_price,0);
  const tC=S.assets.reduce((s,a)=>s+a.qty*a.current_price,0);
  const tG=tC-tI, tGP=tI>0?(tG/tI)*100:0;
  const mD=S.assets.reduce((s,a)=>s+(a.qty*a.current_price*(a.dy/100))/12,0);
  const aD=mD*12, avgDY=tC>0?(aD/tC)*100:0;
  return{tI,tC,tG,tGP,mD,aD,avgDY};
}


// ── Autopreenchimento por ticker ─────────────────────────
const TICKER_INFO = {
  ITUB4:{type:'Ação',sector:'Banco'}, ITUB3:{type:'Ação',sector:'Banco'}, BBAS3:{type:'Ação',sector:'Banco'}, BBDC4:{type:'Ação',sector:'Banco'}, BBDC3:{type:'Ação',sector:'Banco'}, SANB11:{type:'Ação',sector:'Banco'}, BPAC11:{type:'Ação',sector:'Banco'},
  PETR4:{type:'Ação',sector:'Petróleo'}, PETR3:{type:'Ação',sector:'Petróleo'}, PRIO3:{type:'Ação',sector:'Petróleo'}, RECV3:{type:'Ação',sector:'Petróleo'},
  VALE3:{type:'Ação',sector:'Mineração'}, GGBR4:{type:'Ação',sector:'Siderurgia'}, CSNA3:{type:'Ação',sector:'Siderurgia'}, GOAU4:{type:'Ação',sector:'Siderurgia'},
  CMIG4:{type:'Ação',sector:'Energia'}, CMIG3:{type:'Ação',sector:'Energia'}, TAEE11:{type:'Ação',sector:'Energia'}, EGIE3:{type:'Ação',sector:'Energia'}, TRPL4:{type:'Ação',sector:'Energia'}, CPFE3:{type:'Ação',sector:'Energia'}, ENBR3:{type:'Ação',sector:'Energia'}, ALUP11:{type:'Ação',sector:'Energia'}, ENGI11:{type:'Ação',sector:'Energia'},
  SAPR11:{type:'Ação',sector:'Saneamento'}, SAPR4:{type:'Ação',sector:'Saneamento'}, SAPR3:{type:'Ação',sector:'Saneamento'}, SBSP3:{type:'Ação',sector:'Saneamento'}, CSMG3:{type:'Ação',sector:'Saneamento'},
  KLBN11:{type:'Ação',sector:'Papel e Celulose'}, KLBN4:{type:'Ação',sector:'Papel e Celulose'}, SUZB3:{type:'Ação',sector:'Papel e Celulose'},
  WEGE3:{type:'Ação',sector:'Industrial'}, ABEV3:{type:'Ação',sector:'Bebidas'}, VIVT3:{type:'Ação',sector:'Telecomunicações'}, TIMS3:{type:'Ação',sector:'Telecomunicações'},
  BOVA11:{type:'ETF',sector:'ETF Brasil'}, SMAL11:{type:'ETF',sector:'ETF Brasil'}, IVVB11:{type:'ETF',sector:'ETF Exterior'}, WRLD11:{type:'ETF',sector:'ETF Exterior'}, DIVD11:{type:'ETF',sector:'ETF Dividendos'}, DIVO11:{type:'ETF',sector:'ETF Dividendos'}, HASH11:{type:'ETF',sector:'ETF Cripto'},
  MXRF11:{type:'FII',sector:'Papel'}, KNCR11:{type:'FII',sector:'Papel'}, KNIP11:{type:'FII',sector:'Papel'}, CPTS11:{type:'FII',sector:'Papel'}, HGLG11:{type:'FII',sector:'Logística'}, XPML11:{type:'FII',sector:'Shopping'}, VISC11:{type:'FII',sector:'Shopping'}, KNRI11:{type:'FII',sector:'Híbrido'}, XPLG11:{type:'FII',sector:'Logística'}, BCFF11:{type:'FII',sector:'Fundo de Fundos'}, RBRF11:{type:'FII',sector:'Fundo de Fundos'}
};
const ETF_LIST = new Set(['BOVA11','SMAL11','IVVB11','WRLD11','DIVD11','DIVO11','HASH11','SPXI11','NASD11','TECK11','GOLD11','BOVV11']);
const STOCK_UNIT_LIST = new Set(['SAPR11','TAEE11','SANB11','KLBN11','BPAC11','ALUP11','ENGI11','CPLE11','AESB11']);
function inferType(ticker){
  if(TICKER_INFO[ticker]?.type) return TICKER_INFO[ticker].type;
  if(ETF_LIST.has(ticker)) return 'ETF';
  if(STOCK_UNIT_LIST.has(ticker)) return 'Ação';
  if(/^[A-Z]{4}11$/.test(ticker)) return 'FII';
  return 'Ação';
}
function normalizeDY(v){
  const n=Number(v);
  if(!Number.isFinite(n) || n<0) return '';
  return n>0 && n<1 ? (n*100).toFixed(2) : n.toFixed(2);
}
async function autoFillTicker(){
  const tiEl=document.getElementById('f-ti');
  if(!tiEl) return;
  const ticker=tiEl.value.trim().toUpperCase();
  if(!ticker) return;
  tiEl.value=ticker;
  const tyEl=document.getElementById('f-ty'), seEl=document.getElementById('f-se'), cpEl=document.getElementById('f-cp'), dyEl=document.getElementById('f-dy');
  const local=TICKER_INFO[ticker]||{};
  if(tyEl && (!tyEl.value || tyEl.value==='Ação')) tyEl.value=local.type||inferType(ticker);
  if(seEl && !seEl.value) seEl.value=local.sector||'';
  if(!S.brapiToken){ return; }
  try{
    tiEl.style.borderColor='#fbbf24';
    const r=await fetch(`https://brapi.dev/api/quote/${encodeURIComponent(ticker)}?fundamental=true&token=${encodeURIComponent(S.brapiToken)}`);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json();
    const q=j.results && j.results[0];
    if(!q) return;
    if(cpEl && q.regularMarketPrice && (!cpEl.value || Number(cpEl.value)===0)) cpEl.value=Number(q.regularMarketPrice).toFixed(2);
    const dy=normalizeDY(q.dividendYield ?? q.trailingAnnualDividendYield ?? q.defaultKeyStatistics?.dividendYield);
    if(dyEl && dy && (!dyEl.value || Number(dyEl.value)===0)) dyEl.value=dy;
    const sector=q.sector||q.industry||q.assetProfile?.sector||local.sector||'';
    if(seEl && sector && !seEl.value) seEl.value=sector;
    if(tyEl && local.type) tyEl.value=local.type;
  }catch(e){ console.warn('autofill:', e); }
  finally{ tiEl.style.borderColor=''; }
}

// ── Cotações ─────────────────────────────────────────────
async function fetchQuotes(manual=false){
  if(!S.assets.length) return;
  if(!S.brapiToken){
    if(manual) alert('Configure o token da brapi.dev em ⚙️ brapi para atualizar cotações automaticamente.');
    return;
  }
  S.qLoad=true; render();
  const tks=[...new Set(S.assets.map(a=>a.ticker).filter(Boolean))].join(',');
  if(!tks){ S.qLoad=false; render(); return; }
  try{
    const r=await fetch(`https://brapi.dev/api/quote/${encodeURIComponent(tks)}?token=${encodeURIComponent(S.brapiToken)}`);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json();
    if(j.results){
      j.results.forEach(q=>{
        if(!q.regularMarketPrice) return;
        S.quotes[q.symbol]={price:q.regularMarketPrice, change:q.regularMarketChangePercent||0};
        const a=S.assets.find(x=>x.ticker===q.symbol);
        if(a){ a.current_price=q.regularMarketPrice; }
      });
      S.lastUpdate=new Date(); save();
    }
  }catch(e){
    console.warn('brapi:',e);
    if(manual) alert('Não consegui atualizar as cotações. Confira o token da brapi e sua conexão.');
  }
  S.qLoad=false; S.cd=QI; render();
}

// ── Pie SVG ───────────────────────────────────────────────
function pie(data){
  const tot=data.reduce((s,d)=>s+d.value,0);
  if(!tot) return'<div class="di" style="text-align:center;padding:24px;font-size:13px">Sem dados</div>';
  let p='', a=-Math.PI/2;
  data.forEach((d,i)=>{
    const ang=(d.value/tot)*2*Math.PI;
    const[x1,y1]=[80+68*Math.cos(a),80+68*Math.sin(a)];
    const[x2,y2]=[80+68*Math.cos(a+ang),80+68*Math.sin(a+ang)];
    p+=`<path d="M80,80 L${x1.toFixed(1)},${y1.toFixed(1)} A68,68 0 ${ang>Math.PI?1:0},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${CLRS[i%CLRS.length]}" stroke="#07090f" stroke-width="2"/>`;
    a+=ang;
  });
  return`<svg viewBox="0 0 160 160" width="140" height="140" style="display:block;margin:0 auto">${p}</svg>`;
}

// ── Render ────────────────────────────────────────────────
function render(){
  document.getElementById('root').innerHTML = app();
  bind();
}

function app(){
  const now=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
  const lu=S.lastUpdate?S.lastUpdate.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}):'—';
  const TABS=[['dashboard','📊 Dashboard'],['ativos','💼 Ativos'],['aportes','💰 Aportes'],['dividendos','📅 Dividendos'],['ia','🤖 IA']];
  return`
  <div class="hdr">
    <div class="hdr-logo">
      <div class="hdr-icon">📈</div>
      <div>
        <div class="hdr-title">Carteira de Investimentos</div>
        <div class="hdr-sub">Dados salvos localmente · Backup e importação disponíveis</div>
      </div>
    </div>
    <div class="hdr-right">
      <button class="btn bexp" onclick="exportBackup()" title="Exportar backup">💾 Backup</button>
      <button class="btn bimp" onclick="importBackup()" title="Importar backup">📂 Importar</button>
      <button class="btn bimp" onclick="configBrapi()" title="Configurar token brapi">⚙️ brapi</button>
      <div style="text-align:right">
        <div style="font-size:11px;color:#2e3f58">${now}</div>
        <div style="display:flex;align-items:center;gap:5px;justify-content:flex-end;margin-top:2px">
          <span class="qdot${S.qLoad?' spin':''}"></span>
          <span style="font-size:10px;color:#2e3f58">Cotações ${lu} · <span id="cd-span">${S.cd}</span>s</span>
        </div>
      </div>
    </div>
  </div>
  <div class="tabs">${TABS.map(([k,l])=>`<button class="tab${S.tab===k?' on':''}" onclick="go('${k}')">${l}</button>`).join('')}</div>
  <div class="wrap">${content()}</div>`;
}

function content(){
  if(S.tab==='dashboard') return dash();
  if(S.tab==='ativos')    return ativos();
  if(S.tab==='aportes')   return apTab();
  if(S.tab==='dividendos')return divs();

function normalizeTicker(t){ return String(t||'').trim().toUpperCase(); }
function toNum(v){ const n=Number(v); return Number.isFinite(n)?n:0; }
function parseMoney(v){
  if(typeof v==='number') return Number.isFinite(v)?v:0;
  let s=String(v||'').trim().replace(/R\$|\s/g,'');
  if(!s) return 0;
  if(s.includes(',')) s=s.replace(/\./g,'').replace(',','.');
  s=s.replace(/[^0-9.\-]/g,'');
  const n=Number(s);
  return Number.isFinite(n)?n:0;
}
function saveDivGoal(v){
  const n=parseMoney(v);
  if(n<=0){ alert('Informe um objetivo maior que zero.'); render(); return; }
  S.divGoal=Number(n.toFixed(2));
  saveConfig();
  render();
}
function applyAporteToAssets(ap){
  const ti=normalizeTicker(ap.ticker);
  const qt=toNum(ap.qty);
  const pr=toNum(ap.price);
  if(!ti || qt<=0 || pr<=0) return false;
  const idx=S.assets.findIndex(a=>normalizeTicker(a.ticker)===ti);
  if(idx>=0){
    const a=S.assets[idx];
    const oldQty=toNum(a.qty);
    const oldPM=toNum(a.avg_price);
    const newQty=oldQty+qt;
    const newPM=newQty>0?((oldQty*oldPM)+(qt*pr))/newQty:pr;
    S.assets[idx]={
      ...a,
      ticker:ti,
      qty:Number(newQty.toFixed(8)),
      avg_price:Number(newPM.toFixed(6)),
      current_price:toNum(a.current_price)>0?toNum(a.current_price):pr
    };
  }else{
    const info=TICKER_INFO[ti]||{};
    S.assets.push({
      id:Date.now()+Math.floor(Math.random()*10000),
      ticker:ti,
      type:info.type||inferType(ti),
      sector:info.sector||'',
      qty:qt,
      avg_price:pr,
      current_price:pr,
      dy:0
    });
  }
  ap.appliedToAssets=true;
  return true;
}
function reverseAporteFromAssets(ap){
  const ti=normalizeTicker(ap.ticker);
  const qt=toNum(ap.qty);
  const pr=toNum(ap.price);
  const idx=S.assets.findIndex(a=>normalizeTicker(a.ticker)===ti);
  if(idx<0 || qt<=0 || pr<=0) return false;
  const a=S.assets[idx];
  const oldQty=toNum(a.qty);
  const oldPM=toNum(a.avg_price);
  const newQty=oldQty-qt;
  if(newQty<=0.00000001){
    S.assets.splice(idx,1);
  }else{
    const newCost=Math.max(0,(oldQty*oldPM)-(qt*pr));
    const newPM=newCost>0?newCost/newQty:oldPM;
    S.assets[idx]={...a, qty:Number(newQty.toFixed(8)), avg_price:Number(newPM.toFixed(6))};
  }
  return true;
}
function pendingAportes(){ return S.aportes.filter(a=>!a.appliedToAssets); }
function syncPendingAportes(){
  const pend=pendingAportes();
  if(!pend.length){ alert('✅ Todos os aportes já estão somados na aba Ativos.'); return; }
  if(!confirm(`Existem ${pend.length} aporte(s) ainda não somados na aba Ativos. Deseja sincronizar agora?`)) return;
  pend.slice().reverse().forEach(ap=>applyAporteToAssets(ap));
  save(); render(); fetchQuotes(false);
  alert('✅ Aportes sincronizados com a aba Ativos.');
}
function rebuildAssetsFromAportes(){
  if(!S.aportes.length){ alert('Nenhum aporte registrado para recalcular.'); return; }
  if(!confirm('Isso vai recalcular quantidade e preço médio dos ativos com base APENAS nos aportes registrados. Ativos sem aportes serão mantidos. Continuar?')) return;
  const keep=S.assets.filter(a=>!S.aportes.some(p=>normalizeTicker(p.ticker)===normalizeTicker(a.ticker)));
  const ag={};
  S.aportes.slice().reverse().forEach(p=>{
    const ti=normalizeTicker(p.ticker), qt=toNum(p.qty), pr=toNum(p.price);
    if(!ti || qt<=0 || pr<=0) return;
    if(!ag[ti]) ag[ti]={qty:0,cost:0};
    ag[ti].qty+=qt; ag[ti].cost+=qt*pr; p.appliedToAssets=true;
  });
  const rebuilt=Object.entries(ag).map(([ti,v])=>{
    const old=S.assets.find(a=>normalizeTicker(a.ticker)===ti)||{};
    const info=TICKER_INFO[ti]||{};
    const pm=v.qty>0?v.cost/v.qty:0;
    return {id:old.id||Date.now()+Math.floor(Math.random()*10000), ticker:ti, type:old.type||info.type||inferType(ti), sector:old.sector||info.sector||'', qty:Number(v.qty.toFixed(8)), avg_price:Number(pm.toFixed(6)), current_price:toNum(old.current_price)>0?toNum(old.current_price):Number(pm.toFixed(6)), dy:toNum(old.dy)};
  });
  S.assets=[...keep,...rebuilt];
  save(); render(); fetchQuotes(false);
  alert('✅ Carteira recalculada pelos aportes registrados.');
}

function clA(){ S.showA=false; S.editId=null; S._fa=null; render(); }

function svA(){
  const ti=document.getElementById('f-ti')?.value?.trim().toUpperCase();
  const qt=parseFloat(document.getElementById('f-qt')?.value);
  const ap=parseFloat(document.getElementById('f-ap')?.value);
  const cp=parseFloat(document.getElementById('f-cp')?.value)||ap;
  const dy=parseFloat(document.getElementById('f-dy')?.value)||0;
  const info=TICKER_INFO[ti]||{};
  const se=document.getElementById('f-se')?.value?.trim()||info.sector||'';
  const ty=document.getElementById('f-ty')?.value||info.type||inferType(ti);
  if(!ti||isNaN(qt)||isNaN(ap)){ alert('Preencha Ticker, Quantidade e Preço Médio.'); return; }
  const row={ticker:ti, type:ty, sector:se, qty:qt, avg_price:ap, current_price:cp, dy};
  if(S.editId){ S.assets=S.assets.map(a=>a.id===S.editId?{...a,...row}:a); }
  else { S.assets.push({id:Date.now(),...row}); }
  S.showA=false; S.editId=null; S._fa=null;
  save(); fetchQuotes(false);
}

function rmA(id){
  if(!confirm('Remover este ativo da carteira?')) return;
  S.assets=S.assets.filter(a=>a.id!==id);
  save(); render();
}

function tgP(){ S.showP=!S.showP; S._fp={}; render(); }
function clP(){ S.showP=false; S._fp=null; render(); }

function svP(){
  const ti=normalizeTicker(document.getElementById('p-ti')?.value);
  const qt=parseFloat(document.getElementById('p-qt')?.value);
  const pr=parseFloat(document.getElementById('p-pr')?.value);
  const dc=document.getElementById('p-dc')?.value?.trim()||'';
  let dt=document.getElementById('p-dt')?.value||'';
  if(dt){ const[y,m,d]=dt.split('-'); dt=`${d}/${m}/${y}`; }
  else { dt=new Date().toLocaleDateString('pt-BR'); }
  if(!ti||isNaN(qt)||isNaN(pr)||qt<=0||pr<=0){ alert('Preencha Ticker, Quantidade e Preço com valores maiores que zero.'); return; }

  const ap={id:Date.now(), ticker:ti, qty:qt, price:pr, date:dt, decision:dc, appliedToAssets:false};
  applyAporteToAssets(ap);
  S.aportes.unshift(ap);

  S.showP=false; S._fp=null; save(); fetchQuotes(false);
}

function rmP(id){
  const ap=S.aportes.find(a=>a.id===id);
  if(!ap) return;
  const msg=ap.appliedToAssets
    ?'Remover este aporte? Como ele já foi somado nos Ativos, a quantidade e o preço médio também serão ajustados.'
    :'Remover este aporte?';
  if(!confirm(msg)) return;
  if(ap.appliedToAssets) reverseAporteFromAssets(ap);
  S.aportes=S.aportes.filter(a=>a.id!==id);
  save(); render();
}

function getAI(){
  const {tC,tGP,mD,aD,avgDY}=cx();
  if(!S.assets.length){
    S.aiText='Cadastre seus ativos primeiro para gerar uma análise da carteira.';
    render();
    return;
  }

  const linhas=[];
  const porTipo={};
  const porAtivo=S.assets.map(a=>({
    ticker:a.ticker,
    type:a.type,
    valor:a.qty*a.current_price,
    divMes:(a.qty*a.current_price*(a.dy/100))/12,
    dy:Number(a.dy)||0,
    varPct:a.avg_price>0?((a.current_price-a.avg_price)/a.avg_price)*100:0
  })).sort((a,b)=>b.valor-a.valor);

  porAtivo.forEach(a=>porTipo[a.type]=(porTipo[a.type]||0)+a.valor);
  const maior=porAtivo[0];
  const maiorPct=tC>0?(maior.valor/tC)*100:0;
  const fiisPct=tC>0?((porTipo['FII']||0)/tC)*100:0;
  const acoesPct=tC>0?((porTipo['Ação']||0)/tC)*100:0;
  const etfsPct=tC>0?((porTipo['ETF']||0)/tC)*100:0;
  const rendaFixaPct=tC>0?((porTipo['Renda Fixa']||0)/tC)*100:0;
  const goal=toNum(S.divGoal)||4000;
  const alvoObjetivo=mD>0?(goal/mD)*tC:0;
  const faltaObjetivo=Math.max(0,goal-mD);

  linhas.push('📊 RESUMO DA CARTEIRA');
  linhas.push(`Patrimônio atual: ${fmt(tC)}`);
  linhas.push(`Resultado sobre preço médio: ${fmtP(tGP)}`);
  linhas.push(`Renda passiva estimada: ${fmt(mD)}/mês ou ${fmt(aD)}/ano`);
  linhas.push(`DY médio estimado: ${avgDY.toFixed(2)}% ao ano`);
  linhas.push('');

  linhas.push('⚖️ ALOCAÇÃO');
  Object.entries(porTipo).sort((a,b)=>b[1]-a[1]).forEach(([tipo,valor])=>{
    linhas.push(`• ${tipo}: ${((valor/tC)*100).toFixed(1)}% (${fmt(valor)})`);
  });
  linhas.push('');

  linhas.push('🔎 PONTOS DE ATENÇÃO');
  if(maiorPct>20) linhas.push(`• Concentração alta em ${maior.ticker}: ${maiorPct.toFixed(1)}% da carteira. Avaliar novos aportes em outros ativos antes de aumentar essa posição.`);
  else linhas.push(`• Maior posição é ${maior.ticker}, com ${maiorPct.toFixed(1)}% da carteira. Concentração parece controlada.`);

  if(S.assets.length<10) linhas.push('• Carteira ainda tem poucos ativos. Para renda passiva, normalmente faz sentido diversificar mais entre setores e emissores.');
  if(fiisPct>60) linhas.push('• FIIs estão com peso muito alto. Isso aumenta exposição a juros, vacância e riscos do setor imobiliário.');
  if(acoesPct>70) linhas.push('• Ações estão com peso muito alto. A renda mensal pode ficar mais irregular, pois dividendos de ações variam bastante.');
  if(rendaFixaPct<10) linhas.push('• Renda fixa abaixo de 10%. Uma reserva em pós-fixado ajuda a reduzir risco e aproveitar quedas do mercado.');
  if(etfsPct>35) linhas.push('• ETFs com peso relevante. Verifique se existe sobreposição com ações e fundos que já estão na carteira.');
  if(avgDY>12) linhas.push('• DY médio muito alto pode indicar risco. Confirme se os dividendos são recorrentes ou se houve evento extraordinário.');
  if(avgDY<6) linhas.push('• DY médio ainda baixo para foco em renda passiva. Novos aportes podem priorizar ativos pagadores de renda, sem ignorar qualidade.');
  linhas.push('');

  linhas.push(`💰 CAMINHO PARA ${fmt(goal)}/MÊS`);
  linhas.push(`• Objetivo mensal configurado na aba Dividendos: ${fmt(goal)}.`);
  if(mD>=goal) linhas.push(`• A projeção atual já atinge ou supera ${fmt(goal)}/mês em renda passiva estimada. O foco passa a ser sustentabilidade e diversificação.`);
  else if(mD>0){
    linhas.push(`• Falta aproximadamente ${fmt(faltaObjetivo)}/mês para chegar ao objetivo.`);
    linhas.push(`• Mantendo o DY médio atual, o patrimônio estimado para gerar ${fmt(goal)}/mês seria próximo de ${fmt(alvoObjetivo)}.`);
    linhas.push(`• Patrimônio adicional estimado: ${fmt(Math.max(0,alvoObjetivo-tC))}.`);
  }else{
    linhas.push(`• Ainda não há dividendos projetados. O objetivo está salvo como ${fmt(goal)}/mês, mas é necessário preencher o DY anual dos ativos para calcular o caminho.`);
  }
  linhas.push('');

  linhas.push('✅ SUGESTÃO PRÁTICA PARA NOVOS APORTES');
  linhas.push('• Priorizar ativos/setores abaixo do peso desejado, em vez de comprar sempre o ativo que mais caiu.');
  linhas.push('• Evitar aumentar posição que já esteja acima de 20% da carteira.');
  linhas.push('• Conferir se o dividendo mensal vem de lucro/resultado recorrente, não apenas de evento extraordinário.');
  linhas.push('• Registrar cada compra na aba Aportes com o motivo da decisão para acompanhar a estratégia.');
  linhas.push('');
  linhas.push('⚠️ Esta análise é automática e informativa. Não substitui uma recomendação individual feita por profissional habilitado.');

  S.aiText=linhas.join('\n');
  render();
}

function bind(){
  document.querySelectorAll('.fc input,.fc select').forEach(el=>{
    el.addEventListener('keydown',e=>{ if(e.key==='Enter'){ if(S.showA) svA(); else if(S.showP) svP(); } });
  });
}

// ── Init ──────────────────────────────────────────────────
load();
render();
fetchQuotes(false);
setInterval(()=>{
  S.cd=Math.max(0,S.cd-1);
  if(S.cd<=0){ S.cd=QI; fetchQuotes(false); return; }
  const el=document.getElementById('cd-span');
  if(el) el.textContent=S.cd;
},1000);
</script>
</body>
