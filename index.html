<script>
(()=>{try{const t=localStorage.getItem('carteira_theme');const theme=t==='light'?'light':'dark';document.documentElement.dataset.theme=theme;document.documentElement.style.colorScheme=theme;const meta=document.querySelector('meta[name="theme-color"]');if(meta) meta.setAttribute('content',theme==='light'?'#e8eff6':'#07090f');}catch(e){document.documentElement.dataset.theme='dark';document.documentElement.style.colorScheme='dark';}})();

  .div-recent-value{grid-column:2/3;grid-row:2}

  .div-timeline{grid-template-columns:1fr;gap:7px}
}

let THEME = 'dark';
function normalizeTheme(v){
  return String(v||'dark').toLowerCase()==='light' ? 'light' : 'dark';
}
function applyTheme(theme){
  THEME = normalizeTheme(theme);
  document.documentElement.dataset.theme = THEME;
  document.documentElement.style.colorScheme = THEME;
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta) meta.setAttribute('content', THEME_COLOR[THEME] || THEME_COLOR.dark);
}
function loadThemePreference(){
  let theme='dark';
  try{ theme=localStorage.getItem(THEME_STOR); }catch(e){}
  applyTheme(theme);
}
function saveThemePreference(theme){
  applyTheme(theme);
  try{ localStorage.setItem(THEME_STOR, THEME); }catch(e){}
}

function cloneData(v){ return JSON.parse(JSON.stringify(v ?? null)); }
function normalizeEmail(v){ return String(v||'').toLowerCase().trim(); }
function normalizeAccessList(v){
  return Array.isArray(v)
    ? v.map(x=>normalizeEmail(x)).filter(Boolean)
    : [];
}
function isAccessAdmin(email){
  return ACCESS_ADMIN_EMAILS.includes(normalizeEmail(email));
}
function canManageSecurity(){
  return !!FB.user && isAccessAdmin(FB.user.email);

function makeWalletId(){ return `w_${Date.now()}_${Math.random().toString(16).slice(2,8)}`; }
function emptyWallet(name='Carteira principal'){
  return {
    id: makeWalletId(),
    name,
    assets:[],
    aportes:[],
    proventos:[],
    divGoal:0,
    goals:normalizeGoals(),
    learnMeta:{}
  };
}
function normalizeWalletEntry(w, fallbackName='Carteira'){
  const base=emptyWallet(fallbackName);
  const obj=(w&&typeof w==='object')?w:{};
  return {
    ...base,
    id:String(obj.id||base.id),
    name:String(obj.name||fallbackName||base.name),
    assets:Array.isArray(obj.assets)?obj.assets:[],
    aportes:Array.isArray(obj.aportes)?obj.aportes:[],
    proventos:Array.isArray(obj.proventos)?obj.proventos:[],
    divGoal:Number(obj.divGoal)||0,
    goals:normalizeGoals(obj.goals),
    learnMeta:(obj.learnMeta && typeof obj.learnMeta==='object') ? obj.learnMeta : {}
  };
}
function ensureWallets(){
  if(!Array.isArray(S.wallets) || !S.wallets.length){
    const legacy=normalizeWalletEntry({
      assets:S.assets,
      aportes:S.aportes,
      proventos:S.proventos,
      divGoal:S.divGoal,
      goals:S.goals,
      learnMeta:S.learnMeta
    }, 'Carteira principal');
    S.wallets=[legacy];
    S.activeWalletId=legacy.id;
    return;
  }
  S.wallets=S.wallets.map((w,i)=>normalizeWalletEntry(w, i===0?'Carteira principal':`Carteira ${i+1}`));
  if(!S.activeWalletId || !S.wallets.some(w=>w.id===S.activeWalletId)){
    S.activeWalletId=S.wallets[0].id;
  }
}
function activeWallet(){
  ensureWallets();
  return S.wallets.find(w=>w.id===S.activeWalletId) || S.wallets[0];
}
function syncStateFromWallet(w){
  const wallet=normalizeWalletEntry(w);
  S.assets=cloneData(wallet.assets||[]);
  S.aportes=cloneData(wallet.aportes||[]);
  S.proventos=cloneData(wallet.proventos||[]);
  S.divGoal=Number(wallet.divGoal)||0;
  S.goals=normalizeGoals(wallet.goals);
  S.learnMeta=(wallet.learnMeta && typeof wallet.learnMeta==='object') ? wallet.learnMeta : {};
  rebuildLearnMeta();
}
function syncWalletFromState(){
  ensureWallets();
  const w=activeWallet();
  if(!w) return;
  w.assets=cloneData(S.assets||[]);
  w.aportes=cloneData(S.aportes||[]);
  w.proventos=cloneData(S.proventos||[]);
  w.divGoal=Number(S.divGoal)||0;
  w.goals=normalizeGoals(S.goals);
  w.learnMeta=(S.learnMeta && typeof S.learnMeta==='object') ? cloneData(S.learnMeta) : {};
}
function walletLabel(w=activeWallet()){
  if(!w) return 'Carteira';
  const assets=Number(w.assets?.length||0);
  const aportes=Number(w.aportes?.length||0);
  const prov=Number(w.proventos?.length||0);
  return `${w.name} · ${assets} ativos · ${aportes} aportes · ${prov} proventos`;
}
function activeWalletIndex(){
  ensureWallets();
  const idx=S.wallets.findIndex(w=>w.id===S.activeWalletId);
  return idx>=0 ? idx+1 : 1;
}
function walletCount(){
  ensureWallets();
  return Math.max(1, Number(S.wallets?.length||0));
}
function walletTone(idx=1){
  const tones=[
    {bg:'linear-gradient(180deg,rgba(99,102,241,.18),rgba(99,102,241,.08))',bd:'rgba(99,102,241,.35)',fg:'#c7d2fe'},
    {bg:'linear-gradient(180deg,rgba(52,211,153,.18),rgba(52,211,153,.08))',bd:'rgba(52,211,153,.35)',fg:'#a7f3d0'},
    {bg:'linear-gradient(180deg,rgba(251,191,36,.18),rgba(251,191,36,.08))',bd:'rgba(251,191,36,.35)',fg:'#fde68a'},
    {bg:'linear-gradient(180deg,rgba(244,114,182,.18),rgba(244,114,182,.08))',bd:'rgba(244,114,182,.35)',fg:'#f9a8d4'},
    {bg:'linear-gradient(180deg,rgba(96,165,250,.18),rgba(96,165,250,.08))',bd:'rgba(96,165,250,.35)',fg:'#bfdbfe'}
  ];
  return tones[(Math.max(1,idx)-1)%tones.length];
}
function walletChip(){
  const idx=activeWalletIndex();
  const total=walletCount();
  const tone=walletTone(idx);
  return `<span class="wallet-chip" style="display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:999px;border:1px solid ${tone.bd};background:${tone.bg};color:${tone.fg};font-size:10px;font-weight:700;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)">${idx}<span style="opacity:.7">/</span>${total}</span>`;
}
function walletPill(w, idx){

      <span style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:${active?'700':'600'}">${esc(w.name)}</span>

  </button>`;
}
function switchWallet(id){
  ensureWallets();
  syncWalletFromState();
  const next=S.wallets.find(w=>w.id===id);
  if(!next){
    save();
    render();
    return;
  }
  if(next.id===S.activeWalletId){
    save();
    render();
    return;
  }
  S.activeWalletId=next.id;
  syncStateFromWallet(next);
  save();
  render();
  toast(`📁 ${next.name} ativada.`);
}
function createWallet(){
  ensureWallets();
  syncWalletFromState();
  const name=(prompt('Nome da nova carteira:', `Carteira ${S.wallets.length+1}`)||'').trim();
  if(!name) return;
  const w=emptyWallet(name);
  S.wallets.push(w);
  S.activeWalletId=w.id;
  syncStateFromWallet(w);
  save();
  render();
  toast(`✅ Carteira "${name}" criada.`);
}
function duplicateWallet(){
  ensureWallets();
  syncWalletFromState();
  const src=activeWallet();
  if(!src) return;
  const name=(prompt('Nome da carteira duplicada:', `${src.name} - cópia` )||'').trim();
  if(!name) return;
  const copy=normalizeWalletEntry({...cloneData(src), id:makeWalletId(), name}, name);
  S.wallets.push(copy);
  S.activeWalletId=copy.id;
  syncStateFromWallet(copy);
  save();
  render();
  toast(`✅ Carteira duplicada como "${name}".`);
}
function renameWallet(){
  ensureWallets();
  const w=activeWallet();
  if(!w) return;
  const name=(prompt('Novo nome da carteira:', w.name)||'').trim();
  if(!name) return;
  w.name=name;
  save();
  render();
  toast(`✏️ Carteira renomeada para "${name}".`);
}
function deleteWallet(){
  ensureWallets();
  if(S.wallets.length<=1){
    toast('⚠️ Mantenha ao menos uma carteira.');
    return;
  }
  const w=activeWallet();
  if(!w) return;
  const typed=(prompt(`Confirme a exclusão digitando exatamente o nome da carteira:\n\n"${w.name}"`)||'').trim();
  if(!typed) return;
  if(typed!==String(w.name||'')){
    toast('⚠️ Nome digitado não confere. Exclusão cancelada.','#fbbf24');
    return;
  }
  const ok=confirm(`Última confirmação: excluir a carteira "${w.name}"? Isso remove só essa carteira do perfil.`);
  if(!ok) return;
  const idx=S.wallets.findIndex(x=>x.id===w.id);
  if(idx<0) return;
  S.wallets.splice(idx,1);
  const next=S.wallets[Math.min(idx, S.wallets.length-1)];
  S.activeWalletId=next.id;
  syncStateFromWallet(next);
  save();
  render();
  toast(`🗑️ Carteira "${w.name}" excluída.`);
}

function save(){
  try{
    syncWalletFromState();
    localStorage.setItem(STOR, JSON.stringify({
      wallets:S.wallets, activeWalletId:S.activeWalletId,
      assets:S.assets, aportes:S.aportes, proventos:S.proventos,
      tab:S.tab, divGoal:S.divGoal, goals:S.goals,
      hideValues:S.hideValues,
      apHistoryOpen:S.apHistoryOpen, apSearch:S.apSearch,
      dashPeriod:S.dashPeriod, dashType:S.dashType,
      rentPeriod:S.rentPeriod, rentType:S.rentType, rentBench:S.rentBench,
      irpfYear:S.irpfYear, irpfStep:S.irpfStep,
      learnMeta:S.learnMeta
    }));
    queueCloudSave();
  }catch(e){ console.error('save erro:',e); toast('⚠️ Erro ao salvar dados localmente.','#f87171'); }
}
function saveConfig(){
  try{ localStorage.setItem(STOR+'_cfg', JSON.stringify({brapiToken:S.brapiToken, divGoal:S.divGoal})); queueCloudSave(); }catch(e){}
}
function markProventosDirty(){
  S.autoProvDirty=true;
}
function isAutoGeneratedProvento(p){
  const source=String(p?.source||'').toLowerCase();
  if(source==='b3-movement') return false;
  if(source==='posicaodetalhada b3/xp') return false;
  if(source==='b3 proventos recebidos') return false;
  return !!p?.autoKey || source.startsWith('auto');
}
function stripAutoProventos(){
  const before=Number(S.proventos?.length||0);
  S.proventos=(S.proventos||[]).filter(p=>!isAutoGeneratedProvento(p));
  return before-(S.proventos?.length||0);
}
function scheduleAutoProventosGratis(reason='change'){
  markProventosDirty();
  clearTimeout(S.autoProvTimer);
  S.autoProvTimer=setTimeout(()=>runAutoProventosGratis(reason), 1400);
}
async function runAutoProventosGratis(reason='change'){
  if(S.autoProvRunning) return;
  if(!S.autoProvDirty && reason!=='force') return;
  S.autoProvRunning=true;
  try{
    if(!S.assets.length || !S.aportes.length){
      const cleaned=stripAutoProventos();
      S.autoProvDirty=false;
      if(cleaned>0){ save(); render(); toast(`🧹 ${cleaned} provento(s) automático(s) removido(s) por falta de aportes.`); }
      return;
    }
    const result = await fetchAutoProventosGratis();
    if(!result){
      S.autoProvDirty=false;
      return;
    }
    const { added, cleaned } = result;
    S.autoProvDirty=false;
    if(cleaned>0 || added>0){
      const parts=[];
      if(cleaned>0) parts.push(`${cleaned} removido(s)`);
      if(added>0) parts.push(`${added} adicionado(s)`);
      toast(`✅ Proventos automáticos sincronizados: ${parts.join(' · ')}.`, '#6ee7b7');
    }
  }finally{
    S.autoProvRunning=false;
  }
}

function load(){
  // ← FIX: try-catch separados para não perder tudo se um falhar
  try{
    const d=JSON.parse(localStorage.getItem(STOR)||'{}');
    if(Array.isArray(d.wallets) && d.wallets.length){
      S.wallets=d.wallets.map((w,i)=>normalizeWalletEntry(w, i===0?'Carteira principal':`Carteira ${i+1}`));
      S.activeWalletId=String(d.activeWalletId||S.wallets[0].id);
      const active=S.wallets.find(w=>w.id===S.activeWalletId) || S.wallets[0];
      syncStateFromWallet(active);
    }else{
      if(Array.isArray(d.assets))    S.assets    = d.assets;
      if(Array.isArray(d.aportes))   S.aportes   = d.aportes;
      if(Array.isArray(d.proventos)) S.proventos = d.proventos;
    }
    if(d.tab)                       S.tab       = d.tab==='ranking' ? 'ativos' : d.tab;       // ← FIX: restaura tab
    if(d.divGoal !== undefined)     S.divGoal   = Number(d.divGoal)||0;
    if(d.hideValues !== undefined)  S.hideValues = !!d.hideValues;
    if(d.apHistoryOpen !== undefined) S.apHistoryOpen = !!d.apHistoryOpen;
    if(d.apSearch !== undefined)     S.apSearch  = String(d.apSearch||'');
    if(d.dashPeriod !== undefined)   S.dashPeriod = Math.max(3, Number(d.dashPeriod)||12);
    if(d.dashType !== undefined)     S.dashType = String(d.dashType||'all');
    if(d.rentPeriod !== undefined)   S.rentPeriod = String(d.rentPeriod||'all');
    if(d.rentType !== undefined)     S.rentType = String(d.rentType||'all');
    if(d.rentBench !== undefined)    S.rentBench = String(d.rentBench||'CDI');
    if(d.irpfYear !== undefined)     S.irpfYear = Math.max(2010, Number(d.irpfYear)||new Date().getFullYear());
    if(d.irpfStep !== undefined)     S.irpfStep = Math.min(4, Math.max(1, Number(d.irpfStep)||1));
    if(d.goals && typeof d.goals==='object') S.goals = normalizeGoals(d.goals);
    if(d.learnMeta && typeof d.learnMeta==='object') S.learnMeta = d.learnMeta;
  }catch(e){ console.error('load erro:',e); }
  try{
    const c=JSON.parse(localStorage.getItem(STOR+'_cfg')||'{}');
    if(c.brapiToken)            S.brapiToken = c.brapiToken;
    else                        S.brapiToken = DEFAULT_BRAPI; // garante token padrão
    if(c.divGoal !== undefined) S.divGoal    = Number(c.divGoal)||S.divGoal;
  }catch(e){ S.brapiToken = DEFAULT_BRAPI; }
  // Migração de versões antigas (civ4, civ3...)
  if(!S.aportes.length && !S.assets.length){
    for(const k of ['civ4','civ3','civ2','carteira_v1']){
      try{
        const d=JSON.parse(localStorage.getItem(k)||'{}');
        if(Array.isArray(d.aportes) && d.aportes.length){
          S.aportes=d.aportes; S.assets=d.assets||[]; S.proventos=d.proventos||[];
          if(d.divGoal) S.divGoal=Number(d.divGoal)||0;
          if(d.dashPeriod !== undefined) S.dashPeriod=Math.max(3, Number(d.dashPeriod)||12);
          if(d.dashType !== undefined) S.dashType=String(d.dashType||'all');
          if(d.rentPeriod !== undefined) S.rentPeriod=String(d.rentPeriod||'all');
          if(d.rentType !== undefined) S.rentType=String(d.rentType||'all');
          if(d.rentBench !== undefined) S.rentBench=String(d.rentBench||'CDI');
          if(d.irpfYear !== undefined) S.irpfYear=Math.max(2010, Number(d.irpfYear)||new Date().getFullYear());
          if(d.irpfStep !== undefined) S.irpfStep=Math.min(4, Math.max(1, Number(d.irpfStep)||1));
          if(d.goals && typeof d.goals==='object') S.goals=normalizeGoals(d.goals);
          if(d.learnMeta && typeof d.learnMeta==='object') S.learnMeta=d.learnMeta;
          save(); break;
        }
      }catch(e){}
    }
  }
  ensureWallets();
  syncWalletFromState();
  if(!S.goals || typeof S.goals!=='object') S.goals=normalizeGoals();
  else S.goals=normalizeGoals(S.goals);
  rebuildLearnMeta();

  const cleanedB3Aportes = cleanupB3PositionAportes();

function initFirebase(){
  try{
    if(!window.firebase) return;
    FB.app  = firebase.initializeApp(firebaseConfig);
    FB.auth = firebase.auth();
    FB.db   = firebase.firestore();
    FB.ready = true;
    try{ FB.db.enablePersistence({synchronizeTabs:true}).catch(()=>{}); }catch(e){}
    FB.auth.onAuthStateChanged(async user=>{
      FB.user = user || null;
      if(FB.user){
        FB.access.loading = true;
        FB.access.loaded = false;
        FB.access.allowed = false;
        FB.access.reason = '';
        render();
        const ok = await loadAccessControl(FB.user);
        await recordAccessAttempt(FB.user, ok, FB.access.reason);
        if(!ok){
          stopCloudSync(false);
          try{ await FB.auth.signOut(); }catch(e){}
          FB.user = null;
          FB.access.loading = false;
          toast('⛔ Seu e-mail não está autorizado para acessar este site.','#f87171');
          render();
          return;
        }
        FB.access.loading = false;
        startCloudSync();
      }else{
        FB.access.loading = false;
        FB.access.loaded = false;
        FB.access.allowed = false;
        FB.access.reason = '';
        FB.access.cfg = null;
        FB.access.lastDeniedAt = null;
        stopCloudSync();
      }
      render();
    });
  }catch(e){
    console.warn('Firebase indisponível:', e);
    FB.ready=false;
  }
}
async function loadAccessControl(user){
  const email = normalizeEmail(user?.email);
  if(!FB.db || !email){
    FB.access = {loaded:true,loading:false,allowed:false,reason:'Conecte sua conta Google autorizada para acessar o sistema.',cfg:null,lastDeniedAt:new Date().toISOString()};
    return false;
  }
  try{
    const snap = await FB.db.collection('meta').doc('access').get();
    if(!snap.exists){
      const isAdmin = isAccessAdmin(email);
      FB.access = {
        loaded:true,
        loading:false,
        allowed:isAdmin,
        reason:isAdmin ? '' : 'O controle de acesso ainda não foi configurado neste ambiente.',
        cfg:null,
        lastDeniedAt:isAdmin ? null : new Date().toISOString()
      };
      return isAdmin;
    }
    const cfg = snap.exists ? (snap.data() || {}) : {};
    const enabled = cfg.enabled !== false;
    const allowedEmails = normalizeAccessList(cfg.allowedEmails);
    const blockedEmails = normalizeAccessList(cfg.blockedEmails);
    const allowedDomains = normalizeAccessList(cfg.allowedDomains);
    const domain = email.includes('@') ? email.split('@').pop() : '';
    const isBlocked = blockedEmails.includes(email);
    const isAllowed = enabled && !isBlocked && (
      allowedEmails.includes(email) ||
      (domain && allowedDomains.includes(domain))
    );
    FB.access = {
      loaded:true,
      loading:false,
      allowed:isAllowed,
      reason:isAllowed ? '' : String(cfg.message || 'Acesso restrito a usuários aprovados.'),
      cfg,
      lastDeniedAt:isAllowed ? null : new Date().toISOString()
    };
    return isAllowed;
  }catch(e){
    console.warn('Acesso:', e);
    FB.access = {loaded:true,loading:false,allowed:false,reason:'Não foi possível validar o acesso agora.',cfg:null,lastDeniedAt:new Date().toISOString()};
    return false;
  }
}
async function recordAccessAttempt(user, allowed, reason=''){
  try{
    if(!FB.db || !user?.uid) return;
    const ref = FB.db.collection('users').doc(user.uid);
    await ref.set({
      email: user.email || '',
      displayName: user.displayName || '',
      photoURL: user.photoURL || '',
      allowed: !!allowed,
      lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
      lastSeenLocal: new Date().toISOString(),
      loginCount: firebase.firestore.FieldValue.increment(1),
      lastReason: String(reason || ''),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge:true });
  }catch(e){
    console.warn('log acesso:', e);
  }
}
function portfolioRef(){

function sanitizeFirestoreValue(value, seen=new WeakSet()){
  if(value===undefined || typeof value==='function' || typeof value==='symbol') return undefined;
  if(value===null || typeof value==='string' || typeof value==='boolean') return value;
  if(typeof value==='number') return Number.isFinite(value) ? value : null;
  if(value instanceof Date) return value;
  if(Array.isArray(value)){
    return value.map(item=>{
      const clean=sanitizeFirestoreValue(item, seen);
      return clean===undefined ? null : clean;
    });
  }
  if(value && typeof value==='object'){
    if(seen.has(value)) return undefined;
    seen.add(value);
    const out={};
    for(const [key, item] of Object.entries(value)){
      const clean=sanitizeFirestoreValue(item, seen);
      if(clean!==undefined) out[key]=clean;
    }
    seen.delete(value);
    return out;
  }
  return value;
}
function cloudSyncErrorMessage(error){
  const code=String(error?.code||error?.name||'').toLowerCase();
  const message=String(error?.message||error||'').trim();
  if(code.includes('permission-denied') || /insufficient permissions/i.test(message)) return 'Sem permissão para salvar na nuvem.';
  if(code.includes('unauth') || /not authenticated|unauthenticated/i.test(message)) return 'Faça login com Google para sincronizar.';
  if(/undefined/i.test(message)) return 'O payload da nuvem contém campos inválidos.';
  if(/invalid|failed-precondition|failed to set/i.test(message)) return 'A estrutura enviada para a nuvem foi recusada.';
  if(/network|offline|unavailable|deadline/i.test(message)) return 'Falha temporária de conexão com a nuvem.';
  return 'Falha técnica ao sincronizar com a nuvem.';
}
function isTransientCloudError(error){
  const code=String(error?.code||error?.name||'').toLowerCase();
  const message=String(error?.message||error||'').toLowerCase();
  return /network|offline|unavailable|deadline|aborted|cancelled|timeout/.test(code) || /network|offline|unavailable|deadline|aborted|cancelled|timeout/.test(message);
}
function logCloudSyncError(error, context='uploadLocalToCloud'){
  const ref=portfolioRef();
  const payload=cloudPayload();
  console.error(`[${context}] cloud sync failed`, {
    code:error?.code||error?.name||'unknown',
    message:error?.message||String(error||''),
    path:ref?.path||null,
    userUid:FB.user?.uid||null,
    walletId:S.activeWalletId||null,
    pending:!!FB.pendingCloudSave,
    accessAllowed:!!FB.access.allowed,
    cloudLoaded:!!FB.cloudLoaded,
    payloadSummary:{
      wallets:Array.isArray(payload.wallets)?payload.wallets.length:0,
      assets:Array.isArray(payload.assets)?payload.assets.length:0,
      aportes:Array.isArray(payload.aportes)?payload.aportes.length:0,
      proventos:Array.isArray(payload.proventos)?payload.proventos.length:0,
    },
    stack:error?.stack||null
  });
}
function scheduleCloudRetry(delay=12000){

function applyCloudData(d){
  if(!d) return;
  FB.applying=true;

    S.wallets=d.wallets.map((w,i)=>normalizeWalletEntry(w, i===0?'Carteira principal':`Carteira ${i+1}`));

  }
  if(d.divGoal!==undefined && !(Array.isArray(d.wallets) && d.wallets.length)) S.divGoal = Number(d.divGoal)||0;
  if(d.goals && typeof d.goals==='object' && !(Array.isArray(d.wallets) && d.wallets.length)) S.goals = normalizeGoals(d.goals);
  if(d.learnMeta && typeof d.learnMeta==='object' && !(Array.isArray(d.wallets) && d.wallets.length)) S.learnMeta = d.learnMeta;

    if(d.rentabilidade.type !== undefined) S.rentType = String(d.rentabilidade.type||'all');

    localStorage.setItem(STOR+'_cfg', JSON.stringify({brapiToken:S.brapiToken, divGoal:S.divGoal}));
  }catch(e){}
  FB.lastCloudUpdate = d.updatedAtLocal || new Date().toISOString();
  FB.applying=false;
}
function startCloudSync(){
  const ref=portfolioRef();
  if(!ref) return;
  stopCloudSync(false);
  FB.cloudLoaded=false;
  FB.unsub=ref.onSnapshot(async snap=>{
    try{
      if(!snap.exists){
        if(hasLocalData()) await uploadLocalToCloud(false);
        FB.cloudLoaded=true;
        if(FB.pendingCloudSave) queueCloudSave();
        render();
        return;
      }
      const data=snap.data()||{};
      applyCloudData(data);
      FB.cloudLoaded=true;
      if(FB.pendingCloudSave) queueCloudSave();
      render();
    }catch(e){ console.warn('cloud sync:',e); }
  },err=>{
    console.warn('Firestore:',err);
    toast('⚠️ Erro na sincronização com a nuvem. Confira regras do Firestore.','#fbbf24');
  });
}
function stopCloudSync(doRender=true){

function queueCloudSave(){

async function uploadLocalToCloud(show=true){

  const ref=portfolioRef();
  if(!ref) { if(show) toast('Entre com Google para sincronizar na nuvem.','#fbbf24'); return; }
  try{
    const payload=cloudPayload();
    payload.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
    await ref.set(payload, {merge:true});
    FB.lastCloudUpdate=new Date().toISOString();
    FB.lastCloudError=null;

function backupStamp(date=new Date()){
  const pad=n=>String(n).padStart(2,'0');
  return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}-${pad(date.getHours())}-${pad(date.getMinutes())}`;
}
function backupCurrentState(){

    wallets: cloneData(S.wallets||[]),

    divGoal: Number(S.divGoal)||0,

    dashPeriod: Number(S.dashPeriod)||12,
    dashType: String(S.dashType||'all'),
    rentPeriod: String(S.rentPeriod||'all'),
    rentType: String(S.rentType||'all'),
    rentBench: String(S.rentBench||'CDI'),
    irpfYear: Number(S.irpfYear)||new Date().getFullYear(),
    irpfStep: Number(S.irpfStep)||1,
    learnMeta: cloneData(S.learnMeta||{}),
    tab: String(S.tab||'dashboard')
  };
}
function backupCurrentConfig(){
  return {brapiToken:String(S.brapiToken||''), divGoal:Number(S.divGoal)||0};
}
function backupPayload(){
  const data=backupCurrentState();
  const storage={};
  storage[STOR]=data;
  storage[`${STOR}_cfg`]=backupCurrentConfig();
  return {
    meta:{
      app:APP_NAME,
      backupVersion:BACKUP_VER,
      exportedAt:new Date().toISOString(),
      origin:'localStorage',
      storageKeys:[STOR, `${STOR}_cfg`]
    },
    data,
    storage
  };
}
function backupFromRaw(raw){
  if(!raw || typeof raw!=='object' || Array.isArray(raw)) return null;
  const meta=raw.meta && typeof raw.meta==='object' ? raw.meta : null;
  const data=raw.data && typeof raw.data==='object' ? raw.data : raw;
  const storage=raw.storage && typeof raw.storage==='object' ? raw.storage : null;
  const hasKnown=Array.isArray(data.wallets) || Array.isArray(data.assets) || Array.isArray(data.aportes) || Array.isArray(data.proventos) || data.goals || data.divGoal!==undefined || data.learnMeta || data.brapiToken!==undefined;
  if(!hasKnown && !(meta && /carteira/i.test(String(meta.app||'')))) return null;
  return {meta,data,storage};
}
function backupStats(data){
  const wallets=Array.isArray(data.wallets) ? data.wallets : [];
  const assets=Array.isArray(data.assets) ? data.assets : [];
  const aportes=Array.isArray(data.aportes) ? data.aportes : [];
  const proventos=Array.isArray(data.proventos) ? data.proventos : [];
  const goals=data.goals && typeof data.goals==='object' ? data.goals : {};
  const defaultGoals=normalizeGoals();
  const goalsChanged=Object.keys(goals).filter(k=>JSON.stringify(goals[k] ?? null)!==JSON.stringify(defaultGoals[k] ?? null)).length;
  return {
    wallets:wallets.length,
    assets:assets.length,
    aportes:aportes.length,
    proventos:proventos.length,
    fixed:assets.filter(isRendaFixaAsset).length,
    goals:goalsChanged,
    hasToken:!!String(data.brapiToken||'').trim()
  };
}
function backupImportedAt(payload){
  const iso=payload?.meta?.exportedAt || payload?.data?.exportedAt || payload?.exportedAt || '';
  const d=iso ? new Date(iso) : null;
  return d && !Number.isNaN(d.getTime()) ? d.toLocaleString('pt-BR') : '—';
}

  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([data],{type:'application/json'})),download:`carteira-investimentos-backup-${backupStamp()}.json`});
  a.click();

}

function applyBackupData(parsed){
  const payload=backupFromRaw(parsed);
  if(!payload){
    toast('Arquivo inválido. Selecione um backup do app.', '#f87171');
    return false;
  }
  const state=payload.storage?.[STOR] || payload.data || {};

async function loadPdfJs(){
  if(window.__pdfjsLib) return window.__pdfjsLib;
  if(!window.__pdfjsPromise){
    window.__pdfjsPromise = import('https://cdn.jsdelivr.net/npm/pdfjs-dist@5.6.205/legacy/build/pdf.mjs')
      .then(mod=>{
        try{
          mod.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@5.6.205/legacy/build/pdf.worker.mjs';
        }catch(e){}
        window.__pdfjsLib = mod;
        return mod;
      });
  }
  return window.__pdfjsPromise;
}
function pdfLinesFromTextContent(textContent){
  const rows=new Map();
  (textContent?.items||[]).forEach(item=>{
    const y=Math.round(item.transform?.[5]||0);
    const x=Math.round(item.transform?.[4]||0);
    if(!rows.has(y)) rows.set(y,[]);
    rows.get(y).push({x, s:String(item.str||'')});
  });
  return [...rows.keys()].sort((a,b)=>b-a).map(y=>rows.get(y).sort((a,b)=>a.x-b.x).map(v=>v.s).join(' ').replace(/\s+/g,' ').trim()).filter(Boolean);
}
function pdfSectionFromLine(line){
  const s=String(line||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  if(s.includes('emprestimo de ativos')) return 'Empréstimos';
  if(s === 'acoes' || s.startsWith('acoes ')) return 'Ações';
  if(s.includes('etf - exchange traded fund')) return 'ETF';
  if(s.includes('fii - fundo de investimento imobiliario')) return 'FII';
  if(s.includes('fundo de investimento')) return 'Fundos de Investimento';
  if(s.includes('cdb - certificado de deposito bancario')) return 'Renda Fixa';
  if(s.includes('cra - certificado de recebiveis do agronegocio')) return 'Renda Fixa';
  if(s.includes('deb - debentures')) return 'Renda Fixa';
  if(s.includes('lig - letra imobiliaria garantida')) return 'Renda Fixa';
  return '';
}
function pdfIsRowStart(line, section){
  const s=String(line||'').trim();
  if(!s) return false;
  if(/^total\b/i.test(s)) return false;
  if(/^extrato de pos/i.test(s)) return false;
  if(/^paulo sergio/i.test(s)) return false;
  if(/^filtros aplicados/i.test(s)) return false;
  if(/^data:/i.test(s) || /^tipo de investimento:/i.test(s) || /^instituicao:/i.test(s) || /^marcacoes:/i.test(s)) return false;
  if(/^produto\b/i.test(s) || /^tipo\b/i.test(s) || /^instituicao\b/i.test(s) || /^quantidade\b/i.test(s) || /^preco\b/i.test(s) || /^valor\b/i.test(s)) return false;
  if(/^preço\b/i.test(s) || /^fechamento\b/i.test(s) || /^atualizado\b/i.test(s)) return false;
  if(/^acesse investidor/i.test(s)) return false;
  if(section==='Renda Fixa') return /^(CDB|CRA|DEB|LIG)\b/i.test(s);
  return /^[A-Z0-9]{4,6}[0-9]{1,2}\b/.test(s);
}
function pdfBlockToItem(block, section){
  const txt=String(block||'').replace(/\s+/g,' ').trim();
  if(!txt || section==='Empréstimos') return null;
  if(section==='Renda Fixa'){
    const head=txt.match(/^(?<code>CDB|CRA|DEB|LIG)\s*-\s*/i);
    const tail=txt.match(/(?<date>\d{2}\/\d{2}\/\d{4})[\s\S]*?(?<qty>[\d.,]+)\s+R\$\s*(?<price>[\d.,]+)[\s\S]*?(?:R\$\s*)?(?<value>[\d.,]+)\b/i);
    if(!head || !tail) return null;
    const code=head.groups.code.toUpperCase();
    const product=txt.slice(head[0].length, tail.index).replace(/\s+/g,' ').trim();
    const qty=parseNum(tail.groups.qty);
    const price=parseNum(tail.groups.price);
    const value=parseNum(tail.groups.value);
    const ticker=cleanAssetCode(`${code} ${product} ${tail.groups.date}`);
    const sector=code==='CDB'?'CDB':code==='CRA'?'CRA':code==='DEB'?'Debênture':'LIG';
    return {ticker,qty,price,value:value||qty*price,type:normalizeType('Renda Fixa','Renda Fixa'),sector,product,section};
  }
  const head=txt.match(/^(?<ticker>[A-Z0-9]{4,6}[0-9]{1,2})\s*-\s*/i);
  const tail=txt.match(/(?:R\$\s*)?(?<kind>PN|UNIT|Cotas|Direito|Ações|Acoes|Criptoativo|Internacional|Renda Fixa)\b[\s\S]*?(?<qty>[\d.,]+)\s+R\$\s*(?<price>[\d.,]+)[\s\S]*?(?:R\$\s*)?(?<value>[\d.,]+)\b/i);
  if(!head || !tail) return null;
  const ticker=head.groups.ticker.toUpperCase();
  const qty=parseNum(tail.groups.qty);
  const price=parseNum(tail.groups.price);
  const value=parseNum(tail.groups.value);
  const kind=tail.groups.kind;
  const product=txt.slice(head[0].length, tail.index).replace(/\s+/g,' ').trim();
  const meta=inferB3PositionMeta(section, ticker, product, kind);
  const type=normalizeType(meta.type||'Ação','Ação');
  const sector=meta.sector||'';
  return {ticker,qty,price,value:value||qty*price,type,sector,product,section,kind};
}
async function parseB3PositionPdf(file){
  const pdfjs=await loadPdfJs();
  const data=new Uint8Array(await file.arrayBuffer());
  const doc=await pdfjs.getDocument({data}).promise;
  const items=[]; const warnings=[];
  const stats={importedBySheet:{},ignoredBySheet:{},skippedSheets:[],ignoredByReason:{},totalIgnored:0};
  const importedSet=new Set();
  const addImported=sheet=>{ stats.importedBySheet[sheet]=(stats.importedBySheet[sheet]||0)+1; importedSet.add(sheet); };
  const addIgnored=(sheet,reason)=>{
    stats.totalIgnored++;
    stats.ignoredBySheet[sheet]=(stats.ignoredBySheet[sheet]||0)+1;
    if(reason) stats.ignoredByReason[reason]=(stats.ignoredByReason[reason]||0)+1;
  };
  let importDate=new Date().toLocaleDateString('pt-BR');
  const blocks=[];
  for(let p=1;p<=doc.numPages;p++){
    const page=await doc.getPage(p);
    const text=await page.getTextContent();
    const lines=pdfLinesFromTextContent(text);
    const pageText=lines.join(' ');
    const pageDateMatch=pageText.match(/Data:\s*(\d{2}\/\d{2}\/\d{4})/i);
    if(pageDateMatch) importDate=pageDateMatch[1];
    let section='';
    let current=[];
    const flush=()=>{
      if(!current.length) return;
      const block=current.join(' ');
      blocks.push({section,block,page:p});
      current=[];
    };
    for(const line of lines){
      const sec=pdfSectionFromLine(line);
      if(sec){
        flush();
        section=sec;
        if(sec==='Empréstimos' && !stats.skippedSheets.includes(sec)) stats.skippedSheets.push(sec);
        continue;
      }
      const s=String(line||'').trim();
      if(!s) continue;
      if(/^total\b/i.test(s) || /^extrato de pos/i.test(s) || /^acesse investidor/i.test(s)) { flush(); continue; }
      if(section==='Empréstimos') continue;
      if(pdfIsRowStart(s, section)){
        flush();
        current=[s];
        continue;
      }
      if(current.length) current.push(s);
    }
    flush();
  }
  for(const {section,block,page} of blocks){
    const item=pdfBlockToItem(block, section);
    if(!item){
      addIgnored(section||'PDF','linha não reconhecida');
      warnings.push(`PDF página ${page} (${section||'sem seção'}): linha não reconhecida.`);
      continue;
    }
    items.push({...item,date:importDate});
    addImported(item.section||section||'PDF');
  }
  if(!stats.skippedSheets.includes('Empréstimos')) stats.skippedSheets.push('Empréstimos');
  return {items,warnings,importDate,stats,kind:'position'};
}
function b3MovementNorm(v){
  return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim().toUpperCase();
}
function b3MovementTicker(product){
  const s=b3MovementNorm(product);
  if(!s) return '';
  const m=s.match(/\b(CDB|CRA|DEB|LIG|LCI|LCA|LF|RDB)\s*-\s*([A-Z0-9]+)/i);
  if(m){
    const pref=m[1].toUpperCase();
    const code=m[2].toUpperCase();
    return cleanAssetCode(code.startsWith(pref) ? code : `${pref}${code}`);
  }
  const p=s.match(/\b(CDB|CRA|DEB|LIG|LCI|LCA|LF|RDB)\b/i);
  if(p){
    const rest=s.slice(p.index + p[0].length).replace(/^[-\s]+/,'').match(/^([A-Z0-9]+)/);
    if(rest){
      const pref=p[1].toUpperCase();
      const code=rest[1].toUpperCase();
      return cleanAssetCode(code.startsWith(pref) ? code : `${pref}${code}`);
    }
    return cleanAssetCode(p[1].toUpperCase());
  }
  const first=s.split(' - ')[0] || s.split(' ').filter(Boolean)[0] || s;
  return cleanAssetCode(first);
}
function b3MovementAssetType(product, ticker='', mov=''){
  const tk=String(ticker||b3MovementTicker(product)||'').trim().toUpperCase();
  const meta=inferB3PositionMeta('Movimentação', tk, product, mov);
  return normalizeType(meta.type || metaTicker(tk).type || 'Ação','Ação');
}
function b3MovementKind(mov){
  const s=b3MovementNorm(mov);
  if(/DIVIDENDO|DIVIDENDOS|JCP|JUROS SOBRE CAPITAL|RENDIMENTO|RENDIMENTOS|PAGAMENTO DE JUROS|PAGAMENTO DE RENDIMENTO/.test(s)) return 'provento';
  if(/TRANSFERENCIA\s*-\s*LIQUIDACAO|TRANSFERENCIA LIQUIDACAO/.test(s)) return 'transferencia';
  if(/TRANSFERENCIA SEM FINANCEIRO|SAIDA\/ENTR\. CUST-TRANSF S\/FIN|RETIRADA DE CUSTODIA|TRANSFERENCIA/.test(s)) return 'transferencia';
  if(/BONIFICACAO|DESDOBRAMENTO|DESDOBRO|GRUPAMENTO|FRACAO|DIREITO DE SUBSCRICAO|DIREITOS DE SUBSCRICAO|SOLICITACAO DE SUBSCRICAO|RECIBO DE SUBSCRICAO|CESSAO DE DIREITOS|ATUALIZACAO|LEILAO DE FRACAO|EVENTO GENERICO/.test(s)) return 'evento';
  if(/VENCIMENTO\/RESGATE SALDO EM CONTA|VENCIMENTO/.test(s)) return 'aporte';
  if(/RESGATE ANTECIPADO/.test(s)) return 'resgate';
  if(/COMPRA|APLICA|SUBSCRICAO|ENTRADA/.test(s)) return 'aporte';
  if(/VENDA|SAIDA/.test(s)) return 'resgate';
  return 'revisar';
}
function b3MovementClassify(mov, entryExit, product='', qty=0, price=0, value=0, assetType=''){
  const s=b3MovementNorm(mov);
  const e=b3MovementNorm(entryExit);
  const type=normalizeType(assetType || b3MovementAssetType(product, '', mov), 'Ação');
  const hasValid=String(product||'').trim() && Number(qty)>0 && Number(price)>0 && Number(value)>0;
  const exact=txt=>b3MovementNorm(txt);
  const isTransferLiquidity=/TRANSFERENCIA\s*-\s*LIQUIDACAO|TRANSFERENCIA LIQUIDACAO/.test(s);
  const isTransfer=/TRANSFERENCIA SEM FINANCEIRO|SAIDA\/ENTR\. CUST-TRANSF S\/FIN|RETIRADA DE CUSTODIA|EMPRESTIMO|TRANSFERENCIA/.test(s);
  const isSocietary=/BONIFICACAO|DESDOBRAMENTO|DESDOBRO|GRUPAMENTO|FRACAO|DIREITO DE SUBSCRICAO|DIREITOS DE SUBSCRICAO|SOLICITACAO DE SUBSCRICAO|RECIBO DE SUBSCRICAO|CESSAO DE DIREITOS|ATUALIZACAO|LEILAO DE FRACAO|EVENTO GENERICO/.test(s);
  const isProvento=/RENDIMENTO|DIVIDENDO|JCP|JUROS SOBRE CAPITAL|PAGAMENTO DE JUROS|PAGAMENTO DE RENDIMENTO/.test(s);
  const isReviewProvento=/REEMBOLSO|AMORTIZA|RESTITUICAO DE CAPITAL/.test(s);
  const isHistoric=/COMPRA|VENDA|COMPRA\s*\/\s*VENDA|COMPRA\/VENDA|COMPRA\/VENDA DEFINITIVA\/CESSAO|APLICA|RESGATE ANTECIPADO|VENCIMENTO\/RESGATE SALDO EM CONTA|VENCIMENTO|RESGATE\b/.test(s);
  let destination='revisar';
  let status='Revisar';
  let confidence='Baixa';
  let action='revisar';
  let operationLabel='Revisar';
  let note='Linha sem classificação segura.';
  let group='Revisar manualmente';
  let includeDefault=false;
  let reviewReason='';
  if(isProvento){
    destination='proventos';
    status='Proventos';
    group='Proventos / juros';
    action='provento';
    operationLabel='Provento';
    note='Vai para Proventos.';
    confidence=isReviewProvento ? 'Média' : (hasValid ? 'Alta' : 'Média');
    includeDefault=!isReviewProvento && hasValid;
    if(/TRANSFERIDO/.test(s)) confidence='Média';
    if(/REEMBOLSO/.test(s)) note='Reembolso fica em revisão.';
    if(/AMORTIZA/.test(s)) note='Amortização fica em revisão.';
    if(/RESTITUICAO/.test(s)) note='Restituição de capital fica em revisão.';
    if(isReviewProvento){
      destination='revisar';
      status='Revisar';
      group='Revisar manualmente';
      action='revisar';
      confidence='Média';
      includeDefault=false;
    }
  }else if(isSocietary){
    destination='eventos';
    status='Eventos';
    group='Eventos societários';
    action='revisar';
    operationLabel='Evento societário';
    note='Evento societário para revisão.';
    confidence='Baixa';
    includeDefault=false;
  }else if(isTransfer || isTransferLiquidity){
    const validTrade=hasValid && Number(qty)>0 && Number(price)>0 && Number(value)>0;
    const isRf=type==='Renda Fixa';
    const credit=e==='CREDITO' || e==='ENTRADA';
    const debit=e==='DEBITO' || e==='SAIDA';
    if(isTransferLiquidity && validTrade && !isRf && (credit || debit)){
      destination='historico';
      status='Histórico';
      group='Compras / vendas';
      action=credit ? 'compra' : 'venda';
      operationLabel=credit ? 'Compra' : 'Venda';
      note='Transferência - Liquidação interpretada como operação de bolsa.';
      confidence='Alta';
      includeDefault=true;
    }else if(isTransferLiquidity && validTrade && isRf && (credit || debit)){
      destination='historico';
      status='Histórico';
      group='Resgates / vencimentos';
      action=credit ? 'venda' : 'compra';
      operationLabel=credit ? 'Resgate' : 'Aplicação';
      note='Transferência - Liquidação interpretada como movimentação de renda fixa.';
      confidence='Alta';
      includeDefault=true;
    }else{
      destination='revisar';
      status=isTransferLiquidity ? 'Operação potencial' : 'Revisar';
      group=isTransferLiquidity ? 'Operação potencial / Revisar' : 'Transferências / custódia';
      action='revisar';
      operationLabel='Revisar';
      note=isTransferLiquidity ? 'Liquidação sem preço/valor no extrato B3. Revisar manualmente.' : 'Transferência ou custódia: revisar manualmente.';
      confidence=isTransferLiquidity ? 'Baixa' : 'Baixa';
      includeDefault=false;
      reviewReason=isTransferLiquidity ? 'sem_precovalor' : 'transferencia';
    }
  }else if(isHistoric){
    destination='historico';
    status='Histórico';
    group=/RESGATE\b|VENCIMENTO/.test(s) ? 'Resgates / vencimentos' : (/APLICA/.test(s) ? 'Aplicações' : 'Compras / vendas');
    action=/VENDA|SAIDA/.test(s) || /RESGATE\b|VENCIMENTO/.test(s) ? 'venda' : 'compra';
    if(type==='Renda Fixa' && /COMPRA\s*\/\s*VENDA|COMPRA\/VENDA|COMPRA\/VENDA DEFINITIVA\/CESSAO/.test(s)){
      const credit=e==='CREDITO' || e==='ENTRADA';
      const debit=e==='DEBITO' || e==='SAIDA';
      if(debit){
        action='compra';
        operationLabel='Aplicação';
        note='Renda fixa interpretada como aplicação/compra.';
        confidence=hasValid ? 'Alta' : 'Média';
      }else if(credit){
        action='venda';
        operationLabel='Resgate';
        note='Renda fixa interpretada como resgate/venda.';
        confidence=hasValid ? 'Alta' : 'Média';
      }else{
        action='revisar';
        operationLabel='Revisar';
        confidence='Média';
        note='Renda fixa sem entrada/saída suficiente para interpretar.';
      }
    }else if(/COMPRA\s*\/\s*VENDA|COMPRA\/VENDA|COMPRA\/VENDA DEFINITIVA\/CESSAO/.test(s)){
      const eup=exact(entryExit);
      action=eup==='DEBITO' || eup==='SAIDA' ? 'compra' : eup==='CREDITO' || eup==='ENTRADA' ? 'venda' : 'revisar';
      confidence=eup==='DEBITO' || eup==='SAIDA' || eup==='CREDITO' || eup==='ENTRADA' ? 'Alta' : 'Média';
      note='Operação compra/venda com base na entrada/saída.';
      operationLabel=action==='compra' ? 'Compra' : action==='venda' ? 'Venda' : 'Revisar';
    }else if(/RESGATE ANTECIPADO|VENCIMENTO\/RESGATE SALDO EM CONTA|VENCIMENTO|RESGATE\b/.test(s)){
      action='venda';
      confidence=hasValid ? 'Alta' : 'Média';
      note='Movimentação de resgate/vencimento.';
      operationLabel=/RESGATE ANTECIPADO/.test(s) ? 'Resgate antecipado' : (/VENCIMENTO/.test(s) ? 'Vencimento' : 'Resgate');
    }else if(/APLICA/.test(s)){
      action='compra';
      confidence=hasValid ? 'Alta' : 'Média';
      note='Aplicação financeira.';
      operationLabel='Aplicação';
    }else{
      confidence=hasValid ? 'Alta' : 'Média';
      note='Compra ou venda identificada.';
      operationLabel=action==='compra' ? 'Compra' : 'Venda';
    }
    includeDefault=confidence==='Alta' && hasValid;
  }
  return {destination,status,confidence,action,operationLabel,note,group,includeDefault,hasValid,type,reviewReason};
}
function b3MovementAction(mov, entryExit){
  return b3MovementClassify(mov, entryExit).action;
}
function b3MovementTarget(mov, entryExit, product='', qty=0, price=0, value=0, assetType=''){
  const cls=b3MovementClassify(mov, entryExit, product, qty, price, value, assetType);
  if(cls.destination==='historico') return 'aportes';
  if(cls.destination==='proventos') return 'proventos';
  if(cls.destination==='eventos') return 'eventos';
  if(cls.status==='Operação potencial') return 'revisar';
  return 'revisar';
}
function b3MovementGroup(mov){
  const s=b3MovementNorm(mov);
  if(/DIVIDENDO|DIVIDENDOS|JCP|JUROS SOBRE CAPITAL|RENDIMENTO|RENDIMENTOS|PAGAMENTO DE JUROS|PAGAMENTO DE RENDIMENTO/.test(s)) return 'Proventos / juros';
  if(/TRANSFERENCIA\s*-\s*LIQUIDACAO/.test(s)) return 'Operação potencial / Revisar';
  if(/TRANSFERENCIA SEM FINANCEIRO|SAIDA\/ENTR\. CUST-TRANSF S\/FIN|RETIRADA DE CUSTODIA|EMPRESTIMO|TRANSFERENCIA/.test(s)) return 'Transferências / custódia';
  if(/BONIFICACAO|DESDOBRAMENTO|DESDOBRO|GRUPAMENTO|FRACAO|DIREITO DE SUBSCRICAO|DIREITOS DE SUBSCRICAO|SOLICITACAO DE SUBSCRICAO|RECIBO DE SUBSCRICAO|CESSAO DE DIREITOS|ATUALIZACAO|LEILAO DE FRACAO|EVENTO GENERICO/.test(s)) return 'Eventos societários';
  if(/RESGATE ANTECIPADO|VENCIMENTO\/RESGATE SALDO EM CONTA|VENCIMENTO/.test(s)) return 'Resgates / vencimentos';
  if(/APLICA/.test(s)) return 'Aplicações';
  if(/COMPRA|VENDA|SUBSCRICAO/.test(s)) return 'Compras / vendas';
  return 'Revisar manualmente';
}
function b3MovementLooksLikeSummaryRow(movement, product, row=[]){
  const keywords=['TOTAL','TOTAL LIQUIDO','TOTAL LÍQUIDO','VALOR TOTAL','TOTAL GERAL','RESUMO','CONSOLIDADO','SOMA'];
  const cells=[movement,product,...(Array.isArray(row)?row:[])].filter(v=>v!==null && v!==undefined).map(v=>String(v).trim()).filter(Boolean);
  if(!cells.length) return true;
  const firstNorm=b3MovementNorm(cells.slice(0,3).join(' | '));
  if(keywords.some(k=>firstNorm.includes(b3MovementNorm(k)))) return true;
  return false;
}
function b3MovementParseRow({movement, product, entryExit, qty, price, value, importDate, date, broker, sheet='Movimentacao'}){
  const mov=String(movement||'').trim();
  const prod=String(product||'').trim();
  const ticker=b3MovementTicker(prod);
  const q=parseNum(qty);
  const v=parseNum(value);
  let p=parseNum(price);
  if((!p || p<=0) && q>0 && v>0) p=v/q;
  const meta=inferB3PositionMeta('Movimentação', ticker, prod, mov);
  const type=normalizeType(meta.type||metaTicker(ticker).type||'Ação','Ação');
  const sector=meta.sector||'';
  const classification=b3MovementClassify(mov, entryExit, prod, q, p, v, type);
  const action=classification.action;
  const target=b3MovementTarget(mov, entryExit, prod, q, p, v, type);
  const movDate=date||importDate||new Date().toLocaleDateString('pt-BR');
  const total=v||q*p;
  const movKey=[sheet,movDate,b3MovementNorm(entryExit),b3MovementNorm(mov),ticker,String(q),String(Number(p||0).toFixed(4)),String(Number(total||0).toFixed(2))].join('|');
  return {
    ticker,
    qty:q,
    price:p,
    value:total,
    type,
    sector,
    product:prod,
    movement:mov,
    entryExit:String(entryExit||''),
    action,
    interpretedOperation:classification.operationLabel||'Revisar',
    target,
    destination:classification.destination,
    destinationLabel:classification.status,
    confidence:classification.confidence,
    reviewGroup:classification.group,
    include:classification.includeDefault,
    reviewNote:classification.note,
    reviewReason:classification.reviewReason||'',
    sheet,
    date:movDate,
    broker:String(broker||''),
    movKey
  };
}
function b3MovementDateKey(v){

function b3MovementDateFromCell(v, fallback){

  if(typeof v==='number' && Number.isFinite(v) && v>20000){
    const d=new Date(Math.round((v-25569)*86400*1000));
    if(!isNaN(d)) return `${String(d.getUTCDate()).padStart(2,'0')}/${String(d.getUTCMonth()+1).padStart(2,'0')}/${d.getUTCFullYear()}`;
  }
  const s=String(v||'').trim();
  if(!s) return fallback||'';
  const input=inputDateValue(s);
  if(input) return brDate(input);
  const d=parseAnyDate(s);
  return d ? toBRDate(d) : (fallback||'');
}
function b3MoneyEquals(a,b){

}
function b3QtyEquals(a,b){

function b3MovementDuplicateKind(it){
  const ticker=String(it.ticker||'').toUpperCase();
  if(!ticker) return '';
  const dateKey=b3MovementDateKey(it.date);
  const value=Number(it.value)||((Number(it.qty)||0)*(Number(it.price)||0));
  if(String(it.target||'')==='proventos'){
    const typeNorm=b3MovementNorm(it.movement||it.type||'');
    const dup=(S.proventos||[]).some(p=>{
      const pType=b3MovementNorm(p.type||p.note||'');
      return String(p.ticker||'').toUpperCase()===ticker
        && b3MovementDateKey(p.date)===dateKey
        && b3MoneyEquals(p.value,value)
        && (!typeNorm || !pType || pType.includes(typeNorm) || typeNorm.includes(pType));
    });
    return dup ? 'provento' : '';
  }
  if(String(it.target||'')==='aportes'){
    const op=String(it.action||'compra').toLowerCase();
    const dup=(S.aportes||[]).some(a=>{
      const aOp=String(a.operation||a.op||'compra').toLowerCase();
      const aTotal=(Math.abs(Number(a.qty)||0))*(Number(a.price)||0);
      return String(a.ticker||'').toUpperCase()===ticker
        && b3MovementDateKey(a.date)===dateKey
        && aOp===op
        && b3QtyEquals(Math.abs(Number(a.qty)||0),Math.abs(Number(it.qty)||0))
        && b3MoneyEquals(aTotal,value);
    });
    return dup ? 'aporte' : '';
  }
  return '';
}
function b3MovementReviewNote(it){
  const notes=[];
  if(String(it.target||'')==='revisar') notes.push('Revisar manualmente antes de gravar.');
  if(!it.ticker) notes.push('Ticker nao identificado.');
  if(Number(it.qty)<=0 && String(it.target||'')!=='proventos') notes.push('Quantidade ausente ou zerada.');
  if(String(it.target||'')==='aportes' && Number(it.price)<=0) notes.push('Preco unitario ausente ou zerado.');
  if(Number(it.value)<=0) notes.push('Valor total ausente ou zerado.');
  const dup=it.possibleDuplicate ? (it.duplicateKind||b3MovementDuplicateKind(it)) : '';
  if(dup) notes.push('Possivel duplicado ja existente.');
  if(it.interpretedOperation) notes.push(`Tipo interpretado: ${it.interpretedOperation}.`);
  if(String(it.target||'')==='proventos') notes.push('Vai entrar na aba Proventos.');
  else if(String(it.target||'')==='aportes') notes.push('Vai atualizar Historico de aportes e Ativos.');
  if(it.destinationLabel) notes.push(`Destino sugerido: ${it.destinationLabel}.`);
  if(it.confidence) notes.push(`Confianca: ${it.confidence}.`);
  if(it.reviewNote) notes.push(it.reviewNote);
  if(it.reviewReason==='sem_precovalor') notes.push('Liquidação sem preço/valor no extrato B3. Revisar manualmente.');
  return notes.join(' ');
}

function b3MovementHistoricalOperationType(it){

  if(/VENCIMENTO\/RESGATE SALDO EM CONTA|VENCIMENTO/.test(s)) return 'Vencimento';

  if(/COMPRA\s*\/\s*VENDA|COMPRA\/VENDA|COMPRA\/VENDA DEFINITIVA\/CESSAO/.test(s)){

function b3MovementRefreshReviewFlags(it){
  const next={...it};
  next.value=(Number(next.value)||((Number(next.qty)||0)*(Number(next.price)||0)));
  if(!next.destination || !next.destinationLabel || !next.confidence){
    const cls=b3MovementClassify(next.movement, next.entryExit, next.product, next.qty, next.price, next.value, next.type);
    next.destination=cls.destination;
    next.destinationLabel=cls.status;
    next.confidence=cls.confidence;
    next.reviewGroup=cls.group;
    next.reviewNote=cls.note;
    next.action=cls.action;
    next.interpretedOperation=cls.operationLabel||next.interpretedOperation||'Revisar';
    next.reviewReason=cls.reviewReason||next.reviewReason||'';
    next.target=b3MovementTarget(next.movement, next.entryExit, next.product, next.qty, next.price, next.value, next.type);
    next.include=cls.includeDefault;
  }
  next.duplicateKind=b3MovementDuplicateKind(next);
  next.possibleDuplicate=!!next.duplicateKind;
  next.observation=b3MovementReviewNote(next);
  const allowedForDefault=(next.destination==='historico' || next.destination==='proventos') && next.confidence==='Alta';
  if(next.possibleDuplicate
    || !next.ticker
    || Number(next.value)<=0
    || !String(next.date||'').trim()
    || next.target==='revisar'
    || next.destination==='eventos'
    || next.destination==='revisar'
    || next.destination==='ignorar'
    || (next.destination==='historico' && (Number(next.qty)<=0 || Number(next.price)<=0))
    || (next.destination==='proventos' && (Number(next.qty)<=0 || Number(next.price)<=0))){
    next.include=false;
  }else if(allowedForDefault){
    next.include=true;
  }
  return next;
}
function parseB3MovementWorkbook(wb, fileName=''){
  const items=[]; const warnings=[];
  const stats={ importedByMovement:{}, ignoredByMovement:{}, ignoredByReason:{}, totalIgnored:0, skippedSheets:[] };
  const dateMatch=String(fileName||'').match(/(20\d{2})[-_](\d{2})[-_](\d{2})/);
  const importDate=dateMatch?`${dateMatch[3]}/${dateMatch[2]}/${dateMatch[1]}`:new Date().toLocaleDateString('pt-BR');
  const addIgnored=(mov,reason)=>{
    stats.totalIgnored++;
    const key=mov||'sem movimento';
    stats.ignoredByMovement[key]=(stats.ignoredByMovement[key]||0)+1;
    if(reason) stats.ignoredByReason[reason]=(stats.ignoredByReason[reason]||0)+1;
  };
  const addImported=mov=>{
    const key=mov||'sem movimento';
    stats.importedByMovement[key]=(stats.importedByMovement[key]||0)+1;
  };
  (wb.SheetNames||[]).forEach(sheetName=>{
    const sheet=wb.Sheets[sheetName]; if(!sheet) return;
    const rows=XLSX.utils.sheet_to_json(sheet,{header:1,raw:true,defval:null});
    if(!rows || rows.length<2){ stats.skippedSheets.push(sheetName); return; }
    let headerIdx=-1;
    for(let i=0;i<Math.min(rows.length,20);i++){
      const h=(rows[i]||[]).map(normHeaderB3);
      const ok=h.some(x=>x==='entrada/saida' || x==='entrada-saida' || x==='entrada / saida') && h.some(x=>x.includes('movimentacao')) && h.some(x=>x.includes('produto')) && h.some(x=>x.includes('quantidade')) && h.some(x=>x.includes('preco unitario')) && h.some(x=>x.includes('valor da operacao'));
      if(ok){ headerIdx=i; break; }
    }
    if(headerIdx<0){ stats.skippedSheets.push(sheetName); return; }
    const headers=(rows[headerIdx]||[]).map(v=>String(v||'').trim());
    rows.slice(headerIdx+1).forEach((row,idx)=>{
      if(!row || row.every(v=>v===null || String(v).trim()==='')) return;
      const entryExit=String(pickB3(row,headers,['Entrada/Saída','Entrada/Saida','Entrada - Saida','Entrada/Saída '] )||'').trim();
      const movement=String(pickB3(row,headers,['Movimentação','Movimentacao'])||'').trim();
      const product=String(pickB3(row,headers,['Produto'])||'').trim();
      const qty=parseNum(pickB3(row,headers,['Quantidade']));
      const price=parseNum(pickB3(row,headers,['Preço unitário','Preco unitario']));
      const value=parseNum(pickB3(row,headers,['Valor da Operação','Valor da Operacao']));
      const movementDate=b3MovementDateFromCell(pickB3(row,headers,['Data','Data do Movimento','Data da Movimentação','Data da Movimentacao','Data da Operação','Data da Operacao']), importDate);
      const broker=String(pickB3(row,headers,['Instituição','Instituicao','Corretora','Instituição Financeira','Instituicao Financeira'])||'').trim();
      if(b3MovementLooksLikeSummaryRow(movement, product, row)){
        addIgnored(movement||product||'sem movimento','linha total / resumo');
        return;
      }
      if(!movement || !product || !movementDate || value<=0){
        addIgnored(movement||'sem movimento','linha não reconhecida');
        return;
      }
      const item=b3MovementParseRow({movement, product, entryExit, qty, price, value, importDate, date:movementDate, broker, sheet:sheetName});
      if(!item.ticker){
        addIgnored(movement,'sem ticker');
        warnings.push(`Movimentacao ${sheetName}: produto nao reconhecido (${movement}).`);
        return;
      }
      if(item.qty<=0){
        addIgnored(movement,'sem quantidade');
        return;
      }
      if(item.target==='revisar' || item.action==='revisar'){
        addIgnored(movement,'revisao manual');
        warnings.push(`Movimentacao ${sheetName}: "${movement}" ficou em revisao manual.`);
        items.push({...item, include:false});
        return;
      }
      if(item.target==='proventos'){
        items.push({...item, include:true});
        addImported(movement);
        return;
      }
      items.push({...item, include:true});
      addImported(movement);
    });
  });
  return {items,warnings,importDate,stats,kind:'movement'};
}
function detectB3ProventosWorkbook(wb, fileName=''){
  const fileHint=/proventos.*recebidos|proventos-recebidos/i.test(String(fileName||''));
  return (wb.SheetNames||[]).some(sheetName=>{
    const sheet=wb.Sheets[sheetName]; if(!sheet) return false;
    const rows=XLSX.utils.sheet_to_json(sheet,{header:1,raw:true,defval:null});
    for(let i=0;i<Math.min(rows.length,10);i++){
      const h=(rows[i]||[]).map(normalizeB3Loose);
      const hasAny=(list)=>h.some(x=>list.includes(x));
      const ok=hasAny(['produto','ativo','nomedoproduto','produtoativo','descricao','papel'])
        && hasAny(['pagamento','datapagamento','datadepagamento','data'])
        && hasAny(['tipodeevento','evento','tipoevento'])
        && hasAny(['instituicao','corretora'])
        && hasAny(['quantidade','qtd'])
        && hasAny(['precounitario','pu'])
        && hasAny(['valorliquido','valor','valornet','valorliquid']);

    }

function b3ProventoTicker(product){
  const s=String(product||'').trim();
  const first=s.split(/\s*-\s*/)[0].trim();
  const firstCode=cleanAssetCode(first);
  const firstNorm=rfPosNorm(first);
  const rfPrefixes=/^(DEB|CRA|CRI|CDB|LCA|LCI)\b/.test(firstNorm);
  if(tickerValidoB3(firstCode)) return firstCode;
  if(rfPrefixes){
    const known=rfDetailedKnownCode(s) || rfDetailedKnownCode(first) || b3ProventoResolveRfTicker(s);
    if(known) return known;
  }
  const known=rfDetailedKnownCode(s) || rfDetailedKnownCode(first) || b3ProventoResolveRfTicker(s);
  if(known) return known;
  return tickerValidoB3(firstCode) ? firstCode : '';
}
function b3ProventoResolveRfTicker(product){
  const text=rfPosNorm(product);
  if(!text) return '';
  const base=text
    .replace(/^(DEB|CRA|CRI|CDB|LCA|LCI)\s*-\s*/,'')
    .replace(/^(DEB|CRA|CRI|CDB|LCA|LCI)\s+/,'')
    .trim();
  const assets=(S.assets||[]).filter(a=>normalizeType(a.type||metaTicker(a.ticker).type||'Ação','Ação')==='Renda Fixa');
  for(const a of assets){
    const hay=rfPosNorm(`${a.ticker||''} ${a.name||''} ${a.product||''} ${a.title||''} ${a.issuer||''} ${a.sector||''}`);
    if(!hay) continue;
    if(base && (hay.includes(base) || base.includes(hay))) return String(a.ticker||'').toUpperCase();
    if(text && hay.includes(text)) return String(a.ticker||'').toUpperCase();
  }
  return '';
}
function b3ProventoCategory(product,eventType,ticker){
  const s=rfPosNorm(`${product} ${eventType}`);
  if(/^(DEB|CRA|CRI|CDB|LCA|LCI)\b/.test(s) || s.includes('PAGAMENTO DE JUROS')) return 'Renda Fixa';
  const meta=metaTicker(ticker);
  return normalizeType(meta.type||inferB3PositionMeta('',ticker,product,eventType).type||'Ação','Ação');

function b3ProventoAssetName(product, ticker=''){
  const s=String(product||'').trim();
  if(!s) return '';
  const parts=s.split(/\s*-\s*/).map(p=>p.trim()).filter(Boolean);
  if(parts.length>1){
    const first=cleanAssetCode(parts[0]);
    if((ticker && first===ticker) || tickerValidoB3(first)) return parts.slice(1).join(' - ').trim();
    if(/^(DEB|CRA|CRI|CDB|LCA|LCI)\b/.test(rfPosNorm(parts[0]))) return s;
  }
  return s;
}
function b3ProventoEventType(eventType){

  if(s.includes('REEMBOLSO')) return 'Reembolso';

}
function b3ProventoDestination(eventType){

function b3ProventoLooksLikeSummaryRow(product, row, headers=[]){

function parseB3MovementBlock(block, date, page=0){

  const movement=String(m.groups.movement||'').replace(/\s+/g,' ').trim();

  const item=b3MovementParseRow({
    movement,
    product,
    qty:m.groups.qty,
    price:m.groups.price,
    value:m.groups.value,
    importDate:date,

async function parseB3MovementPdf(file){
  const pdfjs=await loadPdfJs();
  const data=new Uint8Array(await file.arrayBuffer());
  const doc=await pdfjs.getDocument({data}).promise;
  const items=[]; const warnings=[];
  const stats={ importedByMovement:{}, ignoredByMovement:{}, ignoredByReason:{}, totalIgnored:0, skippedSheets:[] };
  const addImported=mov=>{ stats.importedByMovement[mov]=(stats.importedByMovement[mov]||0)+1; };
  const addIgnored=(mov,reason)=>{ stats.totalIgnored++; stats.ignoredByMovement[mov]=(stats.ignoredByMovement[mov]||0)+1; if(reason) stats.ignoredByReason[reason]=(stats.ignoredByReason[reason]||0)+1; };
  let importDate=new Date().toLocaleDateString('pt-BR');
  const blocks=[];
  for(let p=1;p<=doc.numPages;p++){
    const page=await doc.getPage(p);
    const text=await page.getTextContent();
    const lines=pdfLinesFromTextContent(text);
    const pageText=lines.join(' ');
    const dFinal=pageText.match(/Data Final:\s*(\d{2}\/\d{2}\/\d{4})/i);
    if(dFinal) importDate=dFinal[1];
    let current=[]; let currentDate='';
    const flush=()=>{
      if(!current.length) return;
      blocks.push({date:currentDate||importDate, block:current.join(' '), page:p});
      current=[];
    };
    for(const line of lines){
      const s=String(line||'').trim();
      const dateMatch=s.match(/^(\d{1,2}) de ([a-zçãéíóúâêô]+) de (\d{4})$/i);
      if(dateMatch){
        flush();
        const monthMap={janeiro:'01',fevereiro:'02',marco:'03',março:'03',abril:'04',maio:'05',junho:'06',julho:'07',agosto:'08',setembro:'09',outubro:'10',novembro:'11',dezembro:'12'};
        const mm=monthMap[dateMatch[2].toLowerCase()]||'01';
        currentDate=`${dateMatch[1].padStart(2,'0')}/${mm}/${dateMatch[3]}`;
        continue;
      }
      if(/^extrato de movimentacao/i.test(s) || /^acesse investidor/i.test(s)) { flush(); continue; }
      if(/^movimentacao produto instituicao quantidade preco/i.test(b3MovementNorm(s))) continue;
      if(!s) continue;
      if(pdfMovementIsRowStart(s)){
        flush();
        current=[s];
        continue;
      }
      if(current.length) current.push(s);
    }
    flush();
  }
  blocks.forEach(({block,date,page})=>{
    const item=parseB3MovementBlock(block,date,page);
    if(!item){
      warnings.push(`PDF pagina ${page}: linha de movimento nao reconhecida.`);
      addIgnored('PDF','linha nao reconhecida');
      return;
    }
    items.push(item);
    if(item.include===false) addIgnored(item.movement||'PDF','revisao manual');
    else addImported(item.movement||'PDF');
  });
  return {items,warnings,importDate,stats,kind:'movement'};
}
function detectB3WorkbookKind(wb){

async function detectB3PdfKind(file){

  const doc=await pdfjs.getDocument({data}).promise;
  const maxPages=Math.min(doc.numPages||0, 3);
  let positionHits=0;
  let movementHits=0;
  for(let p=1;p<=maxPages;p++){
    const page=await doc.getPage(p);
    const text=await page.getTextContent();
    const lines=pdfLinesFromTextContent(text).join(' ');
    const s=b3MovementNorm(lines);
    if(/(DATA INICIAL|TIPO DE MOVIMENTACAO|MOVIMENTACAO PRODUTO INSTITUICAO QUANTIDADE PRECO|PAGAMENTO DE JUROS|COMPRA\/VENDA|RESGATE ANTECIPADO|TRANSFERENCIA SEM FINANCEIRO|RETIRADA DE CUSTODIA|EVENTO GENERICO)/.test(s)) movementHits++;

    if(movementHits && !positionHits) return 'movement';
    if(positionHits && !movementHits) return 'position';
  }
  const totalPages=doc.numPages||0;
  for(let p=maxPages+1;p<=totalPages && !positionHits && !movementHits;p++){
    const page=await doc.getPage(p);
    const text=await page.getTextContent();
    const lines=pdfLinesFromTextContent(text).join(' ');
    const s=b3MovementNorm(lines);
    if(/(DATA INICIAL|TIPO DE MOVIMENTACAO|MOVIMENTACAO PRODUTO INSTITUICAO QUANTIDADE PRECO|PAGAMENTO DE JUROS|COMPRA\/VENDA|RESGATE ANTECIPADO|TRANSFERENCIA SEM FINANCEIRO|RETIRADA DE CUSTODIA|EVENTO GENERICO)/.test(s)) movementHits++;
    if(/(EXTRATO DE POS|POSICAO CONSOLIDADA|CARTEIRA|CUSTODIA|QUANTIDADE DISPONIVEL|VALOR ATUALIZADO|PRECO DE FECHAMENTO|VENCIMENTO|INSTITUICAO EMISSORA)/.test(s)) positionHits++;
    if(movementHits && !positionHits) return 'movement';
    if(positionHits && !movementHits) return 'position';

function normHeaderB3(v){

function normalizeKey(value){
  return String(value || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, "")
    .replace(/[^a-zA-Z0-9]/g, "")
    .toLowerCase();

  keys.forEach((key) => {
    normalizedMap[normalizeKey(key)] = row[key];
  });
  for (const name of (possibleNames||[])) {
    const value = normalizedMap[normalizeKey(name)];
    if (value !== undefined && value !== null && String(value).trim() !== "") {
      return value;
    }
  }
  return "";
}

function inferB3PositionMeta(sheetName, ticker, product='', rowType=''){
  const sheet=String(sheetName||'');

  const kind=String(rowType||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  const text=`${sheet} ${ticker} ${product} ${rowType}`;
  const s=notaNorm(text);
  if(isRendaFixaText(text)) return rfMetaFromText(text);
  if(/\bCRIPTOATIVO\b|\bBITCOIN\b|\bHASH\b|\bCRIPTO\b|\bCRYPTO\b/.test(s)) return {type:'Crypto',sector:'Crypto'};
  if(sh.includes('acoes') || sh.includes('acao')) return {type:'Ação',sector:'Ação'};
  if(sh.includes('etf')){
    if(/\bCRIPTOATIVO\b|\bBITCOIN\b|\bHASH\b|\bCRIPTO\b|\bCRYPTO\b/.test(s)) return {type:'Crypto',sector:'Cripto'};
    if(/\bRENDA FIXA\b|IMAB|IRFM|B5P2|TESOURO/.test(s)) return {type:'ETF',sector:'Renda Fixa'};
    if(/\bEXTERIOR\b|INTERNACIONAL|WRLD|SP500|S&P|NASDAQ|EURO/.test(s)) return {type:'ETF',sector:'Exterior'};
    if(/\bDIVID\b/.test(s)) return {type:'ETF',sector:'Dividendos'};
    return {type:'ETF',sector:notaEtfSector(text)};
  }

    return {type:'Fundos de Investimento',sector:'Fundos de Investimento'};
  }

  if(kind==='renda fixa') return {type:'ETF',sector:'Renda Fixa'};
  if(kind==='internacional') return {type:'ETF',sector:'Exterior'};

  if(mt.type==='ETF') return {type:'ETF',sector:mt.sector||notaEtfSector(text)};
  if(mt.type==='FII') return {type:'FII',sector:mt.sector||notaFiiSector(text)};

}
function notaNorm(v){

function notaFindValue(rows, key){
  const k=notaNorm(key);
  for(const row of rows){
    for(let i=0;i<row.length;i++){
      if(notaNorm(row[i])===k){
        for(let j=i+1;j<row.length;j++){
          const val=String(row[j]||'').trim();
          if(val) return val;
        }
      }
    }
  }
  return '';
}
function notaFindHeaderIndex(rows){

    'ESPECIFICACAO DO TITULO',
    'QUANTIDADE',
    'PRECO DE LIQUIDACAO(R$)',
    'COMPRA/VENDA (R$)'
  ];
  for(let i=0;i<rows.length;i++){

  const existing=S.assets.find(a=>String(a.ticker||'').toUpperCase()===tickerClean);
  if(existing && existing.type){
    return {
      type: normalizeType(existing.type,'Ação'),
      sector: existing.sector || existing.type
    };
  }
  const text=`${tickerClean} ${spec||''} ${market||''}`;
  const s=notaNorm(text);
  if(isRendaFixaText(s)) return rfMetaFromText(text);
  if(/\bETF\b|FUNDO DE INDICE|FDO DE INDICE|EXCHANGE TRADED FUND/.test(s)){
    return {type:'ETF',sector:notaEtfSector(text)};
  }
  if(/\bFII\b|FUNDO IMOBILIARIO|FUNDO DE INVESTIMENTO IMOBILIARIO|FDO INV IMOB|COTAS DE FII/.test(s)){
    return {type:'FII',sector:notaFiiSector(text)};
  }
  if(/\bFUNDOS?\s+DE\s+INVESTIMENTO\b/.test(s)) return {type:'Fundos de Investimento', sector:'Fundos de Investimento'};
  const mt=metaTicker(tickerClean);
  if(mt.type==='ETF') return {type:'ETF',sector:mt.sector||notaEtfSector(text)};
  if(mt.type==='FII') return {type:'FII',sector:mt.sector||notaFiiSector(text)};
  if(mt.type==='Renda Fixa') return rfMetaFromText(text);
  if(/\bBDR\b/.test(s)) return {type:'BDR',sector:'BDR'};
  if(/\bCRYPTO\b|\bCRIPTO\b|\bBITCOIN\b/.test(s)) return {type:'Crypto',sector:'Crypto'};
  return {type:mt.type||'Ação', sector:mt.sector||''};
}
function brokerNoteMoney(text, labels){
  const source=String(text||'');
  const lines=source.split(/\r?\n/).map(line=>line.replace(/\s+/g,' ').trim()).filter(Boolean);
  for(const label of labels){
    const normalizedLabel=notaNorm(label);
    const line=lines.find(item=>notaNorm(item).includes(normalizedLabel));
    if(line){
      const values=[...line.matchAll(/(?:R\$\s*)?([\d.]+,\d{2})/g)];
      if(values.length) return parseNum(values[values.length-1][1]);
    }
  }
  return 0;
}
function mapInterAssetToTicker(description){
  const s=notaNorm(description);
  const mappings=[
    [/\bINVESTO\s+HODL\b/,'HODL11','ETF','Cripto'],
    [/\bIT\s+NOW\s+DIVD\b/,'DIVD11','ETF','Dividendos'],
    [/\bVALE\b.*\bON\b|\bON\b.*\bVALE\b/,'VALE3','Ação','Mineração'],
    [/\bCEMIG\b.*\bPN\b|\bPN\b.*\bCEMIG\b/,'CMIG4','Ação','Energia elétrica'],
    [/\bBRASIL\b.*\bON\b|\bON\b.*\bBRASIL\b/,'BBAS3','Ação','Bancos'],
    [/\bSANEPAR\b.*\bUNT\b|\bUNT\b.*\bSANEPAR\b/,'SAPR11','Ação','Saneamento'],
    [/\bPETROBRAS\b.*\bPN\b|\bPN\b.*\bPETROBRAS\b/,'PETR4','Ação','Petróleo e gás']
  ];
  for(const [pattern,ticker,type,sector] of mappings){
    if(pattern.test(s)) return {ticker,type,sector,recognized:true};
  }
  const direct=s.match(/\b([A-Z]{4}\d{1,2})\b/);
  if(direct){
    const ticker=direct[1];
    const meta=metaTicker(ticker);
    return {ticker,type:normalizeType(meta.type||'Ação','Ação'),sector:meta.sector||'',recognized:true};
  }
  return {ticker:'',type:'Ação',sector:'',recognized:false};
}
function parseInterBrokerOperationLine(line){
  const clean=String(line||'').replace(/\s+/g,' ').trim();
  if(!clean || !/^Bovespa\b/i.test(clean)) return null;
  const match=clean.match(/^Bovespa\s+([CV])\s+(?:VIS|FRA)\s+(.+?)\s+([\d.]+)\s+([\d.,]+)\s+([\d.,]+)\s+[DC]\b/i);
  if(!match) return null;
  const description=match[2].trim();
  const qty=parseNum(match[3]);
  const price=parseNum(match[4]);
  const total=parseNum(match[5]);
  if(qty<=0 || price<=0 || total<=0) return null;
  const mapped=mapInterAssetToTicker(description);
  return {
    operation:match[1].toUpperCase()==='V'?'venda':'compra',
    description,
    ticker:mapped.ticker,
    recognized:mapped.recognized,
    type:mapped.type,
    sector:mapped.sector,
    qty,
    price,
    total
  };
}
function consolidateBrokerNoteOperations(operations, tradeDate=''){
  const groups=new Map();
  (operations||[]).forEach((item,index)=>{
    const identity=item.ticker || `PENDENTE:${notaNorm(item.description)}`;
    const key=[identity,item.operation||'compra',tradeDate].join('|');
    if(!groups.has(key)){
      groups.set(key,{
        id:index,
        include:true,
        ticker:item.ticker||'',
        recognized:!!item.recognized,
        operation:item.operation||'compra',
        description:item.description||'',
        type:normalizeType(item.type||'Ação','Ação'),
        sector:item.sector||'',
        qty:0,total:0,price:0,lines:0,tradeDate
      });
    }
    const row=groups.get(key);
    row.qty+=Number(item.qty)||0;
    row.total+=Number(item.total)||0;
    row.lines++;
    row.price=row.qty>0 ? row.total/row.qty : 0;
  });
  return [...groups.values()];
}
function extractInterBrokerNoteHeader(text){
  const raw=String(text||'').replace(/\u00a0/g,' ');
  const lines=raw.split(/\r?\n/).map(line=>line.replace(/\s+/g,' ').trim()).filter(Boolean);
  const businessIndex=lines.findIndex(line=>notaNorm(line).includes('NEGOCIOS REALIZADOS'));
  const headerLines=lines.slice(0,businessIndex>=0?businessIndex:Math.min(lines.length,40));
  const headerText=headerLines.join('\n');
  const normalized=notaNorm(headerText);
  const tradeLabel='DATA\\s*(?:DO\\s*)?PREG[^A-Z0-9]*A?O';
  let noteNumber='';
  let tradeDate='';
  const directNotePatterns=[
    /(?:NR\.?|N\.?|NUMERO)\s*(?:DA\s*)?NOTA\s*[:.-]?\s*(\d{5,12})/,
    /NOTA\s*(?:N\.?|NR\.?)\s*[:.-]?\s*(\d{5,12})/,
    new RegExp(`(\\d{5,12})\\s+FOLHA\\s+\\d+\\s+${tradeLabel}`)
  ];
  for(const pattern of directNotePatterns){
    const match=normalized.match(pattern);
    if(match){ noteNumber=match[1]; break; }
  }
  const directDatePatterns=[
    new RegExp(`${tradeLabel}\\s*[:.-]?\\s*(\\d{2}\\/\\d{2}\\/\\d{4})`),
    /(?:NR\.?|N\.?|NUMERO)\s*(?:DA\s*)?NOTA[\s\S]{0,100}?(\d{5,12})[\s\S]{0,60}?(\d{2}\/\d{2}\/\d{4})/
  ];
  for(const pattern of directDatePatterns){
    const match=normalized.match(pattern);
    if(match){ tradeDate=match[match.length-1]; break; }
  }
  for(let i=0;i<headerLines.length && (!noteNumber||!tradeDate);i++){
    const lineNorm=notaNorm(headerLines[i]);
    const hasNoteLabel=/(?:NR\.?|N\.?|NUMERO)\s*(?:DA\s*)?NOTA/.test(lineNorm);
    const hasTradeLabel=new RegExp(tradeLabel).test(lineNorm);
    const hasHeaderValues=/\b\d{5,12}\s+(?:FOLHA\s+)?\d{1,3}(?:\s+DATA\s*(?:DO\s*)?PREGAO)?\s+\d{2}\/\d{2}\/\d{4}\b/.test(lineNorm);
    if(!hasNoteLabel && !hasTradeLabel && !hasHeaderValues) continue;
    const windowText=headerLines.slice(i,Math.min(headerLines.length,i+4)).join(' ');
    const windowNorm=notaNorm(windowText);
    if(!noteNumber){
      const afterLabel=windowNorm.match(/(?:NR\.?|N\.?|NUMERO)\s*(?:DA\s*)?NOTA[\s:.-]*(?:FOLHA[\s:.-]*)?(?:DATA\s*(?:DO\s*)?PREGAO[\s:.-]*)?(\d{5,12})/);
      const beforeSheet=windowNorm.match(/\b(\d{5,12})\s+(?:FOLHA\s+)?\d{1,3}(?:\s+DATA\s*(?:DO\s*)?PREGAO)?\s+\d{2}\/\d{2}\/\d{4}\b/);
      noteNumber=(afterLabel||beforeSheet||[])[1]||'';
    }
    if(!tradeDate){
      tradeDate=(windowNorm.match(new RegExp(`${tradeLabel}[\\s:.-]*(\\d{2}\\/\\d{2}\\/\\d{4})`))||windowNorm.match(/\b(\d{2}\/\d{2}\/\d{4})\b/)||[])[1]||'';
    }
  }
  return {noteNumber,tradeDate};
}
function parseInterBrokerNoteText(text){
  const raw=String(text||'').replace(/\u00a0/g,' ');
  const normalized=notaNorm(raw);
  const warnings=[];
  const isInter=/NOTA DE CORRETAGEM/.test(normalized) && /INTER DTVM LTDA/.test(normalized);
  if(!isInter) warnings.push('O arquivo não foi identificado com segurança como nota de corretagem do Banco Inter.');
  const {noteNumber,tradeDate}=extractInterBrokerNoteHeader(raw);
  const settlementDate=(normalized.match(/DATA\s*(?:DE\s*)?LIQUIDACAO\s*[:.-]?\s*(\d{2}\/\d{2}\/\d{4})/)||[])[1]||'';
  const broker='INTER DTVM LTDA.';
  const lines=raw.split(/\r?\n/).map(line=>line.replace(/\s+/g,' ').trim()).filter(Boolean);
  const operations=lines.map(parseInterBrokerOperationLine).filter(Boolean);
  const rows=consolidateBrokerNoteOperations(operations,tradeDate);
  const operationsTotal=brokerNoteMoney(raw,['Valor das operações']) || operations.reduce((sum,item)=>sum+item.total,0);
  const netTotal=brokerNoteMoney(raw,['Líquido para','Líquido da nota','Valor líquido da nota','Total líquido']);
  const settlementFee=brokerNoteMoney(raw,['Taxa de liquidação']);
  const emoluments=brokerNoteMoney(raw,['Emolumentos']);
  const transferFee=brokerNoteMoney(raw,['Taxa de transferência de ativos','Transferência de ativos']);
  const costs=netTotal>0 && operationsTotal>0 ? netTotal-operationsTotal : settlementFee+emoluments+transferFee;
  if(!noteNumber) warnings.push('Número da nota não identificado.');
  if(!tradeDate) warnings.push('Data do pregão não identificada.');
  if(!operations.length) warnings.push('Nenhuma operação foi reconhecida em Negócios realizados.');
  const pending=rows.filter(row=>!row.ticker).length;
  if(pending) warnings.push(`${pending} ativo(s) pendente(s) de identificação. Informe o ticker antes de importar.`);
  return {
    valid:isInter && !!noteNumber && !!tradeDate && operations.length>0,
    noteNumber,tradeDate,settlementDate,broker,operations,rows,operationsTotal,netTotal,
    settlementFee,emoluments,transferFee,costs,warnings,
    noteKey:[noteNumber,tradeDate,broker].join('|')
  };
}

function brokerNoteDuplicateInfo(note=S.brokerNoteImport?.parsed){
  if(!note) return {duplicate:false,count:0};
  const key=String(note.noteKey||'');

  const tradeDate=String(note.tradeDate||'');
  const matches=(S.aportes||[]).filter(item=>{

    return (key && String(item.brokerNoteKey||'')===key)

      || (noteNumber && String(item.source||'')==='Nota Inter PDF' && String(item.brokerNoteNumber||'')===noteNumber && String(item.date||'')===tradeDate);
  });
  return {duplicate:matches.length>0,count:matches.length};
}

function rfMetaFromText(v){
  const s=String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase();
  if(s.includes('TESOURO')) return {type:'Renda Fixa',sector:'Tesouro Direto'};
  if(/\bCDB\b/.test(s)) return {type:'Renda Fixa',sector:'CDB'};
  if(/\bLCI\b/.test(s)) return {type:'Renda Fixa',sector:'LCI'};
  if(/\bLCA\b/.test(s)) return {type:'Renda Fixa',sector:'LCA'};
  if(/\bCRI\b/.test(s)) return {type:'Renda Fixa',sector:'CRI'};
  if(/\bCRA\b/.test(s)) return {type:'Renda Fixa',sector:'CRA'};
  if(s.includes('DEBENT')) return {type:'Renda Fixa',sector:'Debênture'};
  if(/\bLF\b|LETRA FINANCEIRA/.test(s)) return {type:'Renda Fixa',sector:'Letra Financeira'};
  return {type:'Renda Fixa',sector:'Renda Fixa'};
}
function tipoPorAbaB3(sheetName,ticker){
  const sh=String(sheetName||'').toLowerCase();
  if(isRendaFixaText(sheetName)||isRendaFixaText(ticker)) return 'Renda Fixa';
  if(sh.includes('fundo imobiliario') || sh.includes('fii')) return 'FII';
  if(sh.includes('fundo de investimento')) return 'Fundos de Investimento';
  if(sh.includes('etf')) return 'ETF';
  if(sh.includes('acoes') || sh.includes('ações')) return 'Ação';
  return metaTicker(ticker).type || 'Ação';
}
function setorPorAbaB3(sheetName,ticker){
  if(isRendaFixaText(sheetName)||isRendaFixaText(ticker)) return rfMetaFromText(`${sheetName} ${ticker}`).sector;
  const meta=metaTicker(ticker);
  if(meta.sector && meta.sector!=='FII' && meta.sector!=='Ação') return meta.sector;
  const sh=String(sheetName||'').toLowerCase();
  if(sh.includes('fundo imobiliario') || sh.includes('fii')) return 'FII';
  if(sh.includes('fundo de investimento')) return 'Fundos de Investimento';
  if(sh.includes('etf')) return 'ETF';
  return meta.sector || '';
}
const B3_POSITION_SUMMARY_LABELS = new Set([
  'etf',

  'rendafixa',

function isB3PositionSummaryText(v){

function isB3PositionSummaryRow(item){
  if(!item) return true;

  if(isB3PositionSummaryText(tickerNorm)) return true;
  if(isB3PositionSummaryText(productNorm)) return true;
