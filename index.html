  const ty=document.getElementById('p-ty')?.value||metaTicker(rawTi).type||'Ação';
  let se=document.getElementById('p-se')?.value?.trim()||'';
  const isRF=ty==='Renda Fixa' || String(ty).includes('Tesouro');
  const isReserve=ty==='Reserva de emergência';
  let ti=cleanAssetCode(rawTi);
  const reserveTarget=isReserve?(document.getElementById('p-rt')?.value||'bolsa'):'';
  const reserveMode=isReserve?(document.getElementById('p-rm')?.value||'entrada'):'';
  if(isReserve){
    ti = ti || `RESERVA ${reserveTarget==='pessoal'?'PESSOAL':'BOLSA'}`;
  }else if(!ti && isRF) ti='RENDA FIXA';
  if(!se){
    const m=isRF?rfMetaFromText(ti):metaTicker(ti);
    se=m.sector||ty;
  }
  if(!ti||qt<=0||pr<=0){ alert('Preencha Ativo/Ticker, Quantidade e Preço.'); return; }
  const reg={id:S.editPId||Date.now(), operation:isReserve?(reserveMode==='saida'?'reserva-saida':'reserva-entrada'):op, ticker:ti, qty:isReserve?1:qt, price:pr, date:dt, decision:dc, type:ty, sector:se};
  if(isReserve){
    reg.reserveTarget=reserveTarget;
    reg.reserveMode=reserveMode;
    reg.reserveLabel=reserveTarget==='pessoal'?'Pessoal':'Bolsa';
    reg.sector=reserveTarget==='pessoal'?'Pessoal':'Bolsa';
  }
  if(isRF){
    reg.issuer=document.getElementById('p-rf-emissor')?.value?.trim()||'';
    reg.bondType=document.getElementById('p-rf-tipo')?.value||'';
    reg.indexer=document.getElementById('p-rf-index')?.value||'';
    reg.rate=document.getElementById('p-rf-rate')?.value?.trim()||'';
    reg.dailyLiquidity=document.getElementById('p-rf-liq')?.value||'';
    reg.maturityDate=brDate(document.getElementById('p-rf-due')?.value||'');
  }
  if(S.editPId){ S.aportes=S.aportes.map(a=>a.id===S.editPId?reg:a); }
  else { S.aportes.unshift(reg); }
  S.showP=false; S.editPId=null; S._fp=null;
  syncAssetsFromAportes(false);
  toast(`✅ ${isReserve? (reserveMode==='saida'?'Saída':'Reserva') : (op==='venda'?'Venda':'Compra')} de ${ti} registrada!`);
  fetchQuotes(false);
}
function rmP(id){
  if(!confirm('Remover esta operação? A aba Ativos será recalculada.')) return;
  S.aportes=S.aportes.filter(a=>a.id!==id);
  if(S.editPId===id){ S.editPId=null; S.showP=false; S._fp=null; }
  syncAssetsFromAportes(false);
  toast('🗑️ Operação removida.');
}

function tgD(){ S.showD=!S.showD; render(); }
function clD(){ S.showD=false; render(); }
function svD(){
  const ti=document.getElementById('d-ti')?.value?.trim().toUpperCase();
  const va=parseNum(document.getElementById('d-va')?.value);
  const ty=document.getElementById('d-ty')?.value||'Rendimento';
  const ob=document.getElementById('d-ob')?.value?.trim()||'';
  const rawDt=document.getElementById('d-dt')?.value||'';
  const dt=rawDt?brDate(rawDt):new Date().toLocaleDateString('pt-BR');
  if(!ti||va<=0){ alert('Preencha Ticker e Valor recebido.'); return; }
  S.proventos.unshift({id:Date.now(), ticker:ti, value:va, type:ty, date:dt, note:ob});
  S.showD=false; save();
  toast(`✅ Provento de ${ti} registrado: ${fmt(va)}`);
  render();
}
function rmD(id){
  if(!confirm('Remover este provento?')) return;
  S.proventos=S.proventos.filter(p=>p.id!==id);
  save(); toast('🗑️ Provento removido.'); render();
}

function toggleAportesHistory(){
  S.apHistoryOpen = S.apHistoryOpen === false;
  save();
  render();
}
function setAporteSearch(v){
  S.apSearch = String(v||'');
  clearTimeout(S.apSearchTimer);
  S.apSearchTimer = setTimeout(()=>render(),180);
}
function clearAporteSearch(){
  S.apSearch = '';
  clearTimeout(S.apSearchTimer);
  render();
}

function getAI(){
  const{tC,tGP,mD,aD,avgDY}=cx();
  const rec=proventoStats();
  if(!S.assets.length){ S.aiText='Cadastre seus ativos primeiro para gerar uma análise.'; render(); return; }
  const porTipo={},por=S.assets.map(a=>({ticker:a.ticker,type:a.type,valor:a.qty*a.current_price,divMes:(a.qty*a.current_price*(a.dy/100))/12,dy:Number(a.dy)||0,var:a.avg_price>0?((a.current_price-a.avg_price)/a.avg_price)*100:0})).sort((a,b)=>b.valor-a.valor);
  por.forEach(a=>porTipo[a.type]=(porTipo[a.type]||0)+a.valor);
  const maior=por[0],maiorPct=tC>0?(maior.valor/tC)*100:0;
  const fiisPct=tC>0?((porTipo['FII']||0)/tC)*100:0,acoesPct=tC>0?((porTipo['Ação']||0)/tC)*100:0;
  const divGoal=Number(S.divGoal)||0,faltaDiv=Math.max(0,divGoal-mD);
  const alvoPat=divGoal>0&&avgDY>0?(divGoal*12)/(avgDY/100):0;
  const L=[];
  L.push('📊 RESUMO DA CARTEIRA');
  L.push(`Patrimônio: ${fmt(tC)} | Resultado: ${fmtP(tGP)}`);
  L.push(`Renda passiva estimada: ${fmt(mD)}/mês (${fmt(aD)}/ano)`);
  L.push(`Proventos recebidos: ${fmt(rec.mes)} no mês · ${fmt(rec.ano)} no ano · ${fmt(rec.total)} total`);
  L.push(`DY médio: ${avgDY.toFixed(2)}%`);
  L.push('');
  L.push('⚖️ ALOCAÇÃO');
  Object.entries(porTipo).sort((a,b)=>b[1]-a[1]).forEach(([tipo,valor])=>L.push(`• ${tipo}: ${((valor/tC)*100).toFixed(1)}% (${fmt(valor)})`));
  L.push('');
  L.push('🔎 PONTOS DE ATENÇÃO');
  if(maiorPct>20) L.push(`• Concentração alta em ${maior.ticker}: ${maiorPct.toFixed(1)}% — considere diversificar próximos aportes.`);
  else L.push(`• Maior posição: ${maior.ticker} com ${maiorPct.toFixed(1)}% — concentração dentro do esperado.`);
  if(S.assets.length<8) L.push('• Poucos ativos. Para renda passiva consistente, 10+ ativos de setores diferentes reduzem risco.');
  if(fiisPct>60) L.push('• FIIs com peso muito alto (>60%). Aumenta exposição a juros e riscos imobiliários.');
  if(acoesPct>70) L.push('• Ações com peso muito alto. Dividendos ficam mais irregulares e sujeitos a resultado trimestral.');
  if(avgDY>12) L.push('• DY médio elevado (>12%). Confirme se os rendimentos são recorrentes, não eventos isolados.');
  if(avgDY>0&&avgDY<5) L.push('• DY médio baixo. Novos aportes em ativos de renda podem acelerar o crescimento da renda passiva.');
  L.push('');
  if(divGoal>0){
    L.push(`💰 OBJETIVO: ${fmt(divGoal)}/mês`);
    if(mD>=divGoal) L.push(`• ✅ Objetivo atingido! Foco agora é sustentabilidade e diversificação da renda.`);
    else{ L.push(`• Falta ${fmt(faltaDiv)}/mês para o objetivo.`); if(alvoPat>0) L.push(`• Patrimônio estimado para atingir o objetivo com DY atual: ${fmt(alvoPat)} (falta ${fmt(Math.max(0,alvoPat-tC))})`); }
    L.push('');
  }
  L.push('✅ SUGESTÕES PRÁTICAS');
  L.push('• Priorize ativos/setores abaixo do peso desejado nos próximos aportes.');
  L.push('• Evite aumentar posição que já está acima de 20% da carteira.');
  L.push('• Confirme que o DY reflete rendimentos recorrentes, não extraordinários.');
  L.push('• Registre o motivo de cada compra na aba Aportes para acompanhar a estratégia.');
  L.push('');
  L.push('⚠️ Análise automática. Não constitui recomendação de investimento. Consulte um profissional habilitado.');
  S.aiText=L.join('\n'); render();
}

function bind(){
  document.querySelectorAll('.fc input:not([disabled]),.fc select').forEach(el=>{
    el.addEventListener('keydown',e=>{ if(e.key==='Enter'){ if(S.showA) svA(); else if(S.showP) svP(); else if(S.showD) svD(); } });
  });
}

load();
initFirebase();
if(S.aportes.length) syncAssetsFromAportes(false); else render();
fetchQuotes(false);
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) fetchQuotes(false); });
window.addEventListener('focus',()=>fetchQuotes(false));
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  PWA.prompt=e;
  render();
});
window.addEventListener('appinstalled',()=>{
  PWA.prompt=null;
  PWA.installed=true;
  toast('App instalado no dispositivo!');
  render();
});
if('serviceWorker' in navigator && location.protocol!=='file:'){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(reg=>{
      if(reg && reg.update) reg.update().catch(()=>{});
    }).catch(()=>{});
  });
}
setInterval(()=>{
  S.cd=Math.max(0,S.cd-1);
  if(S.cd<=0){ S.cd=QI; fetchQuotes(false); return; }
  const el=document.getElementById('cd-span');
  if(el) el.textContent=S.cd;
},1000);
