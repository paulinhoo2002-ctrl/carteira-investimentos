function parseB3PositionWorkbook(wb, fileName=''){
  const items=[]; const warnings=[];
  const stats={
    importedBySheet:{},
    ignoredBySheet:{},
    skippedSheets:[],
    ignoredByReason:{},
    totalIgnored:0
  };
  const dateMatch=String(fileName||'').match(/(20\d{2})[-_](\d{2})[-_](\d{2})/);
  const importDate=dateMatch?`${dateMatch[3]}/${dateMatch[2]}/${dateMatch[1]}`:new Date().toLocaleDateString('pt-BR');
  const addIgnored=(sheetName, reason)=>{
    stats.totalIgnored++;
    stats.ignoredBySheet[sheetName]=(stats.ignoredBySheet[sheetName]||0)+1;
    if(reason){
      stats.ignoredByReason[reason]=(stats.ignoredByReason[reason]||0)+1;
    }
  };
  const addImported=(sheetName)=>{
    stats.importedBySheet[sheetName]=(stats.importedBySheet[sheetName]||0)+1;
  };
  (wb.SheetNames||[]).forEach(sheetName=>{
    const sheet=wb.Sheets[sheetName]; if(!sheet) return;
    if(isEmprestimoSheet(sheetName)){
      warnings.push(`Aba "${sheetName}" ignorada: posições de empréstimo/lent lending não entram como compra na carteira.`);
      stats.skippedSheets.push(sheetName);
      return;
    }
    const rows=XLSX.utils.sheet_to_json(sheet,{header:1,raw:true,defval:null});
    if(!rows || rows.length<2){
      warnings.push(`Aba "${sheetName}" sem linhas úteis para importar.`);
      stats.skippedSheets.push(sheetName);
      return;
    }
    const headers=rows[0].map(x=>String(x||'').trim());
    const normHeaders=headers.map(normHeaderB3);
    const hasQtd=normHeaders.includes('quantidade') || normHeaders.includes('quantidade disponivel');
    const hasTicker=normHeaders.includes('codigo de negociacao') || normHeaders.includes('codigo') || normHeaders.includes('ticker');
    const isRF=isRendaFixaText(sheetName) || normHeaders.some(h=>/vencimento|indexador|emissor|instituicao|taxa/.test(h));
    const isETF=String(sheetName||'').toLowerCase().includes('etf');
    if(!hasQtd && !isRF){
      warnings.push(`Aba "${sheetName}" sem colunas reconhecidas de posição; ignorada.`);
      stats.skippedSheets.push(sheetName);
      return;
    }
    rows.slice(1).forEach((row,idx)=>{
      const produto=String(pickB3(row,headers,['Produto','Nome do Produto','Ativo','Descrição','Descricao','Título','Titulo'])||'').trim();
      const rawTicker=String(pickB3(row,headers,['Código de Negociação','Codigo de Negociacao','Código','Codigo','Ticker'])||'').trim().toUpperCase();
      const venc=String(pickB3(row,headers,['Vencimento','Data de Vencimento'])||'').trim();
      const inst=String(pickB3(row,headers,['Instituição','Instituicao','Emissor','Administrador'])||'').trim();
      const rowType=String(pickB3(row,headers,['Tipo'])||'').trim();
      let ticker=rawTicker;
      if(!ticker && isRF){
        const base=[produto,inst,venc].filter(Boolean).join(' ');
        ticker=cleanAssetCode(base||sheetName);
      }
      if(!ticker){
        addIgnored(sheetName,'sem ticker');
        return;
      }
      if(!isRF && !tickerValidoB3(ticker)){
        addIgnored(sheetName,'ticker inválido');
        return;
      }
      const rowLabel=cleanAssetCode(produto || ticker || '');
      if(!ticker || ticker==='TOTAL'){
        addIgnored(sheetName,'linha total/subtotal');
        return;
      }
      if(/^TOTAL\b/.test(rowLabel) || /^TOTAL\b/.test(produto.trim().toUpperCase())){
        addIgnored(sheetName,'linha total/subtotal');
        return;
      }
      if(/^SUBTOTAL\b/.test(rowLabel) || /^SUBTOTAL\b/.test(produto.trim().toUpperCase())){
        addIgnored(sheetName,'linha total/subtotal');
        return;
      }
      let qty=parseNum(pickB3(row,headers,['Quantidade','Quantidade Disponível','Quantidade Disponivel','Quantidade Atual']));
      const unitPrice=b3PositionUnitPrice(row, headers);
      let currentValue=b3PositionCurrentValue(row, headers);
      if(qty<=0 && isRF && currentValue>0) qty=1;
      if(qty<=0){
        addIgnored(sheetName,'sem quantidade');
        return;
      }
      if(currentValue<=0 && unitPrice>0 && qty>0) currentValue=qty*unitPrice;
      let price=unitPrice>0 ? unitPrice : (currentValue>0 && qty>0 ? currentValue/qty : 0);
      if(isRF && currentValue>0 && qty>0) price=currentValue/qty;
      if(price<=0){
        warnings.push(`${ticker}: sem preço válido; ignorado.`);
        addIgnored(sheetName,'sem preço válido');
        return;
      }
      const meta=inferB3PositionMeta(sheetName, ticker, produto, rowType);
      const tipo=normalizeType(meta.type||'Ação','Ação');
      const setor=meta.sector||'';
      const totalValue=currentValue>0 ? currentValue : qty*price;
      const candidate={
        ticker,
        qty,
        price,
        value:totalValue,
        currentValue:totalValue,
        unitPrice:unitPrice>0 ? unitPrice : price,
        type:tipo,
        sector:setor,
        product:produto.trim(),
        sheet:sheetName,
        kind:rowType,
        date:importDate
      };
      if(isB3PositionSummaryRow(candidate)){
        addIgnored(sheetName,'linha totalizadora / resumo');
        return;
      }
      items.push(candidate);
      addImported(sheetName);
    });
  });
  return {items,warnings,importDate,stats,kind:'position'};
}

function rfDetailedFindExistingAsset(item){
  const ticker=String(item?.ticker||'').toUpperCase();
  const nameKey=rfPosNorm(item?.name);
  const issuerKey=rfPosNorm(item?.issuer);
  const maturityKey=b3MovementDateKey(item?.maturityDate);
  const assets=S.assets||[];
  let idx=assets.findIndex(a=>ticker && String(a.ticker||'').toUpperCase()===ticker);
  if(idx>=0) return {idx,reason:'Mesmo código já existe em Meus Ativos.'};
  idx=assets.findIndex(a=>{
    const text=rfPosNorm(`${a.ticker||''} ${a.name||''} ${a.product||''} ${a.title||''}`);
    return text && nameKey && (text.includes(nameKey) || nameKey.includes(text));
  });
  if(idx>=0) return {idx,reason:'Nome parecido já existe em Meus Ativos.'};
  idx=assets.findIndex(a=>{
    const aMat=b3MovementDateKey(a.rf_maturity_date||a.fixed_maturity_date||a.maturityDate||a.vencimento||'');
    const text=rfPosNorm(`${a.ticker||''} ${a.name||''} ${a.product||''} ${a.sector||''}`);
    return maturityKey && aMat===maturityKey && issuerKey && text.includes(issuerKey);
  });
  if(idx>=0) return {idx,reason:'Mesmo vencimento e emissor/setor já aparecem em Meus Ativos.'};
  return {idx:-1,reason:''};
}
function rfDetailedPossibleDuplicateAsset(item){
  const maturityKey=b3MovementDateKey(item?.maturityDate);
  if(!maturityKey) return -1;
  return (S.assets||[]).findIndex(a=>{
    const aMat=b3MovementDateKey(a.rf_maturity_date||a.fixed_maturity_date||a.maturityDate||a.vencimento||'');
    return aMat===maturityKey && rfPosNorm(a.sector)===rfPosNorm(item?.sector);
  });
}
function rfEventTypeLabel(v){
  const s=rfPosNorm(v);
  if(s.includes('JUROS')) return 'Juros';
  if(s.includes('PREMIO')) return 'Prêmio';
  if(s.includes('AMORT')) return 'Amortização';
  if(s.includes('RESGATE') || s.includes('VENCIMENTO')) return 'Resgate/Vencimento';
  return String(v||'').trim() || 'Revisar';
}
function rfEventDestination(eventType){
  const t=rfEventTypeLabel(eventType);
  return (t==='Juros' || t==='Prêmio') ? 'Proventos' : 'Revisar';
}
function rfEventAutoKey(ev){
  const ticker=String(ev?.ticker||'').toUpperCase();
  const date=b3MovementDateKey(ev?.date);
  const type=rfPosNorm(ev?.eventType).toLowerCase();
  const value=Number(ev?.value||0).toFixed(2);
  return `rf|${ticker}|${date}|${type}|${value}`;
}
function rfEventDuplicate(ev){
  const key=rfEventAutoKey(ev);
  const ticker=String(ev?.ticker||'').toUpperCase();
  const date=b3MovementDateKey(ev?.date);
  const eventType=rfPosNorm(ev?.eventType);
  const value=Number(ev?.value)||0;
  return (S.proventos||[]).some(p=>{
    const sameKey=String(p.autoKey||'')===key;
    const sameFields=String(p.ticker||'').toUpperCase()===ticker
      && b3MovementDateKey(p.date)===date
      && rfPosNorm(p.eventType||p.type)===eventType
      && Math.abs((Number(p.value)||0)-value)<0.01
      && String(p.source||'')==='PosicaoDetalhada B3/XP';
    return sameKey || sameFields;
  });
}
function rfEventBuild(raw){
  const eventType=rfEventTypeLabel(raw.eventType);
  const destination=rfEventDestination(eventType);
  const ticker=String(raw.ticker||rfDetailedKnownCode(raw.assetName)||'').toUpperCase();
  const value=Number(raw.value)||0;
  const date=b3MovementDateFromCell(raw.date,'');
  const ev={
    id:raw.id||0,
    include:false,
    status:'Revisar',
    date,
    ticker,
    assetName:String(raw.assetName||''),
    eventType,
    value,
    destination,
    note:'',
    source:'PosicaoDetalhada B3/XP'
  };
  ev.autoKey=rfEventAutoKey(ev);
  if(!ticker || !date || value<=0){
    ev.status='Revisar';
    ev.note='Dados do evento incompletos.';
    return ev;
  }
  if(destination==='Revisar'){
    ev.status='Revisar';
    ev.note=`${eventType} fica para revisão manual nesta etapa.`;
    return ev;
  }
  if(rfEventDuplicate(ev)){
    ev.status='Duplicado';
    ev.note='Evento já existe em Proventos.';
    return ev;
  }
  ev.status='Novo provento';
  ev.include=true;
  ev.note='Pode ser importado em Proventos.';
  return ev;
}
function rfParseDetailedEvents(rows){
  const events=[];
  for(let i=0;i<rows.length;i++){
    const header=(rows[i]||[]).map(v=>String(v||'').trim());
    const norm=header.map(rfPosNorm);
    const hasDate=norm.some(h=>h.includes('DATA') || h.includes('PAGAMENTO'));
    const hasEventCols=norm.some(h=>h.includes('JUROS') || h.includes('PREMIO') || h.includes('AMORT') || h.includes('RESGATE') || (h.includes('VENCIMENTO') && !h.includes('DATA')));
    const hasGenericEvent=norm.some(h=>h==='EVENTO' || h.includes('TIPO DE EVENTO')) && norm.some(h=>h.includes('VALOR'));
    if(!hasDate || (!hasEventCols && !hasGenericEvent)) continue;
    const idxDate=norm.findIndex(h=>h.includes('DATA') || h.includes('PAGAMENTO'));
    const idxName=norm.findIndex(h=>h.includes('PRODUTO') || h.includes('ATIVO') || h.includes('TITULO') || h.includes('NOME'));
    const idxTicker=norm.findIndex(h=>h.includes('CODIGO') || h.includes('TICKER'));
    const idxEvent=norm.findIndex(h=>h==='EVENTO' || h.includes('TIPO DE EVENTO'));
    const idxValue=norm.findIndex(h=>h.includes('VALOR'));
    const eventCols=norm.map((h,idx)=>({h,idx,type:rfEventTypeLabel(h)})).filter(c=>['Juros','Prêmio','Amortização','Resgate/Vencimento'].includes(c.type) && !c.h.includes('DATA'));
    for(let j=i+1;j<rows.length;j++){
      const row=rows[j]||[];
      if(!row.some(v=>v!==null && String(v).trim()!=='')) break;
      const rowLabel=rfPosNorm(row[0]);
      if(['RENDA FIXA','FUNDOS DE INVESTIMENTOS','DIVIDENDOS, PROVENTOS E OUTRAS DISTRIBUICOES','ACOES','CUSTODIA REMUNERADA'].some(stop=>rowLabel.includes(stop))) break;
      const assetName=String((idxName>=0?row[idxName]:row[0])||'').replace(/\s+/g,' ').trim();
      const ticker=String((idxTicker>=0?row[idxTicker]:'')||rfDetailedKnownCode(assetName)||'').toUpperCase();
      const date=idxDate>=0 ? row[idxDate] : '';
      if(hasGenericEvent && idxEvent>=0 && idxValue>=0){
        const value=parseNum(row[idxValue]);
        if(value>0) events.push(rfEventBuild({id:events.length,date,ticker,assetName,eventType:row[idxEvent],value}));
      }
      eventCols.forEach(col=>{
        const value=parseNum(row[col.idx]);
        if(value>0) events.push(rfEventBuild({id:events.length,date,ticker,assetName,eventType:col.type,value}));
      });
    }
  }
  return events;
}
function rfDetailedStatus(item){
  if(!item.ticker || !item.name || item.qty<=0 || item.appliedValue<=0 || item.marketValue<=0) return {status:'Revisar', note:'Dados principais incompletos.'};
  const found=rfDetailedFindExistingAsset(item);
  if(found.idx>=0) return {status:'Atualizar existente', note:found.reason};
  if(rfDetailedPossibleDuplicateAsset(item)>=0) return {status:'Possível duplicado', note:'Mesmo vencimento e setor encontrados. Revise antes de gravar.'};
  return {status:'Novo ativo', note:'Novo ativo identificado apenas para revisão.'};
}
function parseRfDetailedPositionWorkbook(wb, fileName=''){
  const items=[]; const events=[]; const warnings=[];
  const dateMatch=String(fileName||'').match(/(20\d{2})[-_](\d{2})[-_](\d{2})/);
  const importDate=dateMatch?`${dateMatch[3]}/${dateMatch[2]}/${dateMatch[1]}`:new Date().toLocaleDateString('pt-BR');
  (wb.SheetNames||[]).forEach(sheetName=>{
    const sheet=wb.Sheets[sheetName]; if(!sheet) return;
    const rows=XLSX.utils.sheet_to_json(sheet,{header:1,raw:true,defval:null});
    events.push(...rfParseDetailedEvents(rows));
    for(let i=0;i<rows.length;i++){
      const header=(rows[i]||[]).map(v=>String(v||'').trim());
      const norm=header.map(rfPosNorm);
      const hasRfHeader=norm.some(h=>h.includes('POSICAO A MERCADO')) && norm.some(h=>h.includes('VALOR APLICADO')) && norm.some(h=>h.includes('DATA VENCIMENTO'));
      if(!hasRfHeader) continue;
      const idx={
        name:0,
        market:norm.findIndex(h=>h.includes('POSICAO A MERCADO')),
        applied:norm.findIndex(h=>h==='VALOR APLICADO'),
        rate:norm.findIndex(h=>h.includes('TAXA')),
        application:norm.findIndex(h=>h.includes('DATA APLICACAO')),
        maturity:norm.findIndex(h=>h.includes('DATA VENCIMENTO')),
        qty:norm.findIndex(h=>h==='QUANTIDADE')
      };
      for(let j=i+1;j<rows.length;j++){
        const row=rows[j]||[];
        const name=String(row[idx.name]||'').replace(/\s+/g,' ').trim();
        const nameKey=rfPosNorm(name);
        if(!nameKey) continue;
        if(['FUNDOS DE INVESTIMENTOS','DIVIDENDOS, PROVENTOS E OUTRAS DISTRIBUICOES','PROVENTOS','ACOES','CUSTODIA REMUNERADA'].some(stop=>nameKey.includes(stop))) break;
        if(nameKey==='RENDA FIXA' || nameKey.includes('|')) continue;
        const qty=parseNum(row[idx.qty]);
        const appliedValue=parseNum(row[idx.applied]);
        const marketValue=parseNum(row[idx.market]);
        if(qty<=0 && appliedValue<=0 && marketValue<=0) continue;
        const rate=String(row[idx.rate]||'').replace('IPC-A','IPCA').trim();
        const appDate=b3MovementDateFromCell(row[idx.application], '');
        const maturityDate=b3MovementDateFromCell(row[idx.maturity], '');
        const ticker=rfDetailedKnownCode(name);
        const avgPrice=qty>0 ? appliedValue/qty : 0;
        const currentPrice=qty>0 ? marketValue/qty : 0;
        const result=marketValue-appliedValue;
        const rentability=appliedValue>0 ? (result/appliedValue)*100 : 0;
        const item={
          id:items.length,
          include:true,
          ticker,
          name,
          type:'Renda Fixa',
          sector:rfDetailedSector(name, rate),
          issuer:rfDetailedIssuer(name),
          qty,
          appliedValue,
          marketValue,
          avgPrice,
          currentPrice,
          result,
          rentability,
          rate,
          applicationDate:appDate,
          maturityDate,
          sheet:sheetName,
          importDate
        };
        const status=rfDetailedStatus(item);
        item.status=status.status;
        item.note=status.note;
        if(!item.maturityDate) item.note=`${item.note} Vencimento não informado no arquivo.`.trim();
        if(item.status==='Revisar') item.include=false;
        items.push(item);
      }
    }
  });
  if(!items.length) warnings.push('Nenhum ativo de Renda Fixa foi identificado na seção de posição detalhada.');
  return {items,events,warnings,importDate,kind:'rf-detailed-position'};
}
function parseNotaCorretoraWorkbook(wb, fileName=''){
  const items=[]; const warnings=[];
  const stats={
    byType:{},
    byOperation:{},
    ignoredByReason:{},
    totalIgnored:0
  };
  const sheetName=(wb.SheetNames||[])[0];
  if(!sheetName){
    return {items,warnings,importDate:new Date().toLocaleDateString('pt-BR'),stats,noteKey:'nota-sem-planilha',noteNumber:'',tradeDate:''};
  }
  const sheet=wb.Sheets[sheetName];
  const rows=XLSX.utils.sheet_to_json(sheet,{header:1,raw:true,defval:''});
  const headerIdx=notaFindHeaderIndex(rows);
  const noteNumber=notaFindValue(rows,'NUM NOTA') || notaFindValue(rows,'Nº NOTA') || notaFindValue(rows,'N. NOTA') || '';
  const tradeDateRaw=notaFindValue(rows,'DATA PREGÃO') || notaFindValue(rows,'DATA PREGAO') || '';
  const dateMatch=String(fileName||'').match(/(\d{2})(\d{2})(\d{4})/);
  const tradeDate=tradeDateRaw
    ? (String(tradeDateRaw).includes('/') ? String(tradeDateRaw).trim() : `${String(tradeDateRaw).slice(0,2)}/${String(tradeDateRaw).slice(2,4)}/${String(tradeDateRaw).slice(4,8)}`)
    : (dateMatch ? `${dateMatch[1]}/${dateMatch[2]}/${dateMatch[3]}` : new Date().toLocaleDateString('pt-BR'));
  const noteKey=[noteNumber||cleanAssetCode(fileName)||'NOTA',tradeDate.replace(/\//g,'-')].join('|');
  if(headerIdx<0){
    warnings.push('Cabeçalho da nota corretora não encontrado. Procure a tabela com C/V, TIPO DE MERCADO e ESPECIFICAÇÃO DO TÍTULO.');
    return {items,warnings,importDate:tradeDate,stats,noteKey,noteNumber,tradeDate};
  }
  const headers=(rows[headerIdx]||[]).map(v=>String(v||'').trim());
  const normHeaders=headers.map(notaNorm);
  const idxCv=normHeaders.findIndex(h=>h==='C/V' || h==='CV');
  const idxMarket=normHeaders.findIndex(h=>h.includes('TIPO DE MERCADO'));
  const idxSpec=normHeaders.findIndex(h=>h.includes('ESPECIFICACAO DO TITULO'));
  const idxObs=normHeaders.findIndex(h=>h.includes('OBS'));
  const idxQty=normHeaders.findIndex(h=>h.includes('QUANTIDADE'));
  const idxPrice=normHeaders.findIndex(h=>h.includes('PRECO DE LIQUIDACAO'));
  const idxTotal=normHeaders.findIndex(h=>h.includes('COMPRA/VENDA'));
  if(idxCv<0 || idxSpec<0 || idxQty<0 || idxPrice<0 || idxTotal<0){
    warnings.push('Algumas colunas esperadas não foram encontradas; a nota pode estar em um formato diferente.');
  }
  for(let i=headerIdx+1;i<rows.length;i++){
    const row=rows[i]||[];
    const rowTxt=row.map(v=>String(v||'').trim()).filter(Boolean).join(' ');
    const up=notaNorm(rowTxt);
    if(!rowTxt) continue;
    if(/^(RESUMO|TOTAIS|TOTAL|CORRETAGEM|NOTA DE NEGOCIACAO|NOTA DE NEGOCIAÇÃO|MOVIMENTACAO|MOVIMENTAÇÃO)/.test(up)) break;
    if(/^(PRA?CA|C\/V|TIPO DE MERCADO|ESPECIFICACAO DO TITULO|OBS|QUANTIDADE|PRECO DE LIQUIDACAO|COMPRA\/VENDA)/.test(up)) continue;
    if(/\bSUB\s*TOTAL\b|\bTOTAL\b/.test(up)) {
      stats.totalIgnored++;
      stats.ignoredByReason['linha subtotal/total']=(stats.ignoredByReason['linha subtotal/total']||0)+1;
      continue;
    }
    const spec=String(idxSpec>=0 ? row[idxSpec] : '').trim();
    const cv=String(idxCv>=0 ? row[idxCv] : '').trim().toUpperCase();
    const market=String(idxMarket>=0 ? row[idxMarket] : '').trim();
    const obs=String(idxObs>=0 ? row[idxObs] : '').trim();
    const qty=parseNum(idxQty>=0 ? row[idxQty] : '');
    const price=parseNum(idxPrice>=0 ? row[idxPrice] : '');
    const total=parseNum(idxTotal>=0 ? row[idxTotal] : '');
    if(!spec && qty<=0 && price<=0 && total<=0) continue;
    if(!spec){
      stats.totalIgnored++;
      stats.ignoredByReason['sem especificação']=(stats.ignoredByReason['sem especificação']||0)+1;
      continue;
    }
    if(/\bSUB\s*TOTAL\b|\bTOTAL\b/.test(notaNorm(spec))){
      stats.totalIgnored++;
      stats.ignoredByReason['linha subtotal/total']=(stats.ignoredByReason['linha subtotal/total']||0)+1;
      continue;
    }
    const op=/V/.test(cv) ? 'venda' : 'compra';
    const ticker=notaTickerFromSpec(spec);
    if(!ticker){
      stats.totalIgnored++;
      stats.ignoredByReason['sem ticker']=(stats.ignoredByReason['sem ticker']||0)+1;
      continue;
    }
    const meta=inferNotaMeta(ticker, spec, market);
    const finalPrice=price>0 ? price : (qty>0 && total>0 ? total/qty : 0);
    const finalTotal=total>0 ? total : (qty>0 && finalPrice>0 ? qty*finalPrice : 0);
    if(qty<=0 || finalPrice<=0){
      stats.totalIgnored++;
      stats.ignoredByReason[qty<=0 ? 'sem quantidade' : 'sem preço válido']=(stats.ignoredByReason[qty<=0 ? 'sem quantidade' : 'sem preço válido']||0)+1;
      continue;
    }
    items.push({
      ticker,
      qty,
      price:finalPrice,
      value:finalTotal,
      type:normalizeType(meta.type||'Ação','Ação'),
      sector:meta.sector||'',
      product:spec,
      market,
      obs,
      operation:op,
      date:tradeDate,
      noteKey,
      noteNumber,
      source:'nota-corretora'
    });
    const metaType=normalizeType(meta.type||'Ação','Ação');
    stats.byType[metaType]=(stats.byType[metaType]||0)+1;
    stats.byOperation[op]=(stats.byOperation[op]||0)+1;
  }
  return {items,warnings,importDate:tradeDate,stats,noteKey,noteNumber,tradeDate};
}

async function readBrokerNotePdf(file){
  if(!file) return;
  if(!S.brokerNoteImport) S.brokerNoteImport={open:true};
  S.brokerNoteImport={...S.brokerNoteImport,status:'loading',message:'Lendo o PDF localmente...',fileName:file.name||'nota.pdf',parsed:null};
  render();
  try{
    let pdfjs;
    try{ pdfjs=await loadPdfJs(); }
    catch(error){ throw new Error('PDFJS_LOAD'); }
    const data=new Uint8Array(await file.arrayBuffer());
    const doc=await pdfjs.getDocument({data}).promise;
    const pages=[];
    for(let pageNumber=1;pageNumber<=doc.numPages;pageNumber++){
      const page=await doc.getPage(pageNumber);
      const content=await page.getTextContent();
      pages.push(pdfLinesFromTextContent(content).join('\n'));
    }
    const text=pages.join('\n');
    if(text.replace(/\s+/g,'').length<80) throw new Error('PDF_NO_TEXT');
    const parsed=parseInterBrokerNoteText(text);
    parsed.duplicate=detectBrokerNoteDuplicate(parsed);
    S.brokerNoteImport={...S.brokerNoteImport,status:parsed.valid?'ready':'error',message:parsed.valid?'Nota lida. Confira todos os dados antes de confirmar.':'Não foi possível validar todos os dados da nota.',allowDuplicate:false,parsed};
  }catch(error){
    console.error('[Nota Inter PDF] falha na leitura local',error);
    const message=error?.message==='PDFJS_LOAD'
      ? 'Não foi possível carregar o leitor de PDF. Verifique sua conexão e tente novamente.'
      : 'Não foi possível ler este PDF. Verifique se é uma nota de corretagem do Inter com texto selecionável.';
    S.brokerNoteImport={...S.brokerNoteImport,status:'error',message,parsed:null};
  }
  render();
}

function brokerNoteAdjustedRow(row,note,rateCosts){
  const baseTotal=Number(row.total)||0;
  const operationsTotal=Number(note.operationsTotal)||note.rows.reduce((sum,item)=>sum+(Number(item.total)||0),0);
  const share=rateCosts && operationsTotal>0 ? baseTotal/operationsTotal : 0;
  const allocated=share*(Number(note.costs)||0);
  const adjustedTotal=Math.max(0,baseTotal+allocated);
  return {...row,allocatedCost:allocated,adjustedTotal,adjustedPrice:Number(row.qty)>0?adjustedTotal/Number(row.qty):Number(row.price)||0};
}
function brokerNoteValidationChecklist(note=S.brokerNoteImport?.parsed){
  const rows=note?.rows||[];
  const duplicateInfo=brokerNoteDuplicateInfo(note);
  const rowsTotal=rows.reduce((sum,row)=>sum+(Number(row.total)||0),0);
  const operationsTotal=Number(note?.operationsTotal)||0;
  const valuesMatch=operationsTotal>0 && Math.abs(rowsTotal-operationsTotal)<=0.05;
  const allTickers=rows.length>0 && rows.every(row=>brokerNoteValidTicker(row.ticker));
  return [
    {id:'note',ok:!!note?.noteNumber,label:'Nota identificada',note:note?.noteNumber?`Nota ${note.noteNumber}`:'Número da nota ausente.'},
    {id:'date',ok:!!note?.tradeDate,label:'Data do pregão identificada',note:note?.tradeDate||'Data do pregão ausente.'},
    {id:'broker',ok:!!note?.broker,label:'Corretora identificada',note:note?.broker||'Corretora ausente.'},
    {id:'tickers',ok:allTickers,label:'Todos os ativos possuem ticker',note:allTickers?`${rows.length} ativo(s) identificado(s).`:`${rows.filter(row=>!brokerNoteValidTicker(row.ticker)).length} ticker(s) pendente(s).`},
    {id:'values',ok:valuesMatch,label:'Valores das operações conferem',note:valuesMatch?`Consolidado em ${fmt(rowsTotal)}.`:`Nota ${fmt(operationsTotal)} · linhas ${fmt(rowsTotal)}.`},
    {id:'duplicate',ok:!duplicateInfo.duplicate,label:'Duplicidade não detectada',note:duplicateInfo.duplicate?`${duplicateInfo.count} lançamento(ões) parecido(s) encontrado(s).`:'Nenhuma nota igual localizada.'},
    {id:'pending',ok:rows.length>0 && allTickers,label:'Nenhuma linha pendente',note:rows.length>0&&allTickers?'Prévia pronta para confirmação.':'Revise os campos destacados.'}
  ];
}
function brokerNoteCanConfirm(state=S.brokerNoteImport){
  const note=state?.parsed;
  if(!note?.valid) return false;
  const checks=brokerNoteValidationChecklist(note);
  const required=checks.filter(item=>item.id!=='duplicate').every(item=>item.ok);
  const duplicate=brokerNoteDuplicateInfo(note).duplicate;
  return required && (!duplicate || !!state.allowDuplicate);
}

function confirmBrokerNoteImport(){
  const state=S.brokerNoteImport;
  const note=state?.parsed;
  if(!note?.valid) return;
  if(!brokerNoteCanConfirm(state)){
    alert('A conferência ainda possui pendências. Revise o checklist antes de importar.');
    return;
  }
  const rows=(note.rows||[]).filter(row=>row.include!==false);
  const invalid=rows.filter(row=>!brokerNoteValidTicker(row.ticker) || Number(row.qty)<=0 || Number(row.price)<=0);
  if(invalid.length){
    alert('Existem ativos pendentes ou linhas inválidas. Corrija o ticker antes de importar.');
    return;
  }
  if(detectBrokerNoteDuplicate(note) && !confirm('Esta nota parece já ter sido importada. Continuar poderá duplicar posições e valores. Deseja realmente importar novamente?')) return;
  const adjusted=rows.map(row=>brokerNoteAdjustedRow(row,note,!!state.rateCosts));
  const now=Date.now();
  const observation=`Importado da nota Inter ${note.noteNumber} - Pregão ${note.tradeDate}`;
  const records=adjusted.map((row,index)=>({
    id:now+index,
    operation:row.operation||'compra',
    movementKind:row.operation||'compra',
    ticker:row.ticker,
    qty:Number(row.qty)||0,
    price:Number(row.adjustedPrice)||Number(row.price)||0,
    totalValue:Number(row.adjustedTotal)||Number(row.total)||0,
    date:note.tradeDate,
    decision:observation,
    note:observation,
    type:normalizeType(row.type||metaTicker(row.ticker).type||'Ação','Ação'),
    sector:row.sector||metaTicker(row.ticker).sector||'',
    source:'Nota Inter PDF',
    origin:'Nota Inter PDF',
    brokerNoteKey:note.noteKey,
    brokerNoteNumber:note.noteNumber,
    brokerNoteBroker:note.broker,
    brokerNoteCostsAllocated:!!state.rateCosts,
    brokerNoteAllocatedCost:Number(row.allocatedCost)||0
  }));
  const importedTotal=records.reduce((sum,row)=>sum+(Number(row.totalValue)||0),0);
  S.aportes=[...records,...S.aportes];
  records.forEach(row=>learnTickerMeta(row.ticker,row.type,row.sector,true));
  S.brokerNoteImport=null;
  S.brokerNoteImportSuccess={
    noteNumber:note.noteNumber,
    tradeDate:note.tradeDate,
    assets:records.length,
    total:importedTotal,
    rateCosts:!!state.rateCosts,
    costs:Number(note.costs)||0
  };
  S.aportesViewMode='extrato';
  S.aportesFilter='todos';
  S.aportesPage=1;
  syncAssetsFromAportes(false);
  fetchQuotes(false);
  scheduleAutoProventosGratis('nota-inter-pdf');
  toast(`✅ Nota Inter ${note.noteNumber} importada com sucesso.`);
}

function applyNotaCorretoraTrades(items, noteKey, noteNumber, tradeDate){
  const importTag='[IMPORT_NOTA_CORRETORA]';
  const stamp=String(noteKey||noteNumber||tradeDate||'');
  S.aportes=S.aportes.filter(a=>{
    const dec=String(a.decision||'');
    return !(dec.includes(importTag) && String(a.noteKey||'')===stamp);
  });
  const now=Date.now();
  const novos=items.map((it,i)=>({
    id: now+i,
    operation:it.operation||'compra',
    ticker:it.ticker,
    qty:Number(it.qty)||0,
    price:Number(it.price)||0,
    date:it.date||tradeDate||new Date().toLocaleDateString('pt-BR'),
    decision:`${importTag} nota ${noteNumber||stamp} · ${it.market||'mercado'} · ${it.product||it.ticker}`,
    type:normalizeType(it.type||metaTicker(it.ticker).type||'Ação','Ação'),
    sector:it.sector||'',
    noteKey:stamp,
    noteNumber:noteNumber||'',
    source:'nota-corretora'
  })).filter(x=>x.ticker&&x.qty>0&&x.price>0);
  S.aportes=[...novos,...S.aportes];
  syncAssetsFromAportes(false);
  items.forEach(it=>learnTickerMeta(it.ticker, it.type, it.sector, true));
  save();
  render();
  fetchQuotes(false);
  scheduleAutoProventosGratis('nota');
  toast(`✅ ${novos.length} lançamento(ões) importado(s) da nota da corretora.`);
}

function b3ReviewPeriod(rows){
  const dates=(rows||[])
    .map(row=>parseAnyDate(row?.date||row?.paymentDate||row?.applicationDate||row?.importDate))
    .filter(Boolean)
    .sort((a,b)=>a-b);
  if(!dates.length) return 'Não identificado';
  const format=date=>date.toLocaleDateString('pt-BR');
  return dates.length===1 ? format(dates[0]) : `${format(dates[0])} a ${format(dates[dates.length-1])}`;
}
function b3ConfirmImport(label, selected, duplicates=0, incomplete=0){
  const message=[
    `Confirmar ${label}?`,
    '',
    `Selecionados: ${selected}`,
    `Duplicados ignorados: ${duplicates}`,
    `Pendentes/incompletos: ${incomplete}`,
    '',
    'Somente os itens válidos e selecionados serão aplicados.',
    'Por segurança, recomendamos exportar um backup antes de continuar.'
  ].join('\n');
  const confirmed=confirm(message);
  if(!confirmed) toast('Importação cancelada. Nenhum dado foi alterado.');
  return confirmed;
}
function b3ImportCompletedMessage(message){
  toast(`${message} Reexecute a Auditoria de Dados para conferir o resultado.`);

  return `<div class="b3-conference-summary">
    ${items.map(item=>`<div class="b3-conference-card">
      <div class="label">${esc(item.label)}</div>
      <div class="value">${esc(String(item.value))}</div>

    </div>`).join('')}

function openB3Review(parsed, fileName='', sourceKind='excel'){
  const items=(parsed?.items||[]).map((it,i)=>({
    id:it.id ?? i,
    include:true,
    ticker:String(it.ticker||'').toUpperCase(),
    qty:Number(it.qty)||0,
    price:Number(it.price)||0,
    value:Number(it.value)||((Number(it.qty)||0)*(Number(it.price)||0)),
    type:normalizeType(it.type||'Ação','Ação'),
    sector:String(it.sector||''),
    product:String(it.product||''),
    sheet:String(it.sheet||it.section||'Outros').trim()||'Outros',
    kind:String(it.kind||'').trim(),
    date:it.date||parsed?.importDate||new Date().toLocaleDateString('pt-BR'),
    sourceItem:{...it}
  })).filter(it=>it.ticker && it.qty>0 && it.price>0 && !isB3PositionSummaryRow(it));
  const groupsMap=new Map();
  items.forEach(it=>{
    const key=it.sheet||'Outros';
    if(!groupsMap.has(key)){
      groupsMap.set(key,{sheet:key,count:0,total:0,rights:0,sample:[],selected:true,sourceCount:0,items:[]});
    }
    const g=groupsMap.get(key);
    g.count++;
    g.total += Number(it.value)||0;
    g.sourceCount++;
    g.items.push(it);
    if(g.sample.length<4){
      g.sample.push(`${it.ticker} ${it.kind||it.sector||it.type||''}`.trim());
    }
    if(String(it.kind||'').toLowerCase()==='direito' || String(it.sector||'').toLowerCase()==='direito') g.rights++;
  });
  const groups=[...groupsMap.values()].sort((a,b)=>a.sheet.localeCompare(b.sheet,'pt-BR'));
  const selectedSheets={};
  groups.forEach(g=>{
    selectedSheets[g.sheet]=!/emprest/i.test(g.sheet);
  });
  S.b3Review={
    fileName,
    sourceKind,
    importDate:parsed?.importDate||'',
    warnings:parsed?.warnings||[],
    stats:parsed?.stats||{},
    items,
    groups,
    selectedSheets,
    includeRights:false
  };
  render();
}
function closeB3Review(){
  S.b3Review=null;
  render();
}
function setB3ReviewSheet(sheet, value){
  if(!S.b3Review) return;
  S.b3Review.selectedSheets = S.b3Review.selectedSheets || {};
  S.b3Review.selectedSheets[sheet] = !!value;
  render();
}
function setB3ReviewAll(value){
  if(!S.b3Review) return;
  S.b3Review.selectedSheets = Object.fromEntries((S.b3Review.groups||[]).map(g=>[g.sheet,!!value && !/emprest/i.test(g.sheet)]));
  render();
}
function setB3ReviewItem(sheet, idx, value){
  if(!S.b3Review) return;
  const group=(S.b3Review.groups||[]).find(g=>g.sheet===sheet);
  if(!group || !group.items || !group.items[idx]) return;
  group.items[idx].include=!!value;
  render();
}
function setB3ReviewGroupItems(sheet, value){
  if(!S.b3Review) return;
  const group=(S.b3Review.groups||[]).find(g=>g.sheet===sheet);
  if(!group) return;
  group.items=(group.items||[]).map(it=>({...it, include:!!value}));
  render();
}
function setB3ReviewRights(value){
  if(!S.b3Review) return;
  S.b3Review.includeRights = !!value;
  render();
}
function b3ReviewSelectedItems(){
  const r=S.b3Review;
  if(!r) return [];
  return (r.items||[]).filter(it=>{
    if(it.include===false) return false;
    if(!r.selectedSheets?.[it.sheet]) return false;
    if(!r.includeRights && (String(it.kind||'').toLowerCase()==='direito' || String(it.sector||'').toLowerCase()==='direito')) return false;
    return true;
  });
}
function b3ReviewSummary(){
  const items=(S.b3Review?.items||[]).filter(it=>!isB3PositionSummaryRow(it));
  const selected=b3ReviewSelectedItems().filter(it=>!isB3PositionSummaryRow(it));
  const total=items.reduce((s,it)=>s+(Number(it.value)||((Number(it.qty)||0)*(Number(it.price)||0))),0);
  const selectedTotal=selected.reduce((s,it)=>s+(Number(it.value)||((Number(it.qty)||0)*(Number(it.price)||0))),0);
  const sheets=[...new Set(items.map(it=>it.sheet))];
  const ignored=Number(S.b3Review?.stats?.totalIgnored)||0;
  const diff=Math.abs(total-selectedTotal);
  return {count:selected.length,total:selectedTotal,sheets,ignored,valid:items.length,validTotal:total,selectedCount:selected.length,diff};
}
function importB3Review(){
  if(!S.b3Review) return;
  const rows=b3ReviewSelectedItems().filter(it=>!isB3PositionSummaryRow(it));
  if(!rows.length){
    alert('Selecione ao menos uma aba válida para importar.');
    return;
  }
  const summary=b3ReviewSummary();
  if(!b3ConfirmImport('a posição atual da B3', rows.length, 0, summary.ignored)) return;
  const importDate=S.b3Review.importDate || new Date().toLocaleDateString('pt-BR');
  const payload=rows.map(r=>({
    ...r.sourceItem,
    ticker:r.ticker,
    qty:r.qty,
    price:r.price,
    value:r.value,
    type:r.type,
    sector:r.sector,
    product:r.product,
    sheet:r.sheet,
    kind:r.kind,
    date:r.date
  }));
  S.b3Review=null;
  applyB3ImportedPositions(payload, importDate);
}

function importRfPositionRows(rows){
  let created=0,updated=0,ignored=0;
  const now=new Date().toISOString();
  const source='B3 Posição Atual';
  const fallbackNote='Preço médio provisório importado da posição atual B3. Ajustar pelo histórico de movimentações.';
  const safeStatuses=new Set(['Novo ativo','Atualizar existente']);
  rows.forEach(row=>{
    const item={...row};
    const status=rfDetailedStatus(item);
    item.status=status.status;
    item.note=status.note;
    const safe=safeStatuses.has(item.status)
      && item.ticker
      && Number(item.qty)>0
      && Number(item.appliedValue)>0
      && Number(item.marketValue)>0;
    if(!safe){ ignored++; return; }
    const currentPrice=Number(item.marketValue)/Number(item.qty);
    const found=rfDetailedFindExistingAsset(item);
    if(found.idx>=0){
      const old=S.assets[found.idx]||{};
      const preservedAvg=Number(old.avg_price)||0;
      const preservedType=old.type||item.type||'Renda Fixa';
      const preservedSector=old.sector||item.sector||'';
      const preservedName=old.name||item.name;
      const preservedProduct=old.product||item.name;
      S.assets[found.idx]={
        ...old,
        ticker:old.ticker||item.ticker,
        name:preservedName,
        product:preservedProduct,
        type:preservedType,
        sector:preservedSector,
        qty:Number(item.qty),
        avg_price:preservedAvg,
        current_price:currentPrice,
        dy:Number(old.dy)||0,
        ideal_pct:Number(old.ideal_pct)||0,
        value:Number(item.marketValue),
        current_value:Number(item.marketValue),
        fixed_initial_value:Number(item.appliedValue),
        fixed_current_value:Number(item.marketValue),
        fixed_rate:item.rate,
        fixed_application_date:item.applicationDate,
        fixed_maturity_date:item.maturityDate,
        fixed_issuer:old.fixed_issuer||item.issuer||'',
        fixed_indexer:old.fixed_indexer || (String(item.rate||'').toUpperCase().includes('IPCA') ? 'IPCA' : 'Manual'),
        fixed_source:source,
        updated_at:now,
        rf_aporte_date:old.rf_aporte_date||item.applicationDate,
        rf_contract_rate:old.rf_contract_rate||item.rate,
        rf_maturity_date:old.rf_maturity_date||item.maturityDate,
        quoteSource:old.quoteSource||'importado',
        quoteUpdatedAt:old.quoteUpdatedAt||now,
        source:old.source||source,
        institution:old.institution||item.institution||old.broker||'',
        broker:old.broker||item.institution||'',
        observation:old.observation||old.note||'',
        note:old.note||old.observation||''
      };
      updated++;
      learnTickerMeta(item.ticker, 'Renda Fixa', item.sector, true);
      return;
    }
    S.assets.push({
      id:Date.now()+Math.floor(Math.random()*999999),
      ticker:item.ticker,
      name:item.name,
      product:item.name,
      type:'Renda Fixa',
      sector:item.sector,
      qty:Number(item.qty),
      avg_price:currentPrice,
      current_price:currentPrice,
      dy:0,
      ideal_pct:0,
      value:Number(item.marketValue),
      current_value:Number(item.marketValue),
      fixed_initial_value:Number(item.appliedValue),
      fixed_current_value:Number(item.marketValue),
      fixed_rate:item.rate,
      fixed_application_date:item.applicationDate,
      fixed_maturity_date:item.maturityDate,
      fixed_issuer:item.issuer||'',
      fixed_indexer:String(item.rate||'').toUpperCase().includes('IPCA') ? 'IPCA' : 'Manual',
      fixed_source:source,
      updated_at:now,
      rf_aporte_date:item.applicationDate,
      rf_yield_type:String(item.rate||'').toUpperCase().includes('IPCA') ? 'IPCA' : 'Manual',
      rf_contract_rate:item.rate,
      rf_maturity_date:item.maturityDate,
      quoteSource:'importado',
      quoteUpdatedAt:now,
      source,
      institution:item.institution||'',
      broker:item.institution||'',
      observation:fallbackNote,
      note:fallbackNote
    });
    created++;
    learnTickerMeta(item.ticker, 'Renda Fixa', item.sector, true);
  });
  S.assets=S.assets.sort((a,b)=>String(a.ticker||'').localeCompare(String(b.ticker||''),'pt-BR'));
  return {created,updated,ignored};
}
function importRfEventRows(events){
  let imported=0,duplicates=0,review=0;
  const now=new Date().toISOString();
  const add=[];
  const seen=new Set();
  events.forEach(raw=>{
    const ev=rfEventBuild(raw);
    if(seen.has(ev.autoKey)){ duplicates++; return; }
    if(ev.status==='Duplicado'){ duplicates++; return; }
    if(ev.status!=='Novo provento' || ev.destination!=='Proventos'){ review++; return; }
    seen.add(ev.autoKey);
    add.push({
      id:Date.now()+Math.floor(Math.random()*999999),
      date:b3MovementDateKey(ev.date),
      ticker:ev.ticker,
      assetName:ev.assetName,
      type:'Renda Fixa',
      eventType:ev.eventType,
      value:Number(ev.value)||0,
      source:'PosicaoDetalhada B3/XP',
      autoKey:ev.autoKey,
      created_at:now,
      note:`PosicaoDetalhada B3/XP · ${ev.eventType} · ${ev.assetName||ev.ticker}`
    });
    imported++;
  });
  S.proventos=[...add,...S.proventos];
  return {imported,duplicates,review};
}
function importRfPositionReview(){
  if(!S.rfPositionReview) return;
  const selectedPositions=(S.rfPositionReview.items||[]).filter(it=>it.include!==false);
  if(!selectedPositions.length){
    alert('Selecione ao menos uma posição válida para importar.');
    return;
  }
  const summary=rfPositionReviewSummary();
  const duplicates=(S.rfPositionReview.items||[]).filter(it=>it.status==='Possível duplicado' || it.status==='Duplicado').length;
  const incomplete=(S.rfPositionReview.items||[]).filter(it=>it.status==='Revisar').length;
  if(!b3ConfirmImport('a posição detalhada de Renda Fixa', selectedPositions.length, duplicates, incomplete)) return;
  const positionResult=importRfPositionRows(selectedPositions);
  S.rfPositionReview=null;
  save();

  b3ImportCompletedMessage(`Posição B3 importada: ${positionResult.created} criados, ${positionResult.updated} atualizados, ${positionResult.ignored} ignorados.`);
}
function rfPositionReviewSummary(){
  const items=S.rfPositionReview?.items||[];
  const events=S.rfPositionReview?.events||[];
  const selected=items.filter(it=>it.include!==false);
  const selectedEvents=events.filter(it=>it.include!==false);
  const applied=selected.reduce((s,it)=>s+(Number(it.appliedValue)||0),0);
  const market=selected.reduce((s,it)=>s+(Number(it.marketValue)||0),0);
  const eventValue=selectedEvents.reduce((s,it)=>s+(Number(it.value)||0),0);
  return {count:selected.length,total:items.length,applied,market,eventCount:selectedEvents.length,eventTotal:events.length,eventValue};
}

  if(status==='Novo ativo') return 'ok';

  if(status==='Atualizar existente' || status==='Possível duplicado') return 'warn';
  if(status==='Duplicado' || status==='Ignorar') return 'muted';
  return 'review';

  const incomplete=rows.filter(r=>r.status==='Revisar' || r.destination==='Revisar').length;
  if(!b3ConfirmImport('os proventos recebidos da B3', selectedRows.length, initialDuplicates, incomplete)) return;
  let added=0;
  let duplicates=rows.filter(r=>r.status==='Duplicado').length;
  const next=[];
  (S.proventos||[]).forEach(p=>next.push(p));
  rows.forEach(row=>{
    if(row.include===false) return;
    if(row.status!=='Novo provento' || row.destination!=='Proventos'){
      return;
    }
    const ticker=String(row.ticker||'').trim().toUpperCase();
    const paymentDate=String(row.paymentDate||'').trim();
    const eventType=String(row.eventType||'').trim();
    const value=Number(row.netValue)||0;
    if(!ticker || !paymentDate || !eventType || value<=0){
      return;
    }
    const importRow={
      id:Date.now()+Math.floor(Math.random()*999999),
      date:paymentDate,
      ticker,
      assetName:String(row.assetName||'').trim(),
      type:eventType,
      category:String(row.category||'').trim(),
      eventType,
      qty:Number(row.qty)||0,
      unitPrice:Number(row.unitPrice)||0,
      value:Number(value.toFixed(2)),
      institution:String(row.institution||'').trim(),
      source:'B3 Proventos Recebidos',
      autoKey:b3ProventoSavedAutoKey(row),
      created_at:new Date().toISOString()
    };
    const dup=(next||[]).some(p=>{
      const sameKey=String(p.autoKey||'')===importRow.autoKey;
      const sameFields=String(p.ticker||'').toUpperCase()===ticker
        && b3MovementDateKey(p.date)===b3MovementDateKey(paymentDate)
        && rfPosNorm(p.eventType||p.type)===rfPosNorm(eventType)
        && Math.abs((Number(p.value)||0)-Number(importRow.value||0))<0.01;
      return sameKey || sameFields;
    });
    if(dup){
      duplicates++;
      return;
    }
    next.unshift(importRow);
    added++;
  });
  const ignored=Math.max(0,totalRows-added-duplicates);
  S.proventos=next;
  S.b3ProventosReview=null;
  save();
  render();
  b3ImportCompletedMessage(`Proventos importados: ${added} novos, ${duplicates} duplicados ignorados, ${ignored} ignorados.`);
}
function b3ProventosReviewSummary(){
  const rows=S.b3ProventosReview?.items||[];
  const selected=rows.filter(r=>r.include!==false);
  const total=selected.reduce((s,r)=>s+(Number(r.netValue)||0),0);
  const valid=rows.length;
  const ignored=Number(S.b3ProventosReview?.ignoredCount)||0;
  const importable=rows.filter(r=>r.status==='Novo provento' && r.destination==='Proventos').length;
  const duplicates=rows.filter(r=>r.status==='Duplicado').length;
  const review=rows.filter(r=>r.destination==='Revisar').length;
  return {count:selected.length,totalRows:rows.length,total,importable,duplicates,review,valid,ignored};
}

function openB3MovementReview(parsed, fileName='', sourceKind='excel'){
  const items=(parsed?.items||[]).map((it,i)=>b3MovementRefreshReviewFlags({
    id:it.id ?? i,
    include:it.include!==false,
    target:String(it.target||b3MovementTarget(it.movement,it.entryExit)),
    group:it.reviewGroup||b3MovementGroup(it.movement),
    ticker:String(it.ticker||'').toUpperCase(),
    qty:Number(it.qty)||0,
    price:Number(it.price)||0,
    value:Number(it.value)||((Number(it.qty)||0)*(Number(it.price)||0)),
    type:normalizeType(it.type||'Renda Fixa','Renda Fixa'),
    sector:String(it.sector||''),
    product:String(it.product||''),
    movement:String(it.movement||''),
    entryExit:String(it.entryExit||''),
    broker:String(it.broker||''),
    sheet:String(it.sheet||'Movimentacao').trim()||'Movimentacao',
    date:it.date||parsed?.importDate||new Date().toLocaleDateString('pt-BR'),
    action:String(it.action||'compra'),
    destination:it.destination||'',
    destinationLabel:it.destinationLabel||'',
    confidence:it.confidence||'',
    reviewGroup:it.reviewGroup||'',
    reviewNote:it.reviewNote||'',
    movKey:String(it.movKey||''),
    sourceItem:{...it}
  })).filter(it=>it.ticker || it.movement || it.product);
  const groupsMap=new Map();
  items.forEach(it=>{
    const key=it.reviewGroup||b3MovementGroup(it.movement);
    if(!groupsMap.has(key)){
      groupsMap.set(key,{group:key,count:0,total:0,items:[],selected:true});
    }
    const g=groupsMap.get(key);
    g.count++;
    g.total += Number(it.value)||0;
    g.items.push(it);
  });
  const groups=[...groupsMap.values()];
  S.b3MovementReview={
    fileName,
    sourceKind,
    importDate:parsed?.importDate||'',
    warnings:parsed?.warnings||[],
    stats:parsed?.stats||{},
    filterStatus:'all',
    filterType:'all',
    items,
    groups,
    selectedGroups:Object.fromEntries(groups.map(g=>[g.group,(g.items||[]).some(it=>it.include!==false && (it.destination==='historico' || it.destination==='proventos'))]))
  };
  render();
}

function setB3MovementGroup(group, value){
  if(!S.b3MovementReview) return;
  S.b3MovementReview.selectedGroups = S.b3MovementReview.selectedGroups || {};
  S.b3MovementReview.selectedGroups[group] = !!value;
  const g=(S.b3MovementReview.groups||[]).find(x=>x.group===group);
  if(g) g.items=(g.items||[]).map(it=>b3MovementRefreshReviewFlags({...it, include:!!value}));
  S.b3MovementReview.items = (S.b3MovementReview.items||[]).map(it=>{
    const match=(it.group||b3MovementGroup(it.movement))===group;
    return match ? b3MovementRefreshReviewFlags({...it, include:!!value}) : it;
  });
  render();
}

function setB3MovementReviewFilter(field,value){
  if(!S.b3MovementReview) return;
  if(field==='status') S.b3MovementReview.filterStatus=String(value||'all');
  if(field==='type') S.b3MovementReview.filterType=String(value||'all');

function b3MovementReviewMatchesFilter(item){
  const r=S.b3MovementReview||{};
  const status=String(r.filterStatus||'all');
  const type=String(r.filterType||'all');
  const isDuplicate=!!item.possibleDuplicate;
  const isReview=['eventos','revisar','ignorar'].includes(String(item.target||'')) || String(item.confidence||'').toLowerCase()==='baixa';
  const isValid=b3MovementIsHistoricalImportable(item) && !isDuplicate;
  const statusOk=status==='all'
    || (status==='valid' && isValid)
    || (status==='duplicate' && isDuplicate)
    || (status==='review' && isReview);
  const typeOk=type==='all' || String(item.target||'')===type;
  return statusOk && typeOk;
}
function setB3MovementItem(group, idx, field, value){
  if(!S.b3MovementReview) return;
  const g=(S.b3MovementReview.groups||[]).find(x=>x.group===group);
  if(!g || !g.items || !g.items[idx]) return;
  const row=g.items[idx];
  if(field==='include') row.include=!!value;
  else if(field==='target'){
    row.target=String(value||'aportes');
    if(row.target==='proventos') row.action='provento';
    else if(row.target==='eventos' || row.target==='revisar' || row.target==='ignorar') row.action='revisar';
    else if(row.action==='provento' || row.action==='revisar') row.action=b3MovementAction(row.movement,row.entryExit);
  }
  else if(field==='ticker') row.ticker=String(value||'').trim().toUpperCase();
  else if(field==='type') row.type=normalizeType(value||'Renda Fixa','Renda Fixa');
  else if(field==='sector') row.sector=String(value||'');
  else if(field==='qty') row.qty=parseNum(value);
  else if(field==='price') row.price=parseNum(value);
  row.value=(Number(row.qty)||0)*(Number(row.price)||0) || Number(row.value)||0;
  const refreshed=b3MovementRefreshReviewFlags(row);
  Object.assign(row, refreshed);
  const master=(S.b3MovementReview.items||[]).find(it=>it.movKey===row.movKey || (it.date===row.date && it.product===row.product && it.movement===row.movement));
  if(master){
    master.include=row.include;
    master.target=row.target;
    master.ticker=row.ticker;
    master.type=row.type;
    master.sector=row.sector;
    master.qty=row.qty;
    master.price=row.price;
    master.value=row.value;
    master.action=row.action;
    master.duplicateKind=row.duplicateKind;
    master.possibleDuplicate=row.possibleDuplicate;
    master.observation=row.observation;
  }
  S.b3MovementReview.selectedGroups = S.b3MovementReview.selectedGroups || {};
  S.b3MovementReview.selectedGroups[group] = (g.items||[]).some(it=>it.include!==false);
  render();
}
function setB3MovementGroupItems(group, value){
  if(!S.b3MovementReview) return;
  const g=(S.b3MovementReview.groups||[]).find(x=>x.group===group);
  if(!g) return;
  g.items=(g.items||[]).map(it=>b3MovementRefreshReviewFlags({...it, include:!!value}));
  S.b3MovementReview.items = (S.b3MovementReview.items||[]).map(it=>{
    const match=(it.group||b3MovementGroup(it.movement))===group;
    return match ? b3MovementRefreshReviewFlags({...it, include:!!value}) : it;
  });
  S.b3MovementReview.selectedGroups = S.b3MovementReview.selectedGroups || {};

}
function b3MovementSelectedItems(){
  const r=S.b3MovementReview;
  if(!r) return [];
  return (r.items||[]).filter(it=>{
    const group=it.group||b3MovementGroup(it.movement);
    if(r.selectedGroups && r.selectedGroups[group]===false) return false;
    if(!b3MovementIsHistoricalImportable(it)) return false;
    if(it.possibleDuplicate) return false;
    return true;
  });

function b3MovementSummary(){
  const r=S.b3MovementReview||{};
  const items=[...(r.items||[])];
  const selected=b3MovementSelectedItems();
  const total=selected.reduce((s,it)=>s+(Number(it.value)||((Number(it.qty)||0)*(Number(it.price)||0))),0);
  const valid=items.filter(it=>it.ticker && Number(it.value)>0 && String(it.date||'').trim()).length;
  const compras=items.filter(it=>String(it.interpretedOperation||'').toLowerCase()==='compra').length;
  const vendas=items.filter(it=>String(it.interpretedOperation||'').toLowerCase()==='venda').length;
  const rfAplicResg=items.filter(it=>normalizeType(it.type||'','')==='Renda Fixa' && ['aplicação','resgate','resgate antecipado','vencimento'].includes(String(it.interpretedOperation||'').toLowerCase())).length;
  const revisarPrecoValor=items.filter(it=>String(it.reviewReason||'')==='sem_precovalor' || (String(it.target||'')==='revisar' && (!Number(it.price) || !Number(it.value)))).length;
  const ignoradas=Number(r.stats?.totalIgnored)||0;
  const events=items.filter(it=>String(it.target||'')==='eventos' || /EVENTOS SOCIETARIOS/.test(String(it.reviewGroup||b3MovementGroup(it.movement)).toUpperCase())).length;
  const revisar=items.filter(it=>String(it.target||'')==='revisar').length;
  const transferencias=items.filter(it=>String(it.reviewGroup||b3MovementGroup(it.movement)).includes('Transfer') || String(it.reviewGroup||b3MovementGroup(it.movement)).includes('custódia') || String(it.reviewGroup||b3MovementGroup(it.movement)).includes('custodia')).length;
  const duplicates=items.filter(it=>it.possibleDuplicate).length;
  const incomplete=items.filter(it=>!it.ticker || !String(it.date||'').trim() || (String(it.target||'')!=='proventos' && (!Number(it.qty) || !Number(it.value)))).length;
  const groups=[...new Set(selected.map(it=>it.group||b3MovementGroup(it.movement)))];
  return {
    count:selected.length,
    total,
    groups,
    linesRead:items.length + Number(r.stats?.totalIgnored||0),
    valid,
    ignored:ignoradas,
    compras,
    vendas,
    rfAplicResg,
    revisarPrecoValor,
    events,
    revisar,
    ignorar:ignoradas,
    transferencias,
    duplicates,
    incomplete
  };
}
function applyB3MovementImported(rows, importDate){
  const inputRows=[...(rows||[])];
  const safeRows=inputRows.map(b3MovementRefreshReviewFlags).filter(b3MovementIsHistoricalImportable);
  const existingKeys=new Set((S.aportes||[]).map(a=>b3MovementSavedHistoricalAutoKey(a)));
  const batchKeys=new Set();
  const finalRows=[];
  let duplicateCount=0;
  safeRows.forEach(r=>{
    const operationType=b3MovementHistoricalOperationType(r);
    const side=b3MovementHistoricalSide(r, operationType);
    const autoKey=b3MovementHistoricalAutoKey(r, operationType, side);
    const dupKind=r.duplicateKind || b3MovementDuplicateKind({...r, target:'aportes', action:r.action||(/venda/i.test(operationType)?'venda':'compra')});
    if(dupKind || existingKeys.has(autoKey) || batchKeys.has(autoKey)){
      duplicateCount++;
      return;
    }
    batchKeys.add(autoKey);
    finalRows.push({...r, operationType, side, autoKey});
  });
  const ignoredCount=Math.max(0, inputRows.length - safeRows.length);
  if(!finalRows.length){
    toast(`Movimentações importadas: 0 novas, ${duplicateCount} duplicadas ignoradas, ${ignoredCount} ignoradas.`);
    return;
  }
  const now=Date.now();
  const addAportes=[];
  finalRows.forEach((r,i)=>{
    const date=r.date||importDate||new Date().toLocaleDateString('pt-BR');
    const unitPrice=Number(r.price)||0;
    const totalValue=Number(r.value)||((Number(r.qty)||0)*unitPrice);
    const operationType=String(r.operationType||b3MovementHistoricalOperationType(r)).trim();
    const side=String(r.side||b3MovementHistoricalSide(r, operationType)).trim();
    const institution=String(r.broker||r.institution||'').trim();
    const note=`[IMPORT_B3_MOVIMENTO] ${r.movement||'movimentacao'} · ${r.product||r.ticker}`;
    addAportes.push({
      id:now+i,
      operation:operationType==='Venda' || side==='Saída' ? 'venda' : 'compra',
      op:operationType==='Venda' || side==='Saída' ? 'venda' : 'compra',
      operationType,
      side,
      ticker:r.ticker,
      qty:Number(r.qty)||0,
      price:unitPrice,
      unitPrice,
      totalValue,
      date,
      decision:note,
      note,
      type:normalizeType(r.type||metaTicker(r.ticker).type||'Renda Fixa','Renda Fixa'),
      sector:r.sector||metaTicker(r.ticker).sector||'',
      assetName:r.product||r.ticker,
      category:normalizeType(r.type||metaTicker(r.ticker).type||'Renda Fixa','Renda Fixa'),
      institution,
      source:'B3 Movimentação',
      autoKey:r.autoKey,
      movKey:r.autoKey,
      created_at:new Date().toISOString(),
      movement:r.movement,
      entryExit:r.entryExit,
      product:r.product
    });
  });
  S.aportes=[...addAportes,...S.aportes];
  syncAssetsFromAportes(false);
  [...finalRows].forEach(r=>learnTickerMeta(r.ticker, r.type, r.sector, true));
  save();
  render();
  b3ImportCompletedMessage(`Movimentações importadas: ${addAportes.length} novas, ${duplicateCount} duplicadas ignoradas, ${ignoredCount} ignoradas.`);
}

document.getElementById('b3-file').addEventListener('change',async e=>{
  const file=e.target.files[0]; if(!file) return;
  try{
    const fileName=String(file.name||'');
    const fileType=String(file.type||'').toLowerCase();
    const isPdf=/\.pdf$/i.test(fileName) || fileType.includes('pdf');
    const isCsv=/\.csv$/i.test(fileName) || fileType.includes('csv') || fileType.includes('comma-separated-values');
    let parsed;
    if(isPdf){
      const kind=await detectB3PdfKind(file);
      if(kind==='ambiguous'){
        const choice=(prompt('Não foi possível identificar o tipo do PDF da B3. Digite P para posição ou M para movimentação antes de importar:','P')||'').trim().toUpperCase();
        if(choice!=='P' && choice!=='M'){
          alert('Importação cancelada. Informe P para posição ou M para movimentação.');
          return;
        }
        parsed=choice==='M' ? await parseB3MovementPdf(file) : await parseB3PositionPdf(file);
      }else{
        parsed=kind==='movement' ? await parseB3MovementPdf(file) : await parseB3PositionPdf(file);
      }
    }else if(isCsv){
      if(typeof XLSX==='undefined'){ alert('Biblioteca de Excel não carregou. Verifique sua internet e tente novamente.'); return; }
      const csvText=await file.text();
      const wb=XLSX.read(csvText,{type:'string'});
      if(detectB3ProventosWorkbook(wb,file.name)){
        parsed=parseB3ProventosWorkbook(wb,file.name);
      }else if(detectRfDetailedPositionWorkbook(wb,file.name)){
        parsed=parseRfDetailedPositionWorkbook(wb,file.name);
      }else{
        const kind=detectB3WorkbookKind(wb);
        parsed=kind==='movement' ? parseB3MovementWorkbook(wb,file.name) : parseB3PositionWorkbook(wb,file.name);
      }
    }else{
      if(typeof XLSX==='undefined'){ alert('Biblioteca de Excel não carregou. Verifique sua internet e tente novamente.'); return; }
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf,{type:'array'});
      if(detectB3ProventosWorkbook(wb,file.name)){
        parsed=parseB3ProventosWorkbook(wb,file.name);
      }else if(detectRfDetailedPositionWorkbook(wb,file.name)){
        parsed=parseRfDetailedPositionWorkbook(wb,file.name);
      }else{
        const kind=detectB3WorkbookKind(wb);
        parsed=kind==='movement' ? parseB3MovementWorkbook(wb,file.name) : parseB3PositionWorkbook(wb,file.name);
      }
    }
    const {items,warnings,importDate,stats}=parsed;
    if(!items.length){ alert('Não encontrei itens válidos no arquivo. Tente exportar a posição ou movimentação da B3/corretora no formato correto.'); return; }
    if((parsed.kind||'position')==='b3-proventos'){
      openB3ProventosReview({...parsed, sourceKind:isPdf?'pdf':'excel'}, file.name);
    }else if((parsed.kind||'position')==='rf-detailed-position'){
      openRfPositionReview({...parsed, sourceKind:isPdf?'pdf':'excel'}, file.name);
    }else if((parsed.kind||'position')==='movement'){
      openB3MovementReview({...parsed, sourceKind:isPdf?'pdf':'excel'}, file.name);
    }else{
      openB3Review({...parsed, sourceKind:isPdf?'pdf':'excel'}, file.name);
    }
    if(warnings.length) console.warn('Avisos importação B3:',warnings);
  }catch(err){ console.error(err); alert('Erro ao importar arquivo. Verifique o PDF/Excel e tente novamente.'); }
  e.target.value='';
});

function normalizeQuickMovementKind(value){
  const s=String(value||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if(s==='venda') return 'venda';
  if(s==='provento' || s==='dividendo' || s==='dividendos' || s==='jcp' || s==='rendimento') return 'provento';
  if(s==='renda fixa' || s==='renda-fixa' || s==='rf' || s==='tesouro direto') return 'renda-fixa';
  if(s==='outro' || s==='outros' || s==='neutral' || s==='neutro') return 'outro';
  return 'compra';
}

function findQuickMovementAssetByTicker(ticker){
  const tk=cleanAssetCode(ticker);
  if(!tk) return null;
  const assets=Array.isArray(S.assets) ? S.assets : [];
  const direct=assets.find(a=>cleanAssetCode(a?.ticker||'')===tk);
  if(direct) return direct;
  const learned=learnedMetaFor(tk);
  const meta=metaTicker(tk);
  if((learned && (learned.type || learned.sector || learned.name)) || (meta && (meta.type || meta.sector))){
    return {
      ticker:tk,
      name:String(learned?.name||meta?.name||'').trim(),
      type:normalizeType(learned?.type||meta?.type||'', ''),
      sector:String(learned?.sector||meta?.sector||'').trim()
    };
  }
  return null;
}

function quickMovementPreviewHtml(){

function openQuickMovement(kind='compra'){
  const next=normalizeQuickMovementKind(kind);

  S.showA=false;
  S.showP=false;
  S.showD=false;
  S.editId=null;
  S.editPId=null;
  S.quickMovementEditId=null;
  S.quickMovementDraft={...quickMovementDefaultDraft(next), ...current, kind:next, manualType:false, manualSector:false, manualName:false};
  if(next!=='renda-fixa'){
    const lookup=findQuickMovementAssetByTicker(S.quickMovementDraft.ticker||S.quickMovementDraft.rfName||S.quickMovementDraft.outroTitle||'');

function setQuickMovementField(field, value){
  if(!S.quickMovementDraft || typeof S.quickMovementDraft!=='object') S.quickMovementDraft=quickMovementDefaultDraft();

  if(field==='ticker' || field==='rfName' || field==='outroTitle'){
    const normalized=field==='ticker' ? String(value||'').toUpperCase() : String(value||'');
    S.quickMovementDraft[field]=normalized;
    if(field==='ticker'){
      const lookup=next!=='renda-fixa' ? findQuickMovementAssetByTicker(normalized) : null;
      if(lookup){
        if(lookup.name && !S.quickMovementDraft.manualName) S.quickMovementDraft.assetName=lookup.name;
        if(next!=='outro' && lookup.type && !S.quickMovementDraft.manualType) S.quickMovementDraft.type=normalizeType(lookup.type,'Ação');
        if(next!=='outro' && lookup.sector && !S.quickMovementDraft.manualSector) S.quickMovementDraft.sector=String(lookup.sector).trim();
      }
    }
  }else{
    S.quickMovementDraft[field]=value;
    if(field==='type') S.quickMovementDraft.manualType=true;
    if(field==='sector') S.quickMovementDraft.manualSector=true;

function aporteMovementKind(a){
  const op=String(a?.movementKind || a?.kind || a?.operation || a?.op || '').trim().toLowerCase();
  const type=normalizeType(a?.type||a?.asset_type||'', '');
  if(op.startsWith('reserva')) return op.includes('saida') ? 'reserva-saida' : 'reserva-entrada';
  if(op==='outro' || op==='neutro' || type==='Outro') return 'outro';
  if(op==='provento' || op==='dividendo' || op==='dividendos' || op==='jcp' || op==='rendimento') return 'provento';
  if(op==='renda-fixa' || type==='Renda Fixa' || type==='Tesouro Direto') return 'renda-fixa';
  if(op==='venda' || op==='sell') return 'venda';
  return 'compra';
}
function isNeutralMovement(a){
  return aporteMovementKind(a)==='outro';
}
function aporteMovementLabel(a){
  const kind=aporteMovementKind(a);
  if(kind==='venda') return 'Venda';
  if(kind==='provento') return 'Provento';
  if(kind==='renda-fixa') return 'Renda Fixa';
  if(kind==='outro') return 'Outro';
  if(kind==='reserva-saida') return 'Saída';
  if(kind==='reserva-entrada') return 'Entrada';
  return 'Compra';
}
function aporteMovementTone(a){
  const kind=aporteMovementKind(a);
  if(kind==='venda') return 'rd';
  if(kind==='provento') return 'am';
  if(kind==='renda-fixa') return 'bl';
  if(kind==='outro') return 'mu';
  if(kind==='reserva-saida') return 'rd';
  if(kind==='reserva-entrada') return 'gn';
  return 'gn';
}

function rfValues(a){
  const qty=Number(a?.qty)||0;
  const avg=Number(a?.avg_price)||0;
  const currentStored=Number(a?.current_price)||0;
  const appliedRaw=Number(a?.rf_applied_value ?? a?.fixed_initial_value ?? a?.appliedValue ?? a?.initialValue ?? 0)||0;
  const grossRaw=Number(a?.rf_gross_value ?? a?.fixed_gross_value ?? a?.marketValue ?? a?.currentValue ?? 0)||0;
  const liquidRaw=Number(a?.rf_liquid_value ?? a?.fixed_current_value ?? a?.liquidValue ?? 0)||0;
  const irIof=Number(a?.rf_ir_iof ?? a?.ir_iof ?? a?.iriof ?? 0)||0;
  const unavailable=Number(a?.rf_unavailable_value ?? a?.unavailableValue ?? 0)||0;
  const manualProfitRaw = a?.rf_profit_value;
  const manualProfitSource = String(a?.rf_profit_source || '').toLowerCase();
  const fixedInitial=Number(a?.fixed_initial_value)||0;
  const fixedCurrent=Number(a?.fixed_current_value)||0;
  const fixedGross=Number(a?.fixed_gross_value)||0;
  const applied=appliedRaw>0 ? appliedRaw : fixedInitial>0 ? fixedInitial : qty*avg;
  const liquidCandidate=liquidRaw>0 ? liquidRaw : fixedCurrent>0 ? fixedCurrent : currentStored>0 ? currentStored : 0;
  const grossCandidate=grossRaw>0 ? grossRaw : fixedGross>0 ? fixedGross : 0;
  const current=liquidCandidate>0 ? liquidCandidate : grossCandidate>0 ? grossCandidate : (applied>0 ? applied : null);
  const hasExplicitCurrent = liquidCandidate>0 || grossCandidate>0 || fixedCurrent>0 || (currentStored>0 && Math.abs(currentStored-applied) > 0.0001);
  const derivedProfit=Number.isFinite(current) && applied>0 ? current-applied : null;
  const hasManualProfit = manualProfitRaw!==undefined && manualProfitRaw!==null && String(manualProfitRaw).trim()!=='' && manualProfitSource!=='derived';
  const profit = hasManualProfit ? Number(manualProfitRaw)||0 : derivedProfit;
  const rentab=(Number.isFinite(profit) && applied>0) ? (profit/applied)*100 : null;
  return { qty, avg, applied, current, currentStored, fixedInitial, fixedCurrent, gross: grossCandidate, liquid: liquidCandidate, irIof, unavailable, profit, rentab, hasExplicitCurrent, hasManualProfit };
}

function normalizeType(v, fallback='Ação'){

function normalizeGoals(goals){
  const base={
    patrimonio:{target:0, aporte:0, annualVar:0},
    ativos:{type:'Ação', ticker:'', aporte:0, annualVar:10, finalValue:0},
    proventos:{types:['Ação','FII','ETF','BDR','Stock'], monthly:0},
    allocation:{items:[
      {type:'FII', pct:40},
      {type:'ETF', pct:20},
      {type:'Ação', pct:25},
      {type:'BDR', pct:5},
      {type:'Renda Fixa', pct:10},
    ]}
  };
  const g=(goals && typeof goals==='object') ? JSON.parse(JSON.stringify(goals)) : {};
  g.patrimonio={...base.patrimonio, ...(g.patrimonio||{})};
  g.ativos={...base.ativos, ...(g.ativos||{}), type:normalizeType((g.ativos||{}).type||'Ação','Ação')};
  const rawTypes=Array.isArray(g.proventos?.types) ? g.proventos.types : base.proventos.types;
  g.proventos={...base.proventos, ...(g.proventos||{}), types:[...new Set(rawTypes.map(t=>normalizeType(t,'')).filter(Boolean))]};
  if(!g.proventos.types.length) g.proventos.types=[...base.proventos.types];
  const allocSrc=Array.isArray(g.allocation?.items)
    ? g.allocation.items
    : (g.allocation && typeof g.allocation==='object' ? Object.entries(g.allocation).map(([type,pct])=>({type,pct})) : base.allocation.items);
  const seen=new Set();
  g.allocation={items:allocSrc.map(it=>({
    type:normalizeType(it?.type||it?.label||'',''),
    pct:Math.max(0, Number(it?.pct ?? it?.value ?? it?.percent ?? it?.weight) || 0)
  })).filter(it=>{
    if(!it.type || seen.has(it.type)) return false;
    seen.add(it.type);
    return true;
  })};
  if(!g.allocation.items.length) g.allocation.items=[...base.allocation.items];
  return g;
}

function autoDY(){
  const now=new Date();
  const oneYearAgo=new Date(now.getFullYear()-1,now.getMonth(),now.getDate());
  let updated=0;
  S.assets.forEach(a=>{
    if(a.dySource==='manual') return; // não sobrescreve DY manual
    // 1ª prioridade: calcula pelo histórico real de proventos (mais preciso)
    const provsAno=S.proventos.filter(p=>{
      const d=parseAnyDate(p.date);
      return String(p.ticker||'').toUpperCase()===a.ticker && d && d>=oneYearAgo;
    });
    if(provsAno.length>0 && a.qty>0 && a.current_price>0){
      const totalAnual=provsAno.reduce((s,p)=>s+(Number(p.value)||0),0);
      const dy=(totalAnual/(a.qty*a.current_price))*100;
      if(dy>0){ a.dy=Number(dy.toFixed(2)); a.dySource='proventos'; updated++; return; }
    }
    // 2ª prioridade: tabela de referência de mercado
    if(!a.dy || Number(a.dy)===0 || a.dySource==='estimate'){
      const ref=DY_REF[a.ticker];
      if(ref){ a.dy=ref; a.dySource='estimate'; updated++; }
    }
  });
  if(updated>0){ save(); }
  return updated;
}

function metaTicker(ticker){
  const t=String(ticker||'').trim().toUpperCase();
  const learned=learnedMetaFor(t);
  if(learned?.type){
    const learnedType=normalizeType(learned.type,'Ação');
    const base=META[t];
    const sector=learned.sector || (base && normalizeType(base[0],'Ação')===learnedType ? base[1] : '');
    return {type:learnedType, sector};
  }
  if(isRendaFixaText(t)) return rfMetaFromText(t);
  if(META[t]) return{type:META[t][0],sector:META[t][1]};
  if(/^[A-Z]{4}11$/.test(t)) return{type:'FII',sector:'FII'};
  if(/^[A-Z]{4}[34]$/.test(t)) return{type:'Ação',sector:'Ação'};
  return{type:'Ação',sector:''};
}
function applyMetaToAporte(){
  const ti=(document.getElementById('p-ti')?.value||'').toUpperCase();
  const se=document.getElementById('p-se'); const ty=document.getElementById('p-ty');
  const rfSubtype=document.getElementById('p-rf-subtype');
  const manualType=!!S._fp?.typeManual;
  let m=metaTicker(ti);
  if(ty && ty.value==='Renda Fixa') m=rfMetaFromText(ti||se?.value||'Renda Fixa');
  if(ty && !manualType && (!ty.dataset.manual || !ty.value)) ty.value=normalizeType(m.type||'Ação','Ação');
  if(se && (!se.dataset.manual || !se.value)) se.value=m.sector||'';
  if(rfSubtype && ty?.value==='Renda Fixa' && (!rfSubtype.value || rfSubtype.value==='Renda Fixa')) rfSubtype.value=m.sector||'Renda Fixa';
}

function findDy(q){
  const keys=['dividendYield','trailingAnnualDividendYield','yield','dy','regularMarketDividendYield','dividend_yield','dividendYieldAnnual','annualDividendYield'];
  const seen=new Set();
  function scan(obj){
    if(!obj||typeof obj!=='object'||seen.has(obj)) return 0; seen.add(obj);
    for(const k of keys){const raw=obj[k];if(raw!=null&&raw!==''){const v=Number(String(raw).replace('%','').replace(',','.'));if(v>0) return v>1?v:v*100;}}
    for(const v of Object.values(obj)){const f=scan(v);if(f>0) return f;}
    return 0;
  }
  return scan(q);
}
function cx(){
  const tI=S.assets.reduce((s,a)=>s+assetAppliedValue(a),0);
  const tC=S.assets.reduce((s,a)=>s+assetCurrentValue(a),0);
  const tG=tC-tI,tGP=tI>0?(tG/tI)*100:0;
  const mD=S.assets.reduce((s,a)=>{
    const cur=assetCurrentValue(a);
    return s + (Number.isFinite(cur) ? (cur*(Number(a.dy)||0)/100)/12 : 0);
  },0);
  const aD=mD*12,avgDY=tC>0?(aD/tC)*100:0;
  return{tI,tC,tG,tGP,mD,aD,avgDY};
}
function proventoStats(){
  const now=new Date(); let mes=0,ano=0,total=0;
  S.proventos.forEach(p=>{
    const v=Number(p.value)||0; total+=v;
    const dt=parseAnyDate(p.date);
    if(dt&&dt.getFullYear()===now.getFullYear()){ ano+=v; if(dt.getMonth()===now.getMonth()) mes+=v; }
  });
  return{mes,ano,total};
}
function lucroTotalComProventos(){
  const {tG}=cx();
  const rec=proventoStats();
  return tG + rec.total;
}
function retornoTotalComProventosPct(){
  const {tI}=cx();
  return tI>0 ? (lucroTotalComProventos()/tI)*100 : 0;
}

function proventoResumo(){
  const meses=new Map(),anos=new Map();
  S.proventos.forEach(p=>{
    const dt=parseAnyDate(p.date),v=Number(p.value)||0;
    if(!dt||v<=0) return;
    const y=dt.getFullYear(),m=String(dt.getMonth()+1).padStart(2,'0');
    const mk=`${y}-${m}`;
    if(!meses.has(mk)) meses.set(mk,{key:mk,ano:y,mes:dt.toLocaleDateString('pt-BR',{month:'long'}),valor:0,count:0});
    const mr=meses.get(mk); mr.valor+=v; mr.count++;
    if(!anos.has(y)) anos.set(y,{ano:y,valor:0,count:0});
    const ar=anos.get(y); ar.valor+=v; ar.count++;
  });
  return{
    meses:[...meses.values()].sort((a,b)=>b.key.localeCompare(a.key)),
    anos:[...anos.values()].sort((a,b)=>b.ano-a.ano)
  };
}
function proventoTipoCanonical(value){
  const s=rfPosNorm(value);
  if(!s) return 'Outro';
  if(s.includes('RENDIMENTO')) return 'Rendimento';
  if(s.includes('DIVIDENDO')) return 'Dividendo';
  if(s.includes('JUROS SOBRE CAPITAL') || s==='JCP' || s.includes('JCP')) return 'JCP';
  if(s.includes('PAGAMENTO DE JUROS') || s.includes('JUROS RENDA FIXA')) return 'Juros de Renda Fixa';
  if(s.includes('REEMBOLSO')) return 'Reembolso';
  return 'Outro';
}
function proventoResumoTipos(){
  const base={
    total:0,
    count:0,
    tipos:{
      Rendimento:0,
      Dividendo:0,
      JCP:0,
      'Juros de Renda Fixa':0,
      Reembolso:0,
      Outro:0
    }
  };
  (S.proventos||[]).forEach(p=>{
    const value=Number(p.value)||0;
    if(value<=0) return;
    const type=proventoTipoCanonical(p.eventType||p.type);
    base.total+=value;
    base.count++;
    base.tipos[type]=(base.tipos[type]||0)+value;
  });
  return base;
}
function proventoResumoMensalTipos(){
  const months=new Map();
  (S.proventos||[]).forEach(p=>{
    const dt=parseAnyDate(p.date);
    const value=Number(p.value)||0;
    if(!dt || value<=0) return;
    const year=dt.getFullYear();
    const month=String(dt.getMonth()+1).padStart(2,'0');
    const key=`${year}-${month}`;
    const label=dt.toLocaleDateString('pt-BR',{month:'short'}).replace('.','');
    if(!months.has(key)){
      months.set(key,{
        key,
        year,
        month,
        label,
        total:0,
        count:0,
        tipos:{
          Rendimento:0,
          Dividendo:0,
          JCP:0,
          'Juros de Renda Fixa':0,
          Reembolso:0,
          Outro:0
        }
      });
    }
    const row=months.get(key);
    const type=proventoTipoCanonical(p.eventType||p.type);
    row.total+=value;
    row.count++;
    row.tipos[type]=(row.tipos[type]||0)+value;
  });
  return [...months.values()].sort((a,b)=>b.key.localeCompare(a.key));
}
function proventoHistoricoMensal(){
  const byYear=new Map();
  S.proventos.forEach(p=>{
    const dt=parseAnyDate(p.date);
    const v=Number(p.value)||0;
    if(!dt||v<=0) return;
    const year=dt.getFullYear();
    const month=dt.getMonth();
    if(!byYear.has(year)) byYear.set(year, Array(12).fill(0));
    byYear.get(year)[month]+=v;
  });
  return [...byYear.entries()].sort((a,b)=>b[0]-a[0]).map(([year, months])=>{
    const total=months.reduce((s,v)=>s+v,0);
    const media=total/12;
    return { year, months, total, media };
  });
}
function dividendMonthQueryMonthOptions(){
  const months=new Map();
  (S.proventos||[]).forEach((p,idx)=>{
    const dt=parseAnyDate(p?.date);
    if(!dt) return;
    const key=proventoAuditMonthKey(dt);
    if(!key) return;
    if(!months.has(key)){
      months.set(key,{
        key,
        label:proventoAuditMonthLabel(key),
        index:idx
      });
    }
  });
  const list=[...months.values()].sort((a,b)=>b.key.localeCompare(a.key));
  if(!list.length){
    const fallback=proventoAuditMonthKey(new Date());
    if(fallback) list.push({key:fallback,label:proventoAuditMonthLabel(fallback),index:0});
  }
  return list;
}
function dividendMonthQueryState(){
  const months=dividendMonthQueryMonthOptions();
  const currentValid=!!S.dividendQueryMonth && months.some(m=>m.key===S.dividendQueryMonth);
  if(!currentValid){
    S.dividendQueryMonth=months[0]?.key || '';
  }
  if(typeof S.dividendQueryType!=='string' || !S.dividendQueryType) S.dividendQueryType='all';
  if(typeof S.dividendQueryTicker!=='string') S.dividendQueryTicker='';
  return {
    month:String(S.dividendQueryMonth||''),
    type:String(S.dividendQueryType||'all'),
    ticker:String(S.dividendQueryTicker||''),
    months
  };
}
function dividendMonthQueryRows(){
  const state=dividendMonthQueryState();
  const monthFilter=String(state.month||'').trim();
  const typeFilter=String(state.type||'all').trim();
  const tickerFilter=rfPosNorm(state.ticker||'');
  const rows=[];
  const monthTotals=new Map();
  (S.proventos||[]).forEach((p,idx)=>{
    const dt=parseAnyDate(p?.date);
    const value=Number(p?.value)||0;
    if(!dt || value<=0) return;
    const monthKey=proventoAuditMonthKey(dt);
    if(monthFilter && monthKey!==monthFilter) return;
    const eventType=proventoTipoCanonical(p?.eventType||p?.type);
    if(typeFilter!=='all' && eventType!==typeFilter) return;
    const meta=proventoAssetMeta(p);
    const ticker=String(p?.ticker||meta.asset?.ticker||'').trim().toUpperCase();
    const name=String(p?.assetName||meta.title||p?.note||ticker||'—').trim() || '—';
    const source=String(p?.source||'').trim();
    const hay=rfPosNorm(`${ticker} ${name} ${source} ${p?.note||''}`);
    if(tickerFilter && !hay.includes(tickerFilter)) return;
    const key=ticker||name||`row-${idx}`;
    if(!monthTotals.has(key)){
      monthTotals.set(key,{key,ticker:ticker||'—',name,total:0,count:0});
    }
    const agg=monthTotals.get(key);
    agg.total+=value;
    agg.count++;
    rows.push({
      date:toISODate(dt),
      ticker:ticker||'—',
      name,
      type:eventType,
      value,
      source:source||'—',
      monthKey,
      idx,
      title:meta.title||name
    });
  });
  rows.sort((a,b)=> (b.date||'').localeCompare(a.date||'') || a.ticker.localeCompare(b.ticker) || a.type.localeCompare(b.type) || a.idx-b.idx);
  const filteredCount=rows.length;
  const total=rows.reduce((s,r)=>s+r.value,0);
  const typeSet=[...new Set(rows.map(r=>r.type).filter(Boolean))];
  const bestPayer=[...monthTotals.values()].sort((a,b)=>b.total-a.total || b.count-a.count || a.ticker.localeCompare(b.ticker))[0] || null;
  return {
    state,
    rows,
    total,
    count:filteredCount,
    bestPayer,
    types:typeSet,
    monthLabel:monthFilter ? proventoAuditMonthLabel(monthFilter) : '—'
  };
}

  const type=normalizeType(asset?.type||metaTicker(asset?.ticker).type||'Ação','Ação');
  const event=proventoTipoCanonical(provento?.eventType||provento?.type);
  if(event==='JCP') return 'JCP';
  if(event==='Dividendo') return 'Dividendos';
  if(type==='Renda Fixa' || event==='Juros de Renda Fixa') return 'Renda Fixa';
  return type || 'Ação';
}
function proventoAssetMeta(p){
  const ticker=String(p?.ticker||'').toUpperCase();
  const name=rfPosNorm(p?.assetName||'');
  const asset=(S.assets||[]).find(a=>{
    const at=String(a.ticker||'').toUpperCase();
    const hay=rfPosNorm(`${a.ticker||''} ${a.name||''} ${a.product||''} ${a.title||''}`);
    return (ticker && at===ticker) || (name && hay.includes(name)) || (name && name.includes(hay));
  }) || null;
  return {
    asset,
    type:proventoAssetTypeLabel(asset,p),
    title:asset?.ticker ? `${asset.ticker}${asset.name?` · ${asset.name}`:''}` : (p?.assetName||p?.ticker||'—')
  };
}

function passiveIncomeRollingMonthKeys(baseDate=new Date(), count=12){
