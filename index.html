function save(){
  try{
    localStorage.setItem(STOR, JSON.stringify({
      assets:S.assets, aportes:S.aportes, proventos:S.proventos,
      tab:S.tab, divGoal:S.divGoal, goals:S.goals,
      apHistoryOpen:S.apHistoryOpen, apSearch:S.apSearch,
      dashPeriod:S.dashPeriod, dashType:S.dashType,
      rentPeriod:S.rentPeriod, rentType:S.rentType, rentBench:S.rentBench
    }));
    queueCloudSave();
  }catch(e){ console.error('save erro:',e); toast('⚠️ Erro ao salvar dados localmente.','#f87171'); }
}
function saveConfig(){
  try{ localStorage.setItem(STOR+'_cfg', JSON.stringify({brapiToken:S.brapiToken, divGoal:S.divGoal})); queueCloudSave(); }catch(e){}
}

function load(){
  // ← FIX: try-catch separados para não perder tudo se um falhar
  try{
    const d=JSON.parse(localStorage.getItem(STOR)||'{}');
    if(Array.isArray(d.assets))    S.assets    = d.assets;
    if(Array.isArray(d.aportes))   S.aportes   = d.aportes;
    if(Array.isArray(d.proventos)) S.proventos = d.proventos;
    if(d.tab)                       S.tab       = d.tab;       // ← FIX: restaura tab
    if(d.divGoal !== undefined)     S.divGoal   = Number(d.divGoal)||0;
    if(d.apHistoryOpen !== undefined) S.apHistoryOpen = !!d.apHistoryOpen;
    if(d.apSearch !== undefined)     S.apSearch  = String(d.apSearch||'');
    if(d.dashPeriod !== undefined)   S.dashPeriod = Math.max(3, Number(d.dashPeriod)||12);
    if(d.dashType !== undefined)     S.dashType = String(d.dashType||'all');
    if(d.rentPeriod !== undefined)   S.rentPeriod = String(d.rentPeriod||'all');
    if(d.rentType !== undefined)     S.rentType = String(d.rentType||'all');
    if(d.rentBench !== undefined)    S.rentBench = String(d.rentBench||'CDI');
    if(d.goals && typeof d.goals==='object') S.goals = d.goals;
  }catch(e){ console.error('load erro:',e); }
  try{
    const c=JSON.parse(localStorage.getItem(STOR+'_cfg')||'{}');
    if(c.brapiToken)            S.brapiToken = c.brapiToken;
    else                        S.brapiToken = DEFAULT_BRAPI; // garante token padrão
    if(c.divGoal !== undefined) S.divGoal    = Number(c.divGoal)||S.divGoal;
  }catch(e){ S.brapiToken = DEFAULT_BRAPI; }
  // Migração de versões antigas (civ4, civ3...)
  if(!S.aportes.length && !S.assets.length){
    for(const k of ['civ4','civ3','civ2','carteira_v1']){
      try{
        const d=JSON.parse(localStorage.getItem(k)||'{}');
        if(Array.isArray(d.aportes) && d.aportes.length){
          S.aportes=d.aportes; S.assets=d.assets||[]; S.proventos=d.proventos||[];
          if(d.divGoal) S.divGoal=Number(d.divGoal)||0;
          if(d.dashPeriod !== undefined) S.dashPeriod=Math.max(3, Number(d.dashPeriod)||12);
          if(d.dashType !== undefined) S.dashType=String(d.dashType||'all');
          if(d.rentPeriod !== undefined) S.rentPeriod=String(d.rentPeriod||'all');
          if(d.rentType !== undefined) S.rentType=String(d.rentType||'all');
          if(d.rentBench !== undefined) S.rentBench=String(d.rentBench||'CDI');
          if(d.goals && typeof d.goals==='object') S.goals=d.goals;
          save(); break;
        }
      }catch(e){}
    }
  }
}

function initFirebase(){
  try{
    if(!window.firebase) return;
    FB.app  = firebase.initializeApp(firebaseConfig);
    FB.auth = firebase.auth();
    FB.db   = firebase.firestore();
    FB.ready = true;
    try{ FB.db.enablePersistence({synchronizeTabs:true}).catch(()=>{}); }catch(e){}
    FB.auth.onAuthStateChanged(user=>{
      FB.user = user || null;
      if(FB.user) startCloudSync();
      else stopCloudSync();
      render();
    });
  }catch(e){
    console.warn('Firebase indisponível:', e);
    FB.ready=false;
  }
}
function portfolioRef(){
  if(!FB.db || !FB.user) return null;
  return FB.db.collection('portfolios').doc(FB.user.uid);
}
function cloudPayload(){
  return {
    assets:S.assets,
    aportes:S.aportes,
    proventos:S.proventos,
    divGoal:Number(S.divGoal)||0,
    goals:S.goals,
    settings:{brapiToken:S.brapiToken||''},
    dashboard:{period:Number(S.dashPeriod)||12,type:String(S.dashType||'all')},
    rentabilidade:{period:String(S.rentPeriod||'all'),type:String(S.rentType||'all'),bench:String(S.rentBench||'CDI')},
    tab:S.tab,
    updatedAtLocal:new Date().toISOString(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
}
function hasLocalData(){
  return (S.assets&&S.assets.length)||(S.aportes&&S.aportes.length)||(S.proventos&&S.proventos.length)||(Number(S.divGoal)||0)||(S.goals&&JSON.stringify(S.goals)!==JSON.stringify({patrimonio:{target:0, aporte:0, annualVar:0}, ativos:{type:'Ação', ticker:'', aporte:0, annualVar:10, finalValue:0}, proventos:{types:['Ação','FII','ETF','BDR','Stocks'], monthly:0}}));
}
function applyCloudData(d){
  if(!d) return;
  FB.applying=true;
  if(Array.isArray(d.assets))    S.assets    = d.assets;
  if(Array.isArray(d.aportes))   S.aportes   = d.aportes;
  if(Array.isArray(d.proventos)) S.proventos = d.proventos;
  if(d.divGoal!==undefined)      S.divGoal   = Number(d.divGoal)||0;
  if(d.goals && typeof d.goals==='object') S.goals = d.goals;
  if(d.tab && !S.tab)            S.tab       = d.tab;
  if(d.settings && d.settings.brapiToken && !S.brapiToken) S.brapiToken = d.settings.brapiToken;
  if(d.dashboard && typeof d.dashboard==='object'){
    if(d.dashboard.period !== undefined) S.dashPeriod = Math.max(3, Number(d.dashboard.period)||12);
    if(d.dashboard.type !== undefined) S.dashType = String(d.dashboard.type||'all');
  }
  if(d.rentabilidade && typeof d.rentabilidade==='object'){
    if(d.rentabilidade.period !== undefined) S.rentPeriod = String(d.rentabilidade.period||'all');
    if(d.rentabilidade.type !== undefined) S.rentType = String(d.rentabilidade.type||'all');
    if(d.rentabilidade.bench !== undefined) S.rentBench = String(d.rentabilidade.bench||'CDI');
  }
  try{
    localStorage.setItem(STOR, JSON.stringify({assets:S.assets, aportes:S.aportes, proventos:S.proventos, tab:S.tab, divGoal:S.divGoal, goals:S.goals, dashPeriod:S.dashPeriod, dashType:S.dashType, rentPeriod:S.rentPeriod, rentType:S.rentType, rentBench:S.rentBench}));
    localStorage.setItem(STOR+'_cfg', JSON.stringify({brapiToken:S.brapiToken, divGoal:S.divGoal}));
  }catch(e){}
  FB.lastCloudUpdate = d.updatedAtLocal || new Date().toISOString();
  FB.applying=false;
}
function startCloudSync(){
  const ref=portfolioRef();
  if(!ref) return;
  stopCloudSync(false);
  FB.cloudLoaded=false;
  FB.unsub=ref.onSnapshot(async snap=>{
    try{
      if(!snap.exists){
        if(hasLocalData()) await uploadLocalToCloud(false);
        FB.cloudLoaded=true;
        render();
        return;
      }
      const data=snap.data()||{};
      applyCloudData(data);
      FB.cloudLoaded=true;
      render();
    }catch(e){ console.warn('cloud sync:',e); }
  },err=>{
    console.warn('Firestore:',err);
    toast('⚠️ Erro na sincronização com a nuvem. Confira regras do Firestore.','#fbbf24');
  });
}
function stopCloudSync(doRender=true){
  if(FB.unsub){ try{ FB.unsub(); }catch(e){} }
  FB.unsub=null; FB.cloudLoaded=false;
  if(doRender) render();
}
function queueCloudSave(){
  if(FB.applying || !FB.user || !FB.cloudLoaded) return;
  clearTimeout(FB.saveTimer);
  FB.saveTimer=setTimeout(uploadLocalToCloud,900);
}
async function uploadLocalToCloud(show=true){
  const ref=portfolioRef();
  if(!ref) { if(show) toast('Entre com Google para sincronizar na nuvem.','#fbbf24'); return; }
  try{
    await ref.set(cloudPayload(), {merge:true});
    FB.lastCloudUpdate=new Date().toISOString();
    if(show) toast('☁️ Dados sincronizados na nuvem!');
  }catch(e){
    console.warn(e);
    if(show) toast('❌ Erro ao enviar para a nuvem.','#f87171');
  }
}

async function loadPdfJs(){

        }catch(e){}

        return mod;
      });
  }
  return window.__pdfjsPromise;
}
function pdfLinesFromTextContent(textContent){
  const rows=new Map();
  (textContent?.items||[]).forEach(item=>{
    const y=Math.round(item.transform?.[5]||0);
    const x=Math.round(item.transform?.[4]||0);
    if(!rows.has(y)) rows.set(y,[]);
    rows.get(y).push({x, s:String(item.str||'')});
  });
  return [...rows.keys()].sort((a,b)=>b-a).map(y=>rows.get(y).sort((a,b)=>a.x-b.x).map(v=>v.s).join(' ').replace(/\s+/g,' ').trim()).filter(Boolean);
}
function pdfSectionFromLine(line){
  const s=String(line||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  if(s.includes('emprestimo de ativos')) return 'Empréstimos';
  if(s === 'acoes' || s.startsWith('acoes ')) return 'Ações';
  if(s.includes('etf - exchange traded fund')) return 'ETF';
  if(s.includes('fii - fundo de investimento imobiliario')) return 'FII';
  if(s.includes('cdb - certificado de deposito bancario')) return 'Renda Fixa';
  if(s.includes('cra - certificado de recebiveis do agronegocio')) return 'Renda Fixa';
  if(s.includes('deb - debentures')) return 'Renda Fixa';
  if(s.includes('lig - letra imobiliaria garantida')) return 'Renda Fixa';
  return '';
}
function pdfIsRowStart(line, section){
  const s=String(line||'').trim();
  if(!s) return false;
  if(/^total\b/i.test(s)) return false;
  if(/^extrato de pos/i.test(s)) return false;
  if(/^paulo sergio/i.test(s)) return false;
  if(/^filtros aplicados/i.test(s)) return false;
  if(/^data:/i.test(s) || /^tipo de investimento:/i.test(s) || /^instituicao:/i.test(s) || /^marcacoes:/i.test(s)) return false;
  if(/^produto\b/i.test(s) || /^tipo\b/i.test(s) || /^instituicao\b/i.test(s) || /^quantidade\b/i.test(s) || /^preco\b/i.test(s) || /^valor\b/i.test(s)) return false;
  if(/^preço\b/i.test(s) || /^fechamento\b/i.test(s) || /^atualizado\b/i.test(s)) return false;
  if(/^acesse investidor/i.test(s)) return false;
  if(section==='Renda Fixa') return /^(CDB|CRA|DEB|LIG)\b/i.test(s);
  return /^[A-Z0-9]{4,6}[0-9]{1,2}\b/.test(s);
}
function pdfBlockToItem(block, section){
  const txt=String(block||'').replace(/\s+/g,' ').trim();
  if(!txt || section==='Empréstimos') return null;
  if(section==='Renda Fixa'){
    const head=txt.match(/^(?<code>CDB|CRA|DEB|LIG)\s*-\s*/i);
    const tail=txt.match(/(?<date>\d{2}\/\d{2}\/\d{4})[\s\S]*?(?<qty>[\d.,]+)\s+R\$\s*(?<price>[\d.,]+)[\s\S]*?(?:R\$\s*)?(?<value>[\d.,]+)\b/i);
    if(!head || !tail) return null;
    const code=head.groups.code.toUpperCase();
    const product=txt.slice(head[0].length, tail.index).replace(/\s+/g,' ').trim();
    const qty=parseNum(tail.groups.qty);
    const price=parseNum(tail.groups.price);
    const value=parseNum(tail.groups.value);
    const ticker=cleanAssetCode(`${code} ${product} ${tail.groups.date}`);
    const sector=code==='CDB'?'CDB':code==='CRA'?'CRA':code==='DEB'?'Debênture':'LIG';
    return {ticker,qty,price,value:value||qty*price,type:'Renda Fixa',sector,product,section};
  }
  const head=txt.match(/^(?<ticker>[A-Z0-9]{4,6}[0-9]{1,2})\s*-\s*/i);

  if(!head || !tail) return null;
  const ticker=head.groups.ticker.toUpperCase();
  const qty=parseNum(tail.groups.qty);
  const price=parseNum(tail.groups.price);
  const value=parseNum(tail.groups.value);
  const kind=tail.groups.kind;
  const type=section==='Ações'?'Ação':section==='ETF'?'ETF':section==='FII'?'FII':metaTicker(ticker).type||'Ação';
  const sector=section==='Ações'?'Ação':section==='ETF'?kind:section==='FII'?'FII':metaTicker(ticker).sector||'';
  const product=txt.slice(head[0].length, tail.index).replace(/\s+/g,' ').trim();

async function parseB3PositionPdf(file){
  const pdfjs=await loadPdfJs();
  const data=new Uint8Array(await file.arrayBuffer());
  const doc=await pdfjs.getDocument({data}).promise;
  const items=[]; const warnings=[];
  const stats={importedBySheet:{},ignoredBySheet:{},skippedSheets:[],ignoredByReason:{},totalIgnored:0};
  const importedSet=new Set();
  const addImported=sheet=>{ stats.importedBySheet[sheet]=(stats.importedBySheet[sheet]||0)+1; importedSet.add(sheet); };
  const addIgnored=(sheet,reason)=>{
    stats.totalIgnored++;
    stats.ignoredBySheet[sheet]=(stats.ignoredBySheet[sheet]||0)+1;
    if(reason) stats.ignoredByReason[reason]=(stats.ignoredByReason[reason]||0)+1;
  };
  let importDate=new Date().toLocaleDateString('pt-BR');
  const blocks=[];
  for(let p=1;p<=doc.numPages;p++){
    const page=await doc.getPage(p);
    const text=await page.getTextContent();
    const lines=pdfLinesFromTextContent(text);
    const pageText=lines.join(' ');
    const pageDateMatch=pageText.match(/Data:\s*(\d{2}\/\d{2}\/\d{4})/i);
    if(pageDateMatch) importDate=pageDateMatch[1];
    let section='';
    let current=[];
    const flush=()=>{
      if(!current.length) return;
      const block=current.join(' ');
      blocks.push({section,block,page:p});
      current=[];
    };
    for(const line of lines){
      const sec=pdfSectionFromLine(line);
      if(sec){
        flush();
        section=sec;
        if(sec==='Empréstimos' && !stats.skippedSheets.includes(sec)) stats.skippedSheets.push(sec);
        continue;
      }
      const s=String(line||'').trim();
      if(!s) continue;
      if(/^total\b/i.test(s) || /^extrato de pos/i.test(s) || /^acesse investidor/i.test(s)) { flush(); continue; }
      if(section==='Empréstimos') continue;
      if(pdfIsRowStart(s, section)){
        flush();
        current=[s];
        continue;
      }
      if(current.length) current.push(s);
    }
    flush();
  }
  for(const {section,block,page} of blocks){
    const item=pdfBlockToItem(block, section);
    if(!item){
      addIgnored(section||'PDF','linha não reconhecida');
      warnings.push(`PDF página ${page} (${section||'sem seção'}): linha não reconhecida.`);
      continue;
    }
    items.push({...item,date:importDate});
    addImported(item.section||section||'PDF');
  }
  if(!stats.skippedSheets.includes('Empréstimos')) stats.skippedSheets.push('Empréstimos');
  return {items,warnings,importDate,stats};
}
function normHeaderB3(v){
  return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim().toLowerCase();
}
function pickB3(row, headers, names){
  const wanted=names.map(normHeaderB3);
  for(let i=0;i<headers.length;i++){
    const h=normHeaderB3(headers[i]);
    if(wanted.includes(h)) return row[i];
  }
  return null;
}
function tickerValidoB3(t){
  t=String(t||'').trim().toUpperCase();
  return /^[A-Z]{4}[0-9]{1,2}$/.test(t) || /^[A-Z]{3,6}[0-9]{1,2}$/.test(t);
}
function isMarketTicker(t){
  return tickerValidoB3(t);
}
function cleanAssetCode(txt){
  let s=String(txt||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim().toUpperCase();
  s=s.replace(/\s+/g,' ');
  if(!s) return '';
  // Mantém tickers de bolsa normais; para renda fixa cria um identificador legível e estável.
  if(tickerValidoB3(s)) return s;
  s=s.replace(/[^A-Z0-9 ]/g,'').replace(/\s+/g,' ').trim();
  return s.slice(0,38);
}
function isRendaFixaText(v){
  const s=String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  return /(renda fixa|tesouro|cdb|lci|lca|cri|cra|debenture|debentures|letra financeira|lc\b|lf\b)/.test(s);
}
function isEmprestimoSheet(name){
  const s=String(name||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  return s.includes('emprest') || s.includes('emprést');
}
function notaNorm(v){
  return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim().toUpperCase();
}
function notaFindValue(rows, key){
  const k=notaNorm(key);
  for(const row of rows){
    for(let i=0;i<row.length;i++){
      if(notaNorm(row[i])===k){
        for(let j=i+1;j<row.length;j++){
          const val=String(row[j]||'').trim();
          if(val) return val;
        }
      }
    }
  }
  return '';
}
function notaFindHeaderIndex(rows){
  const req=[
    'C/V',
    'TIPO DE MERCADO',
    'ESPECIFICACAO DO TITULO',
    'QUANTIDADE',
    'PRECO DE LIQUIDACAO(R$)',
    'COMPRA/VENDA (R$)'
  ];
  for(let i=0;i<rows.length;i++){
    const rn=(rows[i]||[]).map(notaNorm);
    if(req.every(k=>rn.some(c=>c===k || c.includes(k)))) return i;
  }
  return -1;
}
function notaTickerFromSpec(spec){
  const s=notaNorm(spec);
  if(!s) return '';
  if(/\bSUB\s*TOTAL\b|\bTOTAL\b/.test(s)) return '';
  const m=s.match(/\b([A-Z]{4,6}\d{1,2})F?\b/);
  if(m) return m[1].replace(/F$/,'');
  if(isRendaFixaText(s)) return cleanAssetCode(s);
  const first=s.split(' ').filter(Boolean)[0] || s;
  return cleanAssetCode(first);
}
function notaFiiSector(text){
  const s=notaNorm(text);
  if(s.includes('LOGIST')) return 'Logística';
  if(s.includes('SHOP')) return 'Shopping';
  if(s.includes('PAPEL') || s.includes('CRI')) return 'Papel';
  if(s.includes('LAJES') || s.includes('ESCRITOR')) return 'Lajes';
  if(s.includes('RENDA URBANA')) return 'Renda Urbana';
  if(s.includes('DESENVOLV')) return 'Desenvolvimento';
  if(s.includes('HOTEL')) return 'Hotel';
  return 'FII';
}
function notaEtfSector(text){
  const s=notaNorm(text);
  if(s.includes('DIVID')) return 'Dividendos';
  if(s.includes('IBOV') || s.includes('IBOVESPA')) return 'Ibovespa';
  if(s.includes('SMALL') || s.includes('SMAL')) return 'Small Caps';
  if(s.includes('EXTERIOR') || s.includes('EUA') || s.includes('SP500') || s.includes('S&P')) return 'Exterior';
  if(s.includes('HASH') || s.includes('CRIPTO') || s.includes('CRYPTO') || s.includes('BITCOIN')) return 'Cripto';
  if(s.includes('RENDA FIXA')) return 'Renda Fixa';
  return 'ETF';
}
function inferNotaMeta(ticker, spec, market){
  const tickerClean=cleanAssetCode(ticker||notaTickerFromSpec(spec));
  const existing=S.assets.find(a=>String(a.ticker||'').toUpperCase()===tickerClean);
  if(existing && existing.type){
    return {
      type: existing.type,
      sector: existing.sector || existing.type
    };
  }
  const text=`${tickerClean} ${spec||''} ${market||''}`;
  const s=notaNorm(text);
  if(isRendaFixaText(s)) return rfMetaFromText(text);
  if(/\bETF\b|FUNDO DE INDICE|FDO DE INDICE|EXCHANGE TRADED FUND/.test(s)){
    return {type:'ETF',sector:notaEtfSector(text)};
  }
  if(/\bFII\b|FUNDO IMOBILIARIO|FUNDO DE INVESTIMENTO IMOBILIARIO|FDO INV IMOB|COTAS DE FII/.test(s)){
    return {type:'FII',sector:notaFiiSector(text)};
  }
  const mt=metaTicker(tickerClean);
  if(mt.type==='ETF') return {type:'ETF',sector:mt.sector||notaEtfSector(text)};
  if(mt.type==='FII') return {type:'FII',sector:mt.sector||notaFiiSector(text)};
  if(mt.type==='Renda Fixa') return rfMetaFromText(text);
  if(/\bBDR\b/.test(s)) return {type:'BDR',sector:'BDR'};
  if(/\bCRYPTO\b|\bCRIPTO\b|\bBITCOIN\b/.test(s)) return {type:'Crypto',sector:'Crypto'};
  return {type:mt.type||'Ação', sector:mt.sector||''};
}
function rfMetaFromText(v){
  const s=String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase();
  if(s.includes('TESOURO')) return {type:'Renda Fixa',sector:'Tesouro Direto'};
  if(/\bCDB\b/.test(s)) return {type:'Renda Fixa',sector:'CDB'};
  if(/\bLCI\b/.test(s)) return {type:'Renda Fixa',sector:'LCI'};
  if(/\bLCA\b/.test(s)) return {type:'Renda Fixa',sector:'LCA'};
  if(/\bCRI\b/.test(s)) return {type:'Renda Fixa',sector:'CRI'};
  if(/\bCRA\b/.test(s)) return {type:'Renda Fixa',sector:'CRA'};
  if(s.includes('DEBENT')) return {type:'Renda Fixa',sector:'Debênture'};
  if(/\bLF\b|LETRA FINANCEIRA/.test(s)) return {type:'Renda Fixa',sector:'Letra Financeira'};
  return {type:'Renda Fixa',sector:'Renda Fixa'};
}
function tipoPorAbaB3(sheetName,ticker){
  const sh=String(sheetName||'').toLowerCase();
  if(isRendaFixaText(sheetName)||isRendaFixaText(ticker)) return 'Renda Fixa';
  if(sh.includes('fundo de investimento')) return 'FII';
  if(sh.includes('etf')) return 'ETF';
  if(sh.includes('acoes') || sh.includes('ações')) return 'Ação';
  return metaTicker(ticker).type || 'Ação';
}
function setorPorAbaB3(sheetName,ticker){
  if(isRendaFixaText(sheetName)||isRendaFixaText(ticker)) return rfMetaFromText(`${sheetName} ${ticker}`).sector;
  const meta=metaTicker(ticker);
  if(meta.sector && meta.sector!=='FII' && meta.sector!=='Ação') return meta.sector;
  const sh=String(sheetName||'').toLowerCase();
  if(sh.includes('fundo de investimento')) return 'FII';
  if(sh.includes('etf')) return 'ETF';
  return meta.sector || '';
}
function parseB3PositionWorkbook(wb, fileName=''){
  const items=[]; const warnings=[];
  const stats={
    importedBySheet:{},
    ignoredBySheet:{},
    skippedSheets:[],
    ignoredByReason:{},
    totalIgnored:0
  };
  const dateMatch=String(fileName||'').match(/(20\d{2})[-_](\d{2})[-_](\d{2})/);
  const importDate=dateMatch?`${dateMatch[3]}/${dateMatch[2]}/${dateMatch[1]}`:new Date().toLocaleDateString('pt-BR');
  const addIgnored=(sheetName, reason)=>{
    stats.totalIgnored++;
    stats.ignoredBySheet[sheetName]=(stats.ignoredBySheet[sheetName]||0)+1;
    if(reason){
      stats.ignoredByReason[reason]=(stats.ignoredByReason[reason]||0)+1;
    }
  };
  const addImported=(sheetName)=>{
    stats.importedBySheet[sheetName]=(stats.importedBySheet[sheetName]||0)+1;
  };
  (wb.SheetNames||[]).forEach(sheetName=>{
    const sheet=wb.Sheets[sheetName]; if(!sheet) return;
    if(isEmprestimoSheet(sheetName)){
      warnings.push(`Aba "${sheetName}" ignorada: posições de empréstimo/lent lending não entram como compra na carteira.`);
      stats.skippedSheets.push(sheetName);
      return;
    }
    const rows=XLSX.utils.sheet_to_json(sheet,{header:1,raw:true,defval:null});
    if(!rows || rows.length<2){
      warnings.push(`Aba "${sheetName}" sem linhas úteis para importar.`);
      stats.skippedSheets.push(sheetName);
      return;
    }
    const headers=rows[0].map(x=>String(x||'').trim());
    const normHeaders=headers.map(normHeaderB3);
    const hasQtd=normHeaders.includes('quantidade') || normHeaders.includes('quantidade disponivel');
    const hasTicker=normHeaders.includes('codigo de negociacao') || normHeaders.includes('codigo') || normHeaders.includes('ticker');
    const isRF=isRendaFixaText(sheetName) || normHeaders.some(h=>/vencimento|indexador|emissor|instituicao|taxa/.test(h));
    const isETF=String(sheetName||'').toLowerCase().includes('etf');
    if(!hasQtd && !isRF){
      warnings.push(`Aba "${sheetName}" sem colunas reconhecidas de posição; ignorada.`);
      stats.skippedSheets.push(sheetName);
      return;
    }
    rows.slice(1).forEach((row,idx)=>{
      const produto=String(pickB3(row,headers,['Produto','Nome do Produto','Ativo','Descrição','Descricao','Título','Titulo'])||'').trim();
      const rawTicker=String(pickB3(row,headers,['Código de Negociação','Codigo de Negociacao','Código','Codigo','Ticker'])||'').trim().toUpperCase();
      const venc=String(pickB3(row,headers,['Vencimento','Data de Vencimento'])||'').trim();
      const inst=String(pickB3(row,headers,['Instituição','Instituicao','Emissor','Administrador'])||'').trim();
      let ticker=rawTicker;
      if(!ticker && isRF){
        const base=[produto,inst,venc].filter(Boolean).join(' ');
        ticker=cleanAssetCode(base||sheetName);
      }
      if(!ticker){
        addIgnored(sheetName,'sem ticker');
        return;
      }
      if(!isRF && !tickerValidoB3(ticker)){
        addIgnored(sheetName,'ticker inválido');
        return;
      }
      const rowLabel=cleanAssetCode(produto || ticker || '');
      if(!ticker || ticker==='TOTAL'){
        addIgnored(sheetName,'linha total/subtotal');
        return;
      }
      if(/^TOTAL\b/.test(rowLabel) || /^TOTAL\b/.test(produto.trim().toUpperCase())){
        addIgnored(sheetName,'linha total/subtotal');
        return;
      }
      if(/^SUBTOTAL\b/.test(rowLabel) || /^SUBTOTAL\b/.test(produto.trim().toUpperCase())){
        addIgnored(sheetName,'linha total/subtotal');
        return;
      }
      let qty=parseNum(pickB3(row,headers,['Quantidade','Quantidade Disponível','Quantidade Disponivel','Quantidade Atual']));
      let price=parseNum(pickB3(row,headers,['Preço de Fechamento','Preco de Fechamento','Preço Atualizado','Preco Atualizado','Preço Atualizado CURVA','Preco Atualizado CURVA','Preço Unitário','Preco Unitario','PU','Valor Unitário','Valor Unitario']));
      let value=parseNum(pickB3(row,headers,['Valor Atualizado','Valor Atualizado CURVA','Valor Atualizado MTM','Valor Atualizado FECHAMENTO','Valor Bruto','Valor Líquido','Valor Liquido','Valor Atual','Saldo Bruto','Saldo Líquido','Saldo Liquido']));
      if(qty<=0 && isRF && value>0) qty=1;
      if(qty<=0){
        addIgnored(sheetName,'sem quantidade');
        return;
      }
      if((!price || price<=0) && value>0) price=value/qty;
      if(price<=0){
        warnings.push(`${ticker}: sem preço válido; ignorado.`);
        addIgnored(sheetName,'sem preço válido');
        return;
      }
      const tipo=isRF?'Renda Fixa':tipoPorAbaB3(sheetName,ticker);
      const setor=isRF?rfMetaFromText(`${produto} ${ticker} ${sheetName}`).sector:setorPorAbaB3(sheetName,ticker);
      items.push({ticker,qty,price,value:value||qty*price,type:tipo,sector:setor,product:produto.trim(),sheet:sheetName,date:importDate});
      addImported(sheetName);
    });
  });
  return {items,warnings,importDate,stats};
}
function parseNotaCorretoraWorkbook(wb, fileName=''){
  const items=[]; const warnings=[];
  const stats={
    byType:{},
    byOperation:{},
    ignoredByReason:{},
    totalIgnored:0
  };
  const sheetName=(wb.SheetNames||[])[0];
  if(!sheetName){
    return {items,warnings,importDate:new Date().toLocaleDateString('pt-BR'),stats,noteKey:'nota-sem-planilha',noteNumber:'',tradeDate:''};
  }
  const sheet=wb.Sheets[sheetName];
  const rows=XLSX.utils.sheet_to_json(sheet,{header:1,raw:true,defval:''});
  const headerIdx=notaFindHeaderIndex(rows);
  const noteNumber=notaFindValue(rows,'NUM NOTA') || notaFindValue(rows,'Nº NOTA') || notaFindValue(rows,'N. NOTA') || '';
  const tradeDateRaw=notaFindValue(rows,'DATA PREGÃO') || notaFindValue(rows,'DATA PREGAO') || '';
  const dateMatch=String(fileName||'').match(/(\d{2})(\d{2})(\d{4})/);
  const tradeDate=tradeDateRaw
    ? (String(tradeDateRaw).includes('/') ? String(tradeDateRaw).trim() : `${String(tradeDateRaw).slice(0,2)}/${String(tradeDateRaw).slice(2,4)}/${String(tradeDateRaw).slice(4,8)}`)
    : (dateMatch ? `${dateMatch[1]}/${dateMatch[2]}/${dateMatch[3]}` : new Date().toLocaleDateString('pt-BR'));
  const noteKey=[noteNumber||cleanAssetCode(fileName)||'NOTA',tradeDate.replace(/\//g,'-')].join('|');
  if(headerIdx<0){
    warnings.push('Cabeçalho da nota corretora não encontrado. Procure a tabela com C/V, TIPO DE MERCADO e ESPECIFICAÇÃO DO TÍTULO.');
    return {items,warnings,importDate:tradeDate,stats,noteKey,noteNumber,tradeDate};
  }
  const headers=(rows[headerIdx]||[]).map(v=>String(v||'').trim());
  const normHeaders=headers.map(notaNorm);
  const idxCv=normHeaders.findIndex(h=>h==='C/V' || h==='CV');
  const idxMarket=normHeaders.findIndex(h=>h.includes('TIPO DE MERCADO'));
  const idxSpec=normHeaders.findIndex(h=>h.includes('ESPECIFICACAO DO TITULO'));
  const idxObs=normHeaders.findIndex(h=>h.includes('OBS'));
  const idxQty=normHeaders.findIndex(h=>h.includes('QUANTIDADE'));
  const idxPrice=normHeaders.findIndex(h=>h.includes('PRECO DE LIQUIDACAO'));
  const idxTotal=normHeaders.findIndex(h=>h.includes('COMPRA/VENDA'));
  if(idxCv<0 || idxSpec<0 || idxQty<0 || idxPrice<0 || idxTotal<0){
    warnings.push('Algumas colunas esperadas não foram encontradas; a nota pode estar em um formato diferente.');
  }
  for(let i=headerIdx+1;i<rows.length;i++){
    const row=rows[i]||[];
    const rowTxt=row.map(v=>String(v||'').trim()).filter(Boolean).join(' ');
    const up=notaNorm(rowTxt);
    if(!rowTxt) continue;
    if(/^(RESUMO|TOTAIS|TOTAL|CORRETAGEM|NOTA DE NEGOCIACAO|NOTA DE NEGOCIAÇÃO|MOVIMENTACAO|MOVIMENTAÇÃO)/.test(up)) break;
    if(/^(PRA?CA|C\/V|TIPO DE MERCADO|ESPECIFICACAO DO TITULO|OBS|QUANTIDADE|PRECO DE LIQUIDACAO|COMPRA\/VENDA)/.test(up)) continue;
    if(/\bSUB\s*TOTAL\b|\bTOTAL\b/.test(up)) {
      stats.totalIgnored++;
      stats.ignoredByReason['linha subtotal/total']=(stats.ignoredByReason['linha subtotal/total']||0)+1;
      continue;
    }
    const spec=String(idxSpec>=0 ? row[idxSpec] : '').trim();
    const cv=String(idxCv>=0 ? row[idxCv] : '').trim().toUpperCase();
    const market=String(idxMarket>=0 ? row[idxMarket] : '').trim();
    const obs=String(idxObs>=0 ? row[idxObs] : '').trim();
    const qty=parseNum(idxQty>=0 ? row[idxQty] : '');
    const price=parseNum(idxPrice>=0 ? row[idxPrice] : '');
    const total=parseNum(idxTotal>=0 ? row[idxTotal] : '');
    if(!spec && qty<=0 && price<=0 && total<=0) continue;
    if(!spec){
      stats.totalIgnored++;
      stats.ignoredByReason['sem especificação']=(stats.ignoredByReason['sem especificação']||0)+1;
      continue;
    }
    if(/\bSUB\s*TOTAL\b|\bTOTAL\b/.test(notaNorm(spec))){
      stats.totalIgnored++;
      stats.ignoredByReason['linha subtotal/total']=(stats.ignoredByReason['linha subtotal/total']||0)+1;
      continue;
    }
    const op=/V/.test(cv) ? 'venda' : 'compra';
    const ticker=notaTickerFromSpec(spec);
    if(!ticker){
      stats.totalIgnored++;
      stats.ignoredByReason['sem ticker']=(stats.ignoredByReason['sem ticker']||0)+1;
      continue;
    }
    const meta=inferNotaMeta(ticker, spec, market);
    const finalPrice=price>0 ? price : (qty>0 && total>0 ? total/qty : 0);
    const finalTotal=total>0 ? total : (qty>0 && finalPrice>0 ? qty*finalPrice : 0);
    if(qty<=0 || finalPrice<=0){
      stats.totalIgnored++;
      stats.ignoredByReason[qty<=0 ? 'sem quantidade' : 'sem preço válido']=(stats.ignoredByReason[qty<=0 ? 'sem quantidade' : 'sem preço válido']||0)+1;
      continue;
    }
    items.push({
      ticker,
      qty,
      price:finalPrice,
      value:finalTotal,
      type:meta.type||'Ação',
      sector:meta.sector||'',
      product:spec,
      market,
      obs,
      operation:op,
      date:tradeDate,
      noteKey,
      noteNumber,
      source:'nota-corretora'
    });
    stats.byType[meta.type||'Ação']=(stats.byType[meta.type||'Ação']||0)+1;
    stats.byOperation[op]=(stats.byOperation[op]||0)+1;
  }
  return {items,warnings,importDate:tradeDate,stats,noteKey,noteNumber,tradeDate};
}

  })).filter(x=>x.ticker&&x.qty>0&&x.price>0);
  S.aportes=[...novos,...S.aportes];
  // Completa metadados para estes ativos após recálculo.
  syncAssetsFromAportes(false);
  S.assets=S.assets.map(a=>{
    const it=items.find(x=>x.ticker===a.ticker);
    if(!it) return a;
    return {...a,type:a.type||it.type,sector:a.sector||it.sector,current_price:it.price,quoteSource:a.quoteSource||'importado',quoteUpdatedAt:a.quoteUpdatedAt||new Date().toISOString()};
  });
  save(); render(); fetchQuotes(false);
  toast(`✅ ${novos.length} posição(ões) importadas do Excel.`);
}
function applyNotaCorretoraTrades(items, noteKey, noteNumber, tradeDate){
  const importTag='[IMPORT_NOTA_CORRETORA]';
  const stamp=String(noteKey||noteNumber||tradeDate||'');
  S.aportes=S.aportes.filter(a=>{
    const dec=String(a.decision||'');
    return !(dec.includes(importTag) && String(a.noteKey||'')===stamp);
  });
  const now=Date.now();
  const novos=items.map((it,i)=>({
    id: now+i,
    operation:it.operation||'compra',
    ticker:it.ticker,
    qty:Number(it.qty)||0,
    price:Number(it.price)||0,
    date:it.date||tradeDate||new Date().toLocaleDateString('pt-BR'),
    decision:`${importTag} nota ${noteNumber||stamp} · ${it.market||'mercado'} · ${it.product||it.ticker}`,
    type:it.type||'Ação',
    sector:it.sector||'',
    noteKey:stamp,
    noteNumber:noteNumber||'',
    source:'nota-corretora'
  })).filter(x=>x.ticker&&x.qty>0&&x.price>0);
  S.aportes=[...novos,...S.aportes];
  syncAssetsFromAportes(false);
  save();
  render();
  fetchQuotes(false);
  toast(`✅ ${novos.length} lançamento(ões) importado(s) da nota da corretora.`);
}
function openNotaReview(parsed, fileName){
  const {items=[],warnings=[],importDate='',stats={},noteKey='',noteNumber='',tradeDate=''}=parsed||{};
  const rows=items.map((it,i)=>({
    id:i,
    include:true,
    ticker:String(it.ticker||'').toUpperCase(),
    operation:String(it.operation||'compra').toLowerCase(),
    qty:Number(it.qty)||0,
    price:Number(it.price)||0,
    type:it.type||'Ação',
    sector:it.sector||'',
    product:it.product||'',
    market:it.market||'',
    obs:it.obs||'',
    value:Number(it.value)||((Number(it.qty)||0)*(Number(it.price)||0)),
    sourceItem:{...it}
  }));
  S.noteReview={fileName,importDate,warnings,stats,noteKey,noteNumber,tradeDate,rows};
  render();
}
function closeNotaReview(){
  S.noteReview=null;
  render();

function setNotaReviewAll(v){
  if(!S.noteReview) return;
  S.noteReview.rows=S.noteReview.rows.map(r=>({...r,include:!!v}));
  render();
}
function setNotaReviewRow(idx, field, value){
  if(!S.noteReview || !S.noteReview.rows[idx]) return;
  const row=S.noteReview.rows[idx];
  if(field==='include') row.include=!!value;
  else if(field==='ticker') row.ticker=String(value||'').trim().toUpperCase();
  else if(field==='operation') row.operation=String(value||'compra').toLowerCase();
  else if(field==='type') row.type=String(value||'Ação');
  else if(field==='sector') row.sector=String(value||'');
  else if(field==='qty') row.qty=parseNum(value);
  else if(field==='price') row.price=parseNum(value);
  else if(field==='product') row.product=String(value||'');
  render();
}
function suggestNotaReviewTypes(){
  if(!S.noteReview) return;
  S.noteReview.rows=S.noteReview.rows.map(row=>{
    if(!row.ticker) return row;
    const sug=inferNotaMeta(row.ticker, row.product||row.sourceItem?.product||'', row.market||row.sourceItem?.market||'');
    const existing=S.assets.find(a=>String(a.ticker||'').toUpperCase()===String(row.ticker||'').toUpperCase());
    const type=existing?.type || sug.type || row.type || 'Ação';
    const sector=existing?.sector || sug.sector || row.sector || '';
    return {...row, type, sector};
  });
  render();
}
function importNotaReview(){
  if(!S.noteReview) return;
  const rows=S.noteReview.rows.filter(r=>r.include!==false && r.ticker && Number(r.qty)>0 && Number(r.price)>0);
  if(!rows.length){ alert('Selecione pelo menos um lançamento válido para importar.'); return; }
  applyNotaCorretoraTrades(rows.map(r=>({...r.sourceItem,ticker:r.ticker,operation:r.operation,qty:r.qty,price:r.price,type:r.type,sector:r.sector,product:r.product})),S.noteReview.noteKey,S.noteReview.noteNumber,S.noteReview.tradeDate);
  S.noteReview=null;
}
function notaReviewSummary(rows){
  const total=rows.filter(r=>r.include!==false).reduce((s,r)=>s+(Number(r.qty)||0)*(Number(r.price)||0),0);
  const count=rows.filter(r=>r.include!==false && r.ticker && Number(r.qty)>0 && Number(r.price)>0).length;
  return {total,count};
}

document.getElementById('b3-file').addEventListener('change',async e=>{
  const file=e.target.files[0]; if(!file) return;
  try{
    const isPdf=/\.pdf$/i.test(file.name) || String(file.type||'').includes('pdf');
    let parsed;
    if(isPdf){
      parsed=await parseB3PositionPdf(file);
    }else{
      if(typeof XLSX==='undefined'){ alert('Biblioteca de Excel não carregou. Verifique sua internet e tente novamente.'); return; }
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf,{type:'array'});
      parsed=parseB3PositionWorkbook(wb,file.name);
    }
    const {items,warnings,importDate,stats}=parsed;
    if(!items.length){ alert('Não encontrei posições válidas no arquivo. Tente exportar a posição da B3/corretora em Excel com colunas Código de Negociação, Quantidade, Preço de Fechamento e Valor Atualizado.'); return; }
    const total=items.reduce((s,i)=>s+(i.value||i.qty*i.price),0);
    const sample=items.slice(0,12).map(i=>`${i.ticker}: ${i.qty} x R$ ${Number(i.price).toFixed(2)} (${i.type}/${i.sector||'-'})`).join('\n');
    const importedLines=Object.entries(stats.importedBySheet||{}).map(([sheet,count])=>`- ${sheet}: ${count}`).join('\n') || '- Nenhuma aba processada';
    const skippedLines=(stats.skippedSheets||[]).length?stats.skippedSheets.map(sheet=>`- ${sheet} (ignorada)`).join('\n'):'- Nenhuma';
    const ignoredBySheetLines=Object.entries(stats.ignoredBySheet||{}).length
      ? Object.entries(stats.ignoredBySheet).map(([sheet,count])=>`- ${sheet}: ${count}`).join('\n')
      : '- Nenhuma';
    const ignoredLines=Object.entries(stats.ignoredByReason||{}).length
      ? Object.entries(stats.ignoredByReason).map(([reason,count])=>`- ${reason}: ${count}`).join('\n')
      : '- Nenhuma';
    const msg=`Resumo da importação (${isPdf?'PDF':'Excel'})\n\nPosições válidas: ${items.length}\nTotal aproximado: ${fmt(total)}\nData usada: ${importDate}\n\nPor aba importada:\n${importedLines}\n\nAbas ignoradas:\n${skippedLines}\n\nLinhas ignoradas por aba:\n${ignoredBySheetLines}\n\nMotivos das linhas ignoradas:\n${stats.totalIgnored||0}\n${ignoredLines}\n\nPrévia das posições que vão entrar:\n${sample}${items.length>12?'\n...':''}\n\nVou importar como compras de ajuste na aba Aportes e recalcular Ativos.\nSe já existir importação B3 desta mesma data, ela será substituída para evitar duplicidade.\n\nObservação: arquivo de posição não traz preço médio real nem data de compra original; para histórico exato, use extrato de movimentações.\n\nConfirmar importação?`;
    if(confirm(msg)) applyB3ImportedPositions(items,importDate);
    if(warnings.length) console.warn('Avisos importação B3:',warnings);
  }catch(err){ console.error(err); alert('Erro ao importar arquivo. Verifique o PDF/Excel e tente novamente.'); }
  e.target.value='';
});
document.getElementById('nota-file').addEventListener('change',async e=>{
  const file=e.target.files[0]; if(!file) return;
  try{
    if(typeof XLSX==='undefined'){ alert('Biblioteca de Excel não carregou. Verifique sua internet e tente novamente.'); return; }
    const isCsv=/\.csv$/i.test(file.name) || String(file.type||'').includes('csv');
    const wb=isCsv
      ? XLSX.read(await file.text(),{type:'string'})
      : XLSX.read(await file.arrayBuffer(),{type:'array'});
    const parsed=parseNotaCorretoraWorkbook(wb,file.name);
    const {items,warnings,importDate,stats,noteKey,noteNumber,tradeDate}=parsed;
    if(!items.length){
      alert('Não encontrei lançamentos válidos na nota da corretora. Confira se o arquivo é uma nota de negociação/exportação da corretora no formato Excel.');
      return;
    }
    openNotaReview({items,warnings,importDate,stats,noteKey,noteNumber,tradeDate},file.name);
    if(warnings.length) console.warn('Avisos importação nota:',warnings);
  }catch(err){ console.error(err); alert('Erro ao importar a nota da corretora. Verifique o arquivo e tente novamente.'); }
  e.target.value='';
});

function parseNum(v){
  if(v==null) return 0;
  let s=String(v).trim().replace(/R\$|%|\s/g,'');
  if(!s) return 0;
  if(s.includes(',')&&s.includes('.')) s=s.replace(/\./g,'').replace(',','.');
  else if(s.includes(',')) s=s.replace(',','.');
  const n=parseFloat(s); return isNaN(n)?0:n;
}
function moneyInput(v){ return (Number(v)||0).toFixed(2).replace('.',','); }
function inputDateValue(v){
  if(!v) return '';
  const s=String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(m){ const d=m[1].padStart(2,'0'),mo=m[2].padStart(2,'0'),y=String(m[3].length<3?2000+Number(m[3]):Number(m[3]));return `${y}-${mo}-${d}`; }
  return '';
}
function brDate(v){
  if(!v) return new Date().toLocaleDateString('pt-BR');
  if(/^\d{4}-\d{2}-\d{2}$/.test(v)){ const[y,m,d]=v.split('-');return`${d}/${m}/${y}`; }
  return v;
}
function parseAnyDate(v){
  if(!v) return null; if(v instanceof Date) return isNaN(v)?null:v;
  const s=String(v).trim();
  const a=s.match(/^(\d{4})-(\d{2})-(\d{2})/); if(a) return new Date(+a[1],+a[2]-1,+a[3]);
  const b=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/); if(b) return new Date(+b[3]<100?2000+ +b[3]:+b[3],+b[2]-1,+b[1]);
  const d=new Date(s); return isNaN(d)?null:d;
}
function toISODate(d){ if(!d)return''; return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

// ── DY automático: proventos reais → estimativa da tabela → manual
function autoDY(){
  const now=new Date();
  const oneYearAgo=new Date(now.getFullYear()-1,now.getMonth(),now.getDate());
  let updated=0;
  S.assets.forEach(a=>{
    if(a.dySource==='manual') return; // não sobrescreve DY manual
    // 1ª prioridade: calcula pelo histórico real de proventos (mais preciso)
    const provsAno=S.proventos.filter(p=>{
      const d=parseAnyDate(p.date);
      return String(p.ticker||'').toUpperCase()===a.ticker && d && d>=oneYearAgo;
    });
    if(provsAno.length>0 && a.qty>0 && a.current_price>0){
      const totalAnual=provsAno.reduce((s,p)=>s+(Number(p.value)||0),0);
      const dy=(totalAnual/(a.qty*a.current_price))*100;
      if(dy>0){ a.dy=Number(dy.toFixed(2)); a.dySource='proventos'; updated++; return; }
    }
    // 2ª prioridade: tabela de referência de mercado
    if(!a.dy || Number(a.dy)===0 || a.dySource==='estimate'){
      const ref=DY_REF[a.ticker];
      if(ref){ a.dy=ref; a.dySource='estimate'; updated++; }
    }
  });
  if(updated>0){ save(); }
  return updated;
}

function metaTicker(ticker){
  const t=String(ticker||'').trim().toUpperCase();
  if(isRendaFixaText(t)) return rfMetaFromText(t);
  if(META[t]) return{type:META[t][0],sector:META[t][1]};
  if(/^[A-Z]{4}11$/.test(t)) return{type:'FII',sector:'FII'};
  if(/^[A-Z]{4}[34]$/.test(t)) return{type:'Ação',sector:'Ação'};
  return{type:'Ação',sector:''};
}

function findDy(q){
  const keys=['dividendYield','trailingAnnualDividendYield','yield','dy','regularMarketDividendYield','dividend_yield','dividendYieldAnnual','annualDividendYield'];
  const seen=new Set();
  function scan(obj){
    if(!obj||typeof obj!=='object'||seen.has(obj)) return 0; seen.add(obj);
    for(const k of keys){const raw=obj[k];if(raw!=null&&raw!==''){const v=Number(String(raw).replace('%','').replace(',','.'));if(v>0) return v>1?v:v*100;}}
    for(const v of Object.values(obj)){const f=scan(v);if(f>0) return f;}
    return 0;
  }
  return scan(q);
}
function cx(){
  const tI=S.assets.reduce((s,a)=>s+a.qty*a.avg_price,0);

  const tG=tC-tI,tGP=tI>0?(tG/tI)*100:0;
  const mD=S.assets.reduce((s,a)=>s+(a.qty*a.current_price*(a.dy/100))/12,0);
  const aD=mD*12,avgDY=tC>0?(aD/tC)*100:0;
  return{tI,tC,tG,tGP,mD,aD,avgDY};
}

function proventoHistoricoMensal(){
  const byYear=new Map();
  S.proventos.forEach(p=>{
    const dt=parseAnyDate(p.date);
    const v=Number(p.value)||0;
    if(!dt||v<=0) return;
    const year=dt.getFullYear();
    const month=dt.getMonth();
    if(!byYear.has(year)) byYear.set(year, Array(12).fill(0));
    byYear.get(year)[month]+=v;
  });
  return [...byYear.entries()].sort((a,b)=>b[0]-a[0]).map(([year, months])=>{

function reserveStats(){
  const out={bolsa:0,pessoal:0,total:0,entries:0};
  S.aportes.forEach(a=>{
    const type=String(a.type||a.asset_type||'').trim();
    const op=String(a.operation||a.op||'compra').toLowerCase();
    const isReserve=type==='Reserva de emergência' || op.startsWith('reserva');
    if(!isReserve) return;
    const raw=Number(a.price)||0;
    const qty=Math.max(1, Math.abs(Number(a.qty)||1));
    const value=raw*qty;
    const sign=(op.includes('saida') || op==='venda') ? -1 : 1;
    const target=String(a.reserveTarget||a.sector||a.asset_sector||'bolsa').toLowerCase();
    const bucket=target.includes('pess') ? 'pessoal' : 'bolsa';
    out[bucket]+=sign*value;
    out.entries++;
  });
  out.total=out.bolsa+out.pessoal;
  return out;
}

function rentabilityHistory(typeFilter='all', period='all', bench='CDI'){
  const txs=[...S.aportes]
    .map(a=>({...a, _dt: parseAnyDate(a.date)}))
    .filter(a=>a._dt)
    .sort((a,b)=>a._dt-b._dt||((Number(a.id)||0)-(Number(b.id)||0)));
  const provs=[...S.proventos]
    .map(p=>({...p, _dt: parseAnyDate(p.date)}))
    .filter(p=>p._dt&&Number(p.value)>0)
    .sort((a,b)=>a._dt-b._dt||String(a.ticker||'').localeCompare(String(b.ticker||'')));
  if(!txs.length && !provs.length){
    return { points:[], view:[], bench:[], labels:[], months:[], years:[], current:null, prev12:null, totalMonths:0 };
  }

  const startDate=txs[0]?new Date(txs[0]._dt.getFullYear(),txs[0]._dt.getMonth(),1)
    :new Date(provs[0]._dt.getFullYear(),provs[0]._dt.getMonth(),1);
  const endDate=new Date();
  const priceByTicker=new Map();
  S.assets.forEach(a=>{
    const tk=cleanAssetCode(a.ticker||'');
    if(!tk) return;
    priceByTicker.set(tk, Number(a.current_price)||Number(a.price)||0);
  });
  const typeSet=typeFilter==='all'?null:new Set([typeFilter]);
  const holdings=new Map();
  const points=[];
  let txPos=0;
  let provPos=0;
  let provCum=0;
  let cursor=new Date(startDate.getFullYear(), startDate.getMonth(), 1);
  while(cursor<=endDate){
    const monthEnd=new Date(cursor.getFullYear(), cursor.getMonth()+1, 0, 23, 59, 59, 999);
    while(txPos<txs.length && txs[txPos]._dt<=monthEnd){
      const tx=txs[txPos++];
      const ticker=cleanAssetCode(tx.ticker||'');
      if(!ticker) continue;
      const type=String(tx.type || metaTicker(ticker).type || 'Ação');
      if(typeSet && !typeSet.has(type)) continue;
      const qty=Math.abs(Number(tx.qty)||0);
      const price=Math.max(0, Number(tx.price)||0);
      if(qty<=0) continue;
      const op=String(tx.operation||tx.op||'compra').toLowerCase();
      const cur=holdings.get(ticker)||{ticker, qty:0, cost:0, type, price:priceByTicker.get(ticker)||price};
      if(op.includes('venda')){
        const sellQty=Math.min(cur.qty, qty);
        if(cur.qty>0 && sellQty>0){
          const avg=cur.cost/cur.qty;
          cur.cost=Math.max(0, cur.cost-(avg*sellQty));
          cur.qty=Math.max(0, cur.qty-sellQty);
        }
      }else{
        cur.qty += qty;
        cur.cost += qty * price;
      }
      cur.type = type || cur.type || 'Ação';
      cur.price = priceByTicker.get(ticker)||cur.price||price;
      if(cur.qty<=0.0000001) holdings.delete(ticker);
      else holdings.set(ticker, cur);
    }
    while(provPos<provs.length && provs[provPos]._dt<=monthEnd){
      const p=provs[provPos++];
      const pType=String(p.type || metaTicker(cleanAssetCode(p.ticker||'')).type || 'Ação');
      if(typeSet && !typeSet.has(pType)) continue;
      provCum += Number(p.value)||0;
    }
    const rows=[...holdings.values()].filter(h=>!typeSet || typeSet.has(String(h.type||'Ação')));
    const costBasis=rows.reduce((s,h)=>s+(Number(h.cost)||0),0);
    const currentValue=rows.reduce((s,h)=>{
      const qty=Number(h.qty)||0;
      const unitPrice=priceByTicker.get(h.ticker)||Number(h.price)|| (qty>0 ? (Number(h.cost)||0)/qty : 0);
      return s + qty * unitPrice;
    },0);
    const cumReturn=costBasis>0 ? (((currentValue + provCum - costBasis)/costBasis)*100) : 0;
    const delta=points.length ? cumReturn - points[points.length-1].cumReturn : cumReturn;
    points.push({
      key:`${cursor.getFullYear()}-${String(cursor.getMonth()+1).padStart(2,'0')}`,
      year:cursor.getFullYear(),
      month:cursor.getMonth(),
      label:cursor.toLocaleDateString('pt-BR',{month:'2-digit',year:'2-digit'}),
      costBasis,
      currentValue,
      proventos:provCum,
      cumReturn,
      delta
    });
    cursor.setMonth(cursor.getMonth()+1);
  }

  const totalMonths = points.length;
  const periodCount = period==='all' ? totalMonths : Math.max(3, Number(period)||12);
  const view = totalMonths > periodCount ? points.slice(-periodCount) : points.slice();
  const benchSeries = rentBenchSeries(view.length, bench);
  const current = view[view.length-1] || points[points.length-1] || null;
  const prev12 = points.length>12 ? points[points.length-13] : null;
  const firstView = view[0] || null;
  const currentBench = benchSeries[benchSeries.length-1] || 0;
  const return12m = current && prev12 ? current.cumReturn - prev12.cumReturn : current ? current.cumReturn : 0;
  const lastMonth = current ? current.delta : 0;
  const aboveBench = current ? current.cumReturn - currentBench : 0;
  const yearsMap = new Map();
  points.forEach(p=>{
    if(!yearsMap.has(p.year)) yearsMap.set(p.year, Array(12).fill(null));
    yearsMap.get(p.year)[p.month] = p;
  });
  const years = [...yearsMap.entries()].sort((a,b)=>b[0]-a[0]).map(([year, months])=>{
    const filled=months.filter(Boolean);
    const annual=filled.reduce((s,p)=>s+p.delta,0);
    const acum=filled.length ? filled[filled.length-1].cumReturn : 0;
    return { year, months, annual, acum };
  });
  return { points, view, benchSeries, current, prev12, firstView, currentBench, return12m, lastMonth, aboveBench, years, totalMonths };
}

function lineChart(series, labels){
  const width=1080, height=360;
  const padL=54, padR=20, padT=18, padB=34;
  const all=series.flatMap(s=>s.values.map(v=>Number(v)||0));
  if(!all.length) return '<div class="es" style="padding:36px 18px">Sem dados suficientes para desenhar o gráfico.</div>';
  let minY=Math.min(0,...all);
  let maxY=Math.max(0,...all);
  if(minY===maxY){ maxY=minY+1; }
  const span=maxY-minY;
  const extra=Math.max(2, span*0.12);
  minY-=extra; maxY+=extra;
  const xStep=(width-padL-padR)/Math.max(1, labels.length-1);
  const yAt=v=>height-padB-(((v-minY)/(maxY-minY))*(height-padT-padB));
  const xAt=i=>padL + i*xStep;
  const grid=[];
  for(let i=0;i<=5;i++){
    const y=padT + ((height-padT-padB)/5)*i;
    const value=maxY - ((maxY-minY)/5)*i;
    grid.push(`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${width-padR}" y2="${y.toFixed(1)}" stroke="#161e2e" stroke-width="1"/>`);
    grid.push(`<text x="${padL-8}" y="${(y+4).toFixed(1)}" text-anchor="end" fill="#64748b" font-size="10">${fmtP(value)}</text>`);
  }
  const paths=series.map((s,idx)=>{
    const color=s.color||CLRS[idx%CLRS.length];
    const values=s.values||[];
    if(!values.length) return '';
    const pts=values.map((v,i)=>`${xAt(i).toFixed(1)},${yAt(v).toFixed(1)}`);
    const path=`M ${pts.join(' L ')}`;
    const area=`M ${xAt(0).toFixed(1)},${(height-padB).toFixed(1)} L ${pts.join(' L ')} L ${xAt(values.length-1).toFixed(1)},${(height-padB).toFixed(1)} Z`;
    return `
      <path d="${area}" fill="${s.fill||'none'}" opacity="${s.fill?1:0}"/>
      <path d="${path}" fill="none" stroke="${color}" stroke-width="${s.width||2.2}" stroke-linecap="round" stroke-linejoin="round"/>
      ${s.points===false?'':values.map((v,i)=>`<circle cx="${xAt(i).toFixed(1)}" cy="${yAt(v).toFixed(1)}" r="2.5" fill="${color}" stroke="#090c15" stroke-width="1"/>`).join('')}
    `;
  }).join('');
  const labelStep=Math.max(1, Math.ceil(labels.length/8));
  const xLabels=labels.map((l,i)=>`<text x="${xAt(i).toFixed(1)}" y="${height-10}" text-anchor="middle" fill="${i%labelStep===0||i===labels.length-1?'#64748b':'transparent'}" font-size="10">${esc(l)}</text>`).join('');
  return `<svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}" style="display:block;overflow:visible">
    ${grid.join('')}
    ${paths}
    ${xLabels}
  </svg>`;
}

function syncAssetsFromAportes(showMsg=false){
  const keep={};
  S.assets.forEach(a=>keep[a.ticker]={...a});
  const grouped={};
  const movs=[...S.aportes].sort((a,b)=>{
    const da=parseAnyDate(a.date)?.getTime()||0,db=parseAnyDate(b.date)?.getTime()||0;
    return da-db||((Number(a.id)||0)-(Number(b.id)||0));
  });
  movs.forEach(p=>{
    const raw=String(p.ticker||'').trim().toUpperCase(); if(!raw) return;
    const t=cleanAssetCode(raw)||raw;
    const q=Math.abs(Number(p.qty)||0),pr=Number(p.price)||0;
    const op=(p.operation||p.op||'compra').toLowerCase();
    const type=String(p.type||p.asset_type||'').trim();
    if(type==='Reserva de emergência' || op.startsWith('reserva')) return;
    const m=metaTicker(t);
    const tipo=p.type||p.asset_type||m.type||'Ação';
    const setor=p.sector||p.asset_sector||m.sector||'';
    if(!grouped[t]) grouped[t]={ticker:t,qty:0,total:0,type:tipo,sector:setor};
    if(!grouped[t].type && tipo) grouped[t].type=tipo;
    if(!grouped[t].sector && setor) grouped[t].sector=setor;
    if(op==='venda'){
      const atual=grouped[t].qty,vendida=Math.min(q,atual),avg=atual>0?grouped[t].total/atual:0;
      grouped[t].qty=Math.max(0,atual-vendida);
      grouped[t].total=Math.max(0,grouped[t].total-(avg*vendida)); return;
    }
    grouped[t].qty+=q; grouped[t].total+=q*pr;
  });
  S.assets=Object.values(grouped).filter(g=>g.qty>0.000001).map(g=>{
    const old=keep[g.ticker]||{},m=metaTicker(g.ticker),avg=g.qty>0?g.total/g.qty:0;
    const isRF=(g.type||old.type||m.type)==='Renda Fixa';
    return{
      id:old.id||Date.now()+Math.floor(Math.random()*999999),
      ticker:g.ticker, type:g.type||old.type||m.type, sector:g.sector||old.sector||m.sector, qty:g.qty,
      avg_price:old.avg_manual?Number(old.avg_price)||avg:avg, avg_manual:!!old.avg_manual,
      current_price:Number(old.current_price)||avg, dy:Number(old.dy)||0,
      dySource:old.dySource||'', price_target:Number(old.price_target)||0, ideal_pct:Number(old.ideal_pct)||0,
      quoteSource:old.quoteSource||(isRF?'manual':''), quoteUpdatedAt:old.quoteUpdatedAt||''
    };
  }).sort((a,b)=>a.ticker.localeCompare(b.ticker));
  autoDY();
  save();
  if(showMsg) toast('✅ Carteira recalculada pelos aportes!');
  render();
}

function collectDividendItems(payload,fallback){
  const out=[]; const seen=new Set();
  function walk(x){
    if(!x) return; if(Array.isArray(x)){x.forEach(walk);return;} if(typeof x!=='object') return;
    const hasRate=['rate','amount','value','dividend','cashAmount','valor'].some(k=>x[k]!==undefined);
    const hasDate=['paymentDate','pay_date','payableDate','date','dataPagamento','exDate','lastDatePrior'].some(k=>x[k]!==undefined);
    if(hasRate&&hasDate){out.push(normalizeDividendItem(x,fallback));return;}
    Object.values(x).forEach(walk);
  }
  walk(payload); return out;
}

async function fetchQuotesYahoo(tickers){
  const clean=[...new Set((tickers||[]).map(t=>String(t||'').trim().toUpperCase()).filter(t=>t&&isMarketTicker(t)))];
  if(!clean.length) return [];
  const apiBase=marketApiBase();
  const r=await fetch(`${apiBase}/api/yahoo-quote?symbols=${encodeURIComponent(clean.join(','))}`,{cache:'no-store'});

    yResults.forEach(q=>{
      const ticker=String(q.symbol||'').replace('.SA','').toUpperCase();
      if(!ticker) return;

      if(!a) return;

      const price=Number(q.regularMarketPrice ?? q.postMarketPrice ?? q.preMarketPrice ?? q.regularMarketPreviousClose);

        const prev=Number(a.current_price)||0;

        a.quoteUpdatedAt=new Date().toISOString();

      const dyY=Number(q.trailingAnnualDividendYield||0)*100;

      const m=metaTicker(a.ticker);

    });

    tickers.forEach(t=>{ if(!recebidos.has(t)) semPreco.push(t); });

    // Fallback opcional para brapi: só tenta se você salvou um token.
    // A cotação principal funciona sem token pelo Yahoo.
    if(semPreco.length && S.brapiToken){

          const j=await r.json();
          const recv=new Set();
          (j.results||[]).forEach(q=>{
            const sym=String(q.symbol||'').toUpperCase();
            recv.add(sym);
            const a=S.assets.find(x=>String(x.ticker||'').toUpperCase()===sym);
            if(!a) return;
            const price=Number(q.regularMarketPrice??q.price??q.close??q.previousClose);
            if(Number.isFinite(price)&&price>0){
              const prev=Number(a.current_price)||0;
              a.current_price=price;
              a.quoteSource='brapi';
              a.quoteUpdatedAt=new Date().toISOString();
              S.quotes[sym]={price,change:Number(q.regularMarketChangePercent)||0,flash:prev>0?(price>prev?'up':price<prev?'down':''):''};
              atualizados++;
            }
            const dyApi=findDy(q);
            if(dyApi>0&&(!a.dy||a.dySource==='api'||a.dySource==='estimate')){
              a.dy=Number(dyApi.toFixed(2));
              a.dySource='api';
            }
          });
          falhou.slice(i,i+20).forEach(t=>{ if(!recv.has(t)) semPreco.push(t); });
        }
      }catch(e){ console.warn('fallback brapi:',e); }
    }

    S.lastUpdate=new Date();

      const editAsset=S.assets.find(x=>x.id===S.editId);
      if(editAsset) S._fa={...editAsset};
    }
    autoDY();

    if(manual){
      const msg = semPreco.length

        : `✅ ${atualizados} cotação(ões) atualizadas automaticamente pelo Yahoo.`;
      toast(msg, semPreco.length?'#fbbf24':'#6ee7b7');
    }
  }catch(e){
    console.warn('Yahoo Finance:',e);
    if(manual) toast('❌ Não foi possível atualizar pelo Yahoo. Verifique se a pasta api foi enviada ao GitHub/Vercel.','#f87171');
  }

  S.qInFlight=false;
  S.qLoad=false; S.cd=QI; render();
}

// ══════════════════════════════════════
function pie(data, colors=CLRS){
  const tot=data.reduce((s,d)=>s+d.value,0);
  if(!tot) return'<div class="di" style="text-align:center;padding:24px;font-size:13px">Sem dados</div>';
  let p='',a=-Math.PI/2;
  data.forEach((d,i)=>{
    const ang=(d.value/tot)*2*Math.PI;
    const[x1,y1]=[80+68*Math.cos(a),80+68*Math.sin(a)];
    const[x2,y2]=[80+68*Math.cos(a+ang),80+68*Math.sin(a+ang)];
    p+=`<path d="M80,80 L${x1.toFixed(1)},${y1.toFixed(1)} A68,68 0 ${ang>Math.PI?1:0},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${colors[i%colors.length]}" stroke="#07090f" stroke-width="2"/>`;
    a+=ang;
  });
  return`<svg viewBox="0 0 160 160" width="160" height="160" style="display:block;margin:0 auto;overflow:visible">
    ${p}
    <circle cx="80" cy="80" r="34" fill="#0d111e" stroke="#111828" stroke-width="2"></circle>
    <text x="80" y="76" text-anchor="middle" fill="#e2eaf6" font-size="14" font-weight="700">${data.length}</text>
    <text x="80" y="92" text-anchor="middle" fill="#64748b" font-size="9">ativos</text>
  </svg>`;
}

function ativos(){
  const total=S.assets.reduce((s,a)=>s+(Number(a.qty)||0)*(Number(a.current_price)||0),0);
  const grouped=new Map();
  S.assets.forEach(a=>{
    const type=(a.type||metaTicker(a.ticker).type||'Ação').trim();
    if(!grouped.has(type)) grouped.set(type,[]);
    grouped.get(type).push(a);
  });
  const order=['Ação','FII','ETF','Renda Fixa','BDR','Crypto'];
  const groupNames=[...order.filter(t=>grouped.has(t)), ...[...grouped.keys()].filter(t=>!order.includes(t)).sort((a,b)=>a.localeCompare(b))];
  const sections=groupNames.map((type,idx)=>{
    const items=[...grouped.get(type)].sort((a,b)=>String(a.ticker||'').localeCompare(String(b.ticker||'')));
    const gTotal=items.reduce((s,a)=>s+(Number(a.qty)||0)*(Number(a.current_price)||0),0);
    const gCost=items.reduce((s,a)=>s+(Number(a.qty)||0)*(Number(a.avg_price)||0),0);
    const gDivMes=items.reduce((s,a)=>s+((Number(a.qty)||0)*(Number(a.current_price)||0)*(Number(a.dy)||0)/100)/12,0);
    const gVar=gCost>0?((gTotal-gCost)/gCost)*100:0;
    const gDY=gTotal>0?(gDivMes/gTotal)*100*12:0;
    const share=total>0?(gTotal/total)*100:0;
    const rows=items.map(a=>{
      const avg=Number(a.avg_price)||0;
      const current=Number(a.current_price)||0;
      const vr=avg>0?((current-avg)/avg)*100:0;
      const dm=((Number(a.qty)||0)*current*(Number(a.dy)||0))/1200;
      const peso=total>0?((Number(a.qty)||0)*current/total)*100:0;
      const alvo=Number(a.price_target)||0,ideal=Number(a.ideal_pct)||0,diff=ideal>0?ideal-peso:0;
      const q=S.quotes[a.ticker];
      const qtag=q?`<span style="font-size:10px;color:${q.change>=0?'#34d399':'#f87171'};margin-left:5px;font-weight:600">${fmtP(q.change)}</span>`:'';
      const qt=a.quoteUpdatedAt?new Date(a.quoteUpdatedAt).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'aguardando';
      const qs=a.quoteSource==='yahoo'?'Yahoo':a.quoteSource==='brapi'?'brapi':a.quoteSource==='importado'?'importado':'mercado';
      return`<tr>
        <td style="font-weight:700;color:#e2eaf6">${esc(a.ticker)}${qtag}</td>
        <td><span class="bdg ${bdg(a.type)}">${esc(a.type)}</span></td>
        <td class="mu">${esc(a.sector||'—')}</td>
        <td>${a.qty}</td>
        <td>R$ ${avg.toFixed(2)}</td>
        <td style="font-weight:600;color:${current>=avg?'#34d399':'#f87171'}" class="${(S.quotes[a.ticker]?.flash==='up'?'flash-up':S.quotes[a.ticker]?.flash==='down'?'flash-down':'')}">
          R$ ${current.toFixed(2)}
          ${a.quoteSource==='brapi'?'<span style="font-size:9px;color:#34d399;margin-left:3px" title="brapi">●</span>':a.quoteSource==='yahoo'?'<span style="font-size:9px;color:#60a5fa;margin-left:3px" title="Yahoo Finance">●</span>':''}
          <div style="font-size:10px;color:#3d5472;font-weight:500;margin-top:2px">${qs} · ${qt}</div>
        </td>
        <td style="color:${vr>=0?'#34d399':'#f87171'};font-weight:700">${fmtP(vr)}</td>
        <td>${alvo>0?'R$ '+alvo.toFixed(2):'—'}</td>
        <td style="font-weight:700;color:#e2eaf6">${fmt((Number(a.qty)||0)*current)}</td>
        <td class="bl" style="font-weight:600">${peso.toFixed(1)}%</td>
        <td class="${ideal>0?(diff>0?'gn':'rd'):'mu'}" style="font-weight:600">${ideal>0?ideal.toFixed(1)+'%':'—'}</td>
        <td class="am" style="font-weight:600">${fmt(dm)}</td>
        <td class="mu">${Number(a.dy)||0}%${a.dySource==='api'?'<span style="font-size:10px;color:#34d399;margin-left:4px" title="via brapi">API</span>':a.dySource==='proventos'?'<span style="font-size:10px;color:#818cf8;margin-left:4px" title="calculado pelos seus proventos reais">●Real</span>':a.dySource==='estimate'?'<span style="font-size:10px;color:#fbbf24;margin-left:4px" title="estimativa de mercado — atualize se necessário">~Est</span>':''}</td>
        <td><button class="bi" onclick="edA(${a.id})">✏️</button></td>
      </tr>`;
    }).join('');
    return`<details class="ag"${idx===0?' open':''}>
      <summary>
        <div class="ag-left">
          <div class="ag-ico">${tipoIcon(type)}</div>
          <div>
            <div class="ag-name">${esc(type)}</div>
            <div class="ag-sub">${items.length} ativos · ${fmt(gTotal)} · ${share.toFixed(1)}% da carteira</div>
          </div>
        </div>
        <div class="ag-stats">
          <div class="ag-stat"><div class="ag-k">Ativos</div><div class="ag-v">${items.length}</div></div>
          <div class="ag-stat"><div class="ag-k">Valor total</div><div class="ag-v">${fmt(gTotal)}</div></div>
          <div class="ag-stat"><div class="ag-k">Variação</div><div class="ag-v" style="color:${gVar>=0?'#34d399':'#f87171'}">${fmtP(gVar)}</div></div>
          <div class="ag-stat"><div class="ag-k">Rentabilidade</div><div class="ag-v" style="color:${gDY>=0?'#34d399':'#f87171'}">${gDY.toFixed(2)}% <small>DY</small></div></div>
          <div class="ag-stat"><div class="ag-k">% na carteira</div><div class="ag-v" style="color:#c0cce0">${share.toFixed(1)}%</div></div>
        </div>
        <div class="ag-open">⌄</div>
      </summary>
      <div class="ag-body">
        <div class="ag-table">
          <div class="tw"><div class="ts"><table>
            <thead><tr><th>Ticker</th><th>Tipo</th><th>Setor</th><th>Qtd</th><th>PM</th>
              <th>
                <div style="display:flex;align-items:center;gap:5px">
                  ATUAL
                  <span class="qdot${S.qLoad?' spin':''}" title="Cotações ao vivo · atualiza a cada ${QI}s"></span>
                </div>
              </th>
              <th>Rentab.</th><th>Alvo</th><th>Total</th><th>% Cart.</th><th>% Ideal</th><th>Div/mês</th><th>DY</th><th></th></tr></thead>
            <tbody>${rows||'<tr><td colspan="14" style="text-align:center;padding:28px;color:#2e3f58">Nenhum ativo nesta categoria.</td></tr>'}</tbody>
          </table></div></div>
        </div>
      </div>
    </details>`;
  }).join('');
  return`<div class="sh">
    <div>
      <div class="st">Meus Ativos (${S.assets.length})</div>
      <div class="mu" style="font-size:12px;margin-top:4px">Ativos agrupados por categoria. Abra cada bloco para ver os detalhes e editar um item.</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn bgh" style="font-size:12px;padding:7px 12px" onclick="syncAssetsFromAportes(true)">🧮 Recalcular</button>
      <button class="btn bgh" style="font-size:12px;padding:7px 12px" onclick="fetchQuotes(true)">🔄 Atualizar mercado</button>
    </div>
  </div>
  ${frmA()}
  <div class="ag-wrap">${sections||'<div class="es" style="background:#0d111e;border:1px dashed #161e2e;border-radius:12px">Registre compras na aba 💰 Aportes para alimentar esta tela.</div>'}</div>`;
}

    <div class="fg">
      <div><div class="fl">Operação</div><select id="p-op"><option value="compra" ${op==='compra'?'selected':''}>Compra</option><option value="venda" ${op==='venda'?'selected':''}>Venda</option></select></div>

      ${isReserve?`<div><div class="fl">Quantidade</div><input id="p-qt" type="number" value="1" disabled style="opacity:.6"></div>`:`<div><div class="fl">Quantidade</div><input id="p-qt" type="number" placeholder="100" value="${esc(f.qty||'')}"></div>`}
      <div><div class="fl">${isReserve?'Valor reservado':'Preço da operação'}</div><input id="p-pr" type="text" placeholder="${isReserve?'500,00':'10,15'}" value="${f.price?esc(moneyInput(f.price)):''}"></div>
      <div><div class="fl">Setor / classe</div><input id="p-se" placeholder="${isReserve?'bolsa ou pessoal':'ex: ETF, CDB, Papel, Banco'}" value="${esc(fSector)}" oninput="this.dataset.manual='1'"></div>
    </div>
    ${isReserve?`<div class="fg" style="margin-top:10px">
      <div><div class="fl">Destino da reserva</div><select id="p-rt"><option value="bolsa" ${(String(f.reserveTarget||f.reserve_target||'bolsa')==='bolsa')?'selected':''}>Bolsa / oportunidade</option><option value="pessoal" ${(String(f.reserveTarget||f.reserve_target||'')==='pessoal')?'selected':''}>Pessoal / particular</option></select></div>
      <div><div class="fl">Modo</div><select id="p-rm"><option value="entrada" ${String(f.operation||f.op||'compra').toLowerCase()!=='venda'?'selected':''}>Entrada na reserva</option><option value="saida" ${String(f.operation||f.op||'compra').toLowerCase()==='venda'?'selected':''}>Saída da reserva</option></select></div>
      <div><div class="fl">Observação</div><input id="p-dc" placeholder="ex: reserva de oportunidade, uso pessoal..." value="${esc(f.decision||'')}"></div>
    </div>`:`<div style="margin-top:10px"><div class="fl">Decisão / motivo</div><input id="p-dc" placeholder="ex: rebalanceamento, importação B3, renda fixa..." value="${esc(f.decision||'')}"></div>`}

      </select></div>
      <div><div class="fl">Indexador</div><select id="p-rf-index"><option value="CDI" ${String(f.indexer||'CDI').toUpperCase()==='CDI'?'selected':''}>CDI</option><option value="CDI+" ${String(f.indexer||'').toUpperCase().includes('CDI+')?'selected':''}>CDI+</option><option value="IPCA+" ${String(f.indexer||'').toUpperCase().includes('IPCA')?'selected':''}>IPCA+</option><option value="Prefixado" ${String(f.indexer||'').toUpperCase().includes('PREFIX')?'selected':''}>Prefixado</option><option value="Outro" ${String(f.indexer||'').toUpperCase()==='OUTRO'?'selected':''}>Outro</option></select></div>

function apTab(){
  const isReserveRow=a=>{
    const type=String(a.type||a.asset_type||'').trim();
    const op=String(a.operation||a.op||'').toLowerCase();
    return type==='Reserva de emergência' || op.startsWith('reserva');
  };
  const compras=S.aportes.filter(a=>!isReserveRow(a) && (a.operation||a.op||'compra')!=='venda').reduce((s,a)=>s+Math.abs(a.qty)*a.price,0);
  const vendas=S.aportes.filter(a=>!isReserveRow(a) && (a.operation||a.op||'compra')==='venda').reduce((s,a)=>s+Math.abs(a.qty)*a.price,0);
  const liquido=compras-vendas;
  const q=String(S.apSearch||'').trim().toLowerCase();
  const filtered=q
    ? S.aportes.filter(a=>{
        const mm=metaTicker(a.ticker);
        const hay=[a.date,a.ticker,a.type,a.asset_type,mm.type,a.sector,a.asset_sector,mm.sector,a.decision,a.operation,a.op,a.reserveTarget,a.issuer,a.bondType,a.indexer,a.rate,a.spread,a.dailyLiquidity,a.maturityDate]
          .filter(Boolean).join(' ').toLowerCase();
        return hay.includes(q);
      })
    : S.aportes;
  const reserve=reserveStats();
  const sum=S.aportes.length?`<div class="card" style="margin-bottom:12px;display:flex;gap:24px;flex-wrap:wrap">
    <div><div class="cl">Comprado</div><div style="font-size:18px;font-weight:700;color:#818cf8">${fmt(compras)}</div></div>
    <div><div class="cl">Vendido</div><div style="font-size:18px;font-weight:700;color:#f87171">${fmt(vendas)}</div></div>
    <div><div class="cl">Líquido</div><div style="font-size:18px;font-weight:700;color:${liquido>=0?'#34d399':'#f87171'}">${fmt(liquido)}</div></div>
    <div><div class="cl">Operações</div><div style="font-size:18px;font-weight:700">${S.aportes.length}</div></div>
    <div><div class="cl">Reserva bolsa</div><div style="font-size:18px;font-weight:700;color:#60a5fa">${fmt(reserve.bolsa)}</div><div class="cs">Oportunidade</div></div>
    <div><div class="cl">Reserva pessoal</div><div style="font-size:18px;font-weight:700;color:#34d399">${fmt(reserve.pessoal)}</div><div class="cs">Uso particular</div></div>
  </div>`:'';
  const reserveItems=filtered.filter(a=>{
    const type=String(a.type||a.asset_type||'').trim();
    const op=String(a.operation||a.op||'').toLowerCase();
    return type==='Reserva de emergência' || op.startsWith('reserva');
  });
  const reserveRows=reserveItems.length
    ? reserveItems.map(a=>{
        const op=String(a.operation||a.op||'').toLowerCase();
        const isOut=op.includes('saida') || op==='venda';
        const target=String(a.reserveTarget||a.sector||'bolsa').toLowerCase().includes('pess') ? 'Pessoal' : 'Bolsa';
        return`<tr>
          <td class="mu">${esc(a.date)}</td>
          <td><span class="bdg" style="background:${isOut?'rgba(248,113,113,.08)':'rgba(52,211,153,.08)'};color:${isOut?'#f87171':'#34d399'};border:1px solid ${isOut?'rgba(248,113,113,.22)':'rgba(52,211,153,.22)'}">${isOut?'Saída':'Entrada'}</span></td>
          <td style="font-weight:700;color:#e2eaf6">${esc(a.ticker||'Reserva')}</td>
          <td><span class="bdg ${bdg('Reserva de emergência')}">Reserva</span></td>
          <td class="mu">${esc(target)}</td>
          <td>${Math.abs(Number(a.qty)||1)}</td>
          <td>R$ ${Number(a.price).toFixed(2)}</td>
          <td class="${isOut?'rd':'gn'}" style="font-weight:700">${isOut?'-':'+'}${fmt(Math.abs(Number(a.qty)||1)*Number(a.price||0))}</td>
          <td class="mu">${esc(a.decision||a.reserveLabel||'—')}</td>
          <td><div style="display:flex;gap:6px">
            <button class="bi" onclick="edP(${a.id})">✏️</button>
            <button class="bdi" onclick="rmP(${a.id})">🗑️</button>
          </div></td>
        </tr>`;
      }).join('')
    : '';
  const grouped=new Map();
  filtered.forEach(a=>{

function estimateGoalMonths(startValue,targetValue,monthlyAporte,annualVar){
  const target=Math.max(0,Number(targetValue)||0);
  let value=Math.max(0,Number(startValue)||0);
  const aporte=Math.max(0,Number(monthlyAporte)||0);
  const yearly=Math.max(0,Number(annualVar)||0);
  if(!target) return null;
  if(value>=target) return 0;
  const rate=yearly>0 ? Math.pow(1+yearly/100,1/12)-1 : 0;
  if(aporte<=0 && rate<=0) return null;
  for(let m=1;m<=600;m++){
    value = value * (1 + rate) + aporte;
    if(value>=target) return m;
  }
  return null;
}
function formatGoalMonths(months){
  if(months===0) return 'agora';
  if(months===null||months===undefined) return 'sem estimativa';
  const y=Math.floor(months/12);
  const m=months%12;
  const parts=[];
  if(y) parts.push(`${y} ano${y>1?'s':''}`);
  if(m) parts.push(`${m} mês${m>1?'es':''}`);
  return parts.length?parts.join(' e '):'menos de 1 mês';
}
function goalProgressText(current,target){
  const t=Number(target)||0;
  const c=Number(current)||0;
  const falta=Math.max(0,t-c);
  const prog=t>0?Math.min(100,(c/t)*100):0;
  return {falta,prog};
}

function calcRebalance(){
  const aporte=Number(document.getElementById('reb-val')?.value)||0;
  const out=document.getElementById('reb-out'); if(!out) return;
  if(aporte<=0){out.innerHTML='<div class="es" style="background:#0d111e;border:1px solid #161e2e;border-radius:12px">Digite um valor maior que zero.</div>';return;}
  const total=S.assets.reduce((s,a)=>s+a.qty*a.current_price,0);
  if(!S.assets.length||total<=0){out.innerHTML='<div class="es" style="background:#0d111e;border:1px solid #161e2e;border-radius:12px">Ainda não há ativos suficientes.</div>';return;}
  let list=S.assets.map(a=>{
    const valor=a.qty*a.current_price,peso=valor/total*100,ideal=Number(a.ideal_pct)||0,falta=ideal>0?Math.max(0,ideal-peso):0;
    const rent=a.avg_price>0?((a.current_price-a.avg_price)/a.avg_price)*100:0;
    let score=0,motivos=[];
    if(ideal>0&&falta>0){score+=falta*4;motivos.push(`abaixo do ideal em ${falta.toFixed(1)} p.p.`);}
    if(ideal===0&&peso<10){score+=(10-peso)*1.2;motivos.push('baixo peso');}
    if(rent<0){score+=Math.min(20,Math.abs(rent))*1.1;motivos.push(`queda vs PM (${fmtP(rent)})`);}
    if((Number(a.dy)||0)>6){score+=(Number(a.dy)||0)*0.8;motivos.push(`DY ${a.dy}%`);}
    if(peso>20){score-=25;motivos.push('peso já alto');}
    return{...a,valor,peso,ideal,rent,score,motivos};
  }).filter(a=>a.score>0).sort((a,b)=>b.score-a.score).slice(0,4);
  if(!list.length) list=[...S.assets].map(a=>({...a,valor:a.qty*a.current_price,peso:(a.qty*a.current_price/total*100),ideal:Number(a.ideal_pct)||0,rent:0,score:1,motivos:['menor concentração']})).sort((a,b)=>a.peso-b.peso).slice(0,3);
  const sum=list.reduce((s,a)=>s+a.score,0)||1;
  const rows=list.map(a=>{
    const val=aporte*(a.score/sum),qtd=a.current_price>0?Math.floor(val/a.current_price):0,divMes=val*((Number(a.dy)||0)/100)/12;
    return`<tr><td style="font-weight:700;color:#e2eaf6">${esc(a.ticker)}</td><td>${esc(a.type)}</td><td class="mu">${esc(a.sector||'—')}</td><td>${a.peso.toFixed(1)}%</td><td>${a.ideal?a.ideal.toFixed(1)+'%':'—'}</td><td class="${a.rent<0?'rd':'gn'}">${fmtP(a.rent)}</td><td class="gn" style="font-weight:700">${fmt(val)}</td><td>${qtd}</td><td class="am">+${fmt(divMes)}/mês</td><td class="mu">${esc(a.motivos.join(', '))}</td></tr>`;
  }).join('');
  out.innerHTML=`<div class="tw"><div class="ts"><table><thead><tr><th>Ativo</th><th>Tipo</th><th>Setor</th><th>% Cart.</th><th>% Ideal</th><th>Rentab.</th><th>Sugestão</th><th>Qtd aprox.</th><th>Dividendo</th><th>Motivo</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}
