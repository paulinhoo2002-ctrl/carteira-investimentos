function prudentContributionAnalysis(){
  const analysisRows=assetAnalysisRows();
  const total=analysisRows.reduce((s,row)=>s+(Number(row.current)||0),0);
  const allocItems=allocationGoalItems();
  const allocTarget=Object.fromEntries(allocItems.map(it=>[it.type, Number(it.pct)||0]));
  const {map:allocValues}=allocationActualByType();
  const allocActual=Object.fromEntries(Object.entries(allocValues).map(([type,value])=>[type,total>0?(Number(value)||0)/total*100:0]));
  const assetsByTicker=new Map((S.assets||[]).map(a=>[String(a.ticker||'').trim().toUpperCase(),a]));
  let insufficient=0;
  let avoided=0;
  const evaluated=analysisRows.map(row=>{
    const asset=assetsByTicker.get(row.ticker)||{};
    const signal=assetContributionSignal(row);
    const valid=!!row.ticker
      && Number.isFinite(row.current) && row.current>0
      && Number.isFinite(row.share)
      && Number.isFinite(row.pct);
    if(!valid || signal.label==='Dados insuficientes'){
      insufficient++;
      return {...row,asset,signal,valid:false,score:-Infinity,criteria:['dados insuficientes']};
    }
    if(row.share>30 || signal.label==='Evitar aumentar por concentração'){
      avoided++;
      return {...row,asset,signal,valid:true,score:-Infinity,criteria:['concentração acima do limite prudente']};
    }
    const ideal=Number(asset.ideal_pct)||0;
    const idealGap=ideal>0 ? Math.max(0,ideal-row.share) : 0;
    const typeTarget=Number(allocTarget[row.type]||0);
    const typeActual=Number(allocActual[row.type]||0);
    const typeGap=typeTarget-typeActual;
    const dy=Math.max(0,Number(row.dy)||0);
    const criteria=[];
    let score=0;

    if(row.share<10){score+=18;criteria.push('concentração saudável');}
    else if(row.share<15){score+=10;criteria.push('concentração controlada');}
    else if(row.share<=20){score-=8;criteria.push('posição já relevante');}
    else{score-=32;criteria.push('concentração elevada');}

    if(signal.label==='Pode estudar aporte'){score+=24;criteria.push('sinal prudente favorável ao estudo');}
    else if(signal.label==='Acompanhar'){score+=7;criteria.push('ativo em acompanhamento');}
    else if(signal.label==='Aguardar'){score-=22;criteria.push('sinal de aguardar');}

    if(row.pct<0){
      const fall=Math.abs(row.pct);
      if(fall>=3 && fall<=20){score+=Math.min(14,fall*.7);criteria.push(`queda moderada (${fmtP(row.pct)})`);}
      else if(fall>20){score-=5;criteria.push(`queda acentuada exige análise (${fmtP(row.pct)})`);}
      else{criteria.push(`oscilação leve (${fmtP(row.pct)})`);}
    }else{
      score+=2;
      criteria.push(`desempenho ${fmtP(row.pct)}`);
    }

    if(idealGap>0){score+=Math.min(16,idealGap*1.6);criteria.push(`abaixo do peso ideal em ${idealGap.toFixed(1)} p.p.`);}
    if(typeTarget>0 && typeGap>0){score+=Math.min(15,typeGap*1.2);criteria.push(`${row.type} abaixo da meta em ${typeGap.toFixed(1)} p.p.`);}
    else if(typeTarget>0 && typeGap<0){score-=Math.min(14,Math.abs(typeGap));criteria.push(`${row.type} acima da meta em ${Math.abs(typeGap).toFixed(1)} p.p.`);}
    if(dy>0){score+=Math.min(5,dy*.45);criteria.push(`DY ${dy.toFixed(2)}% como apoio`);}

    return {...row,asset,signal,valid:true,score,criteria,ideal,typeGap};
  });
  const candidates=evaluated
    .filter(row=>row.valid && Number.isFinite(row.score) && row.score>8 && row.signal.label!=='Aguardar')
    .sort((a,b)=>b.score-a.score || a.share-b.share)
    .slice(0,5);
  return {rows:analysisRows,total,evaluated,candidates,insufficient,avoided};
}

  });
  const typeRows=Object.entries(byType).map(([type,value])=>({type,value,share:portfolio.tC>0?(value/portfolio.tC)*100:0})).sort((a,b)=>b.value-a.value);
  const variableValue=typeRows.filter(row=>row.type!=='Renda Fixa').reduce((sum,row)=>sum+row.value,0);
  const fixedAssets=(S.assets||[]).filter(isRendaFixaAsset);
  const fixedApplied=fixedAssets.reduce((sum,a)=>sum+rfValues(a).applied,0);
  const fixedCurrent=fixedAssets.reduce((sum,a)=>sum+rfValues(a).current,0);
  const fixedMissing=fixedAssets.filter(a=>!rfValues(a).hasExplicitCurrent).length;
  const today=new Date(); today.setHours(0,0,0,0);
  const maturities=fixedAssets.map(a=>{
    const date=parseAnyDate(assetRfMaturityDate(a));

  }).filter(row=>row.date && row.date>=today).sort((a,b)=>a.date-b.date);
  const latestMonth=(S.proventos||[]).reduce((latest,p)=>{
    const date=parseAnyDate(p?.date);
    const value=Number(p?.value)||0;
    if(!date || value<=0) return latest;
    const key=`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
    return !latest || key>latest ? key : latest;
  },'');
  const recentProventos=(S.proventos||[]).filter(p=>{
    const date=parseAnyDate(p?.date);
    if(!date || Number(p?.value)<=0) return false;
    return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`===latestMonth;
  });
  const recentTotal=recentProventos.reduce((sum,p)=>sum+(Number(p.value)||0),0);
  const recentPayerMap=new Map();
  recentProventos.forEach(p=>{
    const meta=proventoAssetMeta(p);
    const ticker=String(p.ticker||meta.asset?.ticker||meta.title||'Sem ticker').trim().toUpperCase()||'Sem ticker';
    recentPayerMap.set(ticker,(recentPayerMap.get(ticker)||0)+(Number(p.value)||0));
  });
  const recentBest=[...recentPayerMap.entries()].sort((a,b)=>b[1]-a[1])[0]||null;
  const concentration=[...analysis].filter(r=>Number.isFinite(r.share)).sort((a,b)=>b.share-a.share);
  const positives=[...analysis].filter(r=>Number.isFinite(r.pct)&&r.pct>0).sort((a,b)=>b.pct-a.pct).slice(0,3);
  const negatives=[...analysis].filter(r=>Number.isFinite(r.pct)&&r.pct<0).sort((a,b)=>a.pct-b.pct).slice(0,3);
  const insufficient=analysis.filter(r=>r.pct==null || r.share==null || !Number.isFinite(r.current) || r.current<=0).slice(0,3);
  const concentrated=concentration.filter(r=>r.share>10).slice(0,3);
  return {
    portfolio,income,analysis,typeRows,variableValue,
    fixed:{assets:fixedAssets,applied:fixedApplied,current:fixedCurrent,missing:fixedMissing,maturities},
    recent:{month:latestMonth,total:recentTotal,count:recentProventos.length,best:recentBest},
    concentration,positives,negatives,insufficient,concentrated,
    contribution:prudentContributionAnalysis()
  };
}
function rfCategoryLabel(a){
  const text=rfPosNorm([assetRfSubtype(a),assetRfName(a),a?.fixed_indexer,a?.rf_yield_type,a?.sector].filter(Boolean).join(' '));
  if(/\bCDB\b/.test(text)) return 'CDB';
  if(/\bLCI\b/.test(text)) return 'LCI';
  if(/\bLCA\b/.test(text)) return 'LCA';
  if(text.includes('TESOURO')) return 'Tesouro Direto';
  if(/\bDEB\b/.test(text) || text.includes('DEBENT')) return 'Debênture';
  return 'Outros';
}
function rfBucketLabel(days){
  if(days==null) return 'Sem vencimento';
  if(days<0) return 'Vencido';
  if(days<=30) return 'Próximos 30 dias';
  if(days<=90) return 'Próximos 90 dias';
  if(days<=365) return 'Próximos 12 meses';
  return 'Acima de 12 meses';
}
function rfIntelligenceSnapshot(){
  const today=new Date(); today.setHours(0,0,0,0);
  const assets=(S.assets||[]).filter(isRendaFixaAsset);
  const rows=assets.map(a=>{
    const vals=rfValues(a);
    const applied=Number(vals.applied)||0;
    const current=Number(vals.current)||0;
    const profit=Number(vals.profit)||0;
    const pct=applied>0 ? (profit/applied)*100 : 0;
    const due=parseAnyDate(assetRfMaturityDate(a));
    const days=due ? Math.floor((due.getTime()-today.getTime())/86400000) : null;
    const category=rfCategoryLabel(a);
    const explicit=!!vals.hasExplicitCurrent;
    const issues=[];
    if(!assetRfContractRate(a)) issues.push({tone:'warn',label:'Sem taxa'});
    if(!assetRfMaturityDate(a)) issues.push({tone:'muted',label:'Sem vencimento'});
    if(!explicit) issues.push({tone:'warn',label:'Valor atual não informado'});
    if(days!=null && days<0) issues.push({tone:'danger',label:'Vencido'});
    else if(days!=null && days<=30) issues.push({tone:'warn',label:'Vence em até 30 dias'});
    else if(days!=null && days<=90) issues.push({tone:'warn',label:'Vence em até 90 dias'});
    const currentMeta=assetRfCurrentValueMeta(a);
    return {
      asset:a,
      ticker:String(a.ticker||assetRfName(a)||'—').trim()||'—',
      name:assetRfName(a)||a.name||a.product||a.ticker||'Renda Fixa',
      category,
      subtype:assetRfSubtype(a),
      indexer:assetRfIndexerLabel(a),
      rate:assetRfContractRate(a)||'taxa não informada',
      applied,
      current,
      profit,
      pct,
      due,
      days,
      explicit,
      currentMeta,
      issues,
      bucket:rfBucketLabel(days)
    };
  });
  const totalApplied=rows.reduce((s,r)=>s+r.applied,0);
  const totalCurrent=rows.reduce((s,r)=>s+r.current,0);
  const totalProfit=totalCurrent-totalApplied;
  const totalPct=totalApplied>0 ? (totalProfit/totalApplied)*100 : 0;
  const explicitCount=rows.filter(r=>r.explicit).length;
  const missingCurrent=rows.length-explicitCount;
  const overdue=rows.filter(r=>r.days!=null && r.days<0).length;
  const soon30=rows.filter(r=>r.days!=null && r.days>=0 && r.days<=30).length;
  const soon90=rows.filter(r=>r.days!=null && r.days>=0 && r.days<=90).length;
  const soon12m=rows.filter(r=>r.days!=null && r.days>90 && r.days<=365).length;
  const longTerm=rows.filter(r=>r.days!=null && r.days>365).length;
  const missingDue=rows.filter(r=>r.days==null).length;
  const missingRate=rows.filter(r=>!String(r.rate||'').trim() || /taxa não informada/i.test(r.rate)).length;
  const typeOrder=['CDB','LCI','LCA','Tesouro Direto','Debênture','Outros'];
  const typeRows=typeOrder.map(type=>{
    const subset=rows.filter(r=>r.category===type);
    const value=subset.reduce((s,r)=>s+r.current,0);
    const count=subset.length;
    return {
      type,
      count,
      value,
      share:totalCurrent>0 ? (value/totalCurrent)*100 : 0
    };
  }).filter(r=>r.count>0);
  const bucketOrder=['Vencido','Próximos 30 dias','Próximos 90 dias','Próximos 12 meses','Acima de 12 meses','Sem vencimento'];
  const bucketRows=bucketOrder.map(bucket=>{
    const subset=rows.filter(r=>r.bucket===bucket);
    const value=subset.reduce((s,r)=>s+r.current,0);
    return {bucket,count:subset.length,value,share:totalCurrent>0 ? (value/totalCurrent)*100 : 0};
  }).filter(r=>r.count>0);
  const alertRows=rows
    .flatMap(r=>{
      const severity=r.days==null ? (r.explicit ? 3 : 2) : (r.days<0 ? 0 : r.days<=30 ? 1 : r.days<=90 ? 2 : 4);
      const primaryIssue=(r.days!=null && r.days<0)
        ? 'Vencido'
        : (r.days!=null && r.days<=30)
          ? 'Vence em até 30 dias'
          : (r.days!=null && r.days<=90)
            ? 'Vence em até 90 dias'
            : r.issues.find(it=>it.label==='Valor atual não informado')?.label
              || r.issues.find(it=>it.label==='Sem taxa')?.label
              || r.issues.find(it=>it.label==='Sem vencimento')?.label
              || '';
      return primaryIssue ? [{...r, severity, primaryIssue}] : [];
    })
    .sort((a,b)=>a.severity-b.severity || a.days-b.days || a.ticker.localeCompare(b.ticker))
    .slice(0,6);
  const previewRows=[...rows]
    .sort((a,b)=>b.current-a.current || a.days-b.days || a.ticker.localeCompare(b.ticker))
    .slice(0,5);
  const tableRows=[...rows]
    .sort((a,b)=>{
      const ad=a.days==null ? 99999 : a.days;
      const bd=b.days==null ? 99999 : b.days;
      return ad-bd || b.current-a.current || a.ticker.localeCompare(b.ticker);
    });
  const reading=rows.length===0
    ? {tone:'muted',title:'Nenhum título cadastrado',text:'Cadastre títulos de renda fixa para ver resumo, vencimentos e alertas.'}
    : missingCurrent===rows.length
      ? {tone:'warn',title:'Dados incompletos para cálculo preciso',text:'Nenhum título tem valor atual explícito. Informe o valor bruto ou líquido da corretora para ver a rentabilidade com mais segurança.'}
      : overdue>0
        ? {tone:'danger',title:'Atenção a vencimentos vencidos',text:`${overdue} título${overdue===1?'':'s'} já passou do vencimento e merece revisão.`}
        : soon30>0
          ? {tone:'warn',title:'Atenção a vencimentos próximos',text:`${soon30} título${soon30===1?'':'s'} vencem em até 30 dias.`}
          : missingCurrent>0
            ? {tone:'warn',title:'Dados incompletos para cálculo preciso',text:`${missingCurrent} título${missingCurrent===1?'':'s'} ainda usam o valor aplicado como referência.`}
            : totalProfit>=0
              ? {tone:'ok',title:'Carteira de renda fixa organizada',text:'Os valores atuais informados permitem uma leitura mais confiável da rentabilidade.'}
              : {tone:'warn',title:'Atenção ao resultado informado',text:'Os dados atuais mostram resultado abaixo do aplicado. Revise taxas, vencimentos e valores da corretora.'};
  return {
    assets:rows,
    totalApplied,
    totalCurrent,
    totalProfit,
    totalPct,
    explicitCount,
    missingCurrent,
    overdue,
    soon30,
    soon90,
    soon12m,
    longTerm,
    missingDue,
    missingRate,
    typeRows,
    bucketRows,
    alertRows,
    previewRows,
    tableRows,
    reading
  };
}

function patrimonySnapshot(period=Number(S.dashPeriod)||12){
  const summary=cx();
  const count=Math.max(3,Number(period)||12);
  const now=new Date();
  const firstMonth=new Date(now.getFullYear(),now.getMonth()-(count-1),1);
  const months=[];
  for(let i=0;i<count;i++){
    const date=new Date(firstMonth.getFullYear(),firstMonth.getMonth()+i,1);
    months.push({
      key:`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`,
      label:date.toLocaleDateString('pt-BR',{month:'2-digit',year:'2-digit'}),
      aporte:0,
      cumulative:0
    });
  }
  const monthMap=new Map(months.map(row=>[row.key,row]));
  let baseline=0;
  (S.aportes||[]).forEach(item=>{
    if(isNeutralMovement(item)) return;
    const date=parseAnyDate(item.date);
    if(!date) return;
    const op=String(item.operationType||item.operation||item.op||'compra').toLowerCase();
    const rawValue=Number(item.totalValue||item.value)||Math.abs(Number(item.qty)||0)*(Number(item.unitPrice||item.price)||0);
    if(!Number.isFinite(rawValue)||rawValue<=0) return;
    const signed=/venda|resgate|vencimento/.test(op) ? -rawValue : rawValue;
    const key=`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
    if(date<firstMonth) baseline+=signed;
    else if(monthMap.has(key)) monthMap.get(key).aporte+=signed;
  });
  let cumulative=baseline;
  months.forEach(row=>{cumulative+=row.aporte;row.cumulative=cumulative;});
  const rent=rentabilityHistory('all',String(count),String(S.rentBench||'CDI'));
  const performance=(rent.view||[]).filter(row=>Number.isFinite(Number(row.delta)));
  const bestEvolution=performance.reduce((best,row)=>!best||Number(row.delta)>Number(best.delta)?row:best,null);
  const worstEvolution=performance.reduce((worst,row)=>!worst||Number(row.delta)<Number(worst.delta)?row:worst,null);
  const biggestContribution=months.filter(row=>row.aporte>0).sort((a,b)=>b.aporte-a.aporte)[0]||null;
  const pct=summary.tI>0?(summary.tG/summary.tI)*100:0;
  const absPct=Math.abs(pct);
  const reading=pct>1
    ? {tone:'ok',title:'Crescimento acima dos aportes',text:`O patrimônio está ${fmt(summary.tG)} acima do valor aplicado. Há ganho de capital acumulado de ${fmtP(pct)}.`}
    : pct<-1
      ? {tone:'danger',title:'Patrimônio abaixo do aplicado',text:`A carteira está ${fmt(Math.abs(summary.tG))} abaixo do valor aplicado. Revise desempenho e concentração antes de novas decisões.`}
      : {tone:'muted',title:'Patrimônio próximo do aplicado',text:`A diferença atual é pequena (${fmtP(pct)}). O crescimento observado vem principalmente dos aportes registrados.`};
  return {summary,months,performance,bestEvolution,worstEvolution,biggestContribution,pct,absPct,reading,count};
}

  });
  const order=TYPE_ORDER;
  const groupNames=[...order.filter(t=>grouped.has(t)), ...[...grouped.keys()].filter(t=>!order.includes(t)).sort((a,b)=>a.localeCompare(b))];
  const analysis=assetAnalysisBlock();
  const sections=groupNames.map((type,idx)=>{
    const items=[...grouped.get(type)].sort((a,b)=>String(a.ticker||'').localeCompare(String(b.ticker||'')));
    const sortedItems=sortAssetsByGroup(type, items);
    const gApplied=items.reduce((s,a)=>s+assetAppliedValue(a),0);
    const gTotal=items.reduce((s,a)=>s+assetCurrentValue(a),0);
    const gDivMes=items.reduce((s,a)=>{
      const cur=assetCurrentValue(a);
      return s + (Number.isFinite(cur) ? (cur*(Number(a.dy)||0)/100)/12 : 0);
    },0);
    const gJuros=items.reduce((s,a)=>{
      const j=assetJurosValue(a);
      return s + (Number.isFinite(j) ? j : 0);
    },0);
    const gCost=gApplied;
    const gVar=gCost>0?((gTotal-gCost)/gCost)*100:0;
    const gDY=gTotal>0?(gDivMes/gTotal)*100*12:0;
    const share=total>0?(gTotal/total)*100:0;
    const rows=sortedItems.map(a=>{
      const avg=Number(a.avg_price)||0;
      const currentUnit=Number(a.current_price)||0;
      const marketValue=isRendaFixaAsset(a) ? assetCurrentValue(a) : (Number(a.qty)||0)*currentUnit;
      const currentDisplay=isRendaFixaAsset(a) ? marketValue : currentUnit;
      const applied=assetAppliedValue(a);
      const rentab=assetRentabPct(a);
      const juros=assetJurosValue(a);
      const dm=Number.isFinite(marketValue)?(marketValue*(Number(a.dy)||0))/1200:0;
      const peso=total>0?(marketValue/total)*100:0;
      const alvo=Number(a.price_target)||0,ideal=Number(a.ideal_pct)||0,diff=ideal>0?ideal-peso:0;
      const q=S.quotes[a.ticker];
      const qtag=q?`<span style="font-size:10px;color:${q.change>=0?'#34d399':'#f87171'};margin-left:5px;font-weight:600">${fmtP(q.change)}</span>`:'';
      const qt=a.quoteUpdatedAt?new Date(a.quoteUpdatedAt).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'aguardando';
      const qs=a.quoteSource==='yahoo'?'Yahoo':a.quoteSource==='brapi'?'brapi':a.quoteSource==='importado'?'importado':'sem atualização';
      const isRF=normalizeType(a.type||metaTicker(a.ticker).type||'Ação','Ação')==='Renda Fixa';
      const atualText=marketValue!=null?fmt(currentDisplay):'—';
      const pmText=isRF?fmt(applied):(avg?fmt(avg):'—');
      const rfSource=isRF?assetRfCurrentValueMeta(a):null;
      const rentText=isRF
        ? `${Number.isFinite(rentab)?`Rentab.: ${fmtP(rentab)}`:'Rentab.: —'}<div style="font-size:10px;color:${Number.isFinite(juros)?(juros>=0?'#34d399':'#f87171'):'#64748b'};margin-top:2px">Resultado: ${Number.isFinite(juros)?fmt(juros):'—'}</div>${assetNeedsRFUpdate(a)?'<div style="font-size:10px;color:#fbbf24;margin-top:2px">Sem rendimento atualizado. Informe o valor bruto ou líquido atual da corretora para acompanhar a rentabilidade.</div>':''}`
        : `${Number.isFinite(rentab)?fmtP(rentab):'—'}`;
      const atualCls=isRF
        ? `font-weight:600;color:${Number.isFinite(juros)?(juros>=0?'#34d399':'#f87171'):'#e2eaf6'}`
        : `font-weight:600;color:${currentUnit>=avg?'#34d399':'#f87171'}`;
      return`<tr>
        <td style="font-weight:700;color:#e2eaf6">${esc(a.ticker)}${qtag}</td>
        <td><span class="bdg ${bdg(a.type)}">${esc(a.type)}</span></td>
        <td class="mu">${esc(a.sector||'—')}</td>
        <td>${a.qty}</td>
        <td>${pmText}</td>
        <td style="${atualCls}" class="${(S.quotes[a.ticker]?.flash==='up'?'flash-up':S.quotes[a.ticker]?.flash==='down'?'flash-down':'')}">
          ${atualText}
          ${a.quoteSource==='brapi'?'<span style="font-size:9px;color:#34d399;margin-left:3px" title="brapi">●</span>':a.quoteSource==='yahoo'?'<span style="font-size:9px;color:#60a5fa;margin-left:3px" title="Yahoo Finance">●</span>':''}
          <div style="font-size:10px;color:#3d5472;font-weight:500;margin-top:2px">${qs} · ${qt}</div>
          ${isRF?`<div style="font-size:10px;color:#8da0bd;font-weight:500;margin-top:2px">Fonte: ${esc(rfSource?.source||'—')}${rfSource?.origin ? ` · ${esc(rfSource.origin)}` : ''}</div>`:''}
        </td>
        <td style="color:${Number.isFinite(rentab)?(rentab>=0?'#34d399':'#f87171'):'#64748b'};font-weight:700">${rentText}</td>
        <td>${alvo>0?fmt(alvo):'—'}</td>
        <td style="font-weight:700;color:#e2eaf6">${currentDisplay!=null?fmt(currentDisplay):'—'}</td>
        <td class="bl" style="font-weight:600">${peso.toFixed(1)}%</td>
        <td class="${ideal>0?(diff>0?'gn':'rd'):'mu'}" style="font-weight:600">${ideal>0?ideal.toFixed(1)+'%':'—'}</td>
        <td class="am" style="font-weight:600">${fmt(dm)}</td>
      <td class="mu">${Number(a.dy)||0}%${a.dySource==='api'?'<span style="font-size:10px;color:#34d399;margin-left:4px" title="via brapi">API</span>':a.dySource==='proventos'?'<span style="font-size:10px;color:#818cf8;margin-left:4px" title="calculado pelos seus proventos reais">●Real</span>':a.dySource==='estimate'?'<span style="font-size:10px;color:#fbbf24;margin-left:4px" title="estimativa de mercado — atualize se necessário">~Est</span>':''}</td>
        <td><button class="bi" onclick="edA(${a.id})">✏️</button></td>
      </tr>`;
    }).join('');
    const rfCards=sortedItems.map(a=>{
      const applied=assetAppliedValue(a);
      const current=assetCurrentValue(a);
      const profit=assetJurosValue(a);
      const rentab=assetRentabPct(a);
      const name=assetRfName(a);
      const subtype=assetRfSubtype(a);
      const appDate=assetRfApplicationDate(a);
      const dueDate=assetRfMaturityDate(a);
      const contractRate=assetRfContractRate(a);
      const note=assetRfNote(a);
      const iriof=assetRfIrIof(a);
      const unavailable=assetRfUnavailableValue(a);
      return `<div class="rf-card" style="background:#0d111e;border:1px solid #161e2e;border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:10px;box-shadow:inset 0 1px 0 rgba(255,255,255,.02)">
        <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start">
          <div style="min-width:0">
            <div style="font-weight:800;font-size:14px;color:#e2eaf6;line-height:1.2">${esc(name||a.ticker||'Renda Fixa')}</div>
            <div style="font-size:11px;color:#94a3b8;margin-top:2px">${esc(subtype)}${contractRate?` · ${esc(contractRate)}`:''}</div>
          </div>
          <button class="bi" onclick="edA(${a.id})">✏️</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:8px">
          <div style="background:#0b1220;border:1px solid #162033;border-radius:12px;padding:8px 9px"><div class="mu" style="font-size:10px">Aplicação</div><div style="font-weight:700;color:#e2eaf6;font-size:13px">${esc(appDate||'—')}</div></div>
          <div style="background:#0b1220;border:1px solid #162033;border-radius:12px;padding:8px 9px"><div class="mu" style="font-size:10px">Vencimento</div><div style="font-weight:700;color:#e2eaf6;font-size:13px">${esc(dueDate||'—')}</div></div>
          <div style="background:#0b1220;border:1px solid #162033;border-radius:12px;padding:8px 9px"><div class="mu" style="font-size:10px">Valor aplicado</div><div style="font-weight:700;color:#e2eaf6;font-size:13px">${fmt(applied)}</div></div>
          <div style="background:#0b1220;border:1px solid #162033;border-radius:12px;padding:8px 9px"><div class="mu" style="font-size:10px">Valor líquido</div><div style="font-weight:700;color:#e2eaf6;font-size:13px">${fmt(current)}</div></div>
          <div style="background:#0b1220;border:1px solid #162033;border-radius:12px;padding:8px 9px"><div class="mu" style="font-size:10px">Rentabilidade</div><div style="font-weight:700;color:${Number.isFinite(rentab)?(rentab>=0?'#34d399':'#f87171'):'#e2eaf6'};font-size:13px">${Number.isFinite(rentab)?fmtP(rentab):'—'}</div></div>
          <div style="background:#0b1220;border:1px solid #162033;border-radius:12px;padding:8px 9px"><div class="mu" style="font-size:10px">Ganhos/Perdas</div><div style="font-weight:700;color:${Number.isFinite(profit)?(profit>=0?'#34d399':'#f87171'):'#e2eaf6'};font-size:13px">${Number.isFinite(profit)?fmt(profit):'—'}</div></div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:#94a3b8">
          ${unavailable?`<span class="note-pill">Indisponível: ${fmt(unavailable)}</span>`:''}
          ${iriof||a.rf_ir_iof===0?`<span class="note-pill">IR/IOF: ${fmt(iriof)}</span>`:''}
          ${note?`<span class="note-pill" title="${esc(note)}">Obs.: ${esc(note)}</span>`:''}
        </div>
      </div>`;
    }).join('');
    const isOpen=S.activeAssetsGroup===type;
    return`<details class="ag"${isOpen?' open':''}>
      <summary onclick="toggleAssetGroup(${JSON.stringify(type)}, event)">
        <div class="ag-left">
          <div class="ag-ico">${tipoIcon(type)}</div>
          <div>
            <div class="ag-name">${esc(type)}</div>
            <div class="ag-sub">${items.length} ativos · ${fmt(gTotal)} · ${share.toFixed(1)}% da carteira</div>
          </div>
        </div>
        <div class="ag-stats">
          <div class="ag-stat"><div class="ag-k">${type==='Renda Fixa'?'Valor aplicado':'Ativos'}</div><div class="ag-v">${type==='Renda Fixa'?fmt(gApplied):items.length}</div></div>
          <div class="ag-stat"><div class="ag-k">${type==='Renda Fixa'?'Valor atual':'Valor total'}</div><div class="ag-v">${type==='Renda Fixa'?fmt(gTotal):fmt(gTotal)}</div></div>
          <div class="ag-stat"><div class="ag-k">${type==='Renda Fixa'?'Resultado acumulado':'Variação'}</div><div class="ag-v" style="color:${type==='Renda Fixa'?(gJuros>=0?'#34d399':'#f87171'):(gVar>=0?'#34d399':'#f87171')}">${type==='Renda Fixa'?fmt(gJuros):fmtP(gVar)}</div></div>
          <div class="ag-stat"><div class="ag-k">${type==='Renda Fixa'?'Rentab. acumulada':'Rentabilidade'}</div><div class="ag-v" style="color:${gDY>=0?'#34d399':'#f87171'}">${type==='Renda Fixa'?(gApplied>0?(gTotal-gApplied)/gApplied*100:0).toFixed(2)+'%':gDY.toFixed(2)+'%'} <small>${type==='Renda Fixa'?'':'DY'}</small></div></div>
          <div class="ag-stat"><div class="ag-k">% na carteira</div><div class="ag-v" style="color:#c0cce0">${share.toFixed(1)}%</div></div>
        </div>
        <div class="ag-open">⌄</div>
      </summary>
      <div class="ag-body">
        ${type==='Renda Fixa'
          ? `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px">${rfCards||'<div class="es" style="background:#0d111e;border:1px solid #161e2e;border-radius:12px">Nenhum ativo de renda fixa nesta categoria.</div>'}</div>`
          : `<div class="ag-table">
          <div class="tw"><div class="ts"><table>
            <thead><tr><th><span style="cursor:pointer;user-select:none" onclick="toggleAssetSort(${JSON.stringify(type)},'ticker');event.stopPropagation()">Ticker${assetSortIndicator(type,'ticker')}</span></th><th>Tipo</th><th>Setor</th><th>Qtd</th><th>PM</th>
              <th>
                <div style="display:flex;align-items:center;gap:5px">
                  ATUAL
                  <span class="qdot${S.qLoad?' spin':''}" title="Cotações ao vivo · atualiza a cada ${QI}s"></span>
                </div>
              </th>
              <th><span style="cursor:pointer;user-select:none" onclick="toggleAssetSort(${JSON.stringify(type)},'rentability');event.stopPropagation()">Rentab.${assetSortIndicator(type,'rentability')}</span></th><th>Alvo</th><th>Total</th><th>% Cart.</th><th>% Ideal</th><th>Div/mês</th><th>DY</th><th></th></tr></thead>
            <tbody>${rows||'<tr><td colspan="14" style="text-align:center;padding:28px;color:#2e3f58">Nenhum ativo nesta categoria.</td></tr>'}</tbody>
          </table></div></div>
        </div>`}
      </div>
    </details>`;
  }).join('');
  const innerTab=String(S.assetsInnerTab||'patrimonio')==='analise' ? 'analise' : 'patrimonio';
  const patrimonyPanel=`<div class="asset-inner-panel">
    ${frmA()}
    <div class="ag-wrap">${sections||'<div class="es" style="background:#0d111e;border:1px dashed #161e2e;border-radius:12px">Registre compras na aba 💰 Aportes para alimentar esta tela.</div>'}</div>
  </div>`;
  const analysisPanel=`<div class="asset-inner-panel">${analysis}</div>`;
  return`<div class="sh">
    <div>
      <div class="st">Meus Ativos (${S.assets.length})</div>
      <div class="mu" style="font-size:12px;margin-top:4px">Ativos agrupados por categoria. Abra cada bloco para ver os detalhes e editar um item.</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn bgh" style="font-size:12px;padding:7px 12px" onclick="syncAssetsFromAportes(true)">🧮 Recalcular</button>
      <button class="btn bgh" style="font-size:12px;padding:7px 12px" onclick="fetchQuotes(true)">🔄 Atualizar mercado</button>
    </div>
  </div>
  <div class="asset-inner-tabs" role="tablist" aria-label="Subabas de ativos">
    <button class="asset-inner-tab ${innerTab==='patrimonio'?'on':''}" onclick="setAssetsInnerTab('patrimonio')" role="tab" aria-selected="${innerTab==='patrimonio'?'true':'false'}">Patrimônio</button>
    <button class="asset-inner-tab ${innerTab==='analise'?'on':''}" onclick="setAssetsInnerTab('analise')" role="tab" aria-selected="${innerTab==='analise'?'true':'false'}">Análise</button>
  </div>
  ${innerTab==='analise'?analysisPanel:patrimonyPanel}`;
}

function frmP(){
  if(!S.showP) return'';
  const f=S._fp||{},op=(f.operation||f.op||'compra').toLowerCase();
  const fType=normalizeType(f.type||f.asset_type||metaTicker(f.ticker).type||'Ação','Ação');
  const fSector=f.sector||f.asset_sector||metaTicker(f.ticker).sector||'';
  const isRF=fType==='Renda Fixa' || String(fType).includes('Tesouro');
  const isReserve=fType==='Reserva de emergência';
  const accent=typeAccentColor(fType);
  const pTiOnInput=isReserve ? '' : (isRF ? 'applyMetaToAporte()' : 'this.value=this.value.toUpperCase();applyMetaToAporte()');
  const rfSubtype=String(f.rf_subtype||f.bondType||f.sector||f.asset_sector||'Renda Fixa').trim() || 'Renda Fixa';
  const rfSubtypeOptions=['CDB','LIG','LCI','LCA','Tesouro Direto','LC','LF','CRI','CRA','Debênture','Outro'].map(t=>`<option value="${t}" ${rfSubtype===t?'selected':''}>${t}</option>`).join('');
  return`<div class="fc" style="border-color:${accent}55;box-shadow:0 4px 20px ${accent}12">
    <div style="font-size:14px;font-weight:700;margin-bottom:14px;color:#c4b5fd">${S.editPId?'✏️ Editar operação':'➕ Registrar compra / venda'}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin:-2px 0 14px">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="bdg ${bdg(fType)}" style="font-size:12px;padding:4px 10px">${tipoIcon(fType)} ${esc(fType)}</span>
        <span style="font-size:12px;color:#64748b">${typeQuickHint(fType)}</span>
      </div>
      <div style="font-size:11px;color:${accent};border:1px solid ${accent}33;background:${accent}10;border-radius:999px;padding:4px 10px">${isReserve?'fluxo separado':'tipo aprendido e salvo'}</div>
    </div>
    <div class="fg">
      <div><div class="fl">Operação</div><select id="p-op"><option value="compra" ${op==='compra'?'selected':''}>Compra</option><option value="venda" ${op==='venda'?'selected':''}>Venda</option></select></div>
      <div><div class="fl">Tipo do ativo</div><select id="p-ty" onchange="this.dataset.manual='1'; updateAporteType(this.value);">
        ${['Ação','FII','ETF','Renda Fixa','Tesouro Direto','Reserva de emergência','BDR','Crypto','Stock','Reit','Fundos de Investimento'].map(t=>`<option value="${t}" ${fType===t?'selected':''}>${t}</option>`).join('')}
      </select></div>
      <div><div class="fl">Data</div><input id="p-dt" type="date" value="${esc(inputDateValue(f.date||''))}"></div>
      <div><div class="fl">${isReserve?'Nome / destino da reserva':isRF?'Nome do ativo':'Ticker / nome do ativo'}</div><input id="p-ti" placeholder="${isReserve?'ex: Reserva bolsa, Reserva pessoal':isRF?'ex: CDB Porquinho Objetivo':'ex: MXRF11, DIVD11, CDB Banco...'}" value="${esc(isRF?(f.name||f.rf_name||f.assetName||''):(f.ticker||f.name||f.assetName||''))}" oninput="${pTiOnInput}" onblur="${isReserve?'':'applyMetaToAporte()'}"></div>
      ${isRF
        ? `<div><div class="fl">Subtipo</div><select id="p-rf-subtype">${rfSubtypeOptions}</select></div>
           <div><div class="fl">Data da aplicação</div><input id="p-rf-app-date" type="date" value="${esc(inputDateValue(f.rf_application_date||f.rf_aporte_date||f.fixed_application_date||f.date||''))}"></div>
           <div><div class="fl">Data de vencimento</div><input id="p-rf-due" type="date" value="${esc(inputDateValue(f.rf_maturity_date||f.maturityDate||f.fixed_maturity_date||''))}"></div>
           <div><div class="fl">Rentabilidade contratada</div><input id="p-rf-rate" type="text" placeholder="ex: 100% do CDI, CDI + 2%, IPCA + 6%" value="${esc(f.rf_contract_rate||f.rate||'')}"></div>
           <div><div class="fl">Valor aplicado</div><input id="p-rf-applied" type="text" inputmode="decimal" placeholder="ex: 88.031,64" value="${esc(moneyInput(f.rf_applied_value||f.fixed_initial_value||f.price||0))}"></div>
           <div><div class="fl">Valor bruto</div><input id="p-rf-gross" type="text" inputmode="decimal" placeholder="ex: 88.031,64" value="${esc(moneyInput(f.rf_gross_value||f.fixed_gross_value||f.currentValue||f.marketValue||0))}"></div>
           <div><div class="fl">Valor líquido</div><input id="p-rf-liquid" type="text" inputmode="decimal" placeholder="ex: 87.275,52" value="${esc(moneyInput(f.rf_liquid_value||f.fixed_current_value||f.current_value||0))}"></div>
           <div><div class="fl">IR/IOF</div><input id="p-rf-iriof" type="text" inputmode="decimal" placeholder="ex: -756,12 ou 0,00" value="${esc(moneyInput(f.rf_ir_iof||0))}"></div>
           <div><div class="fl">Valor indisponível</div><input id="p-rf-unavailable" type="text" inputmode="decimal" placeholder="ex: 0,00" value="${esc(moneyInput(f.rf_unavailable_value||0))}"></div>
           <div><div class="fl">Ganhos/Perdas</div><input id="p-rf-profit" type="text" inputmode="decimal" placeholder="deixe em branco para calcular automaticamente" value="${esc(f.rf_profit_source==='manual' || f.rf_profit_manual ? moneyInput(f.rf_profit_value||0) : '')}"></div>
           <div><div class="fl">Observação</div><input id="p-rf-note" placeholder="ex: renda fixa lançada manualmente" value="${esc(f.rf_note||f.note||f.decision||'')}"></div>`
        : `${isReserve?`<div><div class="fl">Quantidade</div><input id="p-qt" type="number" value="1" disabled style="opacity:.6"></div>`:`<div><div class="fl">Quantidade</div><input id="p-qt" type="number" placeholder="100" value="${esc(f.qty||'')}"></div>`}
           <div><div class="fl">${isReserve?'Valor reservado':'Preço da operação'}</div><input id="p-pr" type="text" placeholder="${isReserve?'500,00':'10,15'}" value="${f.price?esc(moneyInput(f.price)):''}"></div>
           <div><div class="fl">Setor / classe</div><input id="p-se" placeholder="${isReserve?'bolsa ou pessoal':'ex: ETF, CDB, Papel, Banco'}" value="${esc(fSector)}" oninput="this.dataset.manual='1'"></div>`
      }
    </div>
    ${isReserve?`<div class="fg" style="margin-top:10px">
      <div><div class="fl">Destino da reserva</div><select id="p-rt"><option value="bolsa" ${(String(f.reserveTarget||f.reserve_target||'bolsa')==='bolsa')?'selected':''}>Bolsa / oportunidade</option><option value="pessoal" ${(String(f.reserveTarget||f.reserve_target||'')==='pessoal')?'selected':''}>Pessoal / particular</option></select></div>
      <div><div class="fl">Modo</div><select id="p-rm"><option value="entrada" ${String(f.operation||f.op||'compra').toLowerCase()!=='venda'?'selected':''}>Entrada na reserva</option><option value="saida" ${String(f.operation||f.op||'compra').toLowerCase()==='venda'?'selected':''}>Saída da reserva</option></select></div>
      <div><div class="fl">Observação</div><input id="p-dc" placeholder="ex: reserva de oportunidade, uso pessoal..." value="${esc(f.decision||'')}"></div>
    </div>`:(!isRF?`<div style="margin-top:10px"><div class="fl">Decisão / motivo</div><input id="p-dc" placeholder="ex: rebalanceamento, importação B3, renda fixa..." value="${esc(f.decision||'')}"></div>`:'')}
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn bsv" onclick="svP()">${S.editPId?'Salvar edição':'Salvar operação'}</button>
      <button class="btn bgh" onclick="clP()">Cancelar</button>
    </div>
  </div>`;
}
function aporteExtractRows(){
  const rows=[];
  (S.aportes||[]).forEach((item,index)=>{
    const ticker=String(item.ticker||item.name||item.title||'Movimentação').trim();
    const meta=metaTicker(ticker);
    const kind=aporteMovementKind(item);
    const qty=Math.abs(Number(item.qty)||0);
    const price=Number(item.price)||0;
    const total=Math.abs(Number(item.totalValue ?? item.value ?? (qty*price))||0);

    rows.push({
      id:item.id,

  (S.proventos||[]).forEach((item,index)=>{
    const ticker=String(item.ticker||item.name||'Provento').trim().toUpperCase();
    const asset=(S.assets||[]).find(a=>String(a.ticker||'').trim().toUpperCase()===ticker);

      id:item.id,

      raw:item,

      type:normalizeType(asset?.type||meta.type||'Ação','Ação'),
      sector:String(asset?.sector||meta.sector||'').trim(),

function aportesPagination(total,pageSize=15){
  const pages=Math.max(1,Math.ceil(total/pageSize));

  if(page!==S.aportesPage) S.aportesPage=page;
  const from=total ? ((page-1)*pageSize)+1 : 0;
  const to=Math.min(page*pageSize,total);
  return `<div class="aporte-pagination">
    <div class="aporte-pagination-info">Mostrando ${from}–${to} de ${total} movimentações</div>
    <div class="aporte-pagination-actions">
      <button class="btn bgh" onclick="setAportesPage(${page-1})" ${page<=1?'disabled':''}>← Anterior</button>
      <span class="aporte-page-number">${page} / ${pages}</span>
      <button class="btn bgh" onclick="setAportesPage(${page+1})" ${page>=pages?'disabled':''}>Próximo →</button>
    </div>
  </div>`;
}
function aporteExtractHtml(rows){
  const pageSize=15;

  const page=Math.min(Math.max(1,Number(S.aportesPage)||1),pages);
  const visible=rows.slice((page-1)*pageSize,page*pageSize);
  if(!visible.length) return `<div class="aporte-empty">Nenhuma movimentação encontrada para esta busca ou filtro.</div>`;
  return `<div class="aporte-extract">${visible.map(aporteHistoryCard).join('')}</div>${aportesPagination(rows.length,pageSize)}`;
}

function estimateGoalMonths(startValue,targetValue,monthlyAporte,annualVar){
  const target=Math.max(0,Number(targetValue)||0);
  let value=Math.max(0,Number(startValue)||0);
  const aporte=Math.max(0,Number(monthlyAporte)||0);
  const yearly=Math.max(0,Number(annualVar)||0);
  if(!target) return null;
  if(value>=target) return 0;
  const rate=yearly>0 ? Math.pow(1+yearly/100,1/12)-1 : 0;
  if(aporte<=0 && rate<=0) return null;
  for(let m=1;m<=600;m++){
    value = value * (1 + rate) + aporte;
    if(value>=target) return m;
  }
  return null;
}
function formatGoalMonths(months){
  if(months===0) return 'agora';
  if(months===null||months===undefined) return 'sem estimativa';
  const y=Math.floor(months/12);
  const m=months%12;
  const parts=[];
  if(y) parts.push(`${y} ano${y>1?'s':''}`);
  if(m) parts.push(`${m} mês${m>1?'es':''}`);
  return parts.length?parts.join(' e '):'menos de 1 mês';
}
function goalProgressText(current,target){
  const t=Number(target)||0;
  const c=Number(current)||0;
  const falta=Math.max(0,t-c);
  const prog=t>0?Math.min(100,(c/t)*100):0;
  return {falta,prog};
}

function normalizeAllocationItems(items){
  const defaults = [
    {type:'FII', pct:40},
    {type:'ETF', pct:20},
    {type:'Ação', pct:25},
    {type:'BDR', pct:5},
    {type:'Renda Fixa', pct:10},
  ];
  const src = Array.isArray(items)
    ? items
    : (items && typeof items==='object' ? Object.entries(items).map(([type,pct])=>({type,pct})) : defaults);
  const seen = new Set();
  const out = src.map(it=>({
    type: normalizeType(it?.type||it?.label||'',''),
    pct: Math.max(0, Number(it?.pct ?? it?.value ?? it?.percent ?? it?.weight) || 0)
  })).filter(it=>{
    if(!it.type || seen.has(it.type)) return false;
    seen.add(it.type);
    return true;
  });
  return out.length ? out : defaults;
}

function normalizeAllocationGoal(){
  const items=allocationGoalItems();
  if(!items.length) return toast('Adicione ao menos uma categoria antes de normalizar.');
  const total=items.reduce((s,it)=>s+Number(it.pct||0),0);
  if(total<=0){
    const share=100/items.length;
    let acc=0;
    items.forEach((it,idx)=>{
      if(idx===items.length-1) it.pct=Number((100-acc).toFixed(1));
      else{
        const v=Number(share.toFixed(1));
        it.pct=v;
        acc+=v;
      }
    });
  }else{
    let acc=0;
    items.forEach((it,idx)=>{
      if(idx===items.length-1) it.pct=Number((100-acc).toFixed(1));
      else{
        const v=Number(((Number(it.pct)||0)/total*100).toFixed(1));
        it.pct=v;
        acc+=v;
      }
    });
  }
  saveAllocationGoalItems(items);
  toast('✅ Distribuição normalizada para 100%');
}

      note:String(p.note||p.observation||'').trim(),
      assetType
    };
  }).filter(row=>row.value>0).sort((a,b)=>(b.date||'').localeCompare(a.date||'')||b.index-a.index);
}
function filteredDividendRows(rows=dividendPremiumRows()){
  const filter=String(S.dividendFilter||'all');
  const period=String(S.dividendPeriod||'all');
  const search=rfPosNorm(S.dividendSearch||'');
  const now=new Date();
  const currentKey=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const start12=new Date(now.getFullYear(),now.getMonth()-11,1);
  return rows.filter(row=>{
    if(filter==='dividend' && row.canonical!=='Dividendo') return false;
    if(filter==='jcp' && row.canonical!=='JCP') return false;
    if(filter==='income' && row.canonical!=='Rendimento') return false;
    if(filter==='other' && ['Dividendo','JCP','Rendimento'].includes(row.canonical)) return false;
    if(period==='month' && row.monthKey!==currentKey) return false;
    if(period==='12m' && (!row.dt || row.dt<start12)) return false;
    if(search){
      const month=row.dt?row.dt.toLocaleDateString('pt-BR',{month:'long',year:'numeric'}):'';
      const hay=rfPosNorm(`${row.ticker} ${row.name} ${row.type} ${month} ${row.date} ${row.note} ${row.source} ${fmt(row.value)}`);
      if(!hay.includes(search)) return false;
    }
    return true;
  });
}

function dividendsByAssetView(rows){
  const groups=new Map();
  rows.forEach(row=>{
    const key=row.ticker||row.name;
    if(!groups.has(key)) groups.set(key,{ticker:row.ticker,name:row.name,total:0,count:0,lastDate:'',rows:[]});
    const group=groups.get(key);
    group.total+=row.value; group.count++; group.rows.push(row);
    if(row.date>group.lastDate) group.lastDate=row.date;
  });
  const total=rows.reduce((sum,row)=>sum+row.value,0);
  const html=[...groups.values()].sort((a,b)=>b.total-a.total).map((group,index)=>{
    const share=total>0?group.total/total*100:0;
    return `<details class="div-asset-group">
      <summary>
        <div class="div-asset-rank">#${index+1}</div>
        <div><div class="div-asset-name">${esc(group.ticker)}</div><div class="div-asset-sub">${esc(group.name)} · ${share.toFixed(1)}% do período</div></div>
        <div class="div-asset-stat"><span>Total recebido</span><strong>${fmt(group.total)}</strong></div>
        <div class="div-asset-stat"><span>Lançamentos</span><strong>${group.count}</strong></div>
        <div class="div-asset-stat"><span>Média</span><strong>${fmt(group.total/group.count)}</strong></div>

        <div class="ag-open">⌄</div>

  return html?`<div class="div-asset-list">${html}</div>`:dividendEmptyState('Nenhum ativo com proventos encontrado.', 'Tente mudar a visão, os filtros ou a busca.');

function dividendMonthlyRows(rows=dividendPremiumRows()){
  const map=new Map();
  rows.forEach(row=>{
    if(!row.monthKey) return;
    if(!map.has(row.monthKey)) map.set(row.monthKey,{key:row.monthKey,total:0,count:0,payers:new Map()});
    const month=map.get(row.monthKey); month.total+=row.value; month.count++;
    month.payers.set(row.ticker,(month.payers.get(row.ticker)||0)+row.value);
  });
  const goal=passiveIncomeGoalTarget();
  const months=[...map.values()].sort((a,b)=>b.key.localeCompare(a.key));
  return months.map((row,index)=>{
    const previous=months[index+1]?.total||0;
    const comparison=previous>0?(row.total-previous)/previous*100:null;
    const best=[...row.payers.entries()].sort((a,b)=>b[1]-a[1])[0]||null;
    const dt=new Date(`${row.key}-01T12:00:00`);
    return {...row,label:dt.toLocaleDateString('pt-BR',{month:'long',year:'numeric'}),comparison,best,goal,goalPct:goal>0?row.total/goal*100:0};
  });
}

function metasTab(){

  }).join(' ');

  const metaPatAporte=Number(mp.aporte)||0;
  const metaPatVar=Number(mp.annualVar)||0;
  const metaPatTime=estimateGoalMonths(tC,metaPatValor,metaPatAporte,metaPatVar);
  const metaPat=goalProgressText(tC,metaPatValor);
  const passiveGoal=passiveIncomeGoalStats();
  const allocItems=allocationGoalItems();
  const {total:allocTotal,map:allocMap}=allocationActualByType();
  const projCurrent=S.assets
    .filter(a=>selectedProTypes.includes(a.type))
    .reduce((s,a)=>s+(((Number(a.qty)||0)*(Number(a.current_price)||0)*(Number(a.dy)||0)/100)/12),0);
  const allocRows=allocItems.map((it,idx)=>{
    const target=Number(it.pct)||0;
    const actual=allocTotal>0 ? ((Number(allocMap[it.type])||0)/allocTotal)*100 : 0;
    const diff=actual-target;
    const color=ALLOC_COLORS[idx%ALLOC_COLORS.length];
    const barWidth=Math.max(4, Math.min(100, Math.abs(diff)));
    return `<tr>
      <td style="font-weight:700;color:#e2eaf6"><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${color};margin-right:8px;vertical-align:middle"></span>${esc(it.type)}</td>

      <td>${actual.toFixed(1)}%</td>
      <td class="${diff>=0?'gn':'rd'}" style="font-weight:700">${diff>=0?'+':''}${diff.toFixed(1)}%</td>
      <td><div class="bwr" style="width:110px"><div class="bfr" style="width:${barWidth}%;background:${diff>=0?'#34d399':'#f87171'}"></div></div></td>
    </tr>`;
  }).join('');

  return`<div style="font-size:14px;font-weight:700;margin-bottom:4px">🎯 Metas</div>

function rentabilidadeTab(){
  const bench=String(S.rentBench||'CDI');
  const type=String(S.rentType||'all');
  const period=String(S.rentPeriod||'all');
  const data=rentabilityHistory(type, period, bench);
  const view=Array.isArray(data.view)?data.view:[];
  const points=Array.isArray(data.points)?data.points:[];
  const benchSeries=Array.isArray(data.benchSeries)?data.benchSeries:[];
  const current=data.current || {cumReturn:0, delta:0, costBasis:0, currentValue:0, proventos:0};
  const benchNow=data.currentBench || 0;
  const gap=current.cumReturn - benchNow;
  const return12m=data.return12m || 0;
  const currentMonth=current.delta || 0;
  const provCurrent=Number(current.proventos)||0;
  const yearsList=(data.years||[]).filter(r=>Number.isFinite(Number(r.annual)));
  const bestYear=yearsList.reduce((best,row)=>!best || Number(row.annual||-999)>Number(best.annual||-999)?row:best,null);
  const worstYear=yearsList.reduce((worst,row)=>!worst || Number(row.annual||999)<Number(worst.annual||999)?row:worst,null);
  const assetsByValue=[...S.assets].map(a=>({
    ticker:a.ticker,
    value:(Number(a.qty)||0)*(Number(a.current_price)||0),
    dy:Number(a.dy)||0,
    type:normalizeType(a.type||'Ação','Ação'),
    sector:String(a.sector||'').trim()||'—'
  })).sort((a,b)=>b.value-a.value);
  const topAsset=assetsByValue[0];
  const top3Value=assetsByValue.slice(0,3).reduce((s,a)=>s+a.value,0);
  const top3Share=data.current?.currentValue>0 ? (top3Value/(Number(data.current.currentValue)||top3Value))*100 : 0;
  const actualByType=S.assets.reduce((acc,a)=>{
    const ty=normalizeType(a.type||'Ação','Ação');
    const v=(Number(a.qty)||0)*(Number(a.current_price)||0);
    acc[ty]=(acc[ty]||0)+v;
    return acc;
  },{});
  const allocItems=allocationGoalItems();
  const allocTarget=Object.fromEntries(allocItems.map(it=>[it.type, Number(it.pct)||0]));
  const allocWarning=Object.keys(allocTarget).map(ty=>{
    const total=Object.values(actualByType).reduce((s,v)=>s+v,0);
    const actual=total>0 ? ((actualByType[ty]||0)/total)*100 : 0;
    const diff=actual-(allocTarget[ty]||0);
    return {ty, actual, target:allocTarget[ty]||0, diff};
  }).sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff))[0];
  const sideCards=[
    {
      title:'Rentabilidade total',
      value:fmtP(current.cumReturn||0),
      foot:`Inclui proventos recebidos · ${gap>=0?'Acima':'Abaixo'} do ${bench}: ${fmtP(gap||0)}`,
      color:'#34d399',
      icon:'📈'
    },
    {
      title:'Últimos 12 meses',
      value:fmtP(return12m||0),
      foot:`Variação acumulada no recorte de 12 meses · proventos: ${fmt(provCurrent)}`,
      color:'#60a5fa',
      icon:'🗓️'
    },
    {
      title:'Último mês',
      value:fmtP(currentMonth||0),
      foot:'Mudança estimada no fechamento do mês',
      color:(currentMonth||0)>=0?'#34d399':'#f87171',
      icon:'📅'
    },
  ];
  const concentrationNote=topAsset
    ? `Concentração: top 3 com ${top3Share.toFixed(1)}% da carteira. Maior posição: ${topAsset.ticker} com ${fmt(topAsset.value)} (${normalizeType(topAsset.type||'Ação','Ação')}).`
    : 'Concentração: sem posições ainda.';

  const chartData=view.length?view:points;
  const chartLabels=chartData.map(p=>p.label);
  const chartSeries=[
    {name:'Carteira', values:chartData.map(p=>p.cumReturn||0), color:'#8da2ff', fill:'rgba(141,162,255,.12)', width:2.5, points:false},
    {name:bench, values:benchSeries.length?benchSeries:rentBenchSeries(chartData.length, bench), color:'#fbbf24', width:2.2, points:false},
  ];

  const yearsRows=(data.years||[]).map(row=>{
    const cells=row.months.map((p,idx)=>{
      if(!p) return `<td style="color:#2e3f58">-</td>`;
      const v=p.delta||0;
      return `<td class="${v>=0?'gn':'rd'}" style="font-weight:${Math.abs(v)>0.005?700:500}">${fmtP(v)}</td>`;
    }).join('');
    return `<tr>
      <td style="font-weight:800;color:#e2eaf6">${row.year}</td>
      ${cells}
      <td style="font-weight:800;color:#e2eaf6">${fmtP(row.annual||0)}</td>
      <td style="font-weight:800;color:${(row.provAnnual||0)>=0?'#fbbf24':'#f87171'}">${fmt(row.provAnnual||0)}</td>

      <td style="font-weight:800;color:${(row.acum||0)>=0?'#34d399':'#f87171'}">${fmtP(row.acum||0)}</td>
    </tr>`;
  }).join('');

  const chartLegend=`<div class="pleg" style="margin-top:0">
    <div class="pli"><span class="pd" style="background:#8da2ff"></span>Carteira</div>
    <div class="pli"><span class="pd" style="background:#fbbf24"></span>${esc(bench)} estimado</div>
    <div class="pli"><span class="pd" style="background:#64748b"></span>Baseado na posição atual</div>
  </div>`;

  return`<div style="font-size:15px;font-weight:700;margin-bottom:4px">📈 Rentabilidade</div>
  <div class="mu" style="font-size:13px;margin-bottom:18px">Controle da carteira com evolução mensal, comparação estimada e histórico por ano. A rentabilidade da carteira já soma os proventos recebidos no cálculo.</div>

  <div class="rent-layout">

      ${sideCards.map(c=>`<div class="card al dash-card rent-card" style="border-left-color:${c.color}">

        </div>
        <div class="dash-value">
          <div class="cv" style="color:${c.color}">${c.value}</div>
        </div>
        <div class="dash-foot">${esc(c.foot)}</div>
      </div>`).join('')}
    </div>

    <div class="cc rent-main">
      <div class="sh" style="margin-bottom:12px">
        <div>
          <div class="st">Rentabilidade comparada com índices</div>
          <div class="mu" style="font-size:12px">Histórico estimado a partir dos dados lançados na carteira e dos proventos recebidos.</div>
        </div>
        <div class="rent-filters">
          <select onchange="setRentPeriod(this.value)">
            <option value="all" ${period==='all'?'selected':''}>Desde o início</option>
            <option value="12" ${String(period)==='12'?'selected':''}>12M</option>
            <option value="24" ${String(period)==='24'?'selected':''}>24M</option>
            <option value="36" ${String(period)==='36'?'selected':''}>36M</option>
            <option value="60" ${String(period)==='60'?'selected':''}>60M</option>
          </select>
          <select onchange="setRentType(this.value)">
            ${['all','Ação','FII','ETF','Renda Fixa','BDR','Crypto'].map(t=>`<option value="${esc(t)}" ${type===t?'selected':''}>${t==='all'?'Todos os tipos':t}</option>`).join('')}
          </select>
          <select onchange="setRentBench(this.value)">
            ${Object.keys(RENT_BENCH).map(b=>`<option value="${esc(b)}" ${bench===b?'selected':''}>${esc(b)}</option>`).join('')}

      </div>

      ${chartLegend}
      <div class="rent-chartbox">
        ${points.length ? lineChart(chartSeries, chartLabels) : '<div class="es" style="padding:42px 18px">Cadastre aportes e proventos para ver a evolução da rentabilidade.</div>'}
      </div>
      <div class="mu" style="font-size:11px;margin-top:6px;line-height:1.35">${topAsset ? `Concentração: top 3 ${top3Share.toFixed(1)}% · Maior posição: ${topAsset.ticker} (${normalizeType(topAsset.type||'Ação','Ação')}).` : 'Concentração: sem posições ainda.'}</div>
    </div>
  </div>

  <details class="sec" style="margin-top:14px">

    <div class="sec-body">

      </table></div></div>
    </div>
  </details>`;
}

function calcRebalance(){
  const aporte=Number(document.getElementById('reb-val')?.value)||0;
  const out=document.getElementById('reb-out'); if(!out) return;
  if(aporte<=0){out.innerHTML='<div class="rebalance-empty">Digite um valor maior que zero para iniciar a simulação.</div>';return;}
  const analysis=prudentContributionAnalysis();
  if(!analysis.rows.length||analysis.total<=0){out.innerHTML='<div class="rebalance-empty">Dados insuficientes para analisar a carteira. Confira quantidade e valor atual dos ativos.</div>';return;}
  const list=analysis.candidates;
  const insufficient=analysis.insufficient;
  const avoided=analysis.avoided;
  const summary=`<div class="rebalance-summary">
    <div class="rebalance-summary-card"><div class="rebalance-summary-label">Valor analisado</div><div class="rebalance-summary-value">${fmt(aporte)}</div><div class="rebalance-summary-note">Base informada para a simulação.</div></div>
    <div class="rebalance-summary-card"><div class="rebalance-summary-label">Ativos para estudo</div><div class="rebalance-summary-value">${list.length}</div><div class="rebalance-summary-note">Até cinco opções que passaram pelos filtros.</div></div>
    <div class="rebalance-summary-card"><div class="rebalance-summary-label">Evitados por concentração</div><div class="rebalance-summary-value">${avoided}</div><div class="rebalance-summary-note">Peso acima do limite prudente.</div></div>
    <div class="rebalance-summary-card"><div class="rebalance-summary-label">Dados insuficientes</div><div class="rebalance-summary-value">${insufficient}</div><div class="rebalance-summary-note">Sem base completa para análise.</div></div>
  </div>`;
  if(!list.length){
    out.innerHTML=`${summary}<div class="rebalance-empty">Nenhum ativo atende aos critérios prudentes no momento. Revise concentração, metas e dados disponíveis antes de aportar.</div>`;
    return;
  }
  const scoreSum=list.reduce((sum,row)=>sum+row.score,0);
  const studyRows=list.map(row=>{
    const value=scoreSum>0 ? aporte*(row.score/scoreSum) : 0;
    const pctClass=row.pct<0?'rd':row.pct>0?'gn':'';
    return `<div class="rebalance-study-row">
      <div class="rebalance-study-asset">
        <div class="rebalance-study-ticker">${esc(row.ticker)}</div>
        <div class="rebalance-study-type">${esc(row.type)}${row.sector&&row.sector!=='—'?` · ${esc(row.sector)}`:''}</div>
      </div>
      <div class="rebalance-study-stat"><div class="rebalance-study-stat-label">Peso atual</div><div class="rebalance-study-stat-value">${row.share.toFixed(1)}%</div></div>
      <div class="rebalance-study-stat"><div class="rebalance-study-stat-label">Rentab.</div><div class="rebalance-study-stat-value ${pctClass}">${fmtP(row.pct)}</div></div>
      <div class="rebalance-study-stat"><div class="rebalance-study-stat-label">DY</div><div class="rebalance-study-stat-value">${row.dy>0?row.dy.toFixed(2)+'%':'—'}</div></div>
      <div class="rebalance-study-stat"><div class="rebalance-study-stat-label">Sinal prudente</div><span class="analysis-pill signal ${esc(row.signal.tone)}">${esc(row.signal.label)}</span></div>
      <div class="rebalance-study-stat"><div class="rebalance-study-stat-label">Valor para estudo</div><div class="rebalance-study-value">${fmt(value)}</div></div>
      <div class="rebalance-study-criteria">${esc(row.criteria.slice(0,4).join(' · '))}</div>
    </div>`;
  }).join('');
  out.innerHTML=`${summary}
    <div class="rebalance-study">
      <div class="rebalance-study-head">
        <div>
          <div class="rebalance-study-title">Simulação prudente</div>
          <div class="rebalance-study-sub">Distribuição indicativa para estudo, sem ordem automática de execução.</div>
        </div>
        <span class="analysis-pill muted">${list.length} ativo${list.length===1?'':'s'}</span>
      </div>
      <div class="rebalance-study-labels"><div>Ativo</div><div>Peso atual</div><div>Rentab.</div><div>DY</div><div>Sinal prudente</div><div>Valor para estudo</div><div>Critérios considerados</div></div>
      ${studyRows}
      <div class="rebalance-dy-note">O DY é usado apenas como apoio. Qualidade do ativo, recorrência dos pagamentos e riscos devem ser avaliados separadamente.</div>
    </div>`;
}

function getAI(){
  const{tC,tI,tGP,mD,aD,avgDY,tG}=cx();
  const rec=proventoStats();
  if(!S.assets.length){ S.aiText='Cadastre seus ativos primeiro para gerar uma análise.'; render(); return; }
  const focus=String(S.aiFocus||'geral');
  const porTipo={},por=S.assets.map(a=>({ticker:a.ticker,type:a.type,valor:assetCurrentValue(a),divMes:(assetCurrentValue(a)*(a.dy/100))/12,dy:Number(a.dy)||0,var:a.avg_price>0?((a.current_price-a.avg_price)/a.avg_price)*100:0,sector:String(a.sector||'').trim()||'—'})).sort((a,b)=>b.valor-a.valor);
  por.forEach(a=>{const ty=normalizeType(a.type||'Ação','Ação'); porTipo[ty]=(porTipo[ty]||0)+a.valor;});
  const maior=por[0],maiorPct=tC>0?(maior.valor/tC)*100:0;
  const pior=por[por.length-1];
  const top3=por.slice(0,3);
  const top3Pct=tC>0?(top3.reduce((s,a)=>s+a.valor,0)/tC)*100:0;
  const fiisPct=tC>0?((porTipo['FII']||0)/tC)*100:0,acoesPct=tC>0?((porTipo['Ação']||0)/tC)*100:0;
  const divGoal=Number(S.divGoal)||0,faltaDiv=Math.max(0,divGoal-mD);
  const alvoPat=divGoal>0&&avgDY>0?(divGoal*12)/(avgDY/100):0;
  const lucroTotal=tG + rec.total;
  const retornoTotalPct=tI>0?(lucroTotal/tI)*100:0;
  const allocItems=allocationGoalItems();
  const allocTarget=Object.fromEntries(allocItems.map(it=>[it.type, Number(it.pct)||0]));
  const atualByType=S.assets.reduce((acc,a)=>{
    const ty=normalizeType(a.type||'Ação','Ação');
    const v=(Number(a.qty)||0)*(Number(a.current_price)||0);
    acc[ty]=(acc[ty]||0)+v;
    return acc;
  },{});
  const allocTotal=Object.values(atualByType).reduce((s,v)=>s+v,0);
  const allocDiffs=Object.keys(allocTarget).map(ty=>{
    const actual=allocTotal>0 ? ((atualByType[ty]||0)/allocTotal)*100 : 0;
    return {type:ty, target:allocTarget[ty], actual, diff:actual-(allocTarget[ty]||0)};
  }).sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
  const worstAlloc=allocDiffs[0];
  const benchmark=String(S.rentBench||'CDI');
  const rentData=rentabilityHistory(String(S.rentType||'all'), String(S.rentPeriod||'all'), benchmark);
  const rentGap=(rentData.current?.cumReturn||0)-(rentData.currentBench||0);
  const L=[];
  L.push('📊 ANÁLISE RÁPIDA DA CARTEIRA');
  L.push(`Patrimônio atual: ${fmt(tC)} | Resultado total: ${fmtP(retornoTotalPct)}`);
  L.push(`Lucro total: ${fmt(lucroTotal)} (ganho de capital + proventos)`);

  L.push(`DY médio da carteira: ${avgDY.toFixed(2)}%`);
  L.push(`Top 3 posições concentram ${top3Pct.toFixed(1)}% da carteira.`);
  if(focus==='renda') L.push(`Foco atual: renda passiva e proventos.`);
  if(focus==='rebalancear') L.push(`Foco atual: rebalanceamento e aportes abaixo da meta.`);
  if(focus==='concentracao') L.push(`Foco atual: concentração e risco da carteira.`);
  L.push('');
  L.push('⚖️ ALOCAÇÃO ATUAL');
  Object.entries(porTipo).sort((a,b)=>b[1]-a[1]).forEach(([tipo,valor])=>L.push(`• ${tipo}: ${((valor/tC)*100).toFixed(1)}% (${fmt(valor)})`));
  if(worstAlloc) L.push(`• Maior desvio da meta: ${worstAlloc.type} com ${worstAlloc.diff>=0?'+':''}${worstAlloc.diff.toFixed(1)} p.p.`);
  L.push('');
  L.push('🔎 O QUE OBSERVAR');
  if(maiorPct>20) L.push(`• Concentração alta em ${maior.ticker}: ${maiorPct.toFixed(1)}% da carteira.`);
  else L.push(`• Maior posição: ${maior.ticker} com ${maiorPct.toFixed(1)}% — concentração sob controle.`);
  if(S.assets.length<8) L.push('• Poucos ativos. Para renda passiva consistente, 10+ ativos de setores diferentes ajudam a reduzir risco.');
  if(fiisPct>60) L.push('• FIIs com peso muito alto (>60%). Isso aumenta a sensibilidade a juros e imóveis.');
  if(acoesPct>70) L.push('• Ações com peso muito alto. A renda tende a oscilar mais com resultados trimestrais.');
  if(avgDY>12) L.push('• DY médio elevado (>12%). Vale conferir se os rendimentos são recorrentes e não pontuais.');
  if(avgDY>0&&avgDY<5) L.push('• DY médio baixo. Novos aportes em ativos de renda podem acelerar a renda passiva.');
  if(rentGap!==0) L.push(`• ${rentGap>=0?'Acima':'Abaixo'} do ${benchmark} em ${fmtP(rentGap)} no recorte atual de rentabilidade.`);
  L.push('');
  if(divGoal>0){
    L.push(`💰 OBJETIVO: ${fmt(divGoal)}/mês`);
    if(mD>=divGoal) L.push(`• ✅ Objetivo atingido! Foco agora é sustentabilidade e diversificação da renda.`);
    else{ L.push(`• Falta ${fmt(faltaDiv)}/mês para o objetivo.`); if(alvoPat>0) L.push(`• Patrimônio estimado para atingir o objetivo com DY atual: ${fmt(alvoPat)} (falta ${fmt(Math.max(0,alvoPat-tC))})`); }
    L.push('');
  }
  L.push('✅ PRIORIDADES PARA O PRÓXIMO APORTE');
  if(allocDiffs.length){
    allocDiffs.slice(0,3).forEach(a=>{
      if(Math.abs(a.diff)<0.5) return;
      if(a.diff<0) L.push(`• Reforçar ${a.type}: está ${Math.abs(a.diff).toFixed(1)} p.p. abaixo da meta.`);
      else L.push(`• Segurar ${a.type}: está ${a.diff.toFixed(1)} p.p. acima da meta.`);
    });
  }
  if(maiorPct>20) L.push(`• Evite aumentar ${maior.ticker} agora; ela já lidera a concentração.`);
  if(top3Pct>70) L.push('• Top 3 posições muito concentradas. Considere distribuir os próximos aportes entre categorias abaixo da meta.');
  if(pior) L.push(`• Posição menor e potencialmente negligenciada: ${pior.ticker} (${fmt(pior.valor)}) pode merecer revisão.`);
  if(focus==='renda'){
    L.push('• Priorize ativos com proventos recorrentes e boa previsibilidade de fluxo.');
    if(avgDY>0) L.push(`• Com DY médio atual de ${avgDY.toFixed(2)}%, a renda estimada continua sensível a novas compras nessa taxa.`);
  }
  if(focus==='rebalancear'){
    const under=allocDiffs.filter(a=>a.diff<0).sort((a,b)=>a.diff-b.diff)[0];
    if(under) L.push(`• Comece pelo maior déficit: ${under.type} está ${Math.abs(under.diff).toFixed(1)} p.p. abaixo da meta.`);
    L.push('• Seus próximos aportes podem servir para aproximar a carteira do desenho-alvo sem vender nada.');
  }
  if(focus==='concentracao'){
    L.push(`• ${top3Pct.toFixed(1)}% da carteira está no top 3. Vale olhar se isso está confortável para seu perfil.`);
    if(maiorPct>20) L.push(`• ${maior.ticker} sozinho já representa ${maiorPct.toFixed(1)}%.`);
  }
  L.push('• Registre o motivo de cada compra na aba Aportes para acompanhar a estratégia ao longo do tempo.');
  if(focus==='renda') L.push('• Quando olhar um ativo novo, compare sempre contribuição mensal estimada, volatilidade e peso na carteira.');
  L.push('');
  L.push('⚠️ Análise automática. Não constitui recomendação de investimento. Consulte um profissional habilitado.');
  S.aiText=L.join('\n'); render();
}

  });
}

function showPwaUpdateNotice(registration){
  if(!registration?.waiting || document.getElementById('pwa-update-notice')) return;
  const notice=document.createElement('div');
  notice.id='pwa-update-notice';
  notice.setAttribute('role','status');
  notice.style.cssText=[
    'position:fixed',
    `bottom:${window.matchMedia('(max-width:700px)').matches?'calc(76px + env(safe-area-inset-bottom))':'18px'}`,
    'left:50%',
    'transform:translateX(-50%)',
    'z-index:99999',
    'width:min(430px,calc(100% - 24px))',
    'display:flex',
    'align-items:center',
    'justify-content:space-between',
    'gap:12px',
    'padding:10px 12px',
    'border:1px solid #26364d',
    'border-radius:13px',
    'background:#0c1727',
    'box-shadow:0 14px 40px rgba(0,0,0,.38)',
    'color:#dbeafe',
    'font:600 12px/1.35 system-ui,sans-serif'
  ].join(';');
  const text=document.createElement('span');
  text.textContent='Nova versão disponível.';
  const button=document.createElement('button');
  button.type='button';
  button.textContent='Atualizar agora';
  button.style.cssText='flex:0 0 auto;border:0;border-radius:9px;padding:8px 10px;background:#38bdf8;color:#062033;font-weight:850;cursor:pointer';
  button.addEventListener('click',()=>{
    button.disabled=true;
    button.textContent='Atualizando...';
    registration.waiting?.postMessage({type:'SKIP_WAITING'});
  });
  notice.append(text,button);
  document.body.appendChild(notice);
}
function watchPwaUpdate(registration){
  if(registration.waiting && navigator.serviceWorker.controller) showPwaUpdateNotice(registration);
  registration.addEventListener('updatefound',()=>{
    const worker=registration.installing;
    if(!worker) return;
    worker.addEventListener('statechange',()=>{
      if(worker.state==='installed' && navigator.serviceWorker.controller){
        showPwaUpdateNotice(registration);
      }
    });
  });
}

if('serviceWorker' in navigator && location.protocol!=='file:'){
  const hadServiceWorkerController=!!navigator.serviceWorker.controller;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(hadServiceWorkerController && navigator.serviceWorker.controller && !window.__swReloaded){
      window.__swReloaded = true;
      window.location.reload();
    }
  });
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(reg=>{
      watchPwaUpdate(reg);
      if(reg && reg.update) reg.update().catch(()=>{});
    }).catch(()=>{});
  });
}
