<title>📈 Carteira de Investimentos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2eaf6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;font-size:14px;overflow-x:hidden}
button{cursor:pointer;font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:#0d111e}::-webkit-scrollbar-thumb{background:#1e2a3d;border-radius:2px}
.hdr{background:#0d111e;border-bottom:1px solid #161e2e;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 4px 24px rgba(0,0,0,.5)}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:16px}

table{width:100%;border-collapse:collapse;font-size:13px;min-width:560px}
thead tr{background:#090c15}

tbody tr{transition:background .1s}tbody tr:hover{background:#0f1728}tbody tr:last-child td{border-bottom:none}
.hist-monthly{min-width:1040px}
.hist-monthly th,.hist-monthly td{text-align:center;white-space:nowrap}
.hist-monthly th:first-child,.hist-monthly td:first-child{
  position:sticky;left:0;z-index:2;text-align:left;

}

.bdg{border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600}
.bac{background:rgba(52,211,153,.08);color:#34d399;border:1px solid rgba(52,211,153,.18)}
.bfi{background:rgba(96,165,250,.08);color:#60a5fa;border:1px solid rgba(96,165,250,.18)}

.btn:hover{opacity:.85;transform:translateY(-1px)}.btn:active{transform:translateY(0)}
.bp{background:linear-gradient(135deg,#3730a3,#4f46e5);color:#c7d2fe;box-shadow:0 2px 14px rgba(99,102,241,.3)}

.bexp{background:#111828;color:#fbbf24;border:1px solid rgba(251,191,36,.2);font-size:12px;padding:7px 12px}
.bimp{background:#111828;color:#60a5fa;border:1px solid rgba(96,165,250,.2);font-size:12px;padding:7px 12px}
.bb3{background:#111828;color:#34d399;border:1px solid rgba(52,211,153,.22);font-size:12px;padding:7px 12px}
.binst{background:#111828;color:#a5b4fc;border:1px solid rgba(99,102,241,.28);font-size:12px;padding:7px 12px}
.bi{background:transparent;border:1px solid #1e2a3d;border-radius:7px;padding:3px 9px;color:#64748b;font-size:13px}
.bdi{background:transparent;border:1px solid rgba(127,29,29,.5);border-radius:7px;padding:3px 9px;color:#f87171;font-size:13px}
.fc{background:#090c15;border:1px solid #312e81;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 4px 20px rgba(99,102,241,.08)}
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.fl{font-size:11px;color:#3d5472;margin-bottom:4px;font-weight:500}
input,select{background:#0d111e;border:1px solid #1e2a3d;border-radius:9px;padding:8px 11px;color:#e2eaf6;font-size:13px;width:100%;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus{border-color:#4f46e5;outline:none;box-shadow:0 0 0 3px rgba(79,70,229,.15)}
input:disabled{opacity:.45;cursor:not-allowed}
input::placeholder{color:#2e3f58}select option{background:#0d111e}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:stretch}
@media(max-width:640px){.cg{grid-template-columns:1fr}}
.cc{background:#0d111e;border:1px solid #161e2e;border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;min-height:100%}
.cc>.tw{flex:1;min-height:0}
.ct{font-size:11px;font-weight:600;color:#3d5472;margin-bottom:12px;text-transform:uppercase;letter-spacing:.07em}
.ag-wrap{display:flex;flex-direction:column;gap:12px}

.ag>summary{list-style:none;display:flex;align-items:center;gap:14px;padding:18px 18px;cursor:pointer;flex-wrap:wrap}
.ag>summary::-webkit-details-marker{display:none}
.ag-left{display:flex;align-items:center;gap:12px;flex:1 1 240px;min-width:220px}
.ag-ico{width:38px;height:38px;border-radius:12px;background:#111828;border:1px solid #1e2a3d;display:flex;align-items:center;justify-content:center;font-size:18px;flex:none}
.ag-name{font-size:19px;font-weight:800;line-height:1.1}
.ag-sub{font-size:12px;color:#64748b;margin-top:4px}

.ag-stat{min-width:0}

.ag-v{font-size:15px;font-weight:800;line-height:1.1;white-space:nowrap}
.ag-v small{font-size:11px;font-weight:700;color:#64748b;margin-left:6px}
.ag-open{width:32px;height:32px;border-radius:999px;border:1px solid #1e2a3d;background:#111828;color:#c0cce0;display:flex;align-items:center;justify-content:center;flex:none;transition:transform .18s}
.ag[open] .ag-open{transform:rotate(180deg)}
.ag-body{padding:0 14px 14px}
.ag-table{margin-top:0}
.ag-table .ts{border-radius:10px}

.db{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.dbl{font-size:12px;color:#c0cce0;min-width:62px;font-weight:600}
.dbt{flex:1;background:#111828;border-radius:4px;height:6px;overflow:hidden}
.dbf{height:100%;border-radius:4px}.dbv{font-size:12px;color:#64748b;min-width:70px;text-align:right}
.pleg{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.pli{display:flex;align-items:center;gap:5px;font-size:12px;color:#64748b}
.pd{width:8px;height:8px;border-radius:2px}
.gn{color:#34d399}.rd{color:#f87171}.am{color:#fbbf24}.pu{color:#818cf8}.bl{color:#60a5fa}.mu{color:#64748b}.di{color:#3d5472}
.bwr{background:#111828;border-radius:3px;height:5px;width:70px;overflow:hidden;display:inline-block}
.bfr{height:100%;background:#fbbf24}
.es{text-align:center;padding:40px 20px;color:#3d5472;line-height:1.7}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.st{font-size:15px;font-weight:700}
.qdot{width:7px;height:7px;border-radius:50%;background:#34d399;display:inline-block;box-shadow:0 0 6px rgba(52,211,153,.6)}
.qdot.spin{background:#fbbf24;box-shadow:0 0 6px rgba(251,191,36,.6);animation:pulse 1s ease-in-out infinite}
.aic{background:#090c15;border:1px solid #2d2a7a;border-radius:12px;padding:20px;box-shadow:0 4px 24px rgba(99,102,241,.12)}
.air{font-size:13px;line-height:1.9;color:#b8c8de;white-space:pre-wrap}
@keyframes priceUp{0%{background:rgba(52,211,153,.25)}100%{background:transparent}}
@keyframes priceDown{0%{background:rgba(248,113,113,.25)}100%{background:transparent}}
.flash-up{animation:priceUp .8s ease-out}
.flash-down{animation:priceDown .8s ease-out}
@keyframes rota{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spn{display:inline-block;animation:rota 1s linear infinite}
.toast{position:fixed;bottom:20px;right:20px;background:#064e3b;color:#6ee7b7;border:1px solid rgba(52,211,153,.3);border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:900px){
  .hdr{padding:10px 12px;gap:10px}
  .hdr-title{font-size:15px}
  .hdr-sub{display:none}
  .hdr-right{margin-left:auto}
  .tabs{top:58px;justify-content:flex-start;padding:0 8px}
}
@media(max-width:640px){
  .hdr{padding:10px 10px;align-items:flex-start}
  .hdr-logo{gap:10px;min-width:0}
  .hdr-icon{width:32px;height:32px;font-size:17px;border-radius:9px}
  .hdr-title{font-size:14px}
  .hdr-right{width:100%;justify-content:flex-end}
  .tabs{top:52px}
  .tab{padding:10px 10px;font-size:11px}
  .wrap{padding:10px}
  .cards{grid-template-columns:1fr;gap:8px}
  .card{padding:12px 13px;border-radius:11px}
  .cv{font-size:18px}
  .cs{font-size:10px}
  .cg{grid-template-columns:1fr;gap:10px}
  .cc{padding:12px;border-radius:11px}
  .sh{gap:6px;margin-bottom:10px}
  .st{font-size:14px}
  .btn{padding:8px 12px;font-size:12px}
  .bexp,.bimp,.bb3{padding:7px 10px;font-size:11px}
  .fc{padding:12px;border-radius:11px}
  .fg{grid-template-columns:1fr;gap:8px}
  .ag>summary{padding:14px}
  .ag-left{min-width:0;flex:1 1 100%}
  .ag-stats{grid-template-columns:repeat(2,minmax(0,1fr));width:100%;gap:8px}
  .ag-open{margin-left:auto}
  .ag-name{font-size:17px}
  .ag-table table{min-width:980px}
  input,select{font-size:16px;padding:10px 11px}
  th,td{padding:8px 10px;font-size:11px}
  table{font-size:11px;min-width:720px}
  .tw{border-radius:10px}
  .es{padding:24px 14px}
  .toast{left:10px;right:10px;bottom:12px}
}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast-area"></div>
<input type="file" id="imp-file" accept=".json" style="display:none">
<input type="file" id="b3-file" accept=".xlsx,.xls,.csv" style="display:none">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script>
const QI           = 60;
const CLRS         = ['#818cf8','#34d399','#fbbf24','#f472b6','#60a5fa','#a3e635','#fb923c','#a78bfa'];
const STOR         = 'civ5';
const DEFAULT_BRAPI = ''; // brapi fica opcional; cotações usam Yahoo Finance via /api/yahoo-quote sem token

// Firebase — login Google + Firestore
const firebaseConfig = {
  apiKey: "AIzaSyAUAGr6VfVoq4BdYAKSNENLv5dCaisHIho",
  authDomain: "carteira-de-investimento-16725.firebaseapp.com",
  projectId: "carteira-de-investimento-16725",
  storageBucket: "carteira-de-investimento-16725.firebasestorage.app",
  messagingSenderId: "194762472851",
  appId: "1:194762472851:web:1285e351b2dcc80f147c66",
  measurementId: "G-ZP045H8HTZ"
};

let FB = {
  ready:false, app:null, auth:null, db:null, user:null,
  unsub:null, cloudLoaded:false, applying:false, saveTimer:null, lastCloudUpdate:null
};

let S = {
  assets:[], aportes:[], proventos:[], quotes:{}, lastUpdate:null,
  tab:'dashboard', qLoad:false, cd:QI,
  qInFlight:false,
  brapiToken: DEFAULT_BRAPI, divGoal:0,
  aiText:'', aiLoad:false,
  editId:null, editPId:null, showA:false, showP:false, showD:false,
  _fa:null, _fp:null, _fd:null,
};
let PWA = { prompt:null, installed: false };
try{
  PWA.installed = window.matchMedia?.('(display-mode: standalone)')?.matches || window.navigator?.standalone || false;
}catch(e){}

// ══════════════════════════════════════
// STORAGE — corrigido: salva tab + divGoal + beforeunload
// ══════════════════════════════════════
function save(){
  try{
    localStorage.setItem(STOR, JSON.stringify({
      assets:S.assets, aportes:S.aportes, proventos:S.proventos,
      tab:S.tab, divGoal:S.divGoal
    }));
    queueCloudSave();
  }catch(e){ console.error('save erro:',e); toast('⚠️ Erro ao salvar dados localmente.','#f87171'); }
}
function saveConfig(){
  try{ localStorage.setItem(STOR+'_cfg', JSON.stringify({brapiToken:S.brapiToken, divGoal:S.divGoal})); queueCloudSave(); }catch(e){}
}

function load(){
  // ← FIX: try-catch separados para não perder tudo se um falhar
  try{
    const d=JSON.parse(localStorage.getItem(STOR)||'{}');
    if(Array.isArray(d.assets))    S.assets    = d.assets;
    if(Array.isArray(d.aportes))   S.aportes   = d.aportes;
    if(Array.isArray(d.proventos)) S.proventos = d.proventos;
    if(d.tab)                       S.tab       = d.tab;       // ← FIX: restaura tab
    if(d.divGoal !== undefined)     S.divGoal   = Number(d.divGoal)||0;
  }catch(e){ console.error('load erro:',e); }
  try{
    const c=JSON.parse(localStorage.getItem(STOR+'_cfg')||'{}');
    if(c.brapiToken)            S.brapiToken = c.brapiToken;
    else                        S.brapiToken = DEFAULT_BRAPI; // garante token padrão
    if(c.divGoal !== undefined) S.divGoal    = Number(c.divGoal)||S.divGoal;
  }catch(e){ S.brapiToken = DEFAULT_BRAPI; }
  // Migração de versões antigas (civ4, civ3...)
  if(!S.aportes.length && !S.assets.length){
    for(const k of ['civ4','civ3','civ2','carteira_v1']){
      try{
        const d=JSON.parse(localStorage.getItem(k)||'{}');
        if(Array.isArray(d.aportes) && d.aportes.length){
          S.aportes=d.aportes; S.assets=d.assets||[]; S.proventos=d.proventos||[];
          if(d.divGoal) S.divGoal=Number(d.divGoal)||0;
          save(); break;
        }
      }catch(e){}
    }
  }
}

// ← FIX: salva SEMPRE antes da página fechar/recarregar (F5, fecha aba, etc.)
window.addEventListener('beforeunload', save);

// ══════════════════════════════════════
// FIREBASE — login Google + sincronização em nuvem
// ══════════════════════════════════════
function initFirebase(){
  try{
    if(!window.firebase) return;
    FB.app  = firebase.initializeApp(firebaseConfig);
    FB.auth = firebase.auth();
    FB.db   = firebase.firestore();
    FB.ready = true;
    try{ FB.db.enablePersistence({synchronizeTabs:true}).catch(()=>{}); }catch(e){}
    FB.auth.onAuthStateChanged(user=>{
      FB.user = user || null;
      if(FB.user) startCloudSync();
      else stopCloudSync();
      render();
    });
  }catch(e){
    console.warn('Firebase indisponível:', e);
    FB.ready=false;
  }
}
function portfolioRef(){
  if(!FB.db || !FB.user) return null;
  return FB.db.collection('portfolios').doc(FB.user.uid);
}
function cloudPayload(){
  return {
    assets:S.assets,
    aportes:S.aportes,
    proventos:S.proventos,
    divGoal:Number(S.divGoal)||0,
    settings:{brapiToken:S.brapiToken||''},
    tab:S.tab,
    updatedAtLocal:new Date().toISOString(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
}
function hasLocalData(){
  return (S.assets&&S.assets.length)||(S.aportes&&S.aportes.length)||(S.proventos&&S.proventos.length)||(Number(S.divGoal)||0);
}
function applyCloudData(d){
  if(!d) return;
  FB.applying=true;
  if(Array.isArray(d.assets))    S.assets    = d.assets;
  if(Array.isArray(d.aportes))   S.aportes   = d.aportes;
  if(Array.isArray(d.proventos)) S.proventos = d.proventos;
  if(d.divGoal!==undefined)      S.divGoal   = Number(d.divGoal)||0;
  if(d.tab && !S.tab)            S.tab       = d.tab;
  if(d.settings && d.settings.brapiToken && !S.brapiToken) S.brapiToken = d.settings.brapiToken;
  try{
    localStorage.setItem(STOR, JSON.stringify({assets:S.assets, aportes:S.aportes, proventos:S.proventos, tab:S.tab, divGoal:S.divGoal}));
    localStorage.setItem(STOR+'_cfg', JSON.stringify({brapiToken:S.brapiToken, divGoal:S.divGoal}));
  }catch(e){}
  FB.lastCloudUpdate = d.updatedAtLocal || new Date().toISOString();
  FB.applying=false;
}
function startCloudSync(){
  const ref=portfolioRef();
  if(!ref) return;
  stopCloudSync(false);
  FB.cloudLoaded=false;
  FB.unsub=ref.onSnapshot(async snap=>{
    try{
      if(!snap.exists){
        if(hasLocalData()) await uploadLocalToCloud(false);
        FB.cloudLoaded=true;
        render();
        return;
      }
      const data=snap.data()||{};
      applyCloudData(data);
      FB.cloudLoaded=true;
      render();
    }catch(e){ console.warn('cloud sync:',e); }
  },err=>{
    console.warn('Firestore:',err);
    toast('⚠️ Erro na sincronização com a nuvem. Confira regras do Firestore.','#fbbf24');
  });
}
function stopCloudSync(doRender=true){
  if(FB.unsub){ try{ FB.unsub(); }catch(e){} }
  FB.unsub=null; FB.cloudLoaded=false;
  if(doRender) render();
}
function queueCloudSave(){
  if(FB.applying || !FB.user || !FB.cloudLoaded) return;
  clearTimeout(FB.saveTimer);
  FB.saveTimer=setTimeout(uploadLocalToCloud,900);
}
async function uploadLocalToCloud(show=true){
  const ref=portfolioRef();
  if(!ref) { if(show) toast('Entre com Google para sincronizar na nuvem.','#fbbf24'); return; }
  try{
    await ref.set(cloudPayload(), {merge:true});
    FB.lastCloudUpdate=new Date().toISOString();
    if(show) toast('☁️ Dados sincronizados na nuvem!');
  }catch(e){
    console.warn(e);
    if(show) toast('❌ Erro ao enviar para a nuvem.','#f87171');
  }
}
async function signInGoogle(){
  if(!FB.ready){ alert('Firebase não carregou. Verifique a internet.'); return; }
  try{
    const provider=new firebase.auth.GoogleAuthProvider();

function importB3Excel(){
  const el=document.getElementById('b3-file');
  if(!el){ alert('Campo de importação B3 não encontrado.'); return; }
  el.click();
}
function normHeaderB3(v){
  return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim().toLowerCase();
}
function pickB3(row, headers, names){
  const wanted=names.map(normHeaderB3);
  for(let i=0;i<headers.length;i++){
    const h=normHeaderB3(headers[i]);
    if(wanted.includes(h)) return row[i];
  }
  return null;
}
function tickerValidoB3(t){
  t=String(t||'').trim().toUpperCase();
  return /^[A-Z]{4}[0-9]{1,2}$/.test(t) || /^[A-Z]{3,6}[0-9]{1,2}$/.test(t);
}
function isMarketTicker(t){
  return tickerValidoB3(t);
}
function cleanAssetCode(txt){
  let s=String(txt||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim().toUpperCase();
  s=s.replace(/\s+/g,' ');
  if(!s) return '';
  // Mantém tickers de bolsa normais; para renda fixa cria um identificador legível e estável.
  if(tickerValidoB3(s)) return s;
  s=s.replace(/[^A-Z0-9 ]/g,'').replace(/\s+/g,' ').trim();
  return s.slice(0,38);
}
function isRendaFixaText(v){
  const s=String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  return /(renda fixa|tesouro|cdb|lci|lca|cri|cra|debenture|debentures|letra financeira|lc\b|lf\b)/.test(s);
}
function rfMetaFromText(v){
  const s=String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase();
  if(s.includes('TESOURO')) return {type:'Renda Fixa',sector:'Tesouro Direto'};
  if(/\bCDB\b/.test(s)) return {type:'Renda Fixa',sector:'CDB'};
  if(/\bLCI\b/.test(s)) return {type:'Renda Fixa',sector:'LCI'};
  if(/\bLCA\b/.test(s)) return {type:'Renda Fixa',sector:'LCA'};
  if(/\bCRI\b/.test(s)) return {type:'Renda Fixa',sector:'CRI'};
  if(/\bCRA\b/.test(s)) return {type:'Renda Fixa',sector:'CRA'};
  if(s.includes('DEBENT')) return {type:'Renda Fixa',sector:'Debênture'};
  if(/\bLF\b|LETRA FINANCEIRA/.test(s)) return {type:'Renda Fixa',sector:'Letra Financeira'};
  return {type:'Renda Fixa',sector:'Renda Fixa'};
}
function tipoPorAbaB3(sheetName,ticker){
  const sh=String(sheetName||'').toLowerCase();
  if(isRendaFixaText(sheetName)||isRendaFixaText(ticker)) return 'Renda Fixa';
  if(sh.includes('fundo de investimento')) return 'FII';
  if(sh.includes('etf')) return 'ETF';
  if(sh.includes('acoes') || sh.includes('ações')) return 'Ação';
  return metaTicker(ticker).type || 'Ação';
}
function setorPorAbaB3(sheetName,ticker){
  if(isRendaFixaText(sheetName)||isRendaFixaText(ticker)) return rfMetaFromText(`${sheetName} ${ticker}`).sector;
  const meta=metaTicker(ticker);
  if(meta.sector && meta.sector!=='FII' && meta.sector!=='Ação') return meta.sector;
  const sh=String(sheetName||'').toLowerCase();
  if(sh.includes('fundo de investimento')) return 'FII';
  if(sh.includes('etf')) return 'ETF';
  return meta.sector || '';
}
function parseB3PositionWorkbook(wb, fileName=''){
  const items=[]; const warnings=[];
  const dateMatch=String(fileName||'').match(/(20\d{2})[-_](\d{2})[-_](\d{2})/);
  const importDate=dateMatch?`${dateMatch[3]}/${dateMatch[2]}/${dateMatch[1]}`:new Date().toLocaleDateString('pt-BR');
  (wb.SheetNames||[]).forEach(sheetName=>{
    const sheet=wb.Sheets[sheetName]; if(!sheet) return;
    const rows=XLSX.utils.sheet_to_json(sheet,{header:1,raw:true,defval:null});
    if(!rows || rows.length<2) return;
    const headers=rows[0].map(x=>String(x||'').trim());
    const normHeaders=headers.map(normHeaderB3);
    const hasQtd=normHeaders.includes('quantidade') || normHeaders.includes('quantidade disponivel');
    const hasTicker=normHeaders.includes('codigo de negociacao') || normHeaders.includes('codigo') || normHeaders.includes('ticker');
    const isRF=isRendaFixaText(sheetName) || normHeaders.some(h=>/vencimento|indexador|emissor|instituicao|taxa/.test(h));
    const isETF=String(sheetName||'').toLowerCase().includes('etf');
    if(!hasQtd && !isRF) return;
    rows.slice(1).forEach((row,idx)=>{
      const produto=String(pickB3(row,headers,['Produto','Nome do Produto','Ativo','Descrição','Descricao','Título','Titulo'])||'').trim();
      const rawTicker=String(pickB3(row,headers,['Código de Negociação','Codigo de Negociacao','Código','Codigo','Ticker'])||'').trim().toUpperCase();
      const venc=String(pickB3(row,headers,['Vencimento','Data de Vencimento'])||'').trim();
      const inst=String(pickB3(row,headers,['Instituição','Instituicao','Emissor','Administrador'])||'').trim();
      let ticker=rawTicker;
      if(!ticker && isRF){
        const base=[produto,inst,venc].filter(Boolean).join(' ');
        ticker=cleanAssetCode(base||sheetName);
      }
      if(!ticker) return;
      if(!isRF && !tickerValidoB3(ticker)) return;
      if(produto.trim()==='29' || ticker==='TOTAL') return;
      let qty=parseNum(pickB3(row,headers,['Quantidade','Quantidade Disponível','Quantidade Disponivel','Quantidade Atual']));
      let price=parseNum(pickB3(row,headers,['Preço de Fechamento','Preco de Fechamento','Preço Atualizado','Preco Atualizado','Preço Atualizado CURVA','Preco Atualizado CURVA','Preço Unitário','Preco Unitario','PU','Valor Unitário','Valor Unitario']));
      let value=parseNum(pickB3(row,headers,['Valor Atualizado','Valor Atualizado CURVA','Valor Atualizado MTM','Valor Atualizado FECHAMENTO','Valor Bruto','Valor Líquido','Valor Liquido','Valor Atual','Saldo Bruto','Saldo Líquido','Saldo Liquido']));
      if(qty<=0 && isRF && value>0) qty=1;
      if(qty<=0) return;
      if((!price || price<=0) && value>0) price=value/qty;
      if(price<=0){ warnings.push(`${ticker}: sem preço válido; ignorado.`); return; }
      const tipo=isRF?'Renda Fixa':tipoPorAbaB3(sheetName,ticker);
      const setor=isRF?rfMetaFromText(`${produto} ${ticker} ${sheetName}`).sector:setorPorAbaB3(sheetName,ticker);
      items.push({ticker,qty,price,value:value||qty*price,type:tipo,sector:setor,product:produto.trim(),sheet:sheetName,date:importDate});
    });
  });
  return {items,warnings,importDate};
}
function hasSameB3Import(ticker, date){
  return S.aportes.some(a=>String(a.ticker||'').toUpperCase()===ticker && String(a.decision||'').includes('[IMPORT_B3_POSICAO]') && String(a.date||'')===date);
}
function applyB3ImportedPositions(items, importDate){
  const importTag='[IMPORT_B3_POSICAO]';
  // Remove importações B3 anteriores da mesma data para evitar duplicar se subir o mesmo arquivo outra vez.
  S.aportes=S.aportes.filter(a=>!(String(a.decision||'').includes(importTag) && String(a.date||'')===importDate));
  const now=Date.now();
  const novos=items.map((it,i)=>({
    id: now+i,
    operation:'compra',
    ticker:it.ticker,
    qty:Number(it.qty)||0,
    price:Number(it.price)||0,
    date:it.date||importDate,
    decision:`${importTag} ${it.sheet} · posição importada do Excel B3/corretora`,
    type:it.type,
    sector:it.sector
  })).filter(x=>x.ticker&&x.qty>0&&x.price>0);
  S.aportes=[...novos,...S.aportes];
  // Completa metadados para estes ativos após recálculo.
  syncAssetsFromAportes(false);
  S.assets=S.assets.map(a=>{
    const it=items.find(x=>x.ticker===a.ticker);
    if(!it) return a;
    return {...a,type:a.type||it.type,sector:a.sector||it.sector,current_price:it.price,quoteSource:a.quoteSource||'importado',quoteUpdatedAt:a.quoteUpdatedAt||new Date().toISOString()};
  });
  save(); render(); fetchQuotes(false);
  toast(`✅ ${novos.length} posição(ões) importadas do Excel.`);
}
document.getElementById('b3-file').addEventListener('change',async e=>{
  const file=e.target.files[0]; if(!file) return;
  try{
    if(typeof XLSX==='undefined'){ alert('Biblioteca de Excel não carregou. Verifique sua internet e tente novamente.'); return; }
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array'});
    const {items,warnings,importDate}=parseB3PositionWorkbook(wb,file.name);
    if(!items.length){ alert('Não encontrei posições válidas no arquivo. Tente exportar a posição da B3/corretora em Excel com colunas Código de Negociação, Quantidade, Preço de Fechamento e Valor Atualizado.'); return; }
    const total=items.reduce((s,i)=>s+(i.value||i.qty*i.price),0);
    const sample=items.slice(0,12).map(i=>`${i.ticker}: ${i.qty} x R$ ${Number(i.price).toFixed(2)} (${i.type}/${i.sector||'-'})`).join('\n');
    const msg=`Encontrei ${items.length} posição(ões) no Excel.\n\nData usada: ${importDate}\nTotal aproximado: ${fmt(total)}\n\nPrévia:\n${sample}${items.length>12?'\n...':''}\n\nVou importar como compras de ajuste na aba Aportes e recalcular Ativos.\nSe já existir importação B3 desta mesma data, ela será substituída para evitar duplicidade.\n\nObservação: arquivo de posição não traz preço médio real nem data de compra original; para histórico exato, use extrato de movimentações.\n\nConfirmar importação?`;
    if(confirm(msg)) applyB3ImportedPositions(items,importDate);
    if(warnings.length) console.warn('Avisos importação B3:',warnings);
  }catch(err){ console.error(err); alert('Erro ao importar Excel. Verifique o arquivo e tente novamente.'); }
  e.target.value='';
});

function parseNum(v){
  if(v==null) return 0;
  let s=String(v).trim().replace(/R\$|%|\s/g,'');
  if(!s) return 0;
  if(s.includes(',')&&s.includes('.')) s=s.replace(/\./g,'').replace(',','.');
  else if(s.includes(',')) s=s.replace(',','.');
  const n=parseFloat(s); return isNaN(n)?0:n;
}

function inputDateValue(v){
  if(!v) return '';
  const s=String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(m){ const d=m[1].padStart(2,'0'),mo=m[2].padStart(2,'0'),y=String(m[3].length<3?2000+Number(m[3]):Number(m[3]));return `${y}-${mo}-${d}`; }
  return '';
}
function brDate(v){
  if(!v) return new Date().toLocaleDateString('pt-BR');

  return v;
}
function parseAnyDate(v){
  if(!v) return null; if(v instanceof Date) return isNaN(v)?null:v;
  const s=String(v).trim();
  const a=s.match(/^(\d{4})-(\d{2})-(\d{2})/); if(a) return new Date(+a[1],+a[2]-1,+a[3]);

  const d=new Date(s); return isNaN(d)?null:d;
}

// ── DY automático: proventos reais → estimativa da tabela → manual
function autoDY(){
  const now=new Date();
  const oneYearAgo=new Date(now.getFullYear()-1,now.getMonth(),now.getDate());
  let updated=0;
  S.assets.forEach(a=>{
    if(a.dySource==='manual') return; // não sobrescreve DY manual
    // 1ª prioridade: calcula pelo histórico real de proventos (mais preciso)
    const provsAno=S.proventos.filter(p=>{
      const d=parseAnyDate(p.date);
      return String(p.ticker||'').toUpperCase()===a.ticker && d && d>=oneYearAgo;
    });
    if(provsAno.length>0 && a.qty>0 && a.current_price>0){
      const totalAnual=provsAno.reduce((s,p)=>s+(Number(p.value)||0),0);
      const dy=(totalAnual/(a.qty*a.current_price))*100;
      if(dy>0){ a.dy=Number(dy.toFixed(2)); a.dySource='proventos'; updated++; return; }
    }
    // 2ª prioridade: tabela de referência de mercado
    if(!a.dy || Number(a.dy)===0 || a.dySource==='estimate'){
      const ref=DY_REF[a.ticker];
      if(ref){ a.dy=ref; a.dySource='estimate'; updated++; }
    }
  });
  if(updated>0){ save(); }
  return updated;
}

function metaTicker(ticker){
  const t=String(ticker||'').trim().toUpperCase();
  if(isRendaFixaText(t)) return rfMetaFromText(t);
  if(META[t]) return{type:META[t][0],sector:META[t][1]};
  if(/^[A-Z]{4}11$/.test(t)) return{type:'FII',sector:'FII'};
  if(/^[A-Z]{4}[34]$/.test(t)) return{type:'Ação',sector:'Ação'};
  return{type:'Ação',sector:''};
}
function applyMetaToAporte(){
  const ti=(document.getElementById('p-ti')?.value||'').toUpperCase();
  const se=document.getElementById('p-se'); const ty=document.getElementById('p-ty');
  let m=metaTicker(ti);
  if(ty && ty.value==='Renda Fixa') m=rfMetaFromText(ti||se?.value||'Renda Fixa');
  if(ty && (!ty.dataset.manual || !ty.value)) ty.value=m.type||'Ação';
  if(se && (!se.dataset.manual || !se.value)) se.value=m.sector||'';
}
function findDy(q){
  const keys=['dividendYield','trailingAnnualDividendYield','yield','dy','regularMarketDividendYield','dividend_yield','dividendYieldAnnual','annualDividendYield'];
  const seen=new Set();
  function scan(obj){
    if(!obj||typeof obj!=='object'||seen.has(obj)) return 0; seen.add(obj);
    for(const k of keys){const raw=obj[k];if(raw!=null&&raw!==''){const v=Number(String(raw).replace('%','').replace(',','.'));if(v>0) return v>1?v:v*100;}}
    for(const v of Object.values(obj)){const f=scan(v);if(f>0) return f;}
    return 0;
  }
  return scan(q);
}
function cx(){
  const tI=S.assets.reduce((s,a)=>s+a.qty*a.avg_price,0);
  const tC=S.assets.reduce((s,a)=>s+a.qty*a.current_price,0);
  const tG=tC-tI,tGP=tI>0?(tG/tI)*100:0;
  const mD=S.assets.reduce((s,a)=>s+(a.qty*a.current_price*(a.dy/100))/12,0);
  const aD=mD*12,avgDY=tC>0?(aD/tC)*100:0;
  return{tI,tC,tG,tGP,mD,aD,avgDY};
}
function proventoStats(){

}

function proventoResumo(){
  const meses=new Map(),anos=new Map();
  S.proventos.forEach(p=>{
    const dt=parseAnyDate(p.date),v=Number(p.value)||0;
    if(!dt||v<=0) return;
    const y=dt.getFullYear(),m=String(dt.getMonth()+1).padStart(2,'0');
    const mk=`${y}-${m}`;
    if(!meses.has(mk)) meses.set(mk,{key:mk,ano:y,mes:dt.toLocaleDateString('pt-BR',{month:'long'}),valor:0,count:0});
    const mr=meses.get(mk); mr.valor+=v; mr.count++;
    if(!anos.has(y)) anos.set(y,{ano:y,valor:0,count:0});
    const ar=anos.get(y); ar.valor+=v; ar.count++;
  });
  return{
    meses:[...meses.values()].sort((a,b)=>b.key.localeCompare(a.key)),
    anos:[...anos.values()].sort((a,b)=>b.ano-a.ano)
  };
}
function proventoHistoricoMensal(){
  const byYear=new Map();
  S.proventos.forEach(p=>{
    const dt=parseAnyDate(p.date);
    const v=Number(p.value)||0;
    if(!dt||v<=0) return;
    const year=dt.getFullYear();
    const month=dt.getMonth();
    if(!byYear.has(year)) byYear.set(year, Array(12).fill(0));
    byYear.get(year)[month]+=v;
  });
  return [...byYear.entries()].sort((a,b)=>b[0]-a[0]).map(([year, months])=>{
    const total=months.reduce((s,v)=>s+v,0);
    const media=total/12;
    return { year, months, total, media };
  });
}

function syncAssetsFromAportes(showMsg=false){
  const keep={};
  S.assets.forEach(a=>keep[a.ticker]={...a});
  const grouped={};
  const movs=[...S.aportes].sort((a,b)=>{
    const da=parseAnyDate(a.date)?.getTime()||0,db=parseAnyDate(b.date)?.getTime()||0;
    return da-db||((Number(a.id)||0)-(Number(b.id)||0));
  });
  movs.forEach(p=>{
    const raw=String(p.ticker||'').trim().toUpperCase(); if(!raw) return;
    const t=cleanAssetCode(raw)||raw;
    const q=Math.abs(Number(p.qty)||0),pr=Number(p.price)||0;
    const op=(p.operation||p.op||'compra').toLowerCase();
    const m=metaTicker(t);
    const tipo=p.type||p.asset_type||m.type||'Ação';
    const setor=p.sector||p.asset_sector||m.sector||'';
    if(!grouped[t]) grouped[t]={ticker:t,qty:0,total:0,type:tipo,sector:setor};
    if(!grouped[t].type && tipo) grouped[t].type=tipo;
    if(!grouped[t].sector && setor) grouped[t].sector=setor;
    if(op==='venda'){
      const atual=grouped[t].qty,vendida=Math.min(q,atual),avg=atual>0?grouped[t].total/atual:0;
      grouped[t].qty=Math.max(0,atual-vendida);
      grouped[t].total=Math.max(0,grouped[t].total-(avg*vendida)); return;
    }
    grouped[t].qty+=q; grouped[t].total+=q*pr;
  });
  S.assets=Object.values(grouped).filter(g=>g.qty>0.000001).map(g=>{
    const old=keep[g.ticker]||{},m=metaTicker(g.ticker),avg=g.qty>0?g.total/g.qty:0;
    const isRF=(old.type||g.type||m.type)==='Renda Fixa';
    return{
      id:old.id||Date.now()+Math.floor(Math.random()*999999),
      ticker:g.ticker, type:old.type||g.type||m.type, sector:old.sector||g.sector||m.sector, qty:g.qty,
      avg_price:old.avg_manual?Number(old.avg_price)||avg:avg, avg_manual:!!old.avg_manual,
      current_price:Number(old.current_price)||avg, dy:Number(old.dy)||0,
      dySource:old.dySource||'', price_target:Number(old.price_target)||0, ideal_pct:Number(old.ideal_pct)||0,
      quoteSource:old.quoteSource||(isRF?'manual':''), quoteUpdatedAt:old.quoteUpdatedAt||''
    };
  }).sort((a,b)=>a.ticker.localeCompare(b.ticker));
  autoDY();
  save();
  if(showMsg) toast('✅ Carteira recalculada pelos aportes!');
  render();
}
function qtyAtDate(ticker,refDate){
  const t=String(ticker||'').toUpperCase(); let qty=0;
  [...S.aportes].filter(a=>String(a.ticker||'').toUpperCase()===t).sort((a,b)=>(parseAnyDate(a.date)?.getTime()||0)-(parseAnyDate(b.date)?.getTime()||0)).forEach(a=>{
    const d=parseAnyDate(a.date);
    if(!d||!refDate||d.getTime()>refDate.getTime()) return;
    const q=Math.abs(Number(a.qty)||0),op=(a.operation||a.op||'compra').toLowerCase();
    qty+=op==='venda'?-q:q; if(qty<0) qty=0;
  });
  return qty;
}
function earliestAporteDate(){
  let min=null;
  S.aportes.forEach(a=>{const d=parseAnyDate(a.date);if(d&&(!min||d<min)) min=d;});
  if(!min){const y=new Date().getFullYear();min=new Date(y,0,1);}
  min.setDate(min.getDate()-10); return min;
}
function normalizeDividendItem(item,fallback){
  const symbol=String(item.symbol||item.ticker||fallback||'').toUpperCase();
  const payDate=parseAnyDate(item.paymentDate||item.pay_date||item.payableDate||item.date||item.dataPagamento||item.exDate||item.lastDatePrior);
  const posDate=parseAnyDate(item.lastDatePrior||item.recordDate||item.comDate||item.exDate||item.date||item.paymentDate);
  const rate=parseNum(item.rate??item.amount??item.value??item.dividend??item.cashAmount??item.valor);
  const label=String(item.label||item.type||item.tipo||'Provento').trim()||'Provento';
  return{symbol,payDate,posDate:posDate||payDate,rate,label};
}
function collectDividendItems(payload,fallback){
  const out=[]; const seen=new Set();
  function walk(x){
    if(!x) return; if(Array.isArray(x)){x.forEach(walk);return;} if(typeof x!=='object') return;
    const hasRate=['rate','amount','value','dividend','cashAmount','valor'].some(k=>x[k]!==undefined);
    const hasDate=['paymentDate','pay_date','payableDate','date','dataPagamento','exDate','lastDatePrior'].some(k=>x[k]!==undefined);
    if(hasRate&&hasDate){out.push(normalizeDividendItem(x,fallback));return;}
    Object.values(x).forEach(walk);
  }
  walk(payload); return out;
}
function proventoKey(d){ return `${d.symbol}|${toISODate(d.payDate)}|${Number(d.rate||0).toFixed(8)}|${String(d.label||'').toUpperCase()}`; }

async function fetchQuotesYahoo(tickers){
  const clean=[...new Set((tickers||[]).map(t=>String(t||'').trim().toUpperCase()).filter(t=>t&&isMarketTicker(t)))];
  if(!clean.length) return [];
  const apiBase=marketApiBase();
  const r=await fetch(`${apiBase}/api/yahoo-quote?symbols=${encodeURIComponent(clean.join(','))}`,{cache:'no-store'});

  const j=await r.json();

async function fetchQuotes(manual=false){
  if(!S.assets.length) return;
  if(S.qInFlight) return;
  S.qInFlight=true;
  S.qLoad=true; render();

  const tickers=[...new Set(S.assets.map(a=>String(a.ticker||'').trim().toUpperCase()).filter(t=>t&&isMarketTicker(t)))];
  let atualizados=0,semPreco=[];

  try{
    const yResults=await fetchQuotesYahoo(tickers);
    const recebidos=new Set();

    yResults.forEach(q=>{
      const ticker=String(q.symbol||'').replace('.SA','').toUpperCase();
      if(!ticker) return;
      recebidos.add(ticker);

      const a=S.assets.find(x=>String(x.ticker||'').toUpperCase()===ticker);
      if(!a) return;

      const price=Number(q.regularMarketPrice ?? q.postMarketPrice ?? q.preMarketPrice ?? q.regularMarketPreviousClose);
      if(Number.isFinite(price)&&price>0){
        const prev=Number(a.current_price)||0;
        a.current_price=price;
        a.quoteSource='yahoo';
        a.quoteUpdatedAt=new Date().toISOString();
        S.quotes[ticker]={
          price,
          change:Number(q.regularMarketChangePercent)||0,
          flash:prev>0?(price>prev?'up':price<prev?'down':''):''
        };
        atualizados++;
      }else{
        semPreco.push(ticker);
      }

      const dyY=Number(q.trailingAnnualDividendYield||0)*100;
      if(dyY>0&&(!a.dy||a.dySource==='estimate'||a.dySource==='yahoo')){
        a.dy=Number(dyY.toFixed(2));
        a.dySource='yahoo';
      }

      const m=metaTicker(a.ticker);
      if(!a.sector) a.sector=m.sector;
      if(!a.type) a.type=m.type;
    });

    tickers.forEach(t=>{ if(!recebidos.has(t)) semPreco.push(t); });

    // Fallback opcional para brapi: só tenta se você salvou um token.
    // A cotação principal funciona sem token pelo Yahoo.
    if(semPreco.length && S.brapiToken){
      try{
        const falhou=[...new Set(semPreco)];
        semPreco=[];
        for(let i=0;i<falhou.length;i+=20){
          const batch=falhou.slice(i,i+20).join(',');
          let r=await fetch(`https://brapi.dev/api/quote/${encodeURIComponent(batch)}?range=1d&interval=1d&fundamental=true`,{headers:{Authorization:`Bearer ${S.brapiToken}`}});
          if(!r.ok) r=await fetch(`https://brapi.dev/api/quote/${encodeURIComponent(batch)}?range=1d&interval=1d&fundamental=true&token=${encodeURIComponent(S.brapiToken)}`);
          if(!r.ok) continue;
          const j=await r.json();
          const recv=new Set();
          (j.results||[]).forEach(q=>{
            const sym=String(q.symbol||'').toUpperCase();
            recv.add(sym);
            const a=S.assets.find(x=>String(x.ticker||'').toUpperCase()===sym);
            if(!a) return;
            const price=Number(q.regularMarketPrice??q.price??q.close??q.previousClose);
            if(Number.isFinite(price)&&price>0){
              const prev=Number(a.current_price)||0;
              a.current_price=price;
              a.quoteSource='brapi';
              a.quoteUpdatedAt=new Date().toISOString();
              S.quotes[sym]={price,change:Number(q.regularMarketChangePercent)||0,flash:prev>0?(price>prev?'up':price<prev?'down':''):''};
              atualizados++;
            }
            const dyApi=findDy(q);
            if(dyApi>0&&(!a.dy||a.dySource==='api'||a.dySource==='estimate')){
              a.dy=Number(dyApi.toFixed(2));
              a.dySource='api';
            }
          });
          falhou.slice(i,i+20).forEach(t=>{ if(!recv.has(t)) semPreco.push(t); });
        }
      }catch(e){ console.warn('fallback brapi:',e); }
    }

    S.lastUpdate=new Date();
    if(S.editId){
      const editAsset=S.assets.find(x=>x.id===S.editId);
      if(editAsset) S._fa={...editAsset};
    }
    autoDY();
    save();

    if(manual){
      const msg = semPreco.length
        ? `✅ ${atualizados} cotação(ões) atualizadas pelo Yahoo. Sem retorno: ${[...new Set(semPreco)].join(', ')}`
        : `✅ ${atualizados} cotação(ões) atualizadas automaticamente pelo Yahoo.`;
      toast(msg, semPreco.length?'#fbbf24':'#6ee7b7');
    }
  }catch(e){
    console.warn('Yahoo Finance:',e);
    if(manual) toast('❌ Não foi possível atualizar pelo Yahoo. Verifique se a pasta api foi enviada ao GitHub/Vercel.','#f87171');
  }

  S.qInFlight=false;
  S.qLoad=false; S.cd=QI; render();
}

function pie(data){
  const tot=data.reduce((s,d)=>s+d.value,0);
  if(!tot) return'<div class="di" style="text-align:center;padding:24px;font-size:13px">Sem dados</div>';
  let p='',a=-Math.PI/2;
  data.forEach((d,i)=>{
    const ang=(d.value/tot)*2*Math.PI;
    const[x1,y1]=[80+68*Math.cos(a),80+68*Math.sin(a)];
    const[x2,y2]=[80+68*Math.cos(a+ang),80+68*Math.sin(a+ang)];
    p+=`<path d="M80,80 L${x1.toFixed(1)},${y1.toFixed(1)} A68,68 0 ${ang>Math.PI?1:0},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${CLRS[i%CLRS.length]}" stroke="#07090f" stroke-width="2"/>`;
    a+=ang;
  });
  return`<svg viewBox="0 0 160 160" width="140" height="140" style="display:block;margin:0 auto">${p}</svg>`;
}

function dash(){
  const{tI,tC,tG,tGP,mD,aD,avgDY}=cx();
  const byT={};
  S.assets.forEach(a=>{const v=a.qty*a.current_price;byT[a.type]=(byT[a.type]||0)+v;});
  const ad=Object.entries(byT).map(([n,v])=>({name:n,value:v}));
  const p=pie(ad);
  const leg=ad.map((d,i)=>`<div class="pli"><div class="pd" style="background:${CLRS[i%CLRS.length]}"></div><span>${esc(d.name)} ${tC>0?((d.value/tC)*100).toFixed(0):'0'}%</span></div>`).join('');
  const sd=[...S.assets].sort((a,b)=>((b.qty*b.current_price*(b.dy/100))/12)-((a.qty*a.current_price*(a.dy/100))/12));

function ativos(){
  const total=S.assets.reduce((s,a)=>s+(Number(a.qty)||0)*(Number(a.current_price)||0),0);
  const grouped=new Map();
  S.assets.forEach(a=>{
    const type=(a.type||metaTicker(a.ticker).type||'Ação').trim();
    if(!grouped.has(type)) grouped.set(type,[]);
    grouped.get(type).push(a);
  });
  const order=['Ação','FII','ETF','Renda Fixa','BDR','Crypto'];
  const groupNames=[...order.filter(t=>grouped.has(t)), ...[...grouped.keys()].filter(t=>!order.includes(t)).sort((a,b)=>a.localeCompare(b))];
  const sections=groupNames.map((type,idx)=>{
    const items=[...grouped.get(type)].sort((a,b)=>String(a.ticker||'').localeCompare(String(b.ticker||'')));
    const gTotal=items.reduce((s,a)=>s+(Number(a.qty)||0)*(Number(a.current_price)||0),0);
    const gCost=items.reduce((s,a)=>s+(Number(a.qty)||0)*(Number(a.avg_price)||0),0);
    const gDivMes=items.reduce((s,a)=>s+((Number(a.qty)||0)*(Number(a.current_price)||0)*(Number(a.dy)||0)/100)/12,0);
    const gVar=gCost>0?((gTotal-gCost)/gCost)*100:0;
    const gDY=gTotal>0?(gDivMes/gTotal)*100*12:0;
    const share=total>0?(gTotal/total)*100:0;
    const rows=items.map(a=>{
      const avg=Number(a.avg_price)||0;
      const current=Number(a.current_price)||0;
      const vr=avg>0?((current-avg)/avg)*100:0;
      const dm=((Number(a.qty)||0)*current*(Number(a.dy)||0))/1200;
      const peso=total>0?((Number(a.qty)||0)*current/total)*100:0;
      const alvo=Number(a.price_target)||0,ideal=Number(a.ideal_pct)||0,diff=ideal>0?ideal-peso:0;
      const q=S.quotes[a.ticker];
      const qtag=q?`<span style="font-size:10px;color:${q.change>=0?'#34d399':'#f87171'};margin-left:5px;font-weight:600">${fmtP(q.change)}</span>`:'';
      const qt=a.quoteUpdatedAt?new Date(a.quoteUpdatedAt).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'aguardando';
      const qs=a.quoteSource==='yahoo'?'Yahoo':a.quoteSource==='brapi'?'brapi':a.quoteSource==='importado'?'importado':'mercado';
      return`<tr>
        <td style="font-weight:700;color:#e2eaf6">${esc(a.ticker)}${qtag}</td>
        <td><span class="bdg ${bdg(a.type)}">${esc(a.type)}</span></td>
        <td class="mu">${esc(a.sector||'—')}</td>
        <td>${a.qty}</td>
        <td>R$ ${avg.toFixed(2)}</td>
        <td style="font-weight:600;color:${current>=avg?'#34d399':'#f87171'}" class="${(S.quotes[a.ticker]?.flash==='up'?'flash-up':S.quotes[a.ticker]?.flash==='down'?'flash-down':'')}">
          R$ ${current.toFixed(2)}
          ${a.quoteSource==='brapi'?'<span style="font-size:9px;color:#34d399;margin-left:3px" title="brapi">●</span>':a.quoteSource==='yahoo'?'<span style="font-size:9px;color:#60a5fa;margin-left:3px" title="Yahoo Finance">●</span>':''}
          <div style="font-size:10px;color:#3d5472;font-weight:500;margin-top:2px">${qs} · ${qt}</div>
        </td>
        <td style="color:${vr>=0?'#34d399':'#f87171'};font-weight:700">${fmtP(vr)}</td>
        <td>${alvo>0?'R$ '+alvo.toFixed(2):'—'}</td>
        <td style="font-weight:700;color:#e2eaf6">${fmt((Number(a.qty)||0)*current)}</td>
        <td class="bl" style="font-weight:600">${peso.toFixed(1)}%</td>
        <td class="${ideal>0?(diff>0?'gn':'rd'):'mu'}" style="font-weight:600">${ideal>0?ideal.toFixed(1)+'%':'—'}</td>
        <td class="am" style="font-weight:600">${fmt(dm)}</td>
        <td class="mu">${Number(a.dy)||0}%${a.dySource==='api'?'<span style="font-size:10px;color:#34d399;margin-left:4px" title="via brapi">API</span>':a.dySource==='proventos'?'<span style="font-size:10px;color:#818cf8;margin-left:4px" title="calculado pelos seus proventos reais">●Real</span>':a.dySource==='estimate'?'<span style="font-size:10px;color:#fbbf24;margin-left:4px" title="estimativa de mercado — atualize se necessário">~Est</span>':''}</td>
        <td><button class="bi" onclick="edA(${a.id})">✏️</button></td>
      </tr>`;
    }).join('');
    return`<details class="ag"${idx===0?' open':''}>
      <summary>
        <div class="ag-left">
          <div class="ag-ico">${tipoIcon(type)}</div>
          <div>
            <div class="ag-name">${esc(type)}</div>
            <div class="ag-sub">${items.length} ativos · ${fmt(gTotal)} · ${share.toFixed(1)}% da carteira</div>
          </div>
        </div>
        <div class="ag-stats">
          <div class="ag-stat"><div class="ag-k">Ativos</div><div class="ag-v">${items.length}</div></div>
          <div class="ag-stat"><div class="ag-k">Valor total</div><div class="ag-v">${fmt(gTotal)}</div></div>
          <div class="ag-stat"><div class="ag-k">Variação</div><div class="ag-v" style="color:${gVar>=0?'#34d399':'#f87171'}">${fmtP(gVar)}</div></div>
          <div class="ag-stat"><div class="ag-k">Rentabilidade</div><div class="ag-v" style="color:${gDY>=0?'#34d399':'#f87171'}">${gDY.toFixed(2)}% <small>DY</small></div></div>
          <div class="ag-stat"><div class="ag-k">% na carteira</div><div class="ag-v" style="color:#c0cce0">${share.toFixed(1)}%</div></div>
        </div>
        <div class="ag-open">⌄</div>
      </summary>
      <div class="ag-body">
        <div class="ag-table">
          <div class="tw"><div class="ts"><table>
            <thead><tr><th>Ticker</th><th>Tipo</th><th>Setor</th><th>Qtd</th><th>PM</th>
              <th>
                <div style="display:flex;align-items:center;gap:5px">
                  ATUAL
                  <span class="qdot${S.qLoad?' spin':''}" title="Cotações ao vivo · atualiza a cada ${QI}s"></span>
                </div>
              </th>
              <th>Rentab.</th><th>Alvo</th><th>Total</th><th>% Cart.</th><th>% Ideal</th><th>Div/mês</th><th>DY</th><th></th></tr></thead>
            <tbody>${rows||'<tr><td colspan="14" style="text-align:center;padding:28px;color:#2e3f58">Nenhum ativo nesta categoria.</td></tr>'}</tbody>
          </table></div></div>
        </div>
      </div>
    </details>`;
  }).join('');
  return`<div class="sh">
    <div>
      <div class="st">Meus Ativos (${S.assets.length})</div>
      <div class="mu" style="font-size:12px;margin-top:4px">Ativos agrupados por categoria. Abra cada bloco para ver os detalhes e editar um item.</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn bgh" style="font-size:12px;padding:7px 12px" onclick="syncAssetsFromAportes(true)">🧮 Recalcular</button>
      <button class="btn bgh" style="font-size:12px;padding:7px 12px" onclick="fetchQuotes(true)">🔄 Atualizar mercado</button>
    </div>
  </div>
  ${frmA()}
  <div class="ag-wrap">${sections||'<div class="es" style="background:#0d111e;border:1px dashed #161e2e;border-radius:12px">Registre compras na aba 💰 Aportes para alimentar esta tela.</div>'}</div>`;
}

function saveDivGoal(){
  const v=Number(document.getElementById('div-goal')?.value)||0;
  S.divGoal=Math.max(0,v); saveConfig(); save(); render();
}

function ajudarTab(){
  return`<div style="font-size:15px;font-weight:700;margin-bottom:4px">⚖️ Sugestão de aporte</div>
  <div class="mu" style="font-size:13px;margin-bottom:16px">Digite o valor do próximo aporte. Analisamos peso atual, % ideal, rentabilidade e DY para sugerir onde aportar.</div>
  <div class="fc">
    <div class="fg"><div><div class="fl">Valor do aporte (R$)</div><input id="reb-val" type="number" step="0.01" placeholder="ex: 500"></div></div>
    <div style="display:flex;gap:8px;margin-top:14px"><button class="btn bp" onclick="calcRebalance()">Analisar aporte</button></div>
  </div>
  <div id="reb-out">${!S.assets.length?'<div class="es" style="background:#0d111e;border:1px dashed #161e2e;border-radius:12px">Cadastre compras na aba Aportes para a análise funcionar.</div>':'<div class="es" style="background:#0d111e;border:1px dashed #161e2e;border-radius:12px">Informe um valor e clique em Analisar aporte.</div>'}</div>`;
}
function calcRebalance(){
  const aporte=Number(document.getElementById('reb-val')?.value)||0;
  const out=document.getElementById('reb-out'); if(!out) return;
  if(aporte<=0){out.innerHTML='<div class="es" style="background:#0d111e;border:1px solid #161e2e;border-radius:12px">Digite um valor maior que zero.</div>';return;}
  const total=S.assets.reduce((s,a)=>s+a.qty*a.current_price,0);
  if(!S.assets.length||total<=0){out.innerHTML='<div class="es" style="background:#0d111e;border:1px solid #161e2e;border-radius:12px">Ainda não há ativos suficientes.</div>';return;}
  let list=S.assets.map(a=>{
    const valor=a.qty*a.current_price,peso=valor/total*100,ideal=Number(a.ideal_pct)||0,falta=ideal>0?Math.max(0,ideal-peso):0;
    const rent=a.avg_price>0?((a.current_price-a.avg_price)/a.avg_price)*100:0;
    let score=0,motivos=[];
    if(ideal>0&&falta>0){score+=falta*4;motivos.push(`abaixo do ideal em ${falta.toFixed(1)} p.p.`);}
    if(ideal===0&&peso<10){score+=(10-peso)*1.2;motivos.push('baixo peso');}
    if(rent<0){score+=Math.min(20,Math.abs(rent))*1.1;motivos.push(`queda vs PM (${fmtP(rent)})`);}
    if((Number(a.dy)||0)>6){score+=(Number(a.dy)||0)*0.8;motivos.push(`DY ${a.dy}%`);}
    if(peso>20){score-=25;motivos.push('peso já alto');}
    return{...a,valor,peso,ideal,rent,score,motivos};
  }).filter(a=>a.score>0).sort((a,b)=>b.score-a.score).slice(0,4);
  if(!list.length) list=[...S.assets].map(a=>({...a,valor:a.qty*a.current_price,peso:(a.qty*a.current_price/total*100),ideal:Number(a.ideal_pct)||0,rent:0,score:1,motivos:['menor concentração']})).sort((a,b)=>a.peso-b.peso).slice(0,3);
  const sum=list.reduce((s,a)=>s+a.score,0)||1;
  const rows=list.map(a=>{
    const val=aporte*(a.score/sum),qtd=a.current_price>0?Math.floor(val/a.current_price):0,divMes=val*((Number(a.dy)||0)/100)/12;
    return`<tr><td style="font-weight:700;color:#e2eaf6">${esc(a.ticker)}</td><td>${esc(a.type)}</td><td class="mu">${esc(a.sector||'—')}</td><td>${a.peso.toFixed(1)}%</td><td>${a.ideal?a.ideal.toFixed(1)+'%':'—'}</td><td class="${a.rent<0?'rd':'gn'}">${fmtP(a.rent)}</td><td class="gn" style="font-weight:700">${fmt(val)}</td><td>${qtd}</td><td class="am">+${fmt(divMes)}/mês</td><td class="mu">${esc(a.motivos.join(', '))}</td></tr>`;
  }).join('');
  out.innerHTML=`<div class="tw"><div class="ts"><table><thead><tr><th>Ativo</th><th>Tipo</th><th>Setor</th><th>% Cart.</th><th>% Ideal</th><th>Rentab.</th><th>Sugestão</th><th>Qtd aprox.</th><th>Dividendo</th><th>Motivo</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

// IA LOCAL
// ══════════════════════════════════════
function iaTab(){
  const res=S.aiText
    ?`<div class="aic">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#312e81,#4c1d95);display:flex;align-items:center;justify-content:center;font-size:17px">🤖</div>
        <span style="font-size:14px;font-weight:700;color:#c4b5fd">Análise da carteira</span>
      </div>
      <div class="air">${esc(S.aiText)}</div>
      <div style="margin-top:16px;padding-top:12px;border-top:1px solid #161e2e;font-size:11px;color:#2e3f58">⚠️ Análise automática e informativa. Não constitui recomendação. Consulte um profissional CFP/CNPI.</div>
    </div>`
    :`<div class="es" style="background:#0d111e;border:1px dashed #161e2e;border-radius:12px">🤖<br><br>Clique no botão para análise personalizada da sua carteira.</div>`;
  return`<div style="font-size:15px;font-weight:700;margin-bottom:4px">Análise automática da carteira</div>
  <div class="mu" style="font-size:13px;margin-bottom:18px">Análise local com base nos dados cadastrados — sem enviar sua carteira para servidores externos.</div>
  <button class="btn bp" onclick="getAI()" style="display:flex;align-items:center;gap:8px;margin-bottom:18px">✨ Gerar análise</button>${res}`;
}

// ══════════════════════════════════════
// AÇÕES (CRUD)
// ══════════════════════════════════════
function go(t){
  S.tab=t; save(); render();
  if(t==='ativos') fetchQuotes(false);
}  // ← FIX: salva tab ao navegar
function clA(){ S.showA=false; S.editId=null; S._fa=null; render(); }
async function refreshCotacao(){
  await fetchQuotes(false);
  // Atualiza o campo com o novo valor sem fechar o form
  const a = S.assets.find(x=>x.id===S.editId);
  if(!a) return;
  const el = document.getElementById('f-cp');
  if(el) el.value = a.current_price;
  const info = document.querySelector('#f-cp + div');
  if(info && a.quoteUpdatedAt) info.innerHTML = `⏱ ${new Date(a.quoteUpdatedAt).toLocaleTimeString('pt-BR')} · <a href="javascript:refreshCotacao()" style="color:#60a5fa;text-decoration:none">atualizar agora</a>`;
  toast(`✅ Cotação de ${a.ticker} atualizada: R$ ${a.current_price.toFixed(2)}`);
}
function edA(id){ const a=S.assets.find(x=>x.id===id); if(!a)return; S._fa={...a}; S.editId=id; S.showA=true; render(); }
function svA(){
  if(!S.editId) return;
  const ap=parseNum(document.getElementById('f-ap')?.value);
  const dy=parseNum(document.getElementById('f-dy')?.value);
  const pt=parseNum(document.getElementById('f-pt')?.value);
  const ip=parseNum(document.getElementById('f-ip')?.value);
  const se=document.getElementById('f-se')?.value?.trim()||'';
  const ty=document.getElementById('f-ty')?.value||'Ação';
  S.assets=S.assets.map(a=>{
    if(a.id!==S.editId) return a;
    const avgManual=ap>0&&Math.abs(ap-Number(a.avg_price||0))>0.0001;
    return{...a,avg_price:ap||a.avg_price,avg_manual:avgManual||a.avg_manual,
      dy,dySource:'manual',price_target:pt,ideal_pct:ip,sector:se,type:ty};
    // cotação não é editada aqui — vem automaticamente via Yahoo Finance e fallback opcional brapi
  });
  S.showA=false; S.editId=null; S._fa=null;
  save(); toast('✅ Ativo atualizado!'); render();
}

function tgP(){ S.showP=!S.showP; S.editPId=null; S._fp={operation:'compra'}; render(); setTimeout(applyMetaToAporte,50); }
function clP(){ S.showP=false; S.editPId=null; S._fp=null; render(); }
function edP(id){ const p=S.aportes.find(x=>x.id===id); if(!p) return; S._fp={...p}; S.editPId=id; S.showP=true; render(); setTimeout(applyMetaToAporte,50); }
function svP(){
  const op=(document.getElementById('p-op')?.value||'compra').toLowerCase();
  const rawTi=document.getElementById('p-ti')?.value?.trim().toUpperCase();
  const qt=Math.abs(parseNum(document.getElementById('p-qt')?.value));
  const pr=parseNum(document.getElementById('p-pr')?.value);
  const dc=document.getElementById('p-dc')?.value?.trim()||'';
  const dt=brDate(document.getElementById('p-dt')?.value||'');
  const ty=document.getElementById('p-ty')?.value||metaTicker(rawTi).type||'Ação';
  let se=document.getElementById('p-se')?.value?.trim()||'';
  let ti=cleanAssetCode(rawTi);
  if(!ti && ty==='Renda Fixa') ti='RENDA FIXA';
  if(!se){
    const m=ty==='Renda Fixa'?rfMetaFromText(ti):metaTicker(ti);
    se=m.sector||ty;
  }
  if(!ti||qt<=0||pr<=0){ alert('Preencha Ativo/Ticker, Quantidade e Preço.'); return; }
  const reg={id:S.editPId||Date.now(), operation:op, ticker:ti, qty:qt, price:pr, date:dt, decision:dc, type:ty, sector:se};
  if(S.editPId){ S.aportes=S.aportes.map(a=>a.id===S.editPId?reg:a); }
  else { S.aportes.unshift(reg); }
  S.showP=false; S.editPId=null; S._fp=null;
  syncAssetsFromAportes(false);
  toast(`✅ ${op==='venda'?'Venda':'Compra'} de ${ti} registrada!`);
  fetchQuotes(false);
}
function rmP(id){
  if(!confirm('Remover esta operação? A aba Ativos será recalculada.')) return;
  S.aportes=S.aportes.filter(a=>a.id!==id);
  if(S.editPId===id){ S.editPId=null; S.showP=false; S._fp=null; }
  syncAssetsFromAportes(false);
  toast('🗑️ Operação removida.');
}

function tgD(){ S.showD=!S.showD; render(); }
function clD(){ S.showD=false; render(); }
function svD(){
  const ti=document.getElementById('d-ti')?.value?.trim().toUpperCase();
  const va=parseNum(document.getElementById('d-va')?.value);
  const ty=document.getElementById('d-ty')?.value||'Rendimento';
  const ob=document.getElementById('d-ob')?.value?.trim()||'';
  const rawDt=document.getElementById('d-dt')?.value||'';
  const dt=rawDt?brDate(rawDt):new Date().toLocaleDateString('pt-BR');
  if(!ti||va<=0){ alert('Preencha Ticker e Valor recebido.'); return; }
  S.proventos.unshift({id:Date.now(), ticker:ti, value:va, type:ty, date:dt, note:ob});
  S.showD=false; save();
  toast(`✅ Provento de ${ti} registrado: ${fmt(va)}`);
  render();
}
function rmD(id){
  if(!confirm('Remover este provento?')) return;
  S.proventos=S.proventos.filter(p=>p.id!==id);
  save(); toast('🗑️ Provento removido.'); render();
}

function getAI(){
  const{tC,tGP,mD,aD,avgDY}=cx();
  const rec=proventoStats();
  if(!S.assets.length){ S.aiText='Cadastre seus ativos primeiro para gerar uma análise.'; render(); return; }
  const porTipo={},por=S.assets.map(a=>({ticker:a.ticker,type:a.type,valor:a.qty*a.current_price,divMes:(a.qty*a.current_price*(a.dy/100))/12,dy:Number(a.dy)||0,var:a.avg_price>0?((a.current_price-a.avg_price)/a.avg_price)*100:0})).sort((a,b)=>b.valor-a.valor);
  por.forEach(a=>porTipo[a.type]=(porTipo[a.type]||0)+a.valor);
  const maior=por[0],maiorPct=tC>0?(maior.valor/tC)*100:0;
  const fiisPct=tC>0?((porTipo['FII']||0)/tC)*100:0,acoesPct=tC>0?((porTipo['Ação']||0)/tC)*100:0;
  const divGoal=Number(S.divGoal)||0,faltaDiv=Math.max(0,divGoal-mD);
  const alvoPat=divGoal>0&&avgDY>0?(divGoal*12)/(avgDY/100):0;
  const L=[];
  L.push('📊 RESUMO DA CARTEIRA');
  L.push(`Patrimônio: ${fmt(tC)} | Resultado: ${fmtP(tGP)}`);
  L.push(`Renda passiva estimada: ${fmt(mD)}/mês (${fmt(aD)}/ano)`);
  L.push(`Proventos recebidos: ${fmt(rec.mes)} no mês · ${fmt(rec.ano)} no ano · ${fmt(rec.total)} total`);
  L.push(`DY médio: ${avgDY.toFixed(2)}%`);
  L.push('');
  L.push('⚖️ ALOCAÇÃO');
  Object.entries(porTipo).sort((a,b)=>b[1]-a[1]).forEach(([tipo,valor])=>L.push(`• ${tipo}: ${((valor/tC)*100).toFixed(1)}% (${fmt(valor)})`));
  L.push('');
  L.push('🔎 PONTOS DE ATENÇÃO');
  if(maiorPct>20) L.push(`• Concentração alta em ${maior.ticker}: ${maiorPct.toFixed(1)}% — considere diversificar próximos aportes.`);
  else L.push(`• Maior posição: ${maior.ticker} com ${maiorPct.toFixed(1)}% — concentração dentro do esperado.`);
  if(S.assets.length<8) L.push('• Poucos ativos. Para renda passiva consistente, 10+ ativos de setores diferentes reduzem risco.');
  if(fiisPct>60) L.push('• FIIs com peso muito alto (>60%). Aumenta exposição a juros e riscos imobiliários.');
  if(acoesPct>70) L.push('• Ações com peso muito alto. Dividendos ficam mais irregulares e sujeitos a resultado trimestral.');
  if(avgDY>12) L.push('• DY médio elevado (>12%). Confirme se os rendimentos são recorrentes, não eventos isolados.');
  if(avgDY>0&&avgDY<5) L.push('• DY médio baixo. Novos aportes em ativos de renda podem acelerar o crescimento da renda passiva.');
  L.push('');
  if(divGoal>0){
    L.push(`💰 OBJETIVO: ${fmt(divGoal)}/mês`);
    if(mD>=divGoal) L.push(`• ✅ Objetivo atingido! Foco agora é sustentabilidade e diversificação da renda.`);
    else{ L.push(`• Falta ${fmt(faltaDiv)}/mês para o objetivo.`); if(alvoPat>0) L.push(`• Patrimônio estimado para atingir o objetivo com DY atual: ${fmt(alvoPat)} (falta ${fmt(Math.max(0,alvoPat-tC))})`); }
    L.push('');
  }
  L.push('✅ SUGESTÕES PRÁTICAS');
  L.push('• Priorize ativos/setores abaixo do peso desejado nos próximos aportes.');
  L.push('• Evite aumentar posição que já está acima de 20% da carteira.');
  L.push('• Confirme que o DY reflete rendimentos recorrentes, não extraordinários.');
  L.push('• Registre o motivo de cada compra na aba Aportes para acompanhar a estratégia.');
  L.push('');
  L.push('⚠️ Análise automática. Não constitui recomendação de investimento. Consulte um profissional habilitado.');
  S.aiText=L.join('\n'); render();
}

function bind(){
  document.querySelectorAll('.fc input:not([disabled]),.fc select').forEach(el=>{
    el.addEventListener('keydown',e=>{ if(e.key==='Enter'){ if(S.showA) svA(); else if(S.showP) svP(); else if(S.showD) svD(); } });
  });
}

if('serviceWorker' in navigator && location.protocol!=='file:'){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(reg=>{
      if(reg && reg.update) reg.update().catch(()=>{});
    }).catch(()=>{});
  });
}
setInterval(()=>{
  S.cd=Math.max(0,S.cd-1);
  if(S.cd<=0){ S.cd=QI; fetchQuotes(false); return; }
  const el=document.getElementById('cd-span');
  if(el) el.textContent=S.cd;
},1000);
