function passiveIncomeTopPayers(limit=5, monthKeys=null){
  const keys=Array.isArray(monthKeys) && monthKeys.length ? new Set(monthKeys) : null;
  const map=new Map();
  (S.proventos||[]).forEach((p,idx)=>{
    const dt=parseAnyDate(p?.date);
    const value=Number(p?.value)||0;
    if(!dt || value<=0) return;
    const monthKey=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
    if(keys && !keys.has(monthKey)) return;
    const meta=proventoAssetMeta(p);
    const ticker=String(p?.ticker||meta.asset?.ticker||meta.title||'').trim().toUpperCase() || '—';
    const name=String(meta.title || p?.assetName || ticker || '—').trim() || '—';
    const type=String(meta.type || proventoAssetTypeLabel(meta.asset,p) || 'Ação').trim() || 'Ação';
    const key=ticker || name;
    if(!map.has(key)){
      map.set(key,{key,ticker,name,type,total:0,count:0,lastDate:'',sourceIndex:idx});
    }
    const row=map.get(key);
    row.total+=value;
    row.count++;
    const iso=toISODate(dt);
    if(iso && iso>row.lastDate) row.lastDate=iso;
  });
  return [...map.values()].sort((a,b)=>b.total-a.total || b.count-a.count).slice(0,limit);
}
function passiveIncomeGoalStats(){
  const target=passiveIncomeGoalTarget();
  const monthKeys=passiveIncomeRollingMonthKeys(new Date(), 12);
  const monthMap=new Map(monthKeys.map(key=>[key,{key,total:0,count:0}]));
  let total12=0;
  const currentMonthKey=monthKeys[monthKeys.length-1] || '';
  (S.proventos||[]).forEach(p=>{
    const dt=parseAnyDate(p?.date);
    const value=Number(p?.value)||0;
    if(!dt || value<=0) return;
    const key=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
    if(!monthMap.has(key)) return;
    const row=monthMap.get(key);
    row.total+=value;
    row.count++;
    total12+=value;
  });
  const monthlyAvg=total12/12;
  const annualProjection=monthlyAvg*12;
  const percent=target>0 ? (monthlyAvg/target)*100 : 0;
  const missing=Math.max(0, target-monthlyAvg);
  const currentMonthTotal=monthMap.get(currentMonthKey)?.total || 0;
  const byMonth=[...monthMap.values()];
  const topPayers=passiveIncomeTopPayers(5, monthKeys);
  const bestPayer=topPayers[0] || null;
  return {
    target,
    monthKeys,
    byMonth,
    total12,
    monthlyAvg,
    annualProjection,
    percent,
    missing,
    currentMonthKey,
    currentMonthTotal,
    topPayers,
    bestPayer,
    hasData: total12>0 || topPayers.length>0
  };
}

function proventoAuditEnsureState(){
  if(!S.proventoAudit || typeof S.proventoAudit!=='object') S.proventoAudit={month:'', eventType:'all', ticker:'', onlyDuplicates:false, selectedIds:[]};

  const months=proventoAuditMonthOptions();

  return state;

function proventoAuditMonthOptions(){
  const months=new Map();
  (S.proventos||[]).forEach((p,idx)=>{
    const key=proventoAuditMonthKey(p.date);
    if(!key) return;
    if(!months.has(key)){
      months.set(key,{

        index:idx
      });

  });
  const list=[...months.values()].sort((a,b)=>b.key.localeCompare(a.key));
  if(!list.length){
    const fallback=proventoAuditMonthKey(new Date());
    if(fallback) list.push({key:fallback, label:proventoAuditMonthLabel(fallback), index:0});
  }

function proventoAuditBuildRows(){
  const state=proventoAuditEnsureState();
  const all=(S.proventos||[]).map((p,idx)=>{
    const date=String(p.date||'').trim();
    const dt=parseAnyDate(date);
    const monthKey=proventoAuditMonthKey(date);
    const eventType=proventoAuditEntryType(p);
    const ticker=String(p.ticker||'').trim().toUpperCase();
    const value=Number(p.value)||0;
    const assetMeta=proventoAssetMeta(p);
    const name=String(p.assetName||assetMeta.title||p.note||'—').trim() || '—';
    const source=String(p.source||'—').trim() || '—';
    const autoKey=String(p.autoKey||'—').trim() || '—';
    const dupKey=[ticker||'—', date||'—', eventType||'—', value.toFixed(2)].join('|');
    return {
      sourceItem:p,
      auditId:proventoAuditEntryId(p, idx),
      auditIndex:idx,
      date,
      dateKey:dt ? toISODate(dt) : '',
      monthKey,
      ticker: ticker || '—',
      name,
      eventType,
      value,
      source,
      autoKey,
      dupKey
    };
  });
  const groups=new Map();
  all.forEach(row=>{
    if(!groups.has(row.dupKey)) groups.set(row.dupKey, []);
    groups.get(row.dupKey).push(row);
  });
  all.forEach(row=>{
    const group=groups.get(row.dupKey)||[];
    row.dupCount=group.length;
    row.dupIndex=group.findIndex(x=>x.auditId===row.auditId);
    row.isDuplicateGroup=group.length>1;
    row.isPrimary=row.dupIndex===0;
    row.canRemove=row.isDuplicateGroup && !row.isPrimary;
    row.status=row.isDuplicateGroup ? (row.isPrimary ? 'OK' : 'Possível duplicado') : 'OK';
    row.statusClass=row.isDuplicateGroup ? (row.isPrimary ? 'ok' : 'warn') : 'ok';
    row.statusLabel=row.isDuplicateGroup
      ? (row.isPrimary ? `OK · grupo ${group.length}` : `Possível duplicado · ${row.dupIndex+1}/${group.length}`)
      : 'OK';
    row.obs=row.isDuplicateGroup
      ? (row.isPrimary ? `Mantido como primeiro lançamento do grupo de ${group.length}.` : `Possível duplicado extra do mesmo grupo.`)
      : 'Sem duplicidade aparente.';
  });
  const tickerFilter=rfPosNorm(state.ticker||'');
  const eventFilter=String(state.eventType||'all').trim();
  const monthFilter=String(state.month||'').trim();
  const filteredBase=all.filter(row=>{
    if(monthFilter && row.monthKey!==monthFilter) return false;
    if(eventFilter!=='all' && row.eventType!==eventFilter) return false;
    if(tickerFilter){
      const hay=rfPosNorm(`${row.ticker} ${row.name} ${row.source} ${row.autoKey}`);
      if(!hay.includes(tickerFilter)) return false;
    }
    return true;
  });
  const visibleRows=(state.onlyDuplicates ? filteredBase.filter(r=>r.canRemove) : filteredBase)
    .slice()
    .sort((a,b)=> (b.dateKey||'').localeCompare(a.dateKey||'') || a.ticker.localeCompare(b.ticker) || a.eventType.localeCompare(b.eventType));
  const total=filteredBase.reduce((s,r)=>s+r.value,0);
  const dupRows=filteredBase.filter(r=>r.canRemove);
  const dupTotal=dupRows.reduce((s,r)=>s+r.value,0);
  const summary={
    total,
    count:filteredBase.length,
    duplicates:dupRows.length,
    dupTotal,
    cleanTotal:Math.max(0,total-dupTotal),
    selected: (state.selectedIds||[]).filter(id=>dupRows.some(r=>r.auditId===id)).length
  };
  return {state, all, filteredBase, rows:visibleRows, summary};
}

function reserveStats(){
  const out={bolsa:0,pessoal:0,total:0,entries:0};
  S.aportes.forEach(a=>{
    const type=String(a.type||a.asset_type||'').trim();
    const op=String(a.operation||a.op||'compra').toLowerCase();
    const isReserve=type==='Reserva de emergência' || op.startsWith('reserva');
    if(!isReserve) return;
    const raw=Number(a.price)||0;
    const qty=Math.max(1, Math.abs(Number(a.qty)||1));
    const value=raw*qty;
    const sign=(op.includes('saida') || op==='venda') ? -1 : 1;
    const target=String(a.reserveTarget||a.sector||a.asset_sector||'bolsa').toLowerCase();
    const bucket=target.includes('pess') ? 'pessoal' : 'bolsa';
    out[bucket]+=sign*value;
    out.entries++;
  });
  out.total=out.bolsa+out.pessoal;
  return out;
}

function irpfBuildYearReport(year){
  const y=Number(year)||new Date().getFullYear();
  const bucketOrder=['Ações','FII','ETF','BDR','Renda Fixa'];
  const months=Array.from({length:12},(_,idx)=>({
    key:`${y}-${String(idx+1).padStart(2,'0')}`,
    label:irpfMonthLabel(idx),
    buys:0,
    sells:0,
    salesByBucket:Object.fromEntries(bucketOrder.map(b=>[b,0])),
    realizedByBucket:Object.fromEntries(bucketOrder.map(b=>[b,0])),
    taxByBucket:Object.fromEntries(bucketOrder.map(b=>[b,0])),
    exemptByBucket:Object.fromEntries(bucketOrder.map(b=>[b,0])),
    carryByBucket:Object.fromEntries(bucketOrder.map(b=>[b,0])),
    lossUsedByBucket:Object.fromEntries(bucketOrder.map(b=>[b,0])),
    events:[]
  }));
  const holdings=new Map();
  const carryByBucket=Object.fromEntries(bucketOrder.map(b=>[b,0]));
  const txs=[...S.aportes]
    .map(a=>({...a,_dt:parseAnyDate(a.date)}))
    .filter(a=>a._dt && a._dt.getFullYear()===y)
    .sort((a,b)=>a._dt-b._dt||((Number(a.id)||0)-(Number(b.id)||0)));
  const provs=[...S.proventos]
    .map(p=>({...p,_dt:parseAnyDate(p.date)}))
    .filter(p=>p._dt && p._dt.getFullYear()===y && Number(p.value)>0)
    .sort((a,b)=>a._dt-b._dt||String(a.ticker||'').localeCompare(String(b.ticker||'')));

  const ensurePos=(ticker)=>{
    const tk=String(ticker||'').toUpperCase();
    if(!holdings.has(tk)){
      const meta=metaTicker(tk);
      holdings.set(tk,{ticker:tk,qty:0,cost:0,type:meta.type||'Ação',sector:meta.sector||''});
    }
    return holdings.get(tk);
  };

  txs.forEach(tx=>{
    const rawTicker=cleanAssetCode(tx.ticker||'')||String(tx.ticker||'').trim().toUpperCase();
    if(!rawTicker) return;
    const type=normalizeType(tx.type||tx.asset_type||metaTicker(rawTicker).type||'Ação','Ação');
    const isReserve=type==='Reserva de emergência' || String(tx.operation||tx.op||'').toLowerCase().startsWith('reserva');
    if(isReserve) return;

    const month=months[tx._dt.getMonth()];
    const qty=Math.abs(Number(tx.qty)||0);
    const price=Math.abs(Number(tx.price)||0);
    const op=String(tx.operation||tx.op||'compra').toLowerCase();
    const bucket=irpfTaxBucket(type);
    const pos=ensurePos(rawTicker);
    pos.type=type;
    pos.sector=tx.sector||tx.asset_sector||pos.sector||metaTicker(rawTicker).sector||'';

    if(op==='venda'){
      const avgBefore=pos.qty>0 ? (pos.cost/pos.qty) : 0;
      const saleValue=qty*price;
      const costBasis=avgBefore*qty;
      const realized=saleValue-costBasis;
      pos.qty=Math.max(0,pos.qty-qty);
      pos.cost=Math.max(0,pos.cost-costBasis);
      month.sells+=saleValue;
      month.salesByBucket[bucket]+=saleValue;
      month.events.push({bucket, realized, saleValue, type});
      return;
    }

    pos.qty+=qty;
    pos.cost+=qty*price;
    month.buys+=qty*price;
  });

  months.forEach(month=>{
    const equitySalesTotal=month.salesByBucket['Ações'];
    month.events.forEach(evt=>{
      const rate=irpfTaxRate(evt.bucket);
      const canUseExemption = evt.bucket==='Ações' && equitySalesTotal<=20000;
      if(canUseExemption){
        if(evt.realized>0) month.exemptByBucket[evt.bucket]+=evt.realized;
        else month.lossUsedByBucket[evt.bucket]+=evt.realized;
        month.realizedByBucket[evt.bucket]+=evt.realized;
        return;
      }

      const priorCarry=Number(carryByBucket[evt.bucket]||0);
      const net=evt.realized + priorCarry;
      month.realizedByBucket[evt.bucket]+=evt.realized;
      if(net>0){
        month.taxByBucket[evt.bucket]+=net*(rate/100);
        carryByBucket[evt.bucket]=0;
      }else{
        carryByBucket[evt.bucket]=net;
        month.lossUsedByBucket[evt.bucket]+=net;
      }
    });
    bucketOrder.forEach(bucket=>{
      month.carryByBucket[bucket]=carryByBucket[bucket];
    });
    delete month.events;
  });

  const finalPositions=[...holdings.values()]
    .filter(p=>p.qty>0.000001)
    .map(p=>{
      const avg=p.qty>0 ? p.cost/p.qty : 0;
      const current=Number((S.assets.find(a=>String(a.ticker||'').toUpperCase()===p.ticker)?.current_price)||0);
      const bucket=irpfTaxBucket(p.type);
      return {
        ticker:p.ticker,
        type:p.type,
        bucket,
        sector:p.sector||metaTicker(p.ticker).sector||'',
        qty:p.qty,
        cost:p.cost,
        avg,
        current,
        marketValue: current>0 ? p.qty*current : p.cost,
        note: bucket==='FII'
          ? 'Ficha Bens e Direitos'
          : bucket==='ETF'
            ? 'ETF: conferir enquadramento'
            : bucket==='BDR'
              ? 'BDR: verificar custo em reais'
              : bucket==='Renda Fixa'
                ? 'Renda fixa: apurar IR do resgate/vencimento'
                : 'Ações: posição em 31/12'
      };
    })
    .sort((a,b)=>a.bucket.localeCompare(b.bucket)||a.ticker.localeCompare(b.ticker));

  const yearProvents=provs.map(p=>{
    const type=String(p.type||'').trim();
    const bucket=irpfDividendBucketLabel(type);
    const value=Number(p.value)||0;
    return { ...p, bucket, value };
  });

  const positionsByBucket=finalPositions.reduce((acc,p)=>{
    if(!acc[p.bucket]) acc[p.bucket]=[];
    acc[p.bucket].push(p);
    return acc;
  },{});

  const totalsByBucket=months.reduce((acc,month)=>{
    bucketOrder.forEach(bucket=>{
      if(!acc[bucket]) acc[bucket]={sales:0, realized:0, exempt:0, tax:0, carry:0};
      acc[bucket].sales+=Number(month.salesByBucket[bucket]||0);
      acc[bucket].realized+=Number(month.realizedByBucket[bucket]||0);
      acc[bucket].exempt+=Number(month.exemptByBucket[bucket]||0);
      acc[bucket].tax+=Number(month.taxByBucket[bucket]||0);
      acc[bucket].carry=Number(month.carryByBucket[bucket]||0);
    });
    return acc;
  },{});

  const totalBuys=months.reduce((s,m)=>s+m.buys,0);
  const totalSells=months.reduce((s,m)=>s+m.sells,0);
  const totalTax=months.reduce((s,m)=>s+bucketOrder.reduce((x,b)=>x+Number(m.taxByBucket[b]||0),0),0);
  const totalTaxableGain=months.reduce((s,m)=>s+bucketOrder.reduce((x,b)=>x+Math.max(0, Number(m.realizedByBucket[b]||0)+Math.max(0,Number(m.carryByBucket[b]||0))),0),0);
  const totalExemptGain=months.reduce((s,m)=>s+Number(m.exemptByBucket['Ações']||0),0);
  const totalLossCarry=months.reduce((s,m)=>s+bucketOrder.reduce((x,b)=>x+Math.min(0, Number(m.carryByBucket[b]||0)),0),0);
  const liquidationYearEnd=finalPositions.reduce((s,p)=>s+p.cost,0);
  const totalProvents=yearProvents.reduce((s,p)=>s+(Number(p.value)||0),0);
  const taxableProvents=yearProvents.filter(p=>String(p.bucket).includes('Tributação')).reduce((s,p)=>s+(Number(p.value)||0),0);
  const exemptProvents=totalProvents-taxableProvents;

  return {
    year:y,
    months,
    positions:finalPositions,
    positionsByBucket,
    provents:yearProvents,
    bucketOrder,
    totalsByBucket,
    totals:{
      buys:totalBuys,
      sells:totalSells,
      taxableGain:totalTaxableGain,
      exemptGain:totalExemptGain,
      tax:totalTax,
      lossCarry:totalLossCarry,
      proventsTotal:totalProvents,
      proventsExempt:exemptProvents,
      proventsTaxable:taxableProvents,
      yearEndCost:liquidationYearEnd,
    }
  };
}
function irpfIsRfPosition(row){
  return normalizeType(row?.type||'Ação','Ação')==='Renda Fixa' || row?.bucket==='Renda Fixa';
}
function irpfProventoCategory(p){
  const meta=proventoAssetMeta(p);
  const event=proventoTipoCanonical(p?.eventType||p?.type);
  const assetType=normalizeType(meta?.asset?.type||meta?.type||'Ação','Ação');
  const text=rfPosNorm(`${p?.assetName||''} ${p?.ticker||''} ${p?.eventType||''} ${p?.type||''}`);
  if(event==='JCP') return {bucket:'JCP', group:'Tributação exclusiva', label:'JCP'};
  if(event==='Rendimento' && assetType==='FII') return {bucket:'Rendimentos de FIIs', group:'Isento / não tributável', label:'Rendimento de FII'};
  if(event==='Dividendo') return {bucket:'Dividendos', group:'Isento / não tributável', label:'Dividendo'};
  if(event==='Juros de Renda Fixa') return {bucket:'Juros de Renda Fixa', group:'Tributação exclusiva', label:'Juros de Renda Fixa'};
  if(event==='Reembolso') return {bucket:'Reembolso', group:'Outros', label:'Reembolso'};
  if(event==='Rendimento' && /FII|FUNDO IMOBILIARIO|FUNDOS IMOBILIARIOS|IMOBILIARIO/.test(text)) return {bucket:'Rendimentos de FIIs', group:'Isento / não tributável', label:'Rendimento de FII'};
  if(assetType==='FII' && event!=='JCP') return {bucket:'Rendimentos de FIIs', group:'Isento / não tributável', label:'Rendimento de FII'};
  if(assetType==='Renda Fixa') return {bucket:'Juros de Renda Fixa', group:'Tributação exclusiva', label:event || 'Juros de Renda Fixa'};
  return {bucket:'Outros', group:'Outros', label:event || 'Outro'};
}
function irpfAlertItems(report){
  const items=[];
  const assets=(S.assets||[]);
  const rfAssets=assets.filter(isRendaFixaAsset);
  const noType=assets.filter(a=>!String(a.type||metaTicker(a.ticker).type||'').trim()).slice(0,12);
  const noQty=assets.filter(a=>Number(a.qty)<=0).slice(0,12);
  const noAvg=assets.filter(a=>Number(a.avg_price)<=0 && !isRendaFixaAsset(a)).slice(0,12);
  const noProventoCat=(S.proventos||[])
    .map(p=>({p, cat:irpfProventoCategory(p)}))
    .filter(row=>!row.cat.bucket || row.cat.bucket==='Outros')
    .slice(0,12);
  const rfNoDue=rfAssets.filter(a=>!assetRfMaturityDate(a)).slice(0,12);
  const rfNoCurrent=rfAssets.filter(a=>!assetRfCurrentValueMeta(a).source || assetRfCurrentValueMeta(a).source==='valor aplicado').slice(0,12);
  noType.forEach(a=>items.push({tone:'warn',label:'Ativo sem tipo',value:String(a.ticker||a.name||'—'),hint:'Verifique o tipo antes de fechar a declaração.'}));
  noQty.forEach(a=>items.push({tone:'warn',label:'Ativo sem quantidade',value:String(a.ticker||a.name||'—'),hint:'A posição precisa ter quantidade para compor Bens e Direitos.'}));
  noAvg.forEach(a=>items.push({tone:'warn',label:'Ativo sem preço médio',value:String(a.ticker||a.name||'—'),hint:'O IRPF usa custo de aquisição como referência principal.'}));
  noProventoCat.forEach(row=>items.push({tone:'info',label:'Provento sem categoria',value:String(row.p.ticker||row.p.assetName||'—'),hint:'Classifique dividendos, JCP, FIIs ou outros antes de declarar.'}));
  rfNoDue.forEach(a=>items.push({tone:'warn',label:'Renda fixa sem vencimento',value:String(a.ticker||assetRfName(a)||'—'),hint:'Falta a data de vencimento para conferir o título.'}));
  rfNoCurrent.forEach(a=>items.push({tone:'warn',label:'Renda fixa sem valor atual',value:String(a.ticker||assetRfName(a)||'—'),hint:'Informe valor bruto ou líquido para melhorar a conferência.'}));
  if(!assets.length) items.push({tone:'muted',label:'Sem ativos cadastrados',value:'—',hint:'Cadastre posições para gerar o relatório.'});
  return items;
}
function irpfSummaryMetrics(report, year){
  const byCat=report.provents.reduce((acc,p)=>{
    const cat=irpfProventoCategory(p).bucket;
    acc[cat]=(acc[cat]||0)+(Number(p.value)||0);
    return acc;
  },{});
  const rfValue=report.positions.filter(irpfIsRfPosition).reduce((s,p)=>s+Number(p.cost||0),0);
  const incomplete=irpfAlertItems(report).length;
  return {
    applied: report.totals.yearEndCost,
    provents: report.totals.proventsTotal,
    dividends: byCat['Dividendos']||0,
    jcp: byCat['JCP']||0,
    fii: byCat['Rendimentos de FIIs']||0,
    rf: rfValue,
    positions: report.positions.length,
    alerts: incomplete,
    year
  };
}
function irpfAssetsByCategory(report){
  const rows=report.positions.map(p=>({
    ...p,
    referenceValue:Number(p.marketValue)||0,
    acquisitionValue:Number(p.cost)||0,
    note:p.note || (irpfIsRfPosition(p) ? 'IRPF usa custo de aquisição como base principal.' : 'IRPF normalmente usa custo de aquisição, não valor de mercado.')
  }));
  const buckets=rows.reduce((acc,p)=>{
    if(!acc[p.bucket]) acc[p.bucket]=[];
    acc[p.bucket].push(p);
    return acc;
  },{});
  return {rows,buckets};
}
function irpfProventoSummary(report){
  const rows=report.provents.map(p=>{
    const cat=irpfProventoCategory(p);
    const meta=proventoAssetMeta(p);
    return {
      date:p.date,
      ticker:String(p.ticker||meta.asset?.ticker||'—').trim()||'—',
      assetName:meta.title||p.assetName||p.ticker||'—',
      eventType:proventoTipoCanonical(p.eventType||p.type),
      category:cat.bucket,
      group:cat.group,
      value:Number(p.value)||0,
      source:String(p.source||'').trim()||'—',
      bucket:cat.bucket
    };
  });
  const byAsset=rows.reduce((acc,row)=>{
    const key=row.ticker || row.assetName;
    if(!acc[key]) acc[key]={ticker:row.ticker, assetName:row.assetName, total:0, count:0, dividendos:0, jcp:0, fii:0, outros:0};
    const item=acc[key];
    item.total+=row.value;
    item.count++;
    if(row.bucket==='Dividendos') item.dividendos+=row.value;
    else if(row.bucket==='JCP') item.jcp+=row.value;
    else if(row.bucket==='Rendimentos de FIIs') item.fii+=row.value;
    else item.outros+=row.value;
    return acc;
  },{});
  const byCategory=rows.reduce((acc,row)=>{
    acc[row.bucket]=(acc[row.bucket]||0)+row.value;
    return acc;
  },{});
  return {
    rows:rows.sort((a,b)=>new Date(b.date)-new Date(a.date)||b.value-a.value||a.ticker.localeCompare(b.ticker)),
    byAsset:Object.values(byAsset).sort((a,b)=>b.total-a.total),
    byCategory
  };
}
function irpfRendaFixaRows(report){
  return report.positions
    .filter(irpfIsRfPosition)
    .map(p=>{
      const currentMeta=assetRfCurrentValueMeta(p);
      const due=assetRfMaturityDate(p);
      const app=assetRfApplicationDate(p);
      const alerts=[];
      if(!assetRfContractRate(p)) alerts.push('Sem taxa');
      if(!due) alerts.push('Sem vencimento');
      if(!currentMeta.source || currentMeta.source==='valor aplicado') alerts.push('Sem valor atual');
      return {
        ticker:p.ticker,
        name:assetRfName(p)||p.sector||p.type||p.ticker||'Renda Fixa',
        type:assetRfSubtype(p),
        issuer:String(p.fixed_issuer||p.issuer||'').trim()||'—',
        applied:Number(p.cost)||0,
        current:Number(p.marketValue)||0,
        average:Number(p.avg)||0,
        app,
        due,
        note:p.note || 'IRPF usa custo de aquisição como base principal.',
        alerts,
        source:currentMeta.source || 'valor aplicado'
      };
    })
    .sort((a,b)=>{
      const ad=a.due?new Date(a.due).getTime():9999999999999;
      const bd=b.due?new Date(b.due).getTime():9999999999999;
      return ad-bd || b.applied-a.applied || a.ticker.localeCompare(b.ticker);
    });
}
function irpfCsvBuild(report, year){
  const lines=[];
  const nowLabel=new Date().toLocaleString('pt-BR');
  const summary=irpfSummaryMetrics(report, year);
  const proventos=irpfProventoSummary(report);
  const rfRows=irpfRendaFixaRows(report);
  const alerts=irpfAlertItems(report);
  lines.push(`IRPF;Ano-base;${year}`);
  lines.push(`Gerado em;${nowLabel}`);
  lines.push('ORIGEM;carteira-investimentos');
  lines.push('');
  lines.push('RESUMO');
  lines.push(['Indicador','Valor'].map(irpfCsvEscape).join(';'));
  [
    ['Total aplicado em ativos', summary.applied],
    ['Total de proventos no ano', summary.provents],
    ['Total de dividendos', summary.dividends],
    ['Total de JCP', summary.jcp],
    ['Total de rendimentos de FIIs', summary.fii],
    ['Total de renda fixa', summary.rf],
    ['Quantidade de ativos com posição', summary.positions],
    ['Alertas de dados incompletos', summary.alerts],
  ].forEach(([k,v])=>lines.push([k, fmt(Number(v)||0)].map(irpfCsvEscape).join(';')));
  lines.push('');
  lines.push('BENS_E_DIREITOS');
  lines.push(['Ticker','Classe','Quantidade','Preco medio','Custo de aquisicao','Valor atual referencia','Observacao'].map(irpfCsvEscape).join(';'));
  report.positions.forEach(p=>{
    lines.push([
      p.ticker,
      p.bucket,
      p.qty,
      p.avg,
      p.cost,
      p.marketValue,
      p.note
    ].map(v=>typeof v==='number'?fmt(v):String(v||'')).map(irpfCsvEscape).join(';'));
  });
  lines.push('');
  lines.push('PROVENTOS_DO_ANO');
  lines.push(['Data','Ticker','Ativo','Evento','Categoria','Grupo','Valor','Fonte'].map(irpfCsvEscape).join(';'));
  proventos.rows.forEach(p=>{
    lines.push([p.date,p.ticker,p.assetName,p.eventType,p.category,p.group,p.value,p.source].map(v=>typeof v==='number'?fmt(v):String(v||'')).map(irpfCsvEscape).join(';'));
  });
  lines.push('');
  lines.push('PROVENTOS_POR_CATEGORIA');
  lines.push(['Categoria','Total'].map(irpfCsvEscape).join(';'));
  Object.entries(proventos.byCategory).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{
    lines.push([k, fmt(v)].map(irpfCsvEscape).join(';'));
  });
  lines.push('');
  lines.push('PROVENTOS_POR_ATIVO');
  lines.push(['Ticker','Ativo','Total','Qtd lançamentos','Dividendos','JCP','FIIs','Outros'].map(irpfCsvEscape).join(';'));
  proventos.byAsset.forEach(r=>{
    lines.push([r.ticker,r.assetName,r.total,r.count,r.dividendos,r.jcp,r.fii,r.outros].map(v=>typeof v==='number'?fmt(v):String(v||'')).map(irpfCsvEscape).join(';'));
  });
  lines.push('');
  lines.push('RENDA_FIXA');
  lines.push(['Ticker','Tipo','Emissor','Valor aplicado','Valor atual referencia','Data aplicacao','Data vencimento','Fonte','Alertas'].map(irpfCsvEscape).join(';'));
  rfRows.forEach(r=>{
    lines.push([r.ticker,r.type,r.issuer,r.applied,r.current,r.app||'',r.due||'',r.source,r.alerts.join(' | ')||'—'].map(v=>typeof v==='number'?fmt(v):String(v||'')).map(irpfCsvEscape).join(';'));
  });
  lines.push('');
  lines.push('ALERTAS');
  lines.push(['Tipo','Elemento','Observacao'].map(irpfCsvEscape).join(';'));
  alerts.forEach(a=>{
    lines.push([a.label,a.value,a.hint].map(v=>String(v||'')).map(irpfCsvEscape).join(';'));
  });
  return lines.join('\r\n');
}
function irpfExportCSV(){
  return withVisibleValues(()=>{
  const year=irpfSelectedYear();
  const report=irpfBuildYearReport(year);
  const today=new Date();
  const name=`carteira-irpf-${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}-ano-base-${year}.csv`;
  irpfDownloadText(name, irpfCsvBuild(report, year), 'text/csv;charset=utf-8');
  toast(`✅ CSV do IRPF ${year} exportado.`);
  });
}

function irpfFinalSummaryText(report){
  const y=report.year;
  const taxDue=Math.max(0, Number(report.totals.tax)||0);
  const posCount=report.positions.length;
  const provCount=report.provents.length;
  const totalMarket=report.positions.reduce((s,p)=>s+Number(p.marketValue||0),0);
  const buckets=report.bucketOrder.map(bucket=>{
    const data=report.totalsByBucket[bucket]||{};
    const label={ 'Ações':'Ações', 'FII':'FIIs', 'ETF':'ETFs', 'BDR':'BDRs', 'Renda Fixa':'Renda Fixa' }[bucket] || bucket;
    return `${label}: ${fmt(data.realized||0)} realizado, ${fmt(data.tax||0)} IR estimado`;
  }).join('\n');
  return `IRPF ${y}
Resumo para conferência da declaração

1) Posições em 31/12
- ${posCount} posições apuradas
- Valor de mercado estimado: ${fmt(totalMarket)}
- Custo de aquisição em 31/12: ${fmt(report.totals.yearEndCost)}

2) Proventos do ano
- ${provCount} lançamentos
- Total de proventos: ${fmt(report.totals.proventsTotal)}
- Isentos: ${fmt(report.totals.proventsExempt)}
- Tributáveis: ${fmt(report.totals.proventsTaxable)}

3) Apuração e DARF
- Ganhos tributáveis: ${fmt(report.totals.taxableGain)}
- Ganhos isentos: ${fmt(report.totals.exemptGain)}
- DARF estimado: ${fmt(taxDue)}
- Prejuízo acumulado: ${report.totals.lossCarry<0 ? fmt(Math.abs(report.totals.lossCarry)) : 'Nenhum'}

4) Quebra por tipo
${buckets}

Checklist final
- Conferir posição em 31/12 na ficha de Bens e Direitos.
- Conferir rendimentos isentos e tributáveis com os informes.
- Conferir meses com vendas tributáveis e eventual DARF.
- Validar tudo no programa oficial antes de enviar.
`;
}

const DATA_AUDIT_AREAS=['Ativos','Dividendos/Proventos','Renda Fixa','Patrimônio','IRPF','Metas','Backup/Configurações'];
function dataAuditSeverityLabel(severity){
  return severity==='critical' ? 'Crítico' : severity==='warning' ? 'Atenção' : 'Info';
}
function dataAuditItemName(item, fallback='Registro'){
  return String(item?.ticker||item?.name||item?.product||item?.assetName||item?.title||fallback).trim() || fallback;
}
function dataAuditAlerts(){
  const alerts=[];
  let checks=0;
  let failed=0;
  const add=(severity,area,item,problem,impact,fix)=>{
    alerts.push({
      id:`audit-${alerts.length+1}`,
      severity,area,
      item:String(item||'Registro'),
      problem:String(problem||'Dado incompleto.'),
      impact:String(impact||'Pode reduzir a confiabilidade das análises.'),
      fix:String(fix||'Revise o cadastro manualmente.')
    });
  };
  const check=(ok,alert)=>{
    checks++;
    if(ok) return;
    failed++;
    add(...alert);
  };

  (S.assets||[]).forEach((asset,index)=>{
    const item=dataAuditItemName(asset,`Ativo ${index+1}`);
    const ticker=String(asset?.ticker||'').trim();
    const rawType=String(asset?.type||asset?.category||'').trim();
    const qty=Number(asset?.qty);
    const avg=Number(asset?.avg_price);
    const current=Number(asset?.current_price);
    check(!!ticker,['critical','Ativos',item,'Ativo sem ticker/código.','Pode impedir identificação, cotação, agrupamento e conferência no IRPF.','Edite o ativo e informe um ticker ou código válido.']);
    check(!!rawType,['critical','Ativos',item,'Ativo sem tipo ou classe.','Afeta Dashboard, distribuição, análise e classificação no IRPF.','Informe a classe correta, como Ação, FII, ETF ou Renda Fixa.']);
    check(Number.isFinite(qty)&&qty>0,['critical','Ativos',item,'Quantidade ausente, zerada ou inválida.','Compromete valor atual, concentração e rentabilidade.','Revise a quantidade da posição.']);
    check(Number.isFinite(avg)&&avg>0,['critical','Ativos',item,'Preço médio/custo de aquisição ausente.','Compromete resultado acumulado, Patrimônio e Bens e Direitos.','Informe o preço médio ou custo de aquisição correto.']);
    check(Number.isFinite(current)&&current>0,['warning','Ativos',item,'Preço atual ou valor de referência ausente.','Reduz a confiabilidade do patrimônio, concentração e análise.','Atualize a cotação de mercado ou informe o valor atual quando aplicável.']);
    check(![qty,avg,current].some(v=>Number.isFinite(v)&&v<0),['critical','Ativos',item,'Valor negativo incoerente no cadastro.','Pode inverter totais e distorcer cálculos principais.','Revise quantidade, preço médio e preço atual.']);

    if(isRendaFixaAsset(asset)){
      const values=rfValues(asset);
      const subtype=String(asset?.rf_subtype||asset?.fixed_subtype||asset?.bondType||asset?.sector||'').trim();
      const rate=String(asset?.rf_contract_rate||asset?.fixed_rate||asset?.rate||'').trim();
      const maturity=String(asset?.rf_maturity_date||asset?.fixed_maturity_date||asset?.maturityDate||asset?.vencimento||'').trim();
      const maturityDate=parseAnyDate(maturity);
      const issuer=String(asset?.fixed_issuer||asset?.issuer||asset?.institution||asset?.broker||'').trim();
      check(!!subtype,['warning','Renda Fixa',item,'Título sem tipo/subtipo definido.','Dificulta agrupamento e leitura da carteira de renda fixa.','Informe se é CDB, LCI, LCA, Tesouro, Debênture ou outro.']);
      check(Number(values.applied)>0,['critical','Renda Fixa',item,'Valor aplicado ausente ou zerado.','Impede calcular ganho e rentabilidade da posição.','Informe o valor efetivamente aplicado.']);
      check(!!values.hasExplicitCurrent&&Number(values.current)>0,['warning','Renda Fixa',item,'Valor atual, bruto ou líquido não informado.','O app usa o valor aplicado como referência e não acompanha o rendimento real.','Informe o valor atual apresentado pela corretora ou instituição.']);
      check(!!rate,['warning','Renda Fixa',item,'Taxa contratada ausente.','Impede uma leitura completa do título e estimativas futuras.','Informe a taxa, como 100% CDI, IPCA + taxa ou prefixado.']);
      check(!!maturity&&!!maturityDate,['warning','Renda Fixa',item,'Data de vencimento ausente ou inválida.','Impede alertas de vencimento e planejamento de liquidez.','Informe a data de vencimento correta.']);
      if(maturityDate && maturityDate.getTime()<new Date().setHours(0,0,0,0)){
        add('warning','Renda Fixa',item,'Título vencido sem baixa ou status claro.','Pode manter valor vencido como posição ativa.','Confirme resgate, liquidação ou atualização da posição.');
      }
      if(!(Number(values.applied)>0 && Number(values.current)>0 && rate && maturityDate)){
        add('info','Renda Fixa',item,'Dados insuficientes para estimativa completa.','A projeção até o vencimento fica limitada.','Complete valor, taxa e vencimento usando o informe da instituição.');
      }
      check(!!issuer,['info','IRPF',item,'Renda fixa sem instituição ou emissor.','Pode dificultar a descrição e conferência com o informe oficial.','Informe instituição, banco ou emissor do título.']);
      check(!!maturity,['warning','IRPF',item,'Renda fixa sem vencimento para conferência.','Deixa o relatório auxiliar de IRPF incompleto.','Informe o vencimento e confira com o documento oficial.']);
    }

    check(!!rawType,['critical','IRPF',item,'Ativo sem classe para Bens e Direitos.','Pode impedir a classificação adequada no relatório auxiliar.','Defina o tipo do ativo e confira o código aplicável no programa oficial.']);
    check(Number.isFinite(avg)&&avg>0,['critical','IRPF',item,'Ativo sem custo de aquisição confiável.','O valor de Bens e Direitos pode ficar incompleto.','Revise preço médio e operações usando notas e informes oficiais.']);
  });

  (S.proventos||[]).forEach((prov,index)=>{
    const item=dataAuditItemName(prov,`Provento ${index+1}`);
    const dateRaw=String(prov?.date||prov?.paymentDate||'').trim();
    const date=parseAnyDate(dateRaw);
    const ticker=String(prov?.ticker||prov?.assetName||'').trim();
    const value=Number(prov?.value);
    const rawType=String(prov?.eventType||prov?.type||prov?.category||'').trim();
    check(!!dateRaw&&!!date,['critical','Dividendos/Proventos',item,'Provento sem data válida.','Afeta histórico mensal, média de 12 meses e IRPF.','Informe a data real do pagamento.']);
    check(!!ticker,['warning','Dividendos/Proventos',item,'Provento sem ativo identificado.','Dificulta ranking de pagadores e conferência por ativo.','Informe ticker ou nome do ativo.']);
    check(Number.isFinite(value)&&value>0,['critical','Dividendos/Proventos',item,'Provento com valor ausente, zerado ou negativo.','Distorce totais mensais, renda passiva e relatório anual.','Revise o valor líquido recebido.']);
    check(!!rawType,['warning','Dividendos/Proventos',item,'Provento sem categoria ou tipo de evento.','Prejudica separação entre Dividendos, JCP, FIIs e Renda Fixa.','Classifique o evento corretamente.']);
    check(!!rawType,['warning','IRPF',item,'Provento sem categoria fiscal auxiliar.','Pode ficar fora do agrupamento correto do relatório IRPF.','Confira o tipo do evento com o informe oficial.']);
  });

  const validContributionMonths=new Set();
  const validContributionDates=[];
  (S.aportes||[]).forEach((entry,index)=>{
    const item=dataAuditItemName(entry,`Lançamento ${index+1}`);
    const rawDate=String(entry?.date||'').trim();
    const date=parseAnyDate(rawDate);
    const qty=Number(entry?.qty);
    const price=Number(entry?.price);
    const total=Number(entry?.totalValue ?? entry?.value ?? ((Number.isFinite(qty)&&Number.isFinite(price))?Math.abs(qty*price):0));
    check(!!rawDate&&!!date,['critical','Patrimônio',item,'Registro de aporte com data inválida.','Pode quebrar a ordem cronológica e a evolução mensal.','Corrija a data do lançamento.']);
    check(![qty,price,total].some(v=>Number.isFinite(v)&&v<0),['critical','Patrimônio',item,'Registro com quantidade, preço ou valor negativo incoerente.','Pode inverter aportes e distorcer patrimônio aplicado.','Use o tipo da operação para Compra/Venda e mantenha valores absolutos válidos.']);
    if(date){
      validContributionDates.push(date);
      validContributionMonths.add(`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`);
    }
  });
  if(validContributionDates.length){
    const sorted=validContributionDates.sort((a,b)=>a-b);
    const cursor=new Date(sorted[0].getFullYear(),sorted[0].getMonth(),1);
    const end=new Date(sorted.at(-1).getFullYear(),sorted.at(-1).getMonth(),1);
    const missing=[];
    while(cursor<=end && missing.length<120){
      const key=`${cursor.getFullYear()}-${String(cursor.getMonth()+1).padStart(2,'0')}`;
      if(!validContributionMonths.has(key)) missing.push(cursor.toLocaleDateString('pt-BR',{month:'2-digit',year:'numeric'}));
      cursor.setMonth(cursor.getMonth()+1);
    }
    if(missing.length) add('info','Patrimônio',`${missing.length} mês${missing.length===1?'':'es'}`,'Existem meses sem registro de aporte no intervalo analisado.','A evolução mensal pode ter períodos sem movimento, reduzindo a leitura comparativa.','Confirme se realmente não houve aporte nesses meses.');
  }
  if(validContributionMonths.size<2){
    add('warning','Patrimônio','Evolução mensal','Poucos meses com dados válidos.','Não há histórico suficiente para uma evolução patrimonial confiável.','Mantenha os aportes históricos com datas corretas.');
  }

  const target=passiveIncomeGoalTarget();
  check(target>0,['warning','Metas','Renda passiva','Meta mensal de renda passiva ausente ou zerada.','Dashboard e acompanhamento de progresso ficam sem referência.','Defina o objetivo mensal de dividendos na aba Metas.']);
  const currentGoal=Number(S.goals?.proventos?.monthly)||0;
  const legacyGoal=Number(S.divGoal)||0;
  if(currentGoal>0 && legacyGoal>0 && Math.abs(currentGoal-legacyGoal)>0.01){
    add('info','Metas','Renda passiva','Existem valores diferentes entre a meta atual e o campo legado.','O app usa a meta atual primeiro, mas a diferença pode causar dúvida em conferências antigas.','Mantenha a meta atual na aba Metas e confira backups antigos antes de restaurar.');
  }

  const localRecords=(S.assets?.length||0)+(S.aportes?.length||0)+(S.proventos?.length||0);
  if(localRecords>0){
    add('info','Backup/Configurações','Proteção dos dados','A auditoria não consegue confirmar quando o último backup foi exportado.','Dados somente locais podem ser perdidos ao limpar o navegador ou trocar de computador.','Exporte um backup JSON recente em Configurações > Backup e restauração.');
  }

  return {alerts,checks,failed};
}
function dataAuditSnapshot(){
  const data=dataAuditAlerts();
  const counts={critical:0,warning:0,info:0};
  const areas={};
  data.alerts.forEach(alert=>{
    counts[alert.severity]=(counts[alert.severity]||0)+1;
    areas[alert.area]=(areas[alert.area]||0)+1;
  });
  const score=data.checks>0 ? Math.max(0,Math.round(((data.checks-data.failed)/data.checks)*100)) : 100;
  const affected=Object.entries(areas).sort((a,b)=>b[1]-a[1]);
  return {...data,counts,areas,affected,score};
}

function dataAuditTab(){
  const snapshot=dataAuditSnapshot();
  const severity=String(S.dataAuditSeverity||'all');
  const area=String(S.dataAuditArea||'all');
  const filtered=snapshot.alerts.filter(alert=>
    (severity==='all'||alert.severity===severity) &&
    (area==='all'||alert.area===area)
  );
  const severityChips=[
    ['all','Todos'],
    ['critical','Críticos'],
    ['warning','Atenção'],
    ['info','Info']
  ].map(([value,label])=>`<button class="data-audit-chip ${severity===value?'on':''}" onclick="setDataAuditSeverity('${value}')">${label}</button>`).join('');
  const areaChips=[['all','Todas'],...DATA_AUDIT_AREAS.map(value=>[value,value])]

  const runAt=S.dataAuditRunAt instanceof Date ? S.dataAuditRunAt : new Date();
  return `<div class="data-audit-shell">

          <div class="data-audit-title">Auditoria de Dados</div>
          <div class="data-audit-sub">A auditoria não altera seus dados. Use esta tela para revisar cadastros incompletos. Dados incompletos podem afetar Dashboard, IRPF, Renda Fixa e Patrimônio.</div>
        </div>
        <div class="data-audit-actions">
          <button class="btn bgh" onclick="rerunDataAudit()">Reexecutar auditoria</button>
        </div>
      </div>
      <div class="data-audit-summary">
        <div class="data-audit-card ${snapshot.alerts.length?'warning':'ok'}"><div class="data-audit-card-label">Total de alertas</div><div class="data-audit-card-value">${snapshot.alerts.length}</div></div>
        <div class="data-audit-card critical"><div class="data-audit-card-label">Críticos</div><div class="data-audit-card-value">${snapshot.counts.critical}</div></div>
        <div class="data-audit-card warning"><div class="data-audit-card-label">Atenção</div><div class="data-audit-card-value">${snapshot.counts.warning}</div></div>
        <div class="data-audit-card info"><div class="data-audit-card-label">Informativos</div><div class="data-audit-card-value">${snapshot.counts.info}</div></div>
        <div class="data-audit-card ${snapshot.score>=90?'ok':snapshot.score>=70?'warning':'critical'}"><div class="data-audit-card-label">Completude aproximada</div><div class="data-audit-card-value">${snapshot.score}%</div></div>

    <div class="data-audit-filters">
      <div class="data-audit-filter-group"><span class="data-audit-filter-label">Severidade</span>${severityChips}</div>

    <div class="data-audit-areas">
      ${affected}
      <span class="data-audit-area-pill">Executada às ${runAt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</span>
      <span class="data-audit-area-pill">${filtered.length} exibido${filtered.length===1?'':'s'}</span>
    </div>
    <div class="data-audit-list">
      ${filtered.length ? filtered.map(renderAuditAlertCard).join('') : '<div class="data-audit-empty">Nenhum alerta corresponde aos filtros atuais. A auditoria não modificou nenhum cadastro.</div>'}
    </div>
  </div>`;
}

function rentBenchRate(name){
  return Number(RENT_BENCH[String(name||'CDI').toUpperCase()] ?? RENT_BENCH.CDI);
}
function rentBenchSeries(length, bench='CDI'){
  const rate=rentBenchRate(bench);
  const out=[];
  for(let i=0;i<Math.max(0,length);i++){
    out.push(((Math.pow(1+rate/100,(i+1)/12)-1)*100));
  }
  return out;
}
function rentabilityHistory(typeFilter='all', period='all', bench='CDI'){
  const txs=[...S.aportes]
    .map(a=>({...a, _dt: parseAnyDate(a.date)}))
    .filter(a=>a._dt && !isNeutralMovement(a))
    .sort((a,b)=>a._dt-b._dt||((Number(a.id)||0)-(Number(b.id)||0)));
  const provs=[...S.proventos]
    .map(p=>({...p, _dt: parseAnyDate(p.date)}))
    .filter(p=>p._dt&&Number(p.value)>0)
    .sort((a,b)=>a._dt-b._dt||String(a.ticker||'').localeCompare(String(b.ticker||'')));
  if(!txs.length && !provs.length){
    return {
      points:[], view:[], benchSeries:[], labels:[], months:[], years:[],
      current:null, prev12:null, firstView:null, currentBench:0,
      return12m:0, lastMonth:0, aboveBench:0, totalMonths:0
    };
  }

  const startDate=txs[0]?new Date(txs[0]._dt.getFullYear(),txs[0]._dt.getMonth(),1)
    :new Date(provs[0]._dt.getFullYear(),provs[0]._dt.getMonth(),1);
  const endDate=new Date();
  const priceByTicker=new Map();
  S.assets.forEach(a=>{
    const tk=cleanAssetCode(a.ticker||'');
    if(!tk) return;
    priceByTicker.set(tk, Number(a.current_price)||Number(a.price)||0);
  });
  const typeSet=typeFilter==='all'?null:new Set([typeFilter]);
  const holdings=new Map();
  const points=[];
  let txPos=0;
  let provPos=0;
  let provCum=0;
  let provPrevCum=0;
  let cursor=new Date(startDate.getFullYear(), startDate.getMonth(), 1);
  while(cursor<=endDate){
    const monthEnd=new Date(cursor.getFullYear(), cursor.getMonth()+1, 0, 23, 59, 59, 999);
    while(txPos<txs.length && txs[txPos]._dt<=monthEnd){
      const tx=txs[txPos++];
      const ticker=cleanAssetCode(tx.ticker||'');
      if(!ticker) continue;
      const type=normalizeType(tx.type || metaTicker(ticker).type || 'Ação','Ação');
      if(typeSet && !typeSet.has(type)) continue;
      const qty=Math.abs(Number(tx.qty)||0);
      const price=Math.max(0, Number(tx.price)||0);
      if(qty<=0) continue;
      const op=String(tx.operation||tx.op||'compra').toLowerCase();
      const cur=holdings.get(ticker)||{ticker, qty:0, cost:0, type, price:priceByTicker.get(ticker)||price};
      if(op.includes('venda')){
        const sellQty=Math.min(cur.qty, qty);
        if(cur.qty>0 && sellQty>0){
          const avg=cur.cost/cur.qty;
          cur.cost=Math.max(0, cur.cost-(avg*sellQty));
          cur.qty=Math.max(0, cur.qty-sellQty);
        }
      }else{
        cur.qty += qty;
        cur.cost += qty * price;
      }
      cur.type = type || cur.type || 'Ação';
      cur.price = priceByTicker.get(ticker)||cur.price||price;
      if(cur.qty<=0.0000001) holdings.delete(ticker);
      else holdings.set(ticker, cur);
    }
    while(provPos<provs.length && provs[provPos]._dt<=monthEnd){
      const p=provs[provPos++];
      const pType=normalizeType(p.type || metaTicker(cleanAssetCode(p.ticker||'')).type || 'Ação','Ação');
      if(typeSet && !typeSet.has(pType)) continue;
      provCum += Number(p.value)||0;
    }
    const provMonth = Math.max(0, provCum - provPrevCum);
    provPrevCum = provCum;
    const rows=[...holdings.values()].filter(h=>!typeSet || typeSet.has(String(h.type||'Ação')));
    const costBasis=rows.reduce((s,h)=>s+(Number(h.cost)||0),0);
    const currentValue=rows.reduce((s,h)=>{
      const qty=Number(h.qty)||0;
      const unitPrice=priceByTicker.get(h.ticker)||Number(h.price)|| (qty>0 ? (Number(h.cost)||0)/qty : 0);
      return s + qty * unitPrice;
    },0);
    const cumReturn=costBasis>0 ? (((currentValue + provCum - costBasis)/costBasis)*100) : 0;
    const delta=points.length ? cumReturn - points[points.length-1].cumReturn : cumReturn;
    points.push({
      key:`${cursor.getFullYear()}-${String(cursor.getMonth()+1).padStart(2,'0')}`,
      year:cursor.getFullYear(),
      month:cursor.getMonth(),
      label:cursor.toLocaleDateString('pt-BR',{month:'2-digit',year:'2-digit'}),
      costBasis,
      currentValue,
      proventos:provCum,
      provMonth,
      cumReturn,
      delta
    });
    cursor.setMonth(cursor.getMonth()+1);
  }

  const totalMonths = points.length;
  const periodCount = period==='all' ? totalMonths : Math.max(3, Number(period)||12);
  const view = totalMonths > periodCount ? points.slice(-periodCount) : points.slice();
  const benchSeries = rentBenchSeries(view.length, bench);
  const current = view[view.length-1] || points[points.length-1] || null;
  const prev12 = points.length>12 ? points[points.length-13] : null;
  const firstView = view[0] || null;
  const currentBench = benchSeries[benchSeries.length-1] || 0;
  const return12m = current && prev12 ? current.cumReturn - prev12.cumReturn : current ? current.cumReturn : 0;
  const lastMonth = current ? current.delta : 0;
  const aboveBench = current ? current.cumReturn - currentBench : 0;
  const yearsMap = new Map();
  points.forEach(p=>{
    if(!yearsMap.has(p.year)) yearsMap.set(p.year, Array(12).fill(null));
    yearsMap.get(p.year)[p.month] = p;
  });
  const years = [...yearsMap.entries()].sort((a,b)=>b[0]-a[0]).map(([year, months])=>{
    const filled=months.filter(Boolean);
    const annual=filled.reduce((s,p)=>s+p.delta,0);
    const acum=filled.length ? filled[filled.length-1].cumReturn : 0;
    const provAnnual=filled.reduce((s,p)=>s+(Number(p.provMonth)||0),0);
    const provAcum=filled.length ? Number(filled[filled.length-1].proventos)||0 : 0;
    return { year, months, annual, acum, provAnnual, provAcum };
  });
  return { points, view, benchSeries, current, prev12, firstView, currentBench, return12m, lastMonth, aboveBench, years, totalMonths };
}

function lineChart(series, labels){
  const width=1080, height=260;
  const padL=50, padR=18, padT=14, padB=28;
  const all=series.flatMap(s=>s.values.map(v=>Number(v)||0));
  if(!all.length) return '<div class="es" style="padding:36px 18px">Sem dados suficientes para desenhar o gráfico.</div>';
  let minY=Math.min(0,...all);
  let maxY=Math.max(0,...all);
  if(minY===maxY){ maxY=minY+1; }
  const span=maxY-minY;
  const extra=Math.max(2, span*0.12);
  minY-=extra; maxY+=extra;
  const xStep=(width-padL-padR)/Math.max(1, labels.length-1);
  const yAt=v=>height-padB-(((v-minY)/(maxY-minY))*(height-padT-padB));
  const xAt=i=>padL + i*xStep;
  const grid=[];
  for(let i=0;i<=5;i++){
    const y=padT + ((height-padT-padB)/5)*i;
    const value=maxY - ((maxY-minY)/5)*i;
    grid.push(`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${width-padR}" y2="${y.toFixed(1)}" stroke="#161e2e" stroke-width="1"/>`);
    grid.push(`<text x="${padL-8}" y="${(y+4).toFixed(1)}" text-anchor="end" fill="#64748b" font-size="10">${fmtP(value)}</text>`);
  }
  const paths=series.map((s,idx)=>{
    const color=s.color||CLRS[idx%CLRS.length];
    const values=s.values||[];
    if(!values.length) return '';
    const pts=values.map((v,i)=>`${xAt(i).toFixed(1)},${yAt(v).toFixed(1)}`);
    const path=`M ${pts.join(' L ')}`;
    const area=`M ${xAt(0).toFixed(1)},${(height-padB).toFixed(1)} L ${pts.join(' L ')} L ${xAt(values.length-1).toFixed(1)},${(height-padB).toFixed(1)} Z`;
    return `
      <path d="${area}" fill="${s.fill||'none'}" opacity="${s.fill?1:0}"/>
      <path d="${path}" fill="none" stroke="${color}" stroke-width="${s.width||2.2}" stroke-linecap="round" stroke-linejoin="round"/>
      ${s.points===false?'':values.map((v,i)=>`<circle cx="${xAt(i).toFixed(1)}" cy="${yAt(v).toFixed(1)}" r="2.5" fill="${color}" stroke="#090c15" stroke-width="1"/>`).join('')}
    `;
  }).join('');
  const labelStep=Math.max(1, Math.ceil(labels.length/8));
  const xLabels=labels.map((l,i)=>`<text x="${xAt(i).toFixed(1)}" y="${height-10}" text-anchor="middle" fill="${i%labelStep===0||i===labels.length-1?'#64748b':'transparent'}" font-size="10">${esc(l)}</text>`).join('');
  return `<svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}" style="display:block;overflow:visible">
    ${grid.join('')}
    ${paths}
    ${xLabels}
  </svg>`;
}

function syncAssetsFromAportes(showMsg=false){
  const keep={};
  S.assets.forEach(a=>keep[a.ticker]={...a});
  const grouped={};
  const movs=[...S.aportes].sort((a,b)=>{
    const da=parseAnyDate(a.date)?.getTime()||0,db=parseAnyDate(b.date)?.getTime()||0;
    return da-db||((Number(a.id)||0)-(Number(b.id)||0));
  });
  movs.forEach(p=>{
    if(isNeutralMovement(p)) return;
    const raw=String(p.ticker||'').trim().toUpperCase();
    const op=(p.operation||p.op||'compra').toLowerCase();
    const type=String(p.type||p.asset_type||'').trim();
    if(type==='Reserva de emergência' || op.startsWith('reserva')) return;
    const maybeName=String(p.rf_name||p.name||p.assetName||p.product||p.title||raw||'').trim();
    const isRF=normalizeType(type || p.asset_type || 'Ação','Ação')==='Renda Fixa';
    const q=Math.abs(Number(p.qty)||0);
    const pr=Number(p.price)||0;
    const rfSubtype=String(p.rf_subtype||p.bondType||p.fixed_subtype||p.sector||p.asset_sector||'').trim();
    const rfAppDate=String(p.rf_application_date||p.rf_aporte_date||p.fixed_application_date||p.date||'').trim();
    const rfDue=String(p.rf_maturity_date||p.fixed_maturity_date||p.maturityDate||'').trim();
    const rfRate=String(p.rf_contract_rate||p.rate||p.fixed_rate||'').trim();
    const rfApplied=parseNum(p.rf_applied_value ?? p.fixed_initial_value ?? p.appliedValue ?? (isRF ? pr : 0));
    const rfGross=parseNum(p.rf_gross_value ?? p.fixed_gross_value ?? p.marketValue ?? p.currentValue ?? 0);
    const rfLiquid=parseNum(p.rf_liquid_value ?? p.fixed_current_value ?? p.current_value ?? 0);
    const rfIrIof=parseNum(p.rf_ir_iof ?? p.ir_iof ?? p.iof ?? 0);
    const rfUnavailable=parseNum(p.rf_unavailable_value ?? p.unavailableValue ?? 0);
    const rfProfitRaw=String(p.rf_profit_value ?? '').trim();
    const rfProfitSource=String(p.rf_profit_source || (rfProfitRaw!=='' ? 'manual' : 'derived')).toLowerCase();
    const rfProfit=rfProfitRaw!=='' ? parseNum(rfProfitRaw) : undefined;
    const rawKey=isRF ? cleanAssetCode(raw || maybeName || `${rfSubtype} ${rfAppDate}`) : cleanAssetCode(raw)||raw;
    if(!rawKey) return;
    const t=rawKey;
    const m=metaTicker(t);
    const learned=learnedMetaFor(t);
    const tipo=normalizeType(isRF ? 'Renda Fixa' : (learned?.type || p.type || p.asset_type || m.type || 'Ação'),'Ação');
    const setor=isRF ? (rfSubtype || p.sector || p.asset_sector || m.sector || 'Renda Fixa') : (learned?.sector || p.sector || p.asset_sector || m.sector || '');
    if(!grouped[t]) grouped[t]={ticker:t,qty:0,total:0,type:tipo,sector:setor};
    if(!grouped[t].type && tipo) grouped[t].type=tipo;
    if(!grouped[t].sector && setor) grouped[t].sector=setor;
    if(isRF){
      const appliedValue=rfApplied>0 ? rfApplied : (rfGross>0 ? rfGross : (rfLiquid>0 ? rfLiquid : 0));
      const currentValue=rfLiquid>0 ? rfLiquid : (rfGross>0 ? rfGross : (appliedValue>0 ? appliedValue : 0));
      const unitQty=q>0 ? q : 1;
      if(op==='venda'){
        const atual=grouped[t].qty || 1;
        const vendida=Math.min(unitQty,atual);
        grouped[t].qty=Math.max(0,atual-vendida);
        grouped[t].total=Math.max(0,(grouped[t].total||0)-((grouped[t].total||appliedValue||0)/Math.max(1,atual))*vendida);
        grouped[t].rf_liquid_value=currentValue||grouped[t].rf_liquid_value||0;
        grouped[t].rf_gross_value=rfGross||grouped[t].rf_gross_value||0;
        return;
      }
      grouped[t].qty=Math.max(Number(grouped[t].qty)||0, unitQty);
      grouped[t].total=Math.max(Number(grouped[t].total)||0, appliedValue||currentValue||0);
      grouped[t].rf_name=maybeName||grouped[t].rf_name||t;
      grouped[t].product=maybeName||grouped[t].product||t;
      grouped[t].title=maybeName||grouped[t].title||t;
      grouped[t].rf_subtype=rfSubtype||grouped[t].rf_subtype||setor||'Renda Fixa';
      grouped[t].rf_application_date=rfAppDate||grouped[t].rf_application_date||'';
      grouped[t].rf_aporte_date=grouped[t].rf_application_date;
      grouped[t].rf_maturity_date=rfDue||grouped[t].rf_maturity_date||'';
      grouped[t].rf_contract_rate=rfRate||grouped[t].rf_contract_rate||'';
      grouped[t].rf_applied_value=appliedValue||grouped[t].rf_applied_value||0;
      grouped[t].rf_gross_value=rfGross||grouped[t].rf_gross_value||0;
      grouped[t].rf_liquid_value=currentValue||grouped[t].rf_liquid_value||0;
      grouped[t].rf_ir_iof=rfIrIof||grouped[t].rf_ir_iof||0;
      grouped[t].rf_unavailable_value=rfUnavailable||grouped[t].rf_unavailable_value||0;
      grouped[t].rf_profit_value=rfProfit!==undefined ? rfProfit : grouped[t].rf_profit_value;
      grouped[t].rf_profit_source=rfProfitSource||grouped[t].rf_profit_source||'derived';
      grouped[t].rf_note=String(p.rf_note||p.note||p.observation||grouped[t].rf_note||'').trim();
      grouped[t].fixed_initial_value=grouped[t].rf_applied_value||grouped[t].fixed_initial_value||0;
      grouped[t].fixed_current_value=grouped[t].rf_liquid_value||grouped[t].rf_gross_value||grouped[t].fixed_current_value||0;
      grouped[t].fixed_gross_value=grouped[t].rf_gross_value||grouped[t].fixed_gross_value||0;
      grouped[t].fixed_application_date=grouped[t].rf_application_date||grouped[t].fixed_application_date||'';
      grouped[t].fixed_maturity_date=grouped[t].rf_maturity_date||grouped[t].fixed_maturity_date||'';
      grouped[t].fixed_rate=grouped[t].rf_contract_rate||grouped[t].fixed_rate||'';
      grouped[t].fixed_indexer=grouped[t].rf_subtype||grouped[t].fixed_indexer||'';
      grouped[t].fixed_issuer=String(p.fixed_issuer||p.issuer||grouped[t].fixed_issuer||'').trim();
      grouped[t].current_price=grouped[t].fixed_current_value||grouped[t].current_price||0;
      grouped[t].avg_price=grouped[t].fixed_initial_value||grouped[t].avg_price||0;
      grouped[t].avg_manual=true;
      grouped[t].quoteSource='manual';
      grouped[t].quoteUpdatedAt=grouped[t].quoteUpdatedAt||'';
      grouped[t].source=String(p.source||grouped[t].source||'manual-rf');
      grouped[t].decision=String(p.decision||grouped[t].decision||grouped[t].rf_note||'').trim();
      return;
    }
    if(op==='venda'){
      const atual=grouped[t].qty,vendida=Math.min(q,atual),avg=atual>0?grouped[t].total/atual:0;
      grouped[t].qty=Math.max(0,atual-vendida);
      grouped[t].total=Math.max(0,grouped[t].total-(avg*vendida)); return;
    }
    grouped[t].qty+=q; grouped[t].total+=q*pr;
  });
  S.assets=Object.values(grouped).filter(g=>g.qty>0.000001).map(g=>{
    const old=keep[g.ticker]||{},m=metaTicker(g.ticker),avg=g.qty>0?g.total/g.qty:0;
    const isRF=normalizeType(g.type||old.type||m.type||'Ação','Ação')==='Renda Fixa';
    const oldApplied=Number(old.fixed_initial_value)||Number(old.avg_price)||avg;
    const oldCurrent=Number(old.fixed_current_value)||Number(old.current_price)||oldApplied;
    const rfApplied=Number(g.rf_applied_value)||oldApplied||avg;
    const rfGross=Number(g.rf_gross_value)||Number(old.fixed_gross_value)||0;
    const rfLiquid=Number(g.rf_liquid_value)||oldCurrent||rfGross||rfApplied;
    const rfProfit=Number(g.rf_profit_value ?? old.rf_profit_value ?? 0);
    learnTickerMeta(g.ticker, g.type||old.type||m.type, g.sector||old.sector||m.sector, false);
    return{
      id:old.id||Date.now()+Math.floor(Math.random()*999999),
      ticker:g.ticker,
      name:isRF?(g.rf_name||old.name||old.product||g.ticker):old.name,
      product:isRF?(g.product||old.product||old.name||g.ticker):old.product,
      title:isRF?(g.title||old.title||old.product||g.ticker):old.title,
      type:g.type||old.type||m.type,
      sector:g.sector||old.sector||m.sector,
      qty:isRF?Math.max(1, Number(g.qty)||1):g.qty,
      avg_price:isRF?(rfApplied||old.fixed_initial_value||old.avg_price||avg):(old.avg_manual?Number(old.avg_price)||avg:avg),
      avg_manual:isRF?true:!!old.avg_manual,
      current_price:isRF?(rfLiquid||old.fixed_current_value||old.current_price||old.avg_price||avg):(Number(old.current_price)||avg),
      fixed_initial_value:isRF?(rfApplied||old.fixed_initial_value||oldApplied||0):old.fixed_initial_value,
      fixed_current_value:isRF?(rfLiquid||old.fixed_current_value||oldCurrent||0):old.fixed_current_value,
      fixed_gross_value:isRF?(rfGross||old.fixed_gross_value||0):old.fixed_gross_value,
      fixed_application_date:isRF?(g.rf_application_date||old.fixed_application_date||''):old.fixed_application_date,
      fixed_maturity_date:isRF?(g.rf_maturity_date||old.fixed_maturity_date||''):old.fixed_maturity_date,
      fixed_rate:isRF?(g.rf_contract_rate||old.fixed_rate||old.rate||''):old.fixed_rate,
      fixed_indexer:isRF?(g.rf_subtype||old.fixed_indexer||old.indexer||''):old.fixed_indexer,
      fixed_issuer:isRF?(g.fixed_issuer||old.fixed_issuer||''):old.fixed_issuer,
      rf_name:isRF?(g.rf_name||old.rf_name||old.name||old.product||g.ticker):old.rf_name,
      rf_subtype:isRF?(g.rf_subtype||old.rf_subtype||''):old.rf_subtype,
      rf_application_date:isRF?(g.rf_application_date||old.rf_application_date||old.rf_aporte_date||''):old.rf_application_date,

function qtyAtDate(ticker,refDate){
  const t=String(ticker||'').toUpperCase(); let qty=0;
  [...S.aportes].filter(a=>String(a.ticker||'').toUpperCase()===t).sort((a,b)=>(parseAnyDate(a.date)?.getTime()||0)-(parseAnyDate(b.date)?.getTime()||0)).forEach(a=>{
    if(isNeutralMovement(a)) return;
    const d=parseAnyDate(a.date);
    if(!d||!refDate||d.getTime()>refDate.getTime()) return;
    const q=Math.abs(Number(a.qty)||0),op=(a.operation||a.op||'compra').toLowerCase();
    qty+=op==='venda'?-q:q; if(qty<0) qty=0;
  });
  return qty;
}
function earliestAporteDate(){
  let min=null;
  S.aportes.forEach(a=>{if(isNeutralMovement(a)) return; const d=parseAnyDate(a.date);if(d&&(!min||d<min)) min=d;});
  if(!min){const y=new Date().getFullYear();min=new Date(y,0,1);}
  min.setDate(min.getDate()-10); return min;
}
function normalizeDividendItem(item,fallback){
  const symbol=String(item.symbol||item.ticker||fallback||'').toUpperCase();
  const payDate=parseAnyDate(item.paymentDate||item.pay_date||item.payableDate||item.date||item.dataPagamento||item.exDate||item.lastDatePrior);
  const posDate=parseAnyDate(item.lastDatePrior||item.recordDate||item.comDate||item.exDate||item.date||item.paymentDate);
  const rate=parseNum(item.rate??item.amount??item.value??item.dividend??item.cashAmount??item.valor);
  const label=String(item.label||item.type||item.tipo||'Provento').trim()||'Provento';
  return{symbol,payDate,posDate:posDate||payDate,rate,label};
}
function collectDividendItems(payload,fallback){
  const out=[]; const seen=new Set();
  function walk(x){
    if(!x) return; if(Array.isArray(x)){x.forEach(walk);return;} if(typeof x!=='object') return;
    const hasRate=['rate','amount','value','dividend','cashAmount','valor'].some(k=>x[k]!==undefined);
    const hasDate=['paymentDate','pay_date','payableDate','date','dataPagamento','exDate','lastDatePrior'].some(k=>x[k]!==undefined);
    if(hasRate&&hasDate){out.push(normalizeDividendItem(x,fallback));return;}
    Object.values(x).forEach(walk);
  }
  walk(payload); return out;
}
function proventoKey(d){ return `${d.symbol}|${toISODate(d.payDate)}|${Number(d.rate||0).toFixed(8)}|${String(d.label||'').toUpperCase()}`; }

async function fetchQuotesYahoo(tickers){
  const clean=[...new Set((tickers||[]).map(t=>String(t||'').trim().toUpperCase()).filter(t=>t&&isMarketTicker(t)))];
  if(!clean.length) return [];
  const apiBase=marketApiBase();
  const r=await fetch(`${apiBase}/api/yahoo-quote?symbols=${encodeURIComponent(clean.join(','))}`,{cache:'no-store'});
  if(!r.ok) throw new Error('Yahoo HTTP '+r.status);
  const j=await r.json();
  return Array.isArray(j.results)?j.results:[];
}
async function fetchQuotes(manual=false){
  if(!S.assets.length) return;
  if(S.qInFlight) return;
  S.qInFlight=true;
  S.qLoad=true; render();

  const eligibleAssets=(S.assets||[]).filter(a=>{
    return isMarketQuoteEligibleAsset(a);
  });
  const tickers=[...new Set(eligibleAssets.map(a=>String(a.ticker||'').trim().toUpperCase()).filter(t=>t&&isMarketTicker(t)))];
  let atualizados=0,semPreco=[];

  try{
    const yResults=await fetchQuotesYahoo(tickers);
    const recebidos=new Set();

    yResults.forEach(q=>{
      const ticker=String(q.symbol||'').replace('.SA','').toUpperCase();
      if(!ticker) return;
      recebidos.add(ticker);

      const a=S.assets.find(x=>String(x.ticker||'').toUpperCase()===ticker);
      if(!a) return;
      if(!isMarketQuoteEligibleAsset(a)) return;

      const price=Number(q.regularMarketPrice ?? q.postMarketPrice ?? q.preMarketPrice ?? q.regularMarketPreviousClose);
      if(Number.isFinite(price)&&price>0){
        const prev=Number(a.current_price)||0;
        a.current_price=price;
        a.quoteSource='yahoo';
        a.quoteUpdatedAt=new Date().toISOString();
        S.quotes[ticker]={
          price,
          change:Number(q.regularMarketChangePercent)||0,
          flash:prev>0?(price>prev?'up':price<prev?'down':''):''
        };
        atualizados++;
      }else{
        semPreco.push(ticker);
      }

      const dyY=Number(q.trailingAnnualDividendYield||0)*100;
      if(dyY>0&&(!a.dy||a.dySource==='estimate'||a.dySource==='yahoo')){
        a.dy=Number(dyY.toFixed(2));
        a.dySource='yahoo';
      }

      const m=metaTicker(a.ticker);
      if(!a.sector) a.sector=m.sector;
      if(!a.type) a.type=m.type;
    });

    tickers.forEach(t=>{ if(!recebidos.has(t)) semPreco.push(t); });

    // Fallback opcional para brapi: só tenta se você salvou um token.
    // A cotação principal funciona sem token pelo Yahoo.
    if(semPreco.length && S.brapiToken){
      try{
        const falhou=[...new Set(semPreco)];
        semPreco=[];
        for(let i=0;i<falhou.length;i+=20){
          const batch=falhou.slice(i,i+20).join(',');
          let r=await fetch(`https://brapi.dev/api/quote/${encodeURIComponent(batch)}?range=1d&interval=1d&fundamental=true`,{headers:{Authorization:`Bearer ${S.brapiToken}`}});
          if(!r.ok) r=await fetch(`https://brapi.dev/api/quote/${encodeURIComponent(batch)}?range=1d&interval=1d&fundamental=true&token=${encodeURIComponent(S.brapiToken)}`);
          if(!r.ok) continue;
          const j=await r.json();
          const recv=new Set();
          (j.results||[]).forEach(q=>{
            const sym=String(q.symbol||'').toUpperCase();
            recv.add(sym);
            const a=S.assets.find(x=>String(x.ticker||'').toUpperCase()===sym);
            if(!a) return;
            if(!isMarketQuoteEligibleAsset(a)) return;
            const price=Number(q.regularMarketPrice??q.price??q.close??q.previousClose);
            if(Number.isFinite(price)&&price>0){
              const prev=Number(a.current_price)||0;
              a.current_price=price;
              a.quoteSource='brapi';
              a.quoteUpdatedAt=new Date().toISOString();
              S.quotes[sym]={price,change:Number(q.regularMarketChangePercent)||0,flash:prev>0?(price>prev?'up':price<prev?'down':''):''};
              atualizados++;
            }
            const dyApi=findDy(q);
            if(dyApi>0&&(!a.dy||a.dySource==='api'||a.dySource==='estimate')){
              a.dy=Number(dyApi.toFixed(2));
              a.dySource='api';
            }
          });
          falhou.slice(i,i+20).forEach(t=>{ if(!recv.has(t)) semPreco.push(t); });
        }
      }catch(e){ console.warn('fallback brapi:',e); }
    }

    S.lastUpdate=new Date();
    if(S.editId){
      const editAsset=S.assets.find(x=>x.id===S.editId);
      if(editAsset) S._fa={...editAsset};
    }
    autoDY();
    save();

    if(manual){
      const msg = semPreco.length
        ? `✅ ${atualizados} cotação(ões) atualizadas pelo Yahoo. Sem retorno: ${[...new Set(semPreco)].join(', ')}`
        : `✅ ${atualizados} cotação(ões) atualizadas automaticamente pelo Yahoo.`;
      toast(msg, semPreco.length?'#fbbf24':'#6ee7b7');
    }
  }catch(e){
    console.warn('Yahoo Finance:',e);
    if(manual) toast('❌ Não foi possível atualizar pelo Yahoo. Verifique se a pasta api foi enviada ao GitHub/Vercel.','#f87171');
  }

  S.qInFlight=false;
  S.qLoad=false; S.cd=QI; render();
}
async function fetchAutoProventos(){
  const preserved=(S.proventos||[]).filter(p=>!isAutoGeneratedProvento(p));
  const nextAuto=[];
  if(!S.assets.length){
    const cleaned=stripAutoProventos();

  }
  if(!S.brapiToken){alert('Configure o token da brapi.dev em ⚙️ brapi.');return;}
  const start=toISODate(earliestAporteDate()),end=toISODate(new Date());
  const existing=new Set(preserved.map(p=>p.autoKey).filter(Boolean));
  let novos=0,ignorados=0,erros=[];
  const addItems=(items,origem)=>{
    items.forEach(d=>{
      if(!d.symbol||!d.payDate||!d.rate) return;
      const q=qtyAtDate(d.symbol,d.posDate||d.payDate); if(q<=0){ignorados++;return;}
      const value=q*d.rate; if(value<=0){ignorados++;return;}
      const key=proventoKey(d);
      const dup=existing.has(key)||preserved.some(p=>String(p.ticker).toUpperCase()===d.symbol&&p.date===toBRDate(d.payDate)&&Math.abs((Number(p.value)||0)-value)<0.01)||nextAuto.some(p=>String(p.ticker).toUpperCase()===d.symbol&&p.date===toBRDate(d.payDate)&&Math.abs((Number(p.value)||0)-value)<0.01);
      if(dup){ignorados++;return;}
      nextAuto.unshift({id:Date.now()+Math.floor(Math.random()*999999),ticker:d.symbol,value:Number(value.toFixed(2)),type:d.label,date:toBRDate(d.payDate),note:`Auto ${origem}: ${q} cotas x R$ ${Number(d.rate).toFixed(4)}`,autoKey:key});
      existing.add(key); novos++;
    });
  };
  try{
    const tickers=[...new Set(S.assets.map(a=>a.ticker).filter(t=>t&&isMarketTicker(t)))];
    for(let i=0;i<tickers.length;i+=10){
      const batch=tickers.slice(i,i+10).join(',');

        const r=await fetch(`https://brapi.dev/api/quote/${encodeURIComponent(batch)}?dividends=true&range=max&interval=1d&token=${encodeURIComponent(S.brapiToken)}`);
        if(r.ok){const j=await r.json();(j.results||[]).forEach(q=>addItems(collectDividendItems(q,q.symbol),'quote'));}
      }catch(e){erros.push('quote');}
    }
  const fiis=tickers.filter(t=>normalizeType(S.assets.find(a=>a.ticker===t)?.type||metaTicker(t).type||'Ação','Ação')==='FII');
    for(let i=0;i<fiis.length;i+=20){
      const batch=fiis.slice(i,i+20).join(','); if(!batch) continue;
      try{
        const r=await fetch(`https://brapi.dev/api/v2/fii/dividends?symbols=${encodeURIComponent(batch)}&startDate=${start}&endDate=${end}&sortOrder=asc`,{headers:{Authorization:`Bearer ${S.brapiToken}`}});
        if(r.ok){const j=await r.json();addItems(collectDividendItems(j,''),'FII');}
        else if(r.status===403) erros.push('FIIs exigem plano Pro na brapi');
      }catch(e){erros.push('FII');}
    }
    const cleaned=stripAutoProventos();
    S.proventos=[...nextAuto,...preserved];
    save(); render();
    toast(`✅ ${novos} novo(s) provento(s) adicionados.${ignorados?' '+ignorados+' ignorados/duplicados.':''}`, erros.length?'#fbbf24':'#6ee7b7');
    if(erros.length) console.warn('Avisos proventos:',[...new Set(erros)].join(', '));
    return { added: novos, cleaned };
  }catch(e){
    console.warn(e); toast('❌ Erro ao buscar proventos automáticos.','#f87171');
  }
}

function pie(data, colors=CLRS){
  const tot=data.reduce((s,d)=>s+d.value,0);
  if(!tot) return'<div class="di" style="text-align:center;padding:24px;font-size:13px">Sem dados</div>';
  let p='',a=-Math.PI/2;
  data.forEach((d,i)=>{
    const ang=(d.value/tot)*2*Math.PI;
    const[x1,y1]=[90+74*Math.cos(a),90+74*Math.sin(a)];
    const[x2,y2]=[90+74*Math.cos(a+ang),90+74*Math.sin(a+ang)];
    p+=`<path d="M90,90 L${x1.toFixed(1)},${y1.toFixed(1)} A74,74 0 ${ang>Math.PI?1:0},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${colors[i%colors.length]}" stroke="#07090f" stroke-width="2"/>`;
    a+=ang;
  });
  return`<svg viewBox="0 0 180 180" width="180" height="180" style="display:block;margin:0 auto;overflow:visible">
    ${p}
    <circle cx="90" cy="90" r="38" fill="#0d111e" stroke="#111828" stroke-width="2"></circle>
    <text x="90" y="86" text-anchor="middle" fill="#e2eaf6" font-size="15" font-weight="700">${data.length}</text>
    <text x="90" y="103" text-anchor="middle" fill="#64748b" font-size="10">ativos</text>
  </svg>`;
}

function sortAssetsByGroup(type, items){
  const cfg=getAssetSortConfig(type);
  const dirFactor=cfg.dir==='desc' ? -1 : 1;
  return [...items].sort((a,b)=>{
    if(cfg.field==='rentability'){
      const ar=assetRentabPct(a);
      const br=assetRentabPct(b);
      const aValid=Number.isFinite(ar);
      const bValid=Number.isFinite(br);
      if(aValid!==bValid) return aValid ? -1 : 1;
      if(!aValid && !bValid){
        const at=String(a.ticker||'').toUpperCase();
        const bt=String(b.ticker||'').toUpperCase();
        return at.localeCompare(bt,'pt-BR',{sensitivity:'base'}) * dirFactor;
      }
      if(ar===br) return String(a.ticker||'').localeCompare(String(b.ticker||''),'pt-BR',{sensitivity:'base'}) * dirFactor;
      return (ar-br) * dirFactor;
    }
    const at=String(a.ticker||'').trim().toUpperCase();
    const bt=String(b.ticker||'').trim().toUpperCase();
    const aValid=!!at;
    const bValid=!!bt;
    if(aValid!==bValid) return aValid ? -1 : 1;
    if(!aValid && !bValid) return 0;
    return at.localeCompare(bt,'pt-BR',{sensitivity:'base'}) * dirFactor;
  });
}
function assetAnalysisRows(){
  const total=S.assets.reduce((s,a)=>s+assetCurrentValue(a),0);
  return (S.assets||[]).map(a=>{
    const ticker=String(a.ticker||'').trim().toUpperCase();
    const type=normalizeType(a.type||metaTicker(a.ticker).type||'Ação','Ação');
    const sector=String(a.sector||'').trim()||'—';
    const applied=assetAppliedValue(a);
    const current=assetCurrentValue(a);
    const profit=current-applied;
    const pct=assetRentabPct(a);
    const share=total>0 && Number.isFinite(current) ? (current/total)*100 : null;
    return {
      ticker,
      type,
      sector,
      applied:Number.isFinite(applied)?applied:0,
      current:Number.isFinite(current)?current:0,
      profit:Number.isFinite(profit)?profit:0,
      pct:Number.isFinite(pct)?pct:null,
      share:Number.isFinite(share)?share:null,
      dy:Number(a.dy)||0
    };
  }).filter(r=>r.ticker || r.current>0 || r.applied>0);

  }
  if(share<=10) return {label:'Peso saudável', tone:'ok'};
  if(share<=20) return {label:'Atenção: posição relevante', tone:'info'};
  if(share<=30) return {label:'Atenção', tone:'warn'};
  if(share<=50) return {label:'Concentração alta', tone:'danger'};
  return {label:'Concentração muito alta', tone:'danger'};
}
function assetContributionSignal(row){
  if(!row || row.share==null || !Number.isFinite(row.share) || row.pct==null || !Number.isFinite(row.pct) || !Number.isFinite(row.current) || !Number.isFinite(row.applied)){
    return {label:'Dados insuficientes', tone:'muted'};
  }
  if(row.share>30) return {label:'Evitar aumentar por concentração', tone:'danger'};
  if(row.pct<0 && row.share<20) return {label:'Pode estudar aporte', tone:'ok'};
  if(row.pct>=0 && row.share<20) return {label:'Acompanhar', tone:'info'};
  if(row.pct>=0 && row.share>=20) return {label:'Aguardar', tone:'warn'};
  if(row.pct<0 && row.share>=20) return {label:'Aguardar', tone:'warn'};
  return {label:'Acompanhar', tone:'info'};
}

function assetRankingListHtml(rows, mode){
  let listRows=[...rows];
  if(mode==='concentration'){
    listRows=listRows.filter(r=>r.share!=null && r.share>10).sort((a,b)=>b.share-a.share || b.current-a.current);
  }else if(mode==='best'){
    listRows=listRows.filter(r=>Number.isFinite(r.pct) && r.pct>0).sort((a,b)=>b.pct-a.pct || b.current-a.current);
  }else if(mode==='worst'){
    listRows=listRows.filter(r=>Number.isFinite(r.pct) && r.pct<0).sort((a,b)=>a.pct-b.pct || a.current-b.current);
  }else if(mode==='opportunity'){
    listRows=listRows.filter(r=>{
      const sig=assetContributionSignal(r);
      return sig.label==='Pode estudar aporte'
        && Number.isFinite(r.pct)
        && r.pct<0
        && r.share!=null
        && r.share<15
        && Number.isFinite(r.current)
        && r.current>0;
    }).sort((a,b)=>{
      const aModeration=Math.abs(Math.abs(a.pct)-8);
      const bModeration=Math.abs(Math.abs(b.pct)-8);
      return (a.share||0)-(b.share||0) || aModeration-bModeration || Math.abs(a.pct)-Math.abs(b.pct);
    });
  }else{
    listRows=listRows.filter(r=>Number.isFinite(r.current) || Number.isFinite(r.applied)).sort((a,b)=>b.current-a.current || (b.share||0)-(a.share||0));
  }
  listRows=listRows.slice(0,12);
  if(!listRows.length){
    const msg = mode==='concentration'
      ? 'Nenhum ativo acima do limite de atenção.'
      : mode==='opportunity'
        ? 'Nenhum ativo combina queda com concentração saudável no momento.'
        : 'Dados insuficientes para montar o ranking compacto.';
    return `<div class="analysis-ranking-empty">${esc(msg)}</div>`;
  }
  return `
    <div class="analysis-ranking-labels">
      <div>Ativo</div><div>Tipo / setor</div><div>Valor atual</div><div>% carteira</div><div>Rentab.</div><div>Sinalizador</div>

    <div class="analysis-ranking-table">
      ${listRows.map((row,idx)=>assetRankingRowHtml(row, idx+1)).join('')}
    </div>`;

function reportsPeriod(){

function reportsPeriodLabel(){
  return reportsPeriod()==='year' ? 'Ano atual' : reportsPeriod()==='all' ? 'Todos os dados' : 'Últimos 12 meses';
}
function reportsPeriodStart(){
  const now=new Date();
  if(reportsPeriod()==='all') return null;
  if(reportsPeriod()==='year') return new Date(now.getFullYear(),0,1);
  return new Date(now.getFullYear(),now.getMonth()-11,1);
}
function reportsDateAllowed(value){
  const date=parseAnyDate(value);
  if(!date) return reportsPeriod()==='all';
  const start=reportsPeriodStart();
  return !start || date>=start;
}

function reportDateText(value){

function csvEscape(value){

function reportFilename(type,extension){
  const stamp=new Date();
  const date=`${stamp.getFullYear()}-${String(stamp.getMonth()+1).padStart(2,'0')}-${String(stamp.getDate()).padStart(2,'0')}-${String(stamp.getHours()).padStart(2,'0')}-${String(stamp.getMinutes()).padStart(2,'0')}`;

function buildReportPayload(type){
  const snapshot=reportsSnapshot();
  const metadata={
    app:APP_NAME,
    reportType:type,
    reportVersion:1,
    generatedAt:snapshot.generatedAt,
    period:snapshot.period,
    periodLabel:snapshot.periodLabel,
    purpose:'Relatório para consulta e exportação. Não substitui o backup de restauração.'
  };
  if(type==='complete'){
    return {metadata,summary:snapshot,assets:reportAssetRows(),proventos:reportProventoRows(),fixedIncome:reportFixedIncomeRows(),patrimony:reportPatrimonyRows(),goals:cloneData(S.goals||{}),audit:reportAuditRows()};
  }

function exportReportCSV(type){
  return withVisibleValues(()=>{
    try{
      if(type==='irpf'){ irpfExportCSV(); return; }
      const types=type==='complete'?['assets','proventos','fixed','patrimony','audit']:[type];
      const hasData=types.some(key=>buildReportRows(key).length);
      if(!hasData){ toast('Não há dados suficientes para este relatório.','#fbbf24'); return; }
      const sections=types.map(key=>reportCsvSection(key,{
        assets:'ATIVOS',proventos:'DIVIDENDOS_E_PROVENTOS',fixed:'RENDA_FIXA',patrimony:'PATRIMONIO',audit:'AUDITORIA_DE_DADOS'
      }[key])).join('\r\n\r\n');
      const body=type==='complete'
        ? [reportSummaryCsv(),sections,reportGoalsCsv()].join('\r\n\r\n')
        : sections;
      const header=[csvEscape(APP_NAME),csvEscape(`Relatório: ${type}`),csvEscape(`Período: ${reportsPeriodLabel()}`),csvEscape(`Gerado em: ${new Date().toLocaleString('pt-BR')}`)].join(';');
      downloadTextFile(reportFilename(type,'csv'),`\ufeff${header}\r\n\r\n${body}`,'text/csv;charset=utf-8');
      toast('✅ Relatório exportado com sucesso.');
    }catch(error){
      console.error('exportReportCSV erro:',error);
      toast('Erro ao gerar relatório. Nenhum dado foi alterado.','#f87171');
    }
  });
}
function exportReportJSON(type){
  return withVisibleValues(()=>{
    try{
      const payload=buildReportPayload(type);
      const hasData=type==='complete'
        ? payload.assets.length||payload.proventos.length||payload.fixedIncome.length
        : payload.rows.length;
      if(!hasData){ toast('Não há dados suficientes para este relatório.','#fbbf24'); return; }
      downloadTextFile(reportFilename(type,'json'),JSON.stringify(payload,null,2),'application/json;charset=utf-8');
      toast('✅ Relatório JSON exportado com sucesso.');
    }catch(error){
      console.error('exportReportJSON erro:',error);
      toast('Erro ao gerar relatório JSON. Nenhum dado foi alterado.','#f87171');
    }
  });
}
function reportPdfSnapshot(){
  const summary=reportsSnapshot();
  const analysis=assetAnalysisRows();
  const allocation=allocationActualByType();
  const allocationRows=Object.entries(allocation.map||{})
    .map(([type,value])=>({type,value:Number(value)||0,share:allocation.total>0?(Number(value)||0)/allocation.total*100:0}))
    .sort((a,b)=>b.value-a.value);
  const positions=[...analysis].filter(row=>row.current>0).sort((a,b)=>b.current-a.current).slice(0,10);
  const highs=[...analysis].filter(row=>Number.isFinite(row.pct)&&row.pct>0).sort((a,b)=>b.pct-a.pct).slice(0,5);
  const lows=[...analysis].filter(row=>Number.isFinite(row.pct)&&row.pct<0).sort((a,b)=>a.pct-b.pct).slice(0,5);
  const recentProventos=reportProventoRows().slice(0,10);
  const dividendMonths=(summary.income.byMonth||[]).slice(-12);
  const fixed=[...(summary.fixed.assets||[])].sort((a,b)=>{
    const ad=a.due?a.due.getTime():Number.MAX_SAFE_INTEGER;
    const bd=b.due?b.due.getTime():Number.MAX_SAFE_INTEGER;
    return ad-bd||b.current-a.current;
  }).slice(0,8);
  const patrimony=reportPatrimonyRows().slice(-12);
  const severityOrder={critical:0,warning:1,info:2};
  const alerts=[...(summary.audit.alerts||[])].sort((a,b)=>(severityOrder[a.severity]??9)-(severityOrder[b.severity]??9)).slice(0,5);
  const concentration=positions.filter(row=>Number(row.share)>10);
  return {summary,analysis,allocationRows,positions,highs,lows,recentProventos,dividendMonths,fixed,patrimony,alerts,concentration};
}
