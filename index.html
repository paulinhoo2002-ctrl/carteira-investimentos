<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07090f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>📈 Carteira de Investimentos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0f18;color:#edf3ff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;font-size:14px;overflow-x:hidden}
button{cursor:pointer;font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:#111727}::-webkit-scrollbar-thumb{background:#263347;border-radius:2px}
.hdr{background:#111828;border-bottom:1px solid #1d2940;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 4px 24px rgba(0,0,0,.38)}
.hdr-logo{display:flex;align-items:center;gap:10px}
.hdr-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#4f46e5,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 2px 12px rgba(99,102,241,.4)}
.hdr-title{font-size:15px;font-weight:700;letter-spacing:-.01em}
.hdr-sub{font-size:10px;color:#55708d;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hdr-top-fab{display:none}
.cfg-menu>summary{list-style:none}
.cfg-menu>summary::-webkit-details-marker{display:none}
.tabs{background:#111828;border-bottom:1px solid #1d2940;display:flex;flex-wrap:nowrap;justify-content:flex-start;overflow-x:auto;position:sticky;top:58px;z-index:9;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:#58718f;padding:11px 18px;font-size:13px;white-space:nowrap;flex:0 0 auto;transition:all .2s}
.tab:hover{color:#9fb0c7}.tab.on{border-bottom-color:#6366f1;color:#c7d2fe;font-weight:700}
@media(max-width:640px){.tabs{justify-content:flex-start;padding:0 8px;top:52px}.tab{padding:10px 12px;font-size:12px}}
.wrap{padding:20px;max-width:1360px;margin:0 auto}
@media(max-width:640px){.wrap{padding:14px}}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:16px}
.dashboard-hero{grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.dash-card{min-height:124px;padding:12px 14px 10px;display:flex;flex-direction:column;justify-content:space-between}
.dash-head{display:flex;align-items:flex-start;gap:10px}
.dash-ico{width:26px;height:26px;border-radius:999px;background:#141d2f;border:1px solid #27344b;display:flex;align-items:center;justify-content:center;font-size:13px;flex:none}
.dash-kicker{font-size:10px;color:#7489a4;text-transform:uppercase;letter-spacing:.09em;margin-bottom:2px}
.dash-name{font-size:12px;font-weight:700;color:#edf3ff;line-height:1.1}
.dash-value{margin-top:8px}
.dash-card .cv{font-size:22px;line-height:1.05;margin-bottom:0}
.dash-card .cs{font-size:11px;color:#7489a4;margin-top:4px}
.dash-foot{font-size:11px;color:#7489a4;line-height:1.3;max-width:100%}
.div-line-summary{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;align-items:stretch}
.dashboard-grid{gap:10px;grid-template-columns:minmax(0,1.45fr) minmax(330px,.95fr)}
.dashboard-panel{min-height:260px}
.dashboard-legend{display:flex;flex-direction:column;gap:6px;min-width:220px}
.dashboard-legend-item{display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:12px}
.dashboard-legend-left{display:flex;align-items:center;gap:8px;min-width:0}
.dashboard-legend-name{color:#edf3ff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dashboard-legend-pct{color:#d0dbeb;font-weight:700}
.dashboard-swatch{width:10px;height:10px;border-radius:3px;flex:none}
.perf-grid{display:grid;grid-template-columns:minmax(280px,1.08fr) repeat(2,minmax(0,1fr));gap:10px;margin-top:10px}
.perf-card{background:#111828;border:1px solid #1d2940;border-radius:14px;padding:12px 12px 10px}
.perf-card.comp{display:flex;flex-direction:column;gap:10px}
.perf-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
.perf-card.comp .perf-title{margin-bottom:0}
.perf-h{font-size:13px;font-weight:800;color:#e2eaf6}
.perf-sub{font-size:11px;color:#64748b;margin-top:2px}
.perf-badge{font-size:11px;color:#7489a4;border:1px solid #27344b;background:#141d2f;border-radius:999px;padding:4px 8px;white-space:nowrap}
.perf-list{display:flex;flex-direction:column;gap:10px}
.perf-comp-body{display:flex;align-items:center;justify-content:space-between;gap:12px;flex:1;flex-wrap:wrap}
.perf-comp-pie{flex:none;transform:scale(.92);transform-origin:center}
.perf-comp-side{flex:1;min-width:190px}
.perf-comp-side .dashboard-legend{min-width:0;gap:5px}
.perf-comp-side .dashboard-legend-item{font-size:11px}
.perf-comp-side .dashboard-legend-pct{font-size:11px}
.perf-comp-empty{font-size:12px;color:#64748b;padding:16px 4px}
.perf-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center}
.perf-left{min-width:0}
.perf-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.perf-ticker{font-size:13px;font-weight:800;color:#e2eaf6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.perf-val{font-size:11px;color:#64748b;white-space:nowrap}
.perf-bar{height:4px;border-radius:999px;background:#141d2f;border:1px solid #27344b;overflow:hidden;margin-top:6px}
.perf-fill{height:100%;border-radius:999px}
.perf-pct{font-size:14px;font-weight:900;white-space:nowrap}
.perf-amt{font-size:11px;color:#64748b;margin-top:2px;text-align:right}
.perf-empty{font-size:12px;color:#7489a4;padding:18px 0;text-align:center}
.perf-card.hi .perf-pct{color:#34d399}
.perf-card.lo .perf-pct{color:#f87171}
.perf-card.hi .perf-fill{background:linear-gradient(90deg,#34d399,#86efac)}
.perf-card.lo .perf-fill{background:linear-gradient(90deg,#f87171,#fb7185)}
.perf-card.hi .perf-badge{color:#86efac;border-color:rgba(52,211,153,.2);background:rgba(16,185,129,.06)}
.perf-card.lo .perf-badge{color:#fca5a5;border-color:rgba(248,113,113,.2);background:rgba(248,113,113,.06)}
.dash-filters{display:flex;gap:6px;flex-wrap:wrap}
.dash-chip{border:1px solid #27344b;background:#141d2f;color:#7489a4;border-radius:999px;padding:4px 9px;font-size:11px;line-height:1;font-weight:700;transition:all .15s}
.dash-chip:hover{opacity:.9;transform:translateY(-1px)}
.dash-chip.on{background:rgba(79,70,229,.14);color:#a5b4fc;border-color:rgba(99,102,241,.35)}
.rent-layout{display:grid;grid-template-columns:286px minmax(0,1fr);gap:12px;align-items:stretch}
.rent-side{display:flex;flex-direction:column;gap:10px;height:100%}
.rent-main{min-height:0;display:flex;flex-direction:column;gap:10px;height:100%}
.rent-filters{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;justify-content:stretch}
.rent-filters select{min-width:0}
.rent-chartbox{background:#111828;border:1px solid #1d2940;border-radius:14px;padding:8px 8px 2px;overflow:hidden}
.rent-card{flex:1;min-height:0;padding:11px 12px 9px}
.rent-card .dash-value{margin-top:6px}
.rent-card .dash-foot{min-height:28px}
.rent-table th,.rent-table td{text-align:center;white-space:nowrap}
.rent-table th:first-child,.rent-table td:first-child{text-align:left}
.rent-table td{font-variant-numeric:tabular-nums}
.rent-table td.rd,.rent-table td.gn{font-weight:700}
.rent-table thead th{position:sticky;top:0;z-index:2}
.card{background:#111828;border:1px solid #1d2940;border-radius:12px;padding:14px 16px;transition:border-color .2s,box-shadow .2s}
.card.al{border-left:3px solid}.card:hover{border-color:#1e2a3d;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.cl{font-size:11px;color:#3d5472;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.cv{font-size:21px;font-weight:700;margin-bottom:2px;letter-spacing:-.02em}.cs{font-size:11px;color:#2e3f58}
.tw{background:#111828;border:1px solid #1d2940;border-radius:12px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.22)}
.ts{overflow-x:auto;-webkit-overflow-scrolling:touch}
.ts::-webkit-scrollbar{height:0}
.ts{scrollbar-width:none}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:560px}
thead tr{background:#111828}
th{padding:9px 12px;text-align:left;color:#607792;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #1d2940}
td{padding:9px 12px;border-bottom:1px solid #1d2940;color:#d3deec}
tbody tr{transition:background .1s}tbody tr:hover{background:#0f1728}tbody tr:last-child td{border-bottom:none}
.hist-monthly{min-width:1040px}
.hist-monthly th,.hist-monthly td{text-align:center;white-space:nowrap}
.hist-monthly th:first-child,.hist-monthly td:first-child{
  position:sticky;left:0;z-index:2;text-align:left;
  background:#111828;border-right:1px solid #1d2940;
}
.hist-monthly tbody tr td:first-child{background:#111828}
.hist-monthly thead th{position:sticky;top:0;z-index:3;background:#111828}
.hist-monthly thead th:first-child{z-index:4}
.hist-monthly td:nth-last-child(2),.hist-monthly td:last-child{font-variant-numeric:tabular-nums}
.bdg{border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600}
.bac{background:rgba(52,211,153,.08);color:#34d399;border:1px solid rgba(52,211,153,.18)}
.bfi{background:rgba(96,165,250,.08);color:#60a5fa;border:1px solid rgba(96,165,250,.18)}
.bet{background:rgba(167,139,250,.08);color:#a78bfa;border:1px solid rgba(167,139,250,.18)}
.bxx{background:rgba(148,163,184,.05);color:#64748b;border:1px solid rgba(148,163,184,.12)}
.btn{border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:600;transition:all .15s}
.btn:hover{opacity:.85;transform:translateY(-1px)}.btn:active{transform:translateY(0)}
.bp{background:linear-gradient(135deg,#3730a3,#4f46e5);color:#c7d2fe;box-shadow:0 2px 14px rgba(99,102,241,.3)}
.bsv{background:linear-gradient(135deg,#065f46,#047857);color:#6ee7b7;box-shadow:0 2px 14px rgba(16,185,129,.2)}
.bgh{background:#141d2f;color:#7489a4;border:1px solid #27344b}
.bexp{background:#111828;color:#fbbf24;border:1px solid rgba(251,191,36,.2);font-size:12px;padding:7px 12px}
.bimp{background:#111828;color:#60a5fa;border:1px solid rgba(96,165,250,.2);font-size:12px;padding:7px 12px}
.bb3{background:#111828;color:#34d399;border:1px solid rgba(52,211,153,.22);font-size:12px;padding:7px 12px}
.binst{background:#111828;color:#a5b4fc;border:1px solid rgba(99,102,241,.28);font-size:12px;padding:7px 12px}
.bi{background:transparent;border:1px solid #27344b;border-radius:7px;padding:3px 9px;color:#7489a4;font-size:13px}
.bdi{background:transparent;border:1px solid rgba(127,29,29,.5);border-radius:7px;padding:3px 9px;color:#f87171;font-size:13px}
.fc{background:#111828;border:1px solid #312e81;border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:0 4px 20px rgba(99,102,241,.08)}
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.fl{font-size:11px;color:#3d5472;margin-bottom:4px;font-weight:500}
input,select{background:#111828;border:1px solid #27344b;border-radius:9px;padding:8px 11px;color:#edf3ff;font-size:13px;width:100%;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus{border-color:#4f46e5;outline:none;box-shadow:0 0 0 3px rgba(79,70,229,.15)}
input:disabled{opacity:.45;cursor:not-allowed}
input::placeholder{color:#2e3f58}select option{background:#0d111e}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:stretch}
@media(max-width:640px){.cg{grid-template-columns:1fr}}
.cc{background:#111828;border:1px solid #1d2940;border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;min-height:100%}
.cc>.tw{flex:1;min-height:0}
.ct{font-size:11px;font-weight:600;color:#3d5472;margin-bottom:12px;text-transform:uppercase;letter-spacing:.07em}
.sec,.ag,.nota-review-group,.b3-review-group{
  background:#111828;
  border:1px solid #1d2940;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 0 0 1px rgba(255,255,255,.01) inset;
  transition:border-color .2s ease,box-shadow .2s ease,transform .2s ease;
}
.sec:hover,.ag:hover,.nota-review-group:hover,.b3-review-group:hover{
  border-color:#24324a;
  box-shadow:0 8px 24px rgba(0,0,0,.22);
}
.sec{margin-top:0}
.sec+ .sec{margin-top:12px}
.sec>summary,.ag>summary,.nota-review-group summary,.b3-review-group summary{
  list-style:none;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:12px 14px;
  cursor:pointer;
  min-height:54px;
  background:linear-gradient(180deg,#12192a,#111828);
}
.sec>summary::-webkit-details-marker,.ag>summary::-webkit-details-marker,.nota-review-group summary::-webkit-details-marker,.b3-review-group summary::-webkit-details-marker{display:none}
.sec[open]>summary,.ag[open]>summary,.nota-review-group[open] summary,.b3-review-group[open] summary{border-bottom:1px solid #1d2940}
.sec-title{font-size:14px;font-weight:700;color:#e2eaf6}
.sec-meta{font-size:12px;color:#64748b}
.sec-body,.ag-body,.nota-review-group-body,.b3-review-group-body{padding:12px 14px 14px}
.ag-wrap{display:flex;flex-direction:column;gap:12px}
.ag-left{display:flex;align-items:center;gap:12px;flex:1 1 240px;min-width:220px}
.ag-ico{width:34px;height:34px;border-radius:11px;background:#141d2f;border:1px solid #27344b;display:flex;align-items:center;justify-content:center;font-size:16px;flex:none}
.ag-name{font-size:18px;font-weight:800;line-height:1.1}
.ag-sub{font-size:12px;color:#64748b;margin-top:4px}
.ag-stats{display:grid;grid-template-columns:repeat(5,minmax(96px,1fr));gap:12px;flex:2 1 620px;min-width:0}
.ag-stat{min-width:0}
.ag-k{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.ag-v{font-size:15px;font-weight:800;line-height:1.1;white-space:nowrap}
.ag-v small{font-size:11px;font-weight:700;color:#64748b;margin-left:6px}
.ag-open{width:30px;height:30px;border-radius:999px;border:1px solid #27344b;background:#141d2f;color:#c0cce0;display:flex;align-items:center;justify-content:center;flex:none;transition:transform .18s,background .18s,border-color .18s}
.ag:hover .ag-open,.sec:hover .ag-open{border-color:#344560;background:#172033}
.ag[open] .ag-open{transform:rotate(180deg)}
.ag-body{padding:0 14px 14px}
.ag-table{margin-top:0}
.ag-table .ts{border-radius:10px}
.ag-table table{min-width:1120px}
.db{display:grid;grid-template-columns:58px minmax(0,1fr) 92px;align-items:center;gap:12px;margin-bottom:10px}
.dbl{font-size:11px;color:#c0cce0;min-width:0;font-weight:800;letter-spacing:.02em}
.dbt{background:#141d2f;border-radius:999px;height:8px;overflow:hidden;border:1px solid #27344b;box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}
.dbf{height:100%;border-radius:999px;box-shadow:0 0 0 1px rgba(255,255,255,.04) inset}
.dbv{font-size:12px;color:#fbbf24;min-width:0;text-align:right;font-weight:800;letter-spacing:-.01em}
.evo-shell{display:flex;flex-direction:column;gap:10px}
.evo-top{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;flex-wrap:wrap}
.evo-sub{font-size:12px;color:#64748b;line-height:1.35}
.evo-badge{border:1px solid rgba(96,165,250,.18);background:#111828;color:#a5b4fc;border-radius:999px;padding:5px 10px;font-size:11px;font-weight:700;white-space:nowrap}
.evo-legend{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
.evo-chip{border:1px solid #27344b;background:#141d2f;border-radius:999px;padding:5px 10px;font-size:11px;font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:6px}
.evo-chip .dot{width:8px;height:8px;border-radius:999px;display:inline-block}
.evo-chip.aplicado{color:#86efac}
.evo-chip.aplicado .dot{background:#34d399}
.evo-chip.ganho{color:#a5b4fc}
.evo-chip.ganho .dot{background:#818cf8}
.evo-list{display:flex;flex-direction:column;gap:8px;padding-top:4px}
.evo-row{display:grid;grid-template-columns:58px minmax(0,1fr) 92px;align-items:center;gap:12px}
.evo-label{font-size:12px;color:#e2eaf6;font-weight:800;letter-spacing:.01em}
.evo-track{background:#111828;border-radius:999px;height:8px;overflow:hidden;border:1px solid #1e2a3d}
.evo-fill{height:100%;border-radius:999px;box-shadow:0 0 0 1px rgba(255,255,255,.05) inset;background:linear-gradient(90deg,#34d399,#86efac)}
.evo-value{font-size:12px;color:#fbbf24;text-align:right;font-weight:800;letter-spacing:-.01em}
.evo-empty{font-size:13px;padding:16px 0;text-align:center;color:#64748b}
.pleg{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.pli{display:flex;align-items:center;gap:5px;font-size:12px;color:#64748b}
.pd{width:8px;height:8px;border-radius:2px}
.gn{color:#34d399}.rd{color:#f87171}.am{color:#fbbf24}.pu{color:#818cf8}.bl{color:#60a5fa}.mu{color:#64748b}.di{color:#3d5472}
.bwr{background:#111828;border-radius:3px;height:5px;width:70px;overflow:hidden;display:inline-block}
.bfr{height:100%;background:#fbbf24}
.es{text-align:center;padding:40px 20px;color:#3d5472;line-height:1.7}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.st{font-size:15px;font-weight:700}
.qdot{width:7px;height:7px;border-radius:50%;background:#34d399;display:inline-block;box-shadow:0 0 6px rgba(52,211,153,.6)}
.qdot.spin{background:#fbbf24;box-shadow:0 0 6px rgba(251,191,36,.6);animation:pulse 1s ease-in-out infinite}
.aic{background:#090c15;border:1px solid #2d2a7a;border-radius:12px;padding:14px;box-shadow:0 4px 24px rgba(99,102,241,.12)}
.air{font-size:13px;line-height:1.7;color:#b8c8de;white-space:pre-wrap}
@keyframes priceUp{0%{background:rgba(52,211,153,.25)}100%{background:transparent}}
@keyframes priceDown{0%{background:rgba(248,113,113,.25)}100%{background:transparent}}
.flash-up{animation:priceUp .8s ease-out}
.flash-down{animation:priceDown .8s ease-out}
@keyframes rota{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spn{display:inline-block;animation:rota 1s linear infinite}
.toast{position:fixed;bottom:20px;right:20px;background:#064e3b;color:#6ee7b7;border:1px solid rgba(52,211,153,.3);border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.note-overlay{position:fixed;inset:0;z-index:9998;background:rgba(2,6,23,.82);backdrop-filter:blur(6px);display:flex;align-items:flex-start;justify-content:center;padding:22px;overflow:auto}
.note-modal{width:min(1240px,100%);background:#0b1020;border:1px solid #27324a;border-radius:18px;box-shadow:0 28px 80px rgba(0,0,0,.55);overflow:hidden;margin:20px 0}
.note-head{padding:18px 18px 14px;border-bottom:1px solid #182033;background:linear-gradient(180deg,#0f1527,#0b1020)}
.note-title{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap}
.note-title h3{font-size:18px;font-weight:800;color:#f8fafc}

function cloneData(v){ return JSON.parse(JSON.stringify(v ?? null)); }
function normalizeEmail(v){ return String(v||'').toLowerCase().trim(); }
function normalizeAccessList(v){
  return Array.isArray(v)
    ? v.map(x=>normalizeEmail(x)).filter(Boolean)
    : [];
}
function isAccessAdmin(email){
  return ACCESS_ADMIN_EMAILS.includes(normalizeEmail(email));
}
function canManageSecurity(){
  return !!FB.user && isAccessAdmin(FB.user.email);
}
function makeWalletId(){ return `w_${Date.now()}_${Math.random().toString(16).slice(2,8)}`; }
function emptyWallet(name='Carteira principal'){
  return {
    id: makeWalletId(),
    name,
    assets:[],
    aportes:[],
    proventos:[],
    divGoal:0,
    goals:normalizeGoals(),
    learnMeta:{}
  };
}
function normalizeWalletEntry(w, fallbackName='Carteira'){
  const base=emptyWallet(fallbackName);
  const obj=(w&&typeof w==='object')?w:{};
  return {
    ...base,
    id:String(obj.id||base.id),
    name:String(obj.name||fallbackName||base.name),
    assets:Array.isArray(obj.assets)?obj.assets:[],
    aportes:Array.isArray(obj.aportes)?obj.aportes:[],
    proventos:Array.isArray(obj.proventos)?obj.proventos:[],
    divGoal:Number(obj.divGoal)||0,
    goals:normalizeGoals(obj.goals),
    learnMeta:(obj.learnMeta && typeof obj.learnMeta==='object') ? obj.learnMeta : {}
  };
}
function ensureWallets(){
  if(!Array.isArray(S.wallets) || !S.wallets.length){
    const legacy=normalizeWalletEntry({
      assets:S.assets,
      aportes:S.aportes,
      proventos:S.proventos,
      divGoal:S.divGoal,
      goals:S.goals,
      learnMeta:S.learnMeta
    }, 'Carteira principal');
    S.wallets=[legacy];
    S.activeWalletId=legacy.id;
    return;
  }
  S.wallets=S.wallets.map((w,i)=>normalizeWalletEntry(w, i===0?'Carteira principal':`Carteira ${i+1}`));
  if(!S.activeWalletId || !S.wallets.some(w=>w.id===S.activeWalletId)){
    S.activeWalletId=S.wallets[0].id;
  }
}
function activeWallet(){
  ensureWallets();
  return S.wallets.find(w=>w.id===S.activeWalletId) || S.wallets[0];
}
function syncStateFromWallet(w){
  const wallet=normalizeWalletEntry(w);
  S.assets=cloneData(wallet.assets||[]);
  S.aportes=cloneData(wallet.aportes||[]);
  S.proventos=cloneData(wallet.proventos||[]);
  S.divGoal=Number(wallet.divGoal)||0;
  S.goals=normalizeGoals(wallet.goals);
  S.learnMeta=(wallet.learnMeta && typeof wallet.learnMeta==='object') ? wallet.learnMeta : {};
  rebuildLearnMeta();
}
function syncWalletFromState(){
  ensureWallets();
  const w=activeWallet();
  if(!w) return;
  w.assets=cloneData(S.assets||[]);
  w.aportes=cloneData(S.aportes||[]);
  w.proventos=cloneData(S.proventos||[]);
  w.divGoal=Number(S.divGoal)||0;
  w.goals=normalizeGoals(S.goals);
  w.learnMeta=(S.learnMeta && typeof S.learnMeta==='object') ? cloneData(S.learnMeta) : {};
}
function walletLabel(w=activeWallet()){
  if(!w) return 'Carteira';
  const assets=Number(w.assets?.length||0);
  const aportes=Number(w.aportes?.length||0);
  const prov=Number(w.proventos?.length||0);
  return `${w.name} · ${assets} ativos · ${aportes} aportes · ${prov} proventos`;
}
function activeWalletIndex(){
  ensureWallets();
  const idx=S.wallets.findIndex(w=>w.id===S.activeWalletId);
  return idx>=0 ? idx+1 : 1;
}
function walletCount(){
  ensureWallets();
  return Math.max(1, Number(S.wallets?.length||0));
}
function walletTone(idx=1){
  const tones=[
    {bg:'linear-gradient(180deg,rgba(99,102,241,.18),rgba(99,102,241,.08))',bd:'rgba(99,102,241,.35)',fg:'#c7d2fe'},
    {bg:'linear-gradient(180deg,rgba(52,211,153,.18),rgba(52,211,153,.08))',bd:'rgba(52,211,153,.35)',fg:'#a7f3d0'},
    {bg:'linear-gradient(180deg,rgba(251,191,36,.18),rgba(251,191,36,.08))',bd:'rgba(251,191,36,.35)',fg:'#fde68a'},
    {bg:'linear-gradient(180deg,rgba(244,114,182,.18),rgba(244,114,182,.08))',bd:'rgba(244,114,182,.35)',fg:'#f9a8d4'},
    {bg:'linear-gradient(180deg,rgba(96,165,250,.18),rgba(96,165,250,.08))',bd:'rgba(96,165,250,.35)',fg:'#bfdbfe'}
  ];
  return tones[(Math.max(1,idx)-1)%tones.length];
}

function switchWallet(id){
  ensureWallets();
  syncWalletFromState();
  const next=S.wallets.find(w=>w.id===id);
  if(!next){
    save();
    render();
    return;
  }
  if(next.id===S.activeWalletId){
    save();
    render();
    return;
  }
  S.activeWalletId=next.id;
  syncStateFromWallet(next);
  save();
  render();
  toast(`📁 ${next.name} ativada.`);
}
function createWallet(){
  ensureWallets();
  syncWalletFromState();
  const name=(prompt('Nome da nova carteira:', `Carteira ${S.wallets.length+1}`)||'').trim();
  if(!name) return;
  const w=emptyWallet(name);
  S.wallets.push(w);
  S.activeWalletId=w.id;
  syncStateFromWallet(w);
  save();
  render();
  toast(`✅ Carteira "${name}" criada.`);
}
function duplicateWallet(){
  ensureWallets();
  syncWalletFromState();
  const src=activeWallet();
  if(!src) return;
  const name=(prompt('Nome da carteira duplicada:', `${src.name} - cópia` )||'').trim();
  if(!name) return;
  const copy=normalizeWalletEntry({...cloneData(src), id:makeWalletId(), name}, name);
  S.wallets.push(copy);
  S.activeWalletId=copy.id;
  syncStateFromWallet(copy);
  save();
  render();
  toast(`✅ Carteira duplicada como "${name}".`);
}
function renameWallet(){
  ensureWallets();
  const w=activeWallet();
  if(!w) return;
  const name=(prompt('Novo nome da carteira:', w.name)||'').trim();
  if(!name) return;
  w.name=name;
  save();
  render();
  toast(`✏️ Carteira renomeada para "${name}".`);
}
function deleteWallet(){
  ensureWallets();
  if(S.wallets.length<=1){
    toast('⚠️ Mantenha ao menos uma carteira.');
    return;
  }
  const w=activeWallet();
  if(!w) return;
  const typed=(prompt(`Confirme a exclusão digitando exatamente o nome da carteira:\n\n"${w.name}"`)||'').trim();
  if(!typed) return;
  if(typed!==String(w.name||'')){
    toast('⚠️ Nome digitado não confere. Exclusão cancelada.','#fbbf24');
    return;
  }
  const ok=confirm(`Última confirmação: excluir a carteira "${w.name}"? Isso remove só essa carteira do perfil.`);
  if(!ok) return;
  const idx=S.wallets.findIndex(x=>x.id===w.id);
  if(idx<0) return;
  S.wallets.splice(idx,1);
  const next=S.wallets[Math.min(idx, S.wallets.length-1)];
  S.activeWalletId=next.id;
  syncStateFromWallet(next);
  save();
  render();
  toast(`🗑️ Carteira "${w.name}" excluída.`);
}

function markProventosDirty(){
  S.autoProvDirty=true;
}
function isAutoGeneratedProvento(p){
  const source=String(p?.source||'').toLowerCase();
  if(source==='b3-movement') return false;
  return !!p?.autoKey || source.startsWith('auto');
}
function stripAutoProventos(){
  const before=Number(S.proventos?.length||0);
  S.proventos=(S.proventos||[]).filter(p=>!isAutoGeneratedProvento(p));
  return before-(S.proventos?.length||0);
}
function scheduleAutoProventosGratis(reason='change'){
  markProventosDirty();
  clearTimeout(S.autoProvTimer);
  S.autoProvTimer=setTimeout(()=>runAutoProventosGratis(reason), 1400);
}
async function runAutoProventosGratis(reason='change'){
  if(S.autoProvRunning) return;
  if(!S.autoProvDirty && reason!=='force') return;
  S.autoProvRunning=true;
  try{
    if(!S.assets.length || !S.aportes.length){
      const cleaned=stripAutoProventos();
      S.autoProvDirty=false;
      if(cleaned>0){ save(); render(); toast(`🧹 ${cleaned} provento(s) automático(s) removido(s) por falta de aportes.`); }
      return;
    }
    const result = await fetchAutoProventosGratis();
    if(!result){
      S.autoProvDirty=false;
      return;
    }
    const { added, cleaned } = result;
    S.autoProvDirty=false;
    if(cleaned>0 || added>0){
      const parts=[];
      if(cleaned>0) parts.push(`${cleaned} removido(s)`);
      if(added>0) parts.push(`${added} adicionado(s)`);
      toast(`✅ Proventos automáticos sincronizados: ${parts.join(' · ')}.`, '#6ee7b7');
    }
  }finally{
    S.autoProvRunning=false;
  }
}

function load(){
  // ← FIX: try-catch separados para não perder tudo se um falhar
  try{
    const d=JSON.parse(localStorage.getItem(STOR)||'{}');
    if(Array.isArray(d.wallets) && d.wallets.length){
      S.wallets=d.wallets.map((w,i)=>normalizeWalletEntry(w, i===0?'Carteira principal':`Carteira ${i+1}`));
      S.activeWalletId=String(d.activeWalletId||S.wallets[0].id);
      const active=S.wallets.find(w=>w.id===S.activeWalletId) || S.wallets[0];
      syncStateFromWallet(active);
    }else{
      if(Array.isArray(d.assets))    S.assets    = d.assets;
      if(Array.isArray(d.aportes))   S.aportes   = d.aportes;
      if(Array.isArray(d.proventos)) S.proventos = d.proventos;
    }
    if(d.tab)                       S.tab       = d.tab;       // ← FIX: restaura tab
    if(d.divGoal !== undefined)     S.divGoal   = Number(d.divGoal)||0;
    if(d.hideValues !== undefined)  S.hideValues = !!d.hideValues;
    if(d.apHistoryOpen !== undefined) S.apHistoryOpen = !!d.apHistoryOpen;
    if(d.apSearch !== undefined)     S.apSearch  = String(d.apSearch||'');
    if(d.dashPeriod !== undefined)   S.dashPeriod = Math.max(3, Number(d.dashPeriod)||12);
    if(d.dashType !== undefined)     S.dashType = String(d.dashType||'all');
    if(d.rentPeriod !== undefined)   S.rentPeriod = String(d.rentPeriod||'all');
    if(d.rentType !== undefined)     S.rentType = String(d.rentType||'all');
    if(d.rentBench !== undefined)    S.rentBench = String(d.rentBench||'CDI');
    if(d.irpfYear !== undefined)     S.irpfYear = Math.max(2010, Number(d.irpfYear)||new Date().getFullYear());
    if(d.irpfStep !== undefined)     S.irpfStep = Math.min(4, Math.max(1, Number(d.irpfStep)||1));
    if(d.goals && typeof d.goals==='object') S.goals = normalizeGoals(d.goals);
    if(d.learnMeta && typeof d.learnMeta==='object') S.learnMeta = d.learnMeta;
  }catch(e){ console.error('load erro:',e); }
  try{
    const c=JSON.parse(localStorage.getItem(STOR+'_cfg')||'{}');
    if(c.brapiToken)            S.brapiToken = c.brapiToken;
    else                        S.brapiToken = DEFAULT_BRAPI; // garante token padrão
    if(c.divGoal !== undefined) S.divGoal    = Number(c.divGoal)||S.divGoal;
  }catch(e){ S.brapiToken = DEFAULT_BRAPI; }
  // Migração de versões antigas (civ4, civ3...)
  if(!S.aportes.length && !S.assets.length){
    for(const k of ['civ4','civ3','civ2','carteira_v1']){
      try{
        const d=JSON.parse(localStorage.getItem(k)||'{}');
        if(Array.isArray(d.aportes) && d.aportes.length){
          S.aportes=d.aportes; S.assets=d.assets||[]; S.proventos=d.proventos||[];
          if(d.divGoal) S.divGoal=Number(d.divGoal)||0;
          if(d.dashPeriod !== undefined) S.dashPeriod=Math.max(3, Number(d.dashPeriod)||12);
          if(d.dashType !== undefined) S.dashType=String(d.dashType||'all');
          if(d.rentPeriod !== undefined) S.rentPeriod=String(d.rentPeriod||'all');
          if(d.rentType !== undefined) S.rentType=String(d.rentType||'all');
          if(d.rentBench !== undefined) S.rentBench=String(d.rentBench||'CDI');
          if(d.irpfYear !== undefined) S.irpfYear=Math.max(2010, Number(d.irpfYear)||new Date().getFullYear());
          if(d.irpfStep !== undefined) S.irpfStep=Math.min(4, Math.max(1, Number(d.irpfStep)||1));
          if(d.goals && typeof d.goals==='object') S.goals=normalizeGoals(d.goals);
          if(d.learnMeta && typeof d.learnMeta==='object') S.learnMeta=d.learnMeta;
          save(); break;
        }
      }catch(e){}
    }
  }
  ensureWallets();
  syncWalletFromState();
  if(!S.goals || typeof S.goals!=='object') S.goals=normalizeGoals();
  else S.goals=normalizeGoals(S.goals);
  rebuildLearnMeta();
  if(S.assets.length && S.aportes.length) S.autoProvDirty=true;
}

function initFirebase(){
  try{
    if(!window.firebase) return;
    FB.app  = firebase.initializeApp(firebaseConfig);
    FB.auth = firebase.auth();
    FB.db   = firebase.firestore();
    FB.ready = true;
    try{ FB.db.enablePersistence({synchronizeTabs:true}).catch(()=>{}); }catch(e){}
    FB.auth.onAuthStateChanged(async user=>{
      FB.user = user || null;
      if(FB.user){
        FB.access.loading = true;
        FB.access.loaded = false;
        FB.access.allowed = false;
        FB.access.reason = '';
        render();
        const ok = await loadAccessControl(FB.user);
        await recordAccessAttempt(FB.user, ok, FB.access.reason);
        if(!ok){
          stopCloudSync(false);
          try{ await FB.auth.signOut(); }catch(e){}
          FB.user = null;
          FB.access.loading = false;
          toast('⛔ Seu e-mail não está autorizado para acessar este site.','#f87171');
          render();
          return;
        }
        FB.access.loading = false;
        startCloudSync();
      }else{
        FB.access.loading = false;
        FB.access.loaded = false;
        FB.access.allowed = false;
        FB.access.reason = '';
        FB.access.cfg = null;
        FB.access.lastDeniedAt = null;
        stopCloudSync();
      }
      render();
    });
  }catch(e){
    console.warn('Firebase indisponível:', e);
    FB.ready=false;
  }
}
async function loadAccessControl(user){
  const email = normalizeEmail(user?.email);
  if(!FB.db || !email){
    FB.access = {loaded:true,loading:false,allowed:false,reason:'Conecte sua conta Google autorizada para acessar o sistema.',cfg:null,lastDeniedAt:new Date().toISOString()};
    return false;
  }
  try{
    const snap = await FB.db.collection('meta').doc('access').get();
    if(!snap.exists){
      const isAdmin = isAccessAdmin(email);
      FB.access = {
        loaded:true,
        loading:false,
        allowed:isAdmin,
        reason:isAdmin ? '' : 'O controle de acesso ainda não foi configurado neste ambiente.',
        cfg:null,
        lastDeniedAt:isAdmin ? null : new Date().toISOString()
      };
      return isAdmin;
    }
    const cfg = snap.exists ? (snap.data() || {}) : {};
    const enabled = cfg.enabled !== false;
    const allowedEmails = normalizeAccessList(cfg.allowedEmails);
    const blockedEmails = normalizeAccessList(cfg.blockedEmails);
    const allowedDomains = normalizeAccessList(cfg.allowedDomains);
    const domain = email.includes('@') ? email.split('@').pop() : '';
    const isBlocked = blockedEmails.includes(email);
    const isAllowed = enabled && !isBlocked && (
      allowedEmails.includes(email) ||
      (domain && allowedDomains.includes(domain))
    );
    FB.access = {
      loaded:true,
      loading:false,
      allowed:isAllowed,
      reason:isAllowed ? '' : String(cfg.message || 'Acesso restrito a usuários aprovados.'),
      cfg,
      lastDeniedAt:isAllowed ? null : new Date().toISOString()
    };
    return isAllowed;
  }catch(e){
    console.warn('Acesso:', e);
    FB.access = {loaded:true,loading:false,allowed:false,reason:'Não foi possível validar o acesso agora.',cfg:null,lastDeniedAt:new Date().toISOString()};
    return false;
  }
}
async function recordAccessAttempt(user, allowed, reason=''){

    if(!FB.db || !user?.uid) return;
    const ref = FB.db.collection('users').doc(user.uid);
    await ref.set({
      email: user.email || '',
      displayName: user.displayName || '',
      photoURL: user.photoURL || '',
      allowed: !!allowed,
      lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
      lastSeenLocal: new Date().toISOString(),
      loginCount: firebase.firestore.FieldValue.increment(1),
      lastReason: String(reason || ''),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge:true });
  }catch(e){
    console.warn('log acesso:', e);
  }

function applyCloudData(d){
  if(!d) return;
  FB.applying=true;
  if(Array.isArray(d.wallets) && d.wallets.length){
    S.wallets=d.wallets.map((w,i)=>normalizeWalletEntry(w, i===0?'Carteira principal':`Carteira ${i+1}`));
    if(d.activeWalletId) S.activeWalletId=String(d.activeWalletId);
    const active=S.wallets.find(w=>w.id===S.activeWalletId) || S.wallets[0];
    syncStateFromWallet(active);
  }else{
    if(Array.isArray(d.assets))    S.assets    = d.assets;
    if(Array.isArray(d.aportes))   S.aportes   = d.aportes;
    if(Array.isArray(d.proventos)) S.proventos = d.proventos;
    if(d.divGoal!==undefined)      S.divGoal   = Number(d.divGoal)||0;
    if(d.goals && typeof d.goals==='object') S.goals = normalizeGoals(d.goals);
    if(d.learnMeta && typeof d.learnMeta==='object') S.learnMeta = d.learnMeta;
  }
  if(d.divGoal!==undefined && !(Array.isArray(d.wallets) && d.wallets.length)) S.divGoal = Number(d.divGoal)||0;
  if(d.goals && typeof d.goals==='object' && !(Array.isArray(d.wallets) && d.wallets.length)) S.goals = normalizeGoals(d.goals);
  if(d.learnMeta && typeof d.learnMeta==='object' && !(Array.isArray(d.wallets) && d.wallets.length)) S.learnMeta = d.learnMeta;
  if(d.tab && !S.tab)            S.tab       = d.tab;
  if(d.settings && d.settings.brapiToken && !S.brapiToken) S.brapiToken = d.settings.brapiToken;
  if(d.dashboard && typeof d.dashboard==='object'){
    if(d.dashboard.period !== undefined) S.dashPeriod = Math.max(3, Number(d.dashboard.period)||12);
    if(d.dashboard.type !== undefined) S.dashType = String(d.dashboard.type||'all');
  }
  if(d.rentabilidade && typeof d.rentabilidade==='object'){
    if(d.rentabilidade.period !== undefined) S.rentPeriod = String(d.rentabilidade.period||'all');
    if(d.rentabilidade.type !== undefined) S.rentType = String(d.rentabilidade.type||'all');
    if(d.rentabilidade.bench !== undefined) S.rentBench = String(d.rentabilidade.bench||'CDI');
  }
  rebuildLearnMeta();
  try{
    syncWalletFromState();
    localStorage.setItem(STOR, JSON.stringify({wallets:S.wallets, activeWalletId:S.activeWalletId, assets:S.assets, aportes:S.aportes, proventos:S.proventos, tab:S.tab, divGoal:S.divGoal, goals:S.goals, dashPeriod:S.dashPeriod, dashType:S.dashType, rentPeriod:S.rentPeriod, rentType:S.rentType, rentBench:S.rentBench, learnMeta:S.learnMeta}));
    localStorage.setItem(STOR+'_cfg', JSON.stringify({brapiToken:S.brapiToken, divGoal:S.divGoal}));
  }catch(e){}
  FB.lastCloudUpdate = d.updatedAtLocal || new Date().toISOString();
  FB.applying=false;
}
function startCloudSync(){
  const ref=portfolioRef();
  if(!ref) return;
  stopCloudSync(false);
  FB.cloudLoaded=false;
  FB.unsub=ref.onSnapshot(async snap=>{
    try{
      if(!snap.exists){
        if(hasLocalData()) await uploadLocalToCloud(false);
        FB.cloudLoaded=true;
        render();
        return;
      }
      const data=snap.data()||{};
      applyCloudData(data);
      FB.cloudLoaded=true;
      render();
    }catch(e){ console.warn('cloud sync:',e); }
  },err=>{
    console.warn('Firestore:',err);
    toast('⚠️ Erro na sincronização com a nuvem. Confira regras do Firestore.','#fbbf24');
  });
}
function stopCloudSync(doRender=true){
  if(FB.unsub){ try{ FB.unsub(); }catch(e){} }
  FB.unsub=null; FB.cloudLoaded=false;
  if(doRender) render();
}
function queueCloudSave(){

async function uploadLocalToCloud(show=true){

    FB.lastCloudUpdate=new Date().toISOString();

  }
}

async function loadPdfJs(){
  if(window.__pdfjsLib) return window.__pdfjsLib;
  if(!window.__pdfjsPromise){
    window.__pdfjsPromise = import('https://cdn.jsdelivr.net/npm/pdfjs-dist@5.6.205/legacy/build/pdf.mjs')
      .then(mod=>{
        try{
          mod.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@5.6.205/legacy/build/pdf.worker.mjs';
        }catch(e){}
        window.__pdfjsLib = mod;
        return mod;
      });
  }
  return window.__pdfjsPromise;
}
function pdfLinesFromTextContent(textContent){
  const rows=new Map();
  (textContent?.items||[]).forEach(item=>{
    const y=Math.round(item.transform?.[5]||0);
    const x=Math.round(item.transform?.[4]||0);
    if(!rows.has(y)) rows.set(y,[]);
    rows.get(y).push({x, s:String(item.str||'')});
  });
  return [...rows.keys()].sort((a,b)=>b-a).map(y=>rows.get(y).sort((a,b)=>a.x-b.x).map(v=>v.s).join(' ').replace(/\s+/g,' ').trim()).filter(Boolean);
}
function pdfSectionFromLine(line){
  const s=String(line||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  if(s.includes('emprestimo de ativos')) return 'Empréstimos';
  if(s === 'acoes' || s.startsWith('acoes ')) return 'Ações';
  if(s.includes('etf - exchange traded fund')) return 'ETF';
  if(s.includes('fii - fundo de investimento imobiliario')) return 'FII';
  if(s.includes('fundo de investimento')) return 'Fundos de Investimento';
  if(s.includes('cdb - certificado de deposito bancario')) return 'Renda Fixa';
  if(s.includes('cra - certificado de recebiveis do agronegocio')) return 'Renda Fixa';
  if(s.includes('deb - debentures')) return 'Renda Fixa';
  if(s.includes('lig - letra imobiliaria garantida')) return 'Renda Fixa';
  return '';
}
function pdfIsRowStart(line, section){
  const s=String(line||'').trim();
  if(!s) return false;
  if(/^total\b/i.test(s)) return false;
  if(/^extrato de pos/i.test(s)) return false;
  if(/^paulo sergio/i.test(s)) return false;
  if(/^filtros aplicados/i.test(s)) return false;
  if(/^data:/i.test(s) || /^tipo de investimento:/i.test(s) || /^instituicao:/i.test(s) || /^marcacoes:/i.test(s)) return false;
  if(/^produto\b/i.test(s) || /^tipo\b/i.test(s) || /^instituicao\b/i.test(s) || /^quantidade\b/i.test(s) || /^preco\b/i.test(s) || /^valor\b/i.test(s)) return false;
  if(/^preço\b/i.test(s) || /^fechamento\b/i.test(s) || /^atualizado\b/i.test(s)) return false;
  if(/^acesse investidor/i.test(s)) return false;
  if(section==='Renda Fixa') return /^(CDB|CRA|DEB|LIG)\b/i.test(s);
  return /^[A-Z0-9]{4,6}[0-9]{1,2}\b/.test(s);
}
function pdfBlockToItem(block, section){
  const txt=String(block||'').replace(/\s+/g,' ').trim();
  if(!txt || section==='Empréstimos') return null;
  if(section==='Renda Fixa'){
    const head=txt.match(/^(?<code>CDB|CRA|DEB|LIG)\s*-\s*/i);
    const tail=txt.match(/(?<date>\d{2}\/\d{2}\/\d{4})[\s\S]*?(?<qty>[\d.,]+)\s+R\$\s*(?<price>[\d.,]+)[\s\S]*?(?:R\$\s*)?(?<value>[\d.,]+)\b/i);
    if(!head || !tail) return null;
    const code=head.groups.code.toUpperCase();
    const product=txt.slice(head[0].length, tail.index).replace(/\s+/g,' ').trim();
    const qty=parseNum(tail.groups.qty);
    const price=parseNum(tail.groups.price);
    const value=parseNum(tail.groups.value);
    const ticker=cleanAssetCode(`${code} ${product} ${tail.groups.date}`);
    const sector=code==='CDB'?'CDB':code==='CRA'?'CRA':code==='DEB'?'Debênture':'LIG';
    return {ticker,qty,price,value:value||qty*price,type:normalizeType('Renda Fixa','Renda Fixa'),sector,product,section};
  }
  const head=txt.match(/^(?<ticker>[A-Z0-9]{4,6}[0-9]{1,2})\s*-\s*/i);
  const tail=txt.match(/(?:R\$\s*)?(?<kind>PN|UNIT|Cotas|Direito|Ações|Acoes|Criptoativo|Internacional|Renda Fixa)\b[\s\S]*?(?<qty>[\d.,]+)\s+R\$\s*(?<price>[\d.,]+)[\s\S]*?(?:R\$\s*)?(?<value>[\d.,]+)\b/i);
  if(!head || !tail) return null;
  const ticker=head.groups.ticker.toUpperCase();
  const qty=parseNum(tail.groups.qty);
  const price=parseNum(tail.groups.price);
  const value=parseNum(tail.groups.value);
  const kind=tail.groups.kind;
  const product=txt.slice(head[0].length, tail.index).replace(/\s+/g,' ').trim();
  const meta=inferB3PositionMeta(section, ticker, product, kind);
  const type=normalizeType(meta.type||'Ação','Ação');
  const sector=meta.sector||'';
  return {ticker,qty,price,value:value||qty*price,type,sector,product,section,kind};
}
async function parseB3PositionPdf(file){
  const pdfjs=await loadPdfJs();
  const data=new Uint8Array(await file.arrayBuffer());
  const doc=await pdfjs.getDocument({data}).promise;
  const items=[]; const warnings=[];
  const stats={importedBySheet:{},ignoredBySheet:{},skippedSheets:[],ignoredByReason:{},totalIgnored:0};
  const importedSet=new Set();
  const addImported=sheet=>{ stats.importedBySheet[sheet]=(stats.importedBySheet[sheet]||0)+1; importedSet.add(sheet); };
  const addIgnored=(sheet,reason)=>{
    stats.totalIgnored++;
    stats.ignoredBySheet[sheet]=(stats.ignoredBySheet[sheet]||0)+1;
    if(reason) stats.ignoredByReason[reason]=(stats.ignoredByReason[reason]||0)+1;
  };
  let importDate=new Date().toLocaleDateString('pt-BR');
  const blocks=[];
  for(let p=1;p<=doc.numPages;p++){
    const page=await doc.getPage(p);
    const text=await page.getTextContent();
    const lines=pdfLinesFromTextContent(text);
    const pageText=lines.join(' ');
    const pageDateMatch=pageText.match(/Data:\s*(\d{2}\/\d{2}\/\d{4})/i);
    if(pageDateMatch) importDate=pageDateMatch[1];
    let section='';
    let current=[];
    const flush=()=>{
      if(!current.length) return;
      const block=current.join(' ');
      blocks.push({section,block,page:p});
      current=[];
    };
    for(const line of lines){
      const sec=pdfSectionFromLine(line);
      if(sec){
        flush();
        section=sec;
        if(sec==='Empréstimos' && !stats.skippedSheets.includes(sec)) stats.skippedSheets.push(sec);
        continue;
      }
      const s=String(line||'').trim();
      if(!s) continue;
      if(/^total\b/i.test(s) || /^extrato de pos/i.test(s) || /^acesse investidor/i.test(s)) { flush(); continue; }
      if(section==='Empréstimos') continue;
      if(pdfIsRowStart(s, section)){
        flush();
        current=[s];
        continue;
      }
      if(current.length) current.push(s);
    }
    flush();
  }
  for(const {section,block,page} of blocks){
    const item=pdfBlockToItem(block, section);
    if(!item){
      addIgnored(section||'PDF','linha não reconhecida');
      warnings.push(`PDF página ${page} (${section||'sem seção'}): linha não reconhecida.`);
      continue;
    }
    items.push({...item,date:importDate});
    addImported(item.section||section||'PDF');
  }
  if(!stats.skippedSheets.includes('Empréstimos')) stats.skippedSheets.push('Empréstimos');
  return {items,warnings,importDate,stats,kind:'position'};
}
function b3MovementNorm(v){
  return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim().toUpperCase();
}
function b3MovementTicker(product){
  const s=b3MovementNorm(product);
  if(!s) return '';
  const m=s.match(/\b(CDB|CRA|DEB|LIG|LCI|LCA|LF|RDB)\s*-\s*([A-Z0-9]+)/i);
  if(m){
    const pref=m[1].toUpperCase();
    const code=m[2].toUpperCase();
    return cleanAssetCode(code.startsWith(pref) ? code : `${pref}${code}`);
  }
  const p=s.match(/\b(CDB|CRA|DEB|LIG|LCI|LCA|LF|RDB)\b/i);
  if(p){
    const rest=s.slice(p.index + p[0].length).replace(/^[-\s]+/,'').match(/^([A-Z0-9]+)/);
    if(rest){
      const pref=p[1].toUpperCase();
      const code=rest[1].toUpperCase();
      return cleanAssetCode(code.startsWith(pref) ? code : `${pref}${code}`);
    }
    return cleanAssetCode(p[1].toUpperCase());
  }
  const first=s.split(' - ')[0] || s.split(' ').filter(Boolean)[0] || s;
  return cleanAssetCode(first);
}
function b3MovementKind(mov){
  const s=b3MovementNorm(mov);
  if(/PAGAMENTO DE JUROS/.test(s)) return 'provento';
  if(/TRANSFERENCIA SEM FINANCEIRO|SAIDA\/ENTR\. CUST-TRANSF S\/FIN|RETIRADA DE CUSTODIA/.test(s)) return 'transferencia';
  if(/EVENTO GENERICO/.test(s)) return 'evento';
  if(/RESGATE ANTECIPADO|VENCIMENTO/.test(s)) return 'resgate';
  return 'aporte';
}
function b3MovementAction(mov, entryExit){
  const kind=b3MovementKind(mov);
  if(kind==='provento') return 'provento';
  if(kind==='transferencia' || kind==='evento') return 'ignorar';
  if(kind==='resgate') return 'venda';
  const e=String(entryExit||'').toLowerCase();
  if(e==='debito') return 'venda';
  if(e==='credito') return 'compra';
  return /RESGATE|VENCIMENTO/.test(b3MovementNorm(mov)) ? 'venda' : 'compra';
}
function b3MovementTarget(mov, entryExit){
  const kind=b3MovementKind(mov);
  if(kind==='provento') return 'proventos';
  if(kind==='transferencia' || kind==='evento') return 'ignorar';
  return 'aportes';
}
function b3MovementGroup(mov){
  const s=b3MovementNorm(mov);
  if(/PAGAMENTO DE JUROS/.test(s)) return 'Proventos / juros';
  if(/TRANSFERENCIA SEM FINANCEIRO|SAIDA\/ENTR\. CUST-TRANSF S\/FIN|RETIRADA DE CUSTODIA/.test(s)) return 'Transferencias / custodia';
  if(/EVENTO GENERICO/.test(s)) return 'Eventos';
  if(/RESGATE ANTECIPADO|VENCIMENTO/.test(s)) return 'Resgates / vencimentos';
  if(/APLICA/.test(s)) return 'Aplicacoes';
  if(/COMPRA/.test(s)) return 'Compras / vendas';
  return 'Outros';
}
function b3MovementParseRow({movement, product, entryExit, qty, price, value, importDate, sheet='Movimentacao'}){
  const mov=String(movement||'').trim();
  const prod=String(product||'').trim();
  const ticker=b3MovementTicker(prod);
  const q=parseNum(qty);
  const v=parseNum(value);
  let p=parseNum(price);
  if((!p || p<=0) && q>0 && v>0) p=v/q;
  const meta=inferB3PositionMeta('Renda Fixa', ticker, prod, mov);
  const type=normalizeType(meta.type||'Renda Fixa','Renda Fixa');
  const sector=meta.sector||'';
  const action=b3MovementAction(mov, entryExit);
  const target=b3MovementTarget(mov, entryExit);
  const date=importDate||new Date().toLocaleDateString('pt-BR');
  const movKey=[sheet,date,b3MovementNorm(entryExit),b3MovementNorm(mov),ticker,String(q),String(Number(p||0).toFixed(4)),String(Number(v||0).toFixed(2))].join('|');
  return {ticker,qty:q,price:p,value:v||q*p,type,sector,product:prod,movement:mov,entryExit:String(entryExit||''),action,target,sheet,date,movKey};
}
function parseB3MovementWorkbook(wb, fileName=''){
  const items=[]; const warnings=[];
  const stats={ importedByMovement:{}, ignoredByMovement:{}, ignoredByReason:{}, totalIgnored:0, skippedSheets:[] };
  const dateMatch=String(fileName||'').match(/(20\d{2})[-_](\d{2})[-_](\d{2})/);
  const importDate=dateMatch?`${dateMatch[3]}/${dateMatch[2]}/${dateMatch[1]}`:new Date().toLocaleDateString('pt-BR');
  const addIgnored=(mov,reason)=>{
    stats.totalIgnored++;
    const key=mov||'sem movimento';
    stats.ignoredByMovement[key]=(stats.ignoredByMovement[key]||0)+1;
    if(reason) stats.ignoredByReason[reason]=(stats.ignoredByReason[reason]||0)+1;
  };
  const addImported=mov=>{
    const key=mov||'sem movimento';
    stats.importedByMovement[key]=(stats.importedByMovement[key]||0)+1;
  };
  (wb.SheetNames||[]).forEach(sheetName=>{
    const sheet=wb.Sheets[sheetName]; if(!sheet) return;
    const rows=XLSX.utils.sheet_to_json(sheet,{header:1,raw:true,defval:null});
    if(!rows || rows.length<2){ stats.skippedSheets.push(sheetName); return; }
    let headerIdx=-1;
    for(let i=0;i<Math.min(rows.length,20);i++){
      const h=(rows[i]||[]).map(normHeaderB3);
      const ok=h.some(x=>x==='entrada/saida' || x==='entrada-saida' || x==='entrada / saida') && h.some(x=>x.includes('movimentacao')) && h.some(x=>x.includes('produto')) && h.some(x=>x.includes('quantidade')) && h.some(x=>x.includes('preco unitario')) && h.some(x=>x.includes('valor da operacao'));
      if(ok){ headerIdx=i; break; }
    }
    if(headerIdx<0){ stats.skippedSheets.push(sheetName); return; }
    const headers=(rows[headerIdx]||[]).map(v=>String(v||'').trim());
    rows.slice(headerIdx+1).forEach((row,idx)=>{
      if(!row || row.every(v=>v===null || String(v).trim()==='')) return;
      const entryExit=String(pickB3(row,headers,['Entrada/Saída','Entrada/Saida','Entrada - Saida','Entrada/Saída '] )||'').trim();
      const movement=String(pickB3(row,headers,['Movimentação','Movimentacao'])||'').trim();
      const product=String(pickB3(row,headers,['Produto'])||'').trim();
      const qty=parseNum(pickB3(row,headers,['Quantidade']));
      const price=parseNum(pickB3(row,headers,['Preço unitário','Preco unitario']));
      const value=parseNum(pickB3(row,headers,['Valor da Operação','Valor da Operacao']));
      if(!movement || !product){
        addIgnored(movement||'sem movimento','linha não reconhecida');
        return;
      }
      const item=b3MovementParseRow({movement, product, entryExit, qty, price, value, importDate, sheet:sheetName});
      if(!item.ticker){
        addIgnored(movement,'sem ticker');
        warnings.push(`Movimentacao ${sheetName}: produto nao reconhecido (${movement}).`);
        return;
      }
      if(item.qty<=0){
        addIgnored(movement,'sem quantidade');
        return;
      }
      if(item.target==='ignorar' || item.action==='ignorar'){
        addIgnored(movement,'movimentacao ignorada');
        warnings.push(`Movimentacao ${sheetName}: "${movement}" ficou fora por padrao.`);
        items.push({...item, include:false});
        return;
      }
      if(item.target==='proventos'){
        items.push({...item, include:true});
        addImported(movement);
        return;
      }
      items.push({...item, include:true});
      addImported(movement);
    });
  });
  return {items,warnings,importDate,stats,kind:'movement'};
}
function pdfMovementIsRowStart(line){
  const s=b3MovementNorm(line);
  if(!s) return false;
  if(/^TOTAL\b/.test(s)) return false;
  if(/^EXTRATO DE MOV/.test(s)) return false;
  if(/^PAULO SERGIO/.test(s)) return false;
  if(/^FILTROS APLICADOS/.test(s)) return false;
  if(/^DATA INICIAL:/.test(s) || /^DATA FINAL:/.test(s) || /^TIPO DE MOVIMENTACAO:/.test(s) || /^TIPO DE INVESTIMENTO:/.test(s) || /^INSTITUICAO:/.test(s)) return false;
  if(/^MOVIMENTACAO\b/.test(s) || /^PRODUTO\b/.test(s) || /^INSTITUICAO\b/.test(s) || /^QUANTIDADE\b/.test(s) || /^PRECO\b/.test(s) || /^VALOR\b/.test(s)) return false;
  return /^(APLICACAO|RESGATE ANTECIPADO\/?|COMPRA \/ VENDA|COMPRA\/VENDA DEFINITIVA\/CESSAO|PAGAMENTO DE JUROS|SAIDA\/ENTR\. CUST-TRANSF S\/FIN|TRANSFERENCIA SEM FINANCEIRO|RETIRADA DE CUSTODIA|VENCIMENTO\/RESGATE SALDO EM CONTA|VENCIMENTO|EVENTO GENERICO)\b/.test(s);
}
function parseB3MovementBlock(block, date, page=0){
  const txt=String(block||'').replace(/\s+/g,' ').trim();
  if(!txt) return null;
  const m=txt.match(/^(?<movement>APLICAÇÃO|APLICACAO|RESGATE ANTECIPADO\/?|COMPRA \/ VENDA|COMPRA\/VENDA DEFINITIVA\/CESSAO|PAGAMENTO DE JUROS|SAIDA\/ENTR\. CUST-TRANSF S\/FIN|TRANSFERENCIA SEM FINANCEIRO|RETIRADA DE CUSTODIA|VENCIMENTO\/RESGATE SALDO EM CONTA|VENCIMENTO|EVENTO GENERICO)\s+(?<product>[\s\S]*?)\s+(?<qty>[\d.,]+)\s+R\$\s*(?<price>[\d.,]+)\s+R\$\s*(?<value>[\d.,]+)\b/i);
  if(!m) return null;
  const movement=String(m.groups.movement||'').replace(/\s+/g,' ').trim();
  const product=String(m.groups.product||'').replace(/\s+/g,' ').trim();
  const item=b3MovementParseRow({
    movement,
    product,
    qty:m.groups.qty,
    price:m.groups.price,
    value:m.groups.value,
    importDate:date,
    sheet:`PDF ${page||''}`.trim()
  });
  return {...item, include:item.target!=='ignorar'};
}
async function parseB3MovementPdf(file){
  const pdfjs=await loadPdfJs();
  const data=new Uint8Array(await file.arrayBuffer());
  const doc=await pdfjs.getDocument({data}).promise;
  const items=[]; const warnings=[];
  const stats={ importedByMovement:{}, ignoredByMovement:{}, ignoredByReason:{}, totalIgnored:0, skippedSheets:[] };
  const addImported=mov=>{ stats.importedByMovement[mov]=(stats.importedByMovement[mov]||0)+1; };
  const addIgnored=(mov,reason)=>{ stats.totalIgnored++; stats.ignoredByMovement[mov]=(stats.ignoredByMovement[mov]||0)+1; if(reason) stats.ignoredByReason[reason]=(stats.ignoredByReason[reason]||0)+1; };
  let importDate=new Date().toLocaleDateString('pt-BR');
  const blocks=[];
  for(let p=1;p<=doc.numPages;p++){
    const page=await doc.getPage(p);
    const text=await page.getTextContent();
    const lines=pdfLinesFromTextContent(text);
    const pageText=lines.join(' ');
    const dFinal=pageText.match(/Data Final:\s*(\d{2}\/\d{2}\/\d{4})/i);
    if(dFinal) importDate=dFinal[1];
    let current=[]; let currentDate='';
    const flush=()=>{
      if(!current.length) return;
      blocks.push({date:currentDate||importDate, block:current.join(' '), page:p});
      current=[];
    };
    for(const line of lines){
      const s=String(line||'').trim();
      const dateMatch=s.match(/^(\d{1,2}) de ([a-zçãéíóúâêô]+) de (\d{4})$/i);
      if(dateMatch){
        flush();
        const monthMap={janeiro:'01',fevereiro:'02',marco:'03',março:'03',abril:'04',maio:'05',junho:'06',julho:'07',agosto:'08',setembro:'09',outubro:'10',novembro:'11',dezembro:'12'};
        const mm=monthMap[dateMatch[2].toLowerCase()]||'01';
        currentDate=`${dateMatch[1].padStart(2,'0')}/${mm}/${dateMatch[3]}`;
        continue;
      }
      if(/^extrato de movimentacao/i.test(s) || /^acesse investidor/i.test(s)) { flush(); continue; }
      if(/^movimentacao produto instituicao quantidade preco/i.test(b3MovementNorm(s))) continue;
      if(!s) continue;
      if(pdfMovementIsRowStart(s)){
        flush();
        current=[s];
        continue;
      }
      if(current.length) current.push(s);
    }
    flush();
  }
  blocks.forEach(({block,date,page})=>{
    const item=parseB3MovementBlock(block,date,page);
    if(!item){
      warnings.push(`PDF pagina ${page}: linha de movimento nao reconhecida.`);
      addIgnored('PDF','linha nao reconhecida');
      return;
    }
    items.push(item);
    if(item.include===false) addIgnored(item.movement||'PDF','movimentacao ignorada');
    else addImported(item.movement||'PDF');
  });
  return {items,warnings,importDate,stats,kind:'movement'};
}

async function detectB3PdfKind(file){

    const page=await doc.getPage(p);

    if(movementHits && !positionHits) return 'movement';

  }

    const text=await page.getTextContent();
    const lines=pdfLinesFromTextContent(text).join(' ');
    const s=b3MovementNorm(lines);
    if(/(DATA INICIAL|TIPO DE MOVIMENTACAO|MOVIMENTACAO PRODUTO INSTITUICAO QUANTIDADE PRECO|PAGAMENTO DE JUROS|COMPRA\/VENDA|RESGATE ANTECIPADO|TRANSFERENCIA SEM FINANCEIRO|RETIRADA DE CUSTODIA|EVENTO GENERICO)/.test(s)) movementHits++;
    if(/(EXTRATO DE POS|POSICAO CONSOLIDADA|CARTEIRA|CUSTODIA|QUANTIDADE DISPONIVEL|VALOR ATUALIZADO|PRECO DE FECHAMENTO|VENCIMENTO|INSTITUICAO EMISSORA)/.test(s)) positionHits++;
    if(movementHits && !positionHits) return 'movement';
    if(positionHits && !movementHits) return 'position';
  }

  if(positionHits && !movementHits) return 'position';
  return 'ambiguous';
}
function normHeaderB3(v){

function pickB3(row, headers, names){

}

function cleanAssetCode(txt){

function inferB3PositionMeta(sheetName, ticker, product='', rowType=''){

  const kind=String(rowType||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();

  const s=notaNorm(text);

  if(/\bCRIPTOATIVO\b|\bBITCOIN\b|\bHASH\b|\bCRIPTO\b|\bCRYPTO\b/.test(s)) return {type:'Crypto',sector:'Crypto'};

  if(sh.includes('etf')){

    if(/\bRENDA FIXA\b|IMAB|IRFM|B5P2|TESOURO/.test(s)) return {type:'ETF',sector:'Renda Fixa'};
    if(/\bEXTERIOR\b|INTERNACIONAL|WRLD|SP500|S&P|NASDAQ|EURO/.test(s)) return {type:'ETF',sector:'Exterior'};
    if(/\bDIVID\b/.test(s)) return {type:'ETF',sector:'Dividendos'};

  }
  if(sh.includes('fundo de investimento') || sh.includes('fundo imobiliario') || sh.includes('fii')){

  if(mt.type==='FII') return {type:'FII',sector:mt.sector||notaFiiSector(text)};

}
function notaNorm(v){

}
function notaFindValue(rows, key){
  const k=notaNorm(key);
  for(const row of rows){
    for(let i=0;i<row.length;i++){
      if(notaNorm(row[i])===k){
        for(let j=i+1;j<row.length;j++){
          const val=String(row[j]||'').trim();
          if(val) return val;
        }
      }
    }
  }
  return '';
}
function notaFindHeaderIndex(rows){

    'TIPO DE MERCADO',
    'ESPECIFICACAO DO TITULO',
    'QUANTIDADE',
    'PRECO DE LIQUIDACAO(R$)',
    'COMPRA/VENDA (R$)'
  ];
  for(let i=0;i<rows.length;i++){

function notaTickerFromSpec(spec){

function notaEtfSector(text){

  if(s.includes('IBOV') || s.includes('IBOVESPA')) return 'Ibovespa';
  if(s.includes('SMALL') || s.includes('SMAL')) return 'Small Caps';
  if(s.includes('EXTERIOR') || s.includes('EUA') || s.includes('SP500') || s.includes('S&P')) return 'Exterior';
  if(s.includes('HASH') || s.includes('CRIPTO') || s.includes('CRYPTO') || s.includes('BITCOIN')) return 'Cripto';
  if(s.includes('RENDA FIXA')) return 'Renda Fixa';
  return 'ETF';
}
function inferNotaMeta(ticker, spec, market){

  if(learned?.type) return {type:normalizeType(learned.type,'Ação'), sector:learned.sector||''};
  const existing=S.assets.find(a=>String(a.ticker||'').toUpperCase()===tickerClean);
  if(existing && existing.type){
    return {
      type: normalizeType(existing.type,'Ação'),
      sector: existing.sector || existing.type
    };
  }
  const text=`${tickerClean} ${spec||''} ${market||''}`;

  if(isRendaFixaText(s)) return rfMetaFromText(text);
  if(/\bETF\b|FUNDO DE INDICE|FDO DE INDICE|EXCHANGE TRADED FUND/.test(s)){
    return {type:'ETF',sector:notaEtfSector(text)};
  }
  if(/\bFII\b|FUNDO IMOBILIARIO|FUNDO DE INVESTIMENTO IMOBILIARIO|FDO INV IMOB|COTAS DE FII/.test(s)){
    return {type:'FII',sector:notaFiiSector(text)};

  if(mt.type==='FII') return {type:'FII',sector:mt.sector||notaFiiSector(text)};
  if(mt.type==='Renda Fixa') return rfMetaFromText(text);
  if(/\bBDR\b/.test(s)) return {type:'BDR',sector:'BDR'};
  if(/\bCRYPTO\b|\bCRIPTO\b|\bBITCOIN\b/.test(s)) return {type:'Crypto',sector:'Crypto'};

}
function rfMetaFromText(v){

  if(/\bLCI\b/.test(s)) return {type:'Renda Fixa',sector:'LCI'};
  if(/\bLCA\b/.test(s)) return {type:'Renda Fixa',sector:'LCA'};
  if(/\bCRI\b/.test(s)) return {type:'Renda Fixa',sector:'CRI'};
  if(/\bCRA\b/.test(s)) return {type:'Renda Fixa',sector:'CRA'};
  if(s.includes('DEBENT')) return {type:'Renda Fixa',sector:'Debênture'};

}

  (wb.SheetNames||[]).forEach(sheetName=>{
    const sheet=wb.Sheets[sheetName]; if(!sheet) return;
    if(isEmprestimoSheet(sheetName)){
      warnings.push(`Aba "${sheetName}" ignorada: posições de empréstimo/lent lending não entram como compra na carteira.`);
      stats.skippedSheets.push(sheetName);
      return;
    }
    const rows=XLSX.utils.sheet_to_json(sheet,{header:1,raw:true,defval:null});
    if(!rows || rows.length<2){
      warnings.push(`Aba "${sheetName}" sem linhas úteis para importar.`);
      stats.skippedSheets.push(sheetName);
      return;
    }
    const headers=rows[0].map(x=>String(x||'').trim());
    const normHeaders=headers.map(normHeaderB3);
    const hasQtd=normHeaders.includes('quantidade') || normHeaders.includes('quantidade disponivel');
    const hasTicker=normHeaders.includes('codigo de negociacao') || normHeaders.includes('codigo') || normHeaders.includes('ticker');
    const isRF=isRendaFixaText(sheetName) || normHeaders.some(h=>/vencimento|indexador|emissor|instituicao|taxa/.test(h));
    const isETF=String(sheetName||'').toLowerCase().includes('etf');
    if(!hasQtd && !isRF){
      warnings.push(`Aba "${sheetName}" sem colunas reconhecidas de posição; ignorada.`);
      stats.skippedSheets.push(sheetName);
      return;
    }
    rows.slice(1).forEach((row,idx)=>{
      const produto=String(pickB3(row,headers,['Produto','Nome do Produto','Ativo','Descrição','Descricao','Título','Titulo'])||'').trim();
      const rawTicker=String(pickB3(row,headers,['Código de Negociação','Codigo de Negociacao','Código','Codigo','Ticker'])||'').trim().toUpperCase();
      const venc=String(pickB3(row,headers,['Vencimento','Data de Vencimento'])||'').trim();
      const inst=String(pickB3(row,headers,['Instituição','Instituicao','Emissor','Administrador'])||'').trim();
      const rowType=String(pickB3(row,headers,['Tipo'])||'').trim();
      let ticker=rawTicker;
      if(!ticker && isRF){
        const base=[produto,inst,venc].filter(Boolean).join(' ');
        ticker=cleanAssetCode(base||sheetName);
      }
      if(!ticker){
        addIgnored(sheetName,'sem ticker');
        return;
      }
      if(!isRF && !tickerValidoB3(ticker)){
        addIgnored(sheetName,'ticker inválido');
        return;
      }
      const rowLabel=cleanAssetCode(produto || ticker || '');
      if(!ticker || ticker==='TOTAL'){
        addIgnored(sheetName,'linha total/subtotal');
        return;
      }
      if(/^TOTAL\b/.test(rowLabel) || /^TOTAL\b/.test(produto.trim().toUpperCase())){
        addIgnored(sheetName,'linha total/subtotal');
        return;
      }
      if(/^SUBTOTAL\b/.test(rowLabel) || /^SUBTOTAL\b/.test(produto.trim().toUpperCase())){
        addIgnored(sheetName,'linha total/subtotal');
        return;
      }
      let qty=parseNum(pickB3(row,headers,['Quantidade','Quantidade Disponível','Quantidade Disponivel','Quantidade Atual']));
      let price=parseNum(pickB3(row,headers,['Preço de Fechamento','Preco de Fechamento','Preço Atualizado','Preco Atualizado','Preço Atualizado CURVA','Preco Atualizado CURVA','Preço Unitário','Preco Unitario','PU','Valor Unitário','Valor Unitario']));
      let value=parseNum(pickB3(row,headers,['Valor Atualizado','Valor Atualizado CURVA','Valor Atualizado MTM','Valor Atualizado FECHAMENTO','Valor Bruto','Valor Líquido','Valor Liquido','Valor Atual','Saldo Bruto','Saldo Líquido','Saldo Liquido']));
      if(qty<=0 && isRF && value>0) qty=1;
      if(qty<=0){
        addIgnored(sheetName,'sem quantidade');
        return;
      }
      if((!price || price<=0) && value>0) price=value/qty;
      if(price<=0){
        warnings.push(`${ticker}: sem preço válido; ignorado.`);
        addIgnored(sheetName,'sem preço válido');
        return;
      }
      const meta=inferB3PositionMeta(sheetName, ticker, produto, rowType);
      const tipo=normalizeType(meta.type||'Ação','Ação');
      const setor=meta.sector||'';
      items.push({ticker,qty,price,value:value||qty*price,type:tipo,sector:setor,product:produto.trim(),sheet:sheetName,kind:rowType,date:importDate});
      addImported(sheetName);
    });
  });
  return {items,warnings,importDate,stats,kind:'position'};
}
function parseNotaCorretoraWorkbook(wb, fileName=''){
  const items=[]; const warnings=[];
  const stats={
    byType:{},
    byOperation:{},
    ignoredByReason:{},
    totalIgnored:0
  };
  const sheetName=(wb.SheetNames||[])[0];
  if(!sheetName){
    return {items,warnings,importDate:new Date().toLocaleDateString('pt-BR'),stats,noteKey:'nota-sem-planilha',noteNumber:'',tradeDate:''};
  }
  const sheet=wb.Sheets[sheetName];
  const rows=XLSX.utils.sheet_to_json(sheet,{header:1,raw:true,defval:''});
  const headerIdx=notaFindHeaderIndex(rows);
  const noteNumber=notaFindValue(rows,'NUM NOTA') || notaFindValue(rows,'Nº NOTA') || notaFindValue(rows,'N. NOTA') || '';
  const tradeDateRaw=notaFindValue(rows,'DATA PREGÃO') || notaFindValue(rows,'DATA PREGAO') || '';
  const dateMatch=String(fileName||'').match(/(\d{2})(\d{2})(\d{4})/);
  const tradeDate=tradeDateRaw
    ? (String(tradeDateRaw).includes('/') ? String(tradeDateRaw).trim() : `${String(tradeDateRaw).slice(0,2)}/${String(tradeDateRaw).slice(2,4)}/${String(tradeDateRaw).slice(4,8)}`)
    : (dateMatch ? `${dateMatch[1]}/${dateMatch[2]}/${dateMatch[3]}` : new Date().toLocaleDateString('pt-BR'));
  const noteKey=[noteNumber||cleanAssetCode(fileName)||'NOTA',tradeDate.replace(/\//g,'-')].join('|');
  if(headerIdx<0){
    warnings.push('Cabeçalho da nota corretora não encontrado. Procure a tabela com C/V, TIPO DE MERCADO e ESPECIFICAÇÃO DO TÍTULO.');
    return {items,warnings,importDate:tradeDate,stats,noteKey,noteNumber,tradeDate};
  }
  const headers=(rows[headerIdx]||[]).map(v=>String(v||'').trim());
  const normHeaders=headers.map(notaNorm);
  const idxCv=normHeaders.findIndex(h=>h==='C/V' || h==='CV');
  const idxMarket=normHeaders.findIndex(h=>h.includes('TIPO DE MERCADO'));
  const idxSpec=normHeaders.findIndex(h=>h.includes('ESPECIFICACAO DO TITULO'));
  const idxObs=normHeaders.findIndex(h=>h.includes('OBS'));
  const idxQty=normHeaders.findIndex(h=>h.includes('QUANTIDADE'));
  const idxPrice=normHeaders.findIndex(h=>h.includes('PRECO DE LIQUIDACAO'));
  const idxTotal=normHeaders.findIndex(h=>h.includes('COMPRA/VENDA'));
  if(idxCv<0 || idxSpec<0 || idxQty<0 || idxPrice<0 || idxTotal<0){
    warnings.push('Algumas colunas esperadas não foram encontradas; a nota pode estar em um formato diferente.');
  }
  for(let i=headerIdx+1;i<rows.length;i++){
    const row=rows[i]||[];
    const rowTxt=row.map(v=>String(v||'').trim()).filter(Boolean).join(' ');
    const up=notaNorm(rowTxt);
    if(!rowTxt) continue;
    if(/^(RESUMO|TOTAIS|TOTAL|CORRETAGEM|NOTA DE NEGOCIACAO|NOTA DE NEGOCIAÇÃO|MOVIMENTACAO|MOVIMENTAÇÃO)/.test(up)) break;
    if(/^(PRA?CA|C\/V|TIPO DE MERCADO|ESPECIFICACAO DO TITULO|OBS|QUANTIDADE|PRECO DE LIQUIDACAO|COMPRA\/VENDA)/.test(up)) continue;
    if(/\bSUB\s*TOTAL\b|\bTOTAL\b/.test(up)) {
      stats.totalIgnored++;
      stats.ignoredByReason['linha subtotal/total']=(stats.ignoredByReason['linha subtotal/total']||0)+1;
      continue;
    }
    const spec=String(idxSpec>=0 ? row[idxSpec] : '').trim();
    const cv=String(idxCv>=0 ? row[idxCv] : '').trim().toUpperCase();
    const market=String(idxMarket>=0 ? row[idxMarket] : '').trim();
    const obs=String(idxObs>=0 ? row[idxObs] : '').trim();
    const qty=parseNum(idxQty>=0 ? row[idxQty] : '');
    const price=parseNum(idxPrice>=0 ? row[idxPrice] : '');
    const total=parseNum(idxTotal>=0 ? row[idxTotal] : '');
    if(!spec && qty<=0 && price<=0 && total<=0) continue;
    if(!spec){
      stats.totalIgnored++;
      stats.ignoredByReason['sem especificação']=(stats.ignoredByReason['sem especificação']||0)+1;
      continue;
    }
    if(/\bSUB\s*TOTAL\b|\bTOTAL\b/.test(notaNorm(spec))){
      stats.totalIgnored++;
      stats.ignoredByReason['linha subtotal/total']=(stats.ignoredByReason['linha subtotal/total']||0)+1;
      continue;
    }
    const op=/V/.test(cv) ? 'venda' : 'compra';
    const ticker=notaTickerFromSpec(spec);
    if(!ticker){
      stats.totalIgnored++;
      stats.ignoredByReason['sem ticker']=(stats.ignoredByReason['sem ticker']||0)+1;
      continue;
    }
    const meta=inferNotaMeta(ticker, spec, market);
    const finalPrice=price>0 ? price : (qty>0 && total>0 ? total/qty : 0);
    const finalTotal=total>0 ? total : (qty>0 && finalPrice>0 ? qty*finalPrice : 0);
    if(qty<=0 || finalPrice<=0){
      stats.totalIgnored++;
      stats.ignoredByReason[qty<=0 ? 'sem quantidade' : 'sem preço válido']=(stats.ignoredByReason[qty<=0 ? 'sem quantidade' : 'sem preço válido']||0)+1;
      continue;
    }
    items.push({
      ticker,
      qty,
      price:finalPrice,
      value:finalTotal,
      type:normalizeType(meta.type||'Ação','Ação'),
      sector:meta.sector||'',
      product:spec,
      market,
      obs,
      operation:op,
      date:tradeDate,
      noteKey,
      noteNumber,
      source:'nota-corretora'
    });
    const metaType=normalizeType(meta.type||'Ação','Ação');
    stats.byType[metaType]=(stats.byType[metaType]||0)+1;
    stats.byOperation[op]=(stats.byOperation[op]||0)+1;
  }
  return {items,warnings,importDate:tradeDate,stats,noteKey,noteNumber,tradeDate};
}
function hasSameB3Import(ticker, date){
  return S.aportes.some(a=>String(a.ticker||'').toUpperCase()===ticker && String(a.decision||'').includes('[IMPORT_B3_POSICAO]') && String(a.date||'')===date);
}
function applyB3ImportedPositions(items, importDate){
  const importTag='[IMPORT_B3_POSICAO]';
  // Remove importações B3 anteriores da mesma data para evitar duplicar se subir o mesmo arquivo outra vez.
  S.aportes=S.aportes.filter(a=>!(String(a.decision||'').includes(importTag) && String(a.date||'')===importDate));
  const now=Date.now();
  const novos=items.map((it,i)=>({
    id: now+i,
    operation:'compra',
    ticker:it.ticker,
    qty:Number(it.qty)||0,
    price:Number(it.price)||0,
    date:it.date||importDate,
    decision:`${importTag} ${it.sheet} · posição importada do Excel B3/corretora`,
    type:normalizeType(it.type||metaTicker(it.ticker).type||'Ação','Ação'),
    sector:it.sector||metaTicker(it.ticker).sector||''
  })).filter(x=>x.ticker&&x.qty>0&&x.price>0);
  S.aportes=[...novos,...S.aportes];
  // Completa metadados para estes ativos após recálculo.
  syncAssetsFromAportes(false);
  S.assets=S.assets.map(a=>{
    const it=items.find(x=>x.ticker===a.ticker);
    if(!it) return a;
    return {...a,type:normalizeType(it.type||a.type||'Ação','Ação'),sector:it.sector||a.sector,current_price:it.price,quoteSource:a.quoteSource||'importado',quoteUpdatedAt:a.quoteUpdatedAt||new Date().toISOString()};
  });
  items.forEach(it=>learnTickerMeta(it.ticker, it.type, it.sector, true));
  save(); render(); fetchQuotes(false);
  scheduleAutoProventosGratis('b3');
  toast(`✅ ${novos.length} posição(ões) importadas da B3.`);
}
function applyNotaCorretoraTrades(items, noteKey, noteNumber, tradeDate){
  const importTag='[IMPORT_NOTA_CORRETORA]';
  const stamp=String(noteKey||noteNumber||tradeDate||'');
  S.aportes=S.aportes.filter(a=>{
    const dec=String(a.decision||'');
    return !(dec.includes(importTag) && String(a.noteKey||'')===stamp);
  });
  const now=Date.now();
  const novos=items.map((it,i)=>({
    id: now+i,
    operation:it.operation||'compra',
    ticker:it.ticker,
    qty:Number(it.qty)||0,
    price:Number(it.price)||0,
    date:it.date||tradeDate||new Date().toLocaleDateString('pt-BR'),
    decision:`${importTag} nota ${noteNumber||stamp} · ${it.market||'mercado'} · ${it.product||it.ticker}`,
    type:normalizeType(it.type||metaTicker(it.ticker).type||'Ação','Ação'),
    sector:it.sector||'',
    noteKey:stamp,
    noteNumber:noteNumber||'',
    source:'nota-corretora'
  })).filter(x=>x.ticker&&x.qty>0&&x.price>0);
  S.aportes=[...novos,...S.aportes];
  syncAssetsFromAportes(false);
  items.forEach(it=>learnTickerMeta(it.ticker, it.type, it.sector, true));
  save();
  render();
  fetchQuotes(false);
  scheduleAutoProventosGratis('nota');
  toast(`✅ ${novos.length} lançamento(ões) importado(s) da nota da corretora.`);
}
function openNotaReview(parsed, fileName){
  const {items=[],warnings=[],importDate='',stats={},noteKey='',noteNumber='',tradeDate=''}=parsed||{};
  const rows=items.map((it,i)=>({
    id:i,
    include:true,
    ticker:String(it.ticker||'').toUpperCase(),
    operation:String(it.operation||'compra').toLowerCase(),
    qty:Number(it.qty)||0,
    price:Number(it.price)||0,
    type:normalizeType(it.type||'Ação','Ação'),
    sector:it.sector||'',
    product:it.product||'',
    market:it.market||'',
    obs:it.obs||'',
    value:Number(it.value)||((Number(it.qty)||0)*(Number(it.price)||0)),
    sourceItem:{...it}
  }));
  S.noteReview={fileName,importDate,warnings,stats,noteKey,noteNumber,tradeDate,rows};
  render();
}
function closeNotaReview(){
  S.noteReview=null;
  render();
}
function setNotaReviewAll(v){
  if(!S.noteReview) return;
  S.noteReview.rows=S.noteReview.rows.map(r=>({...r,include:!!v}));
  render();
}
function setNotaReviewOperation(op, value){
  if(!S.noteReview) return;
  S.noteReview.rows=S.noteReview.rows.map(r=>String(r.operation||'compra').toLowerCase()===String(op||'compra').toLowerCase() ? {...r,include:!!value} : r);
  render();
}
function setNotaReviewRow(idx, field, value){
  if(!S.noteReview || !S.noteReview.rows[idx]) return;
  const row=S.noteReview.rows[idx];
  if(field==='include') row.include=!!value;
  else if(field==='ticker') row.ticker=String(value||'').trim().toUpperCase();
  else if(field==='operation') row.operation=String(value||'compra').toLowerCase();
  else if(field==='type') row.type=normalizeType(value||'Ação','Ação');
  else if(field==='sector') row.sector=String(value||'');
  else if(field==='qty') row.qty=parseNum(value);
  else if(field==='price') row.price=parseNum(value);
  else if(field==='product') row.product=String(value||'');
  render();
}
function suggestNotaReviewTypes(){
  if(!S.noteReview) return;
  S.noteReview.rows=S.noteReview.rows.map(row=>{
    if(!row.ticker) return row;
    const sug=inferNotaMeta(row.ticker, row.product||row.sourceItem?.product||'', row.market||row.sourceItem?.market||'');
    const existing=S.assets.find(a=>String(a.ticker||'').toUpperCase()===String(row.ticker||'').toUpperCase());
    const type=normalizeType(existing?.type || sug.type || row.type || 'Ação','Ação');
    const sector=existing?.sector || sug.sector || row.sector || '';
    return {...row, type, sector};
  });
  render();
}
function importNotaReview(){
  if(!S.noteReview) return;
  const rows=S.noteReview.rows.filter(r=>r.include!==false && r.ticker && Number(r.qty)>0 && Number(r.price)>0);
  if(!rows.length){ alert('Selecione pelo menos um lançamento válido para importar.'); return; }
  applyNotaCorretoraTrades(rows.map(r=>({...r.sourceItem,ticker:r.ticker,operation:r.operation,qty:r.qty,price:r.price,type:r.type,sector:r.sector,product:r.product})),S.noteReview.noteKey,S.noteReview.noteNumber,S.noteReview.tradeDate);
  S.noteReview=null;
}
function notaReviewSummary(rows){
  const total=rows.filter(r=>r.include!==false).reduce((s,r)=>s+(Number(r.qty)||0)*(Number(r.price)||0),0);
  const count=rows.filter(r=>r.include!==false && r.ticker && Number(r.qty)>0 && Number(r.price)>0).length;
  return {total,count};
}

function openB3Review(parsed, fileName='', sourceKind='excel'){
  const items=(parsed?.items||[]).map((it,i)=>({
    id:it.id ?? i,
    include:true,
    ticker:String(it.ticker||'').toUpperCase(),
    qty:Number(it.qty)||0,
    price:Number(it.price)||0,
    value:Number(it.value)||((Number(it.qty)||0)*(Number(it.price)||0)),
    type:normalizeType(it.type||'Ação','Ação'),
    sector:String(it.sector||''),
    product:String(it.product||''),
    sheet:String(it.sheet||it.section||'Outros').trim()||'Outros',
    kind:String(it.kind||'').trim(),
    date:it.date||parsed?.importDate||new Date().toLocaleDateString('pt-BR'),
    sourceItem:{...it}
  })).filter(it=>it.ticker && it.qty>0 && it.price>0);
  const groupsMap=new Map();
  items.forEach(it=>{
    const key=it.sheet||'Outros';
    if(!groupsMap.has(key)){
      groupsMap.set(key,{sheet:key,count:0,total:0,rights:0,sample:[],selected:true,sourceCount:0,items:[]});
    }
    const g=groupsMap.get(key);
    g.count++;
    g.total += Number(it.value)||0;
    g.sourceCount++;
    g.items.push(it);
    if(g.sample.length<4){
      g.sample.push(`${it.ticker} ${it.kind||it.sector||it.type||''}`.trim());
    }
    if(String(it.kind||'').toLowerCase()==='direito' || String(it.sector||'').toLowerCase()==='direito') g.rights++;
  });
  const groups=[...groupsMap.values()].sort((a,b)=>a.sheet.localeCompare(b.sheet,'pt-BR'));
  const selectedSheets={};
  groups.forEach(g=>{
    selectedSheets[g.sheet]=!/emprest/i.test(g.sheet);
  });
  S.b3Review={
    fileName,
    sourceKind,
    importDate:parsed?.importDate||'',
    warnings:parsed?.warnings||[],
    stats:parsed?.stats||{},
    items,
    groups,
    selectedSheets,
    includeRights:false
  };
  render();
}

function setB3MovementItem(group, idx, field, value){
  if(!S.b3MovementReview) return;
  const g=(S.b3MovementReview.groups||[]).find(x=>x.group===group);
  if(!g || !g.items || !g.items[idx]) return;
  const row=g.items[idx];
  if(field==='include') row.include=!!value;
  else if(field==='target') row.target=String(value||'aportes');
  else if(field==='ticker') row.ticker=String(value||'').trim().toUpperCase();
  else if(field==='type') row.type=normalizeType(value||'Renda Fixa','Renda Fixa');
  else if(field==='sector') row.sector=String(value||'');
  else if(field==='qty') row.qty=parseNum(value);
  else if(field==='price') row.price=parseNum(value);
  const master=(S.b3MovementReview.items||[]).find(it=>it.movKey===row.movKey || (it.date===row.date && it.product===row.product && it.movement===row.movement));
  if(master){
    master.include=row.include;
    master.target=row.target;
    master.ticker=row.ticker;
    master.type=row.type;
    master.sector=row.sector;
    master.qty=row.qty;
    master.price=row.price;
    master.value=(Number(row.value)||((Number(row.qty)||0)*(Number(row.price)||0)));
  }
  S.b3MovementReview.selectedGroups = S.b3MovementReview.selectedGroups || {};
  S.b3MovementReview.selectedGroups[group] = (g.items||[]).every(it=>it.include!==false);
  render();
}
function setB3MovementGroupItems(group, value){

  g.items=(g.items||[]).map(it=>({...it, include:!!value}));
  S.b3MovementReview.items = (S.b3MovementReview.items||[]).map(it=>{
    const match=(it.group||b3MovementGroup(it.movement))===group;
    return match ? {...it, include:!!value} : it;
  });
  S.b3MovementReview.selectedGroups = S.b3MovementReview.selectedGroups || {};
  S.b3MovementReview.selectedGroups[group] = !!value;
  render();
}
