<style>

input,select{background:#0d111e;border:1px solid #1e2a3d;border-radius:9px;padding:8px 11px;color:#e2eaf6;font-size:13px;width:100%;transition:border-color .15s,box-shadow .15s}

@media(max-width:640px){.cg{grid-template-columns:1fr}}

.air{font-size:13px;line-height:1.9;color:#b8c8de;white-space:pre-wrap}
.bkp{background:#090c15;border:1px solid #1e2a3d;border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}

<body>
<div id="root"></div>
<input type="file" id="imp-file" accept=".json" style="display:none">
<script>
const QI     = 60;
const CLRS   = ['#818cf8','#34d399','#fbbf24','#f472b6','#60a5fa','#a3e635','#fb923c','#a78bfa'];

let S = {
  assets:[], aportes:[], quotes:{}, lastUpdate:null,
  tab:'dashboard', qLoad:false, cd:QI,
  brapiToken:'',
  divGoal:4000,
  aiText:'', aiLoad:false,
  editId:null, showA:false, showP:false, _fa:null, _fp:null,
};

// ── Storage ──────────────────────────────────────────────
function load(){
  try{
    const d=JSON.parse(localStorage.getItem('civ4')||'{}');
    if(d.assets)  S.assets  = d.assets;
    if(d.aportes) S.aportes = d.aportes;
    const c=JSON.parse(localStorage.getItem('civ4_config')||'{}');
    if(c.brapiToken) S.brapiToken = c.brapiToken;
    if(c.divGoal !== undefined) S.divGoal = Number(c.divGoal)||0;
    if(d.divGoal !== undefined) S.divGoal = Number(d.divGoal)||S.divGoal;
  }catch(e){}
}
function save(){
  try{ localStorage.setItem('civ4', JSON.stringify({assets:S.assets, aportes:S.aportes})); }catch(e){}
}
function saveConfig(){
  try{ localStorage.setItem('civ4_config', JSON.stringify({brapiToken:S.brapiToken, divGoal:S.divGoal})); }catch(e){}
}
function configBrapi(){
  const atual = S.brapiToken ? '********' : '';
  const token = prompt('Cole aqui seu token gratuito da brapi.dev para atualizar cotações. Deixe em branco para remover.', atual);
  if(token === null) return;
  S.brapiToken = token.trim()==='********' ? S.brapiToken : token.trim();
  saveConfig();
  alert(S.brapiToken ? '✅ Token salvo neste navegador.' : 'Token removido. As cotações automáticas ficarão desativadas.');
  fetchQuotes(true);
}

// ── Backup ───────────────────────────────────────────────
function exportBackup(){
  const data = JSON.stringify({assets:S.assets, aportes:S.aportes, divGoal:S.divGoal, exportedAt:new Date().toISOString()}, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `carteira-backup-${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.json`;
  a.click();
}
function importBackup(){
  document.getElementById('imp-file').click();
}
document.getElementById('imp-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try{
      const d = JSON.parse(ev.target.result);
      if(d.assets)  S.assets  = d.assets;
      if(d.aportes) S.aportes = d.aportes;
      if(d.divGoal !== undefined) S.divGoal = Number(d.divGoal)||S.divGoal;
      save(); saveConfig(); render();
      alert(`✅ Backup importado! ${S.assets.length} ativos e ${S.aportes.length} aportes carregados.`);
    }catch(err){ alert('Erro ao importar. Verifique o arquivo.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ── Helpers ───────────────────────────────────────────────
const fmt  = v => v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fmtP = v => `${v>=0?'+':''}${v.toFixed(2)}%`;
function parseNum(v){
  if(v===undefined || v===null) return 0;
  let s=String(v).trim().replace(/R\$|%|\s/g,'');
  if(!s) return 0;
  if(s.includes(',') && s.includes('.')) s=s.replace(/\./g,'').replace(',', '.');
  else if(s.includes(',')) s=s.replace(',', '.');
  const n=parseFloat(s);
  return isNaN(n)?0:n;
}
const moneyInput = v => (Number(v)||0).toFixed(2).replace('.', ',');
const esc  = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
const bdg  = t => t==='Ação'?'bac':t==='FII'?'bfi':t==='ETF'?'bet':'bxx';


// ── Metadados automáticos por ticker ─────────────────────
const META = {
  PETR3:['Ação','Petróleo'], PETR4:['Ação','Petróleo'], PRIO3:['Ação','Petróleo'], RECV3:['Ação','Petróleo'],
  ITUB3:['Ação','Banco'], ITUB4:['Ação','Banco'], BBAS3:['Ação','Banco'], BBDC3:['Ação','Banco'], BBDC4:['Ação','Banco'], SANB11:['Ação','Banco'],
  CMIG3:['Ação','Energia'], CMIG4:['Ação','Energia'], TAEE11:['Ação','Energia'], TRPL4:['Ação','Energia'], EGIE3:['Ação','Energia'], CPFE3:['Ação','Energia'], ENBR3:['Ação','Energia'],
  SAPR3:['Ação','Saneamento'], SAPR4:['Ação','Saneamento'], SAPR11:['Ação','Saneamento'], SBSP3:['Ação','Saneamento'], CSMG3:['Ação','Saneamento'],
  VALE3:['Ação','Mineração'], CSNA3:['Ação','Siderurgia'], GGBR4:['Ação','Siderurgia'], USIM5:['Ação','Siderurgia'],
  WEGE3:['Ação','Industrial'], ABEV3:['Ação','Bebidas'], VIVT3:['Ação','Telecom'], TIMS3:['Ação','Telecom'],
  BBSE3:['Ação','Seguros'], PSSA3:['Ação','Seguros'], CXSE3:['Ação','Seguros'],
  BOVA11:['ETF','Ibovespa'], SMAL11:['ETF','Small Caps'], IVVB11:['ETF','Exterior'], HASH11:['ETF','Cripto'], DIVD11:['ETF','Dividendos'], DIVO11:['ETF','Dividendos'], XFIX11:['ETF','IFIX'],
  MXRF11:['FII','Papel'], VGIP11:['FII','Papel'], KNCR11:['FII','Papel'], KNIP11:['FII','Papel'], CPTS11:['FII','Papel'], RBRR11:['FII','Papel'],
  HGLG11:['FII','Logística'], XPLG11:['FII','Logística'], VILG11:['FII','Logística'], BTLG11:['FII','Logística'], LVBI11:['FII','Logística'],
  XPML11:['FII','Shopping'], VISC11:['FII','Shopping'], HSML11:['FII','Shopping'], MALL11:['FII','Shopping'],
  HGRU11:['FII','Renda Urbana'], TRXF11:['FII','Renda Urbana'], RBVA11:['FII','Renda Urbana'],
  TGAR11:['FII','Desenvolvimento'], HGBS11:['FII','Shopping'], HGRE11:['FII','Lajes'], PVBI11:['FII','Lajes'], RBRP11:['FII','Lajes']
};
function metaTicker(ticker){
  const t=String(ticker||'').trim().toUpperCase();
  if(META[t]) return {type:META[t][0], sector:META[t][1]};
  if(/^[A-Z]{4}11$/.test(t)) return {type:'FII', sector:'FII'};
  if(/^[A-Z]{4}[34]$/.test(t)) return {type:'Ação', sector:'Ação'};
  return {type:'Ação', sector:''};
}
function applyMetaToAporte(){
  const ti=document.getElementById('p-ti')?.value?.trim().toUpperCase()||'';
  const m=metaTicker(ti);
  const se=document.getElementById('p-se');
  const ty=document.getElementById('p-ty');
  if(se) se.value=m.sector||'';
  if(ty) ty.value=m.type||'';
}
function syncAssetsFromAportes(showMsg=false){
  const keep={};
  S.assets.forEach(a=>keep[a.ticker]={...a});
  const grouped={};

  // Processa em ordem cronológica para compra/venda manter preço médio correto.
  const movs=[...S.aportes].sort((a,b)=>(Number(a.id)||0)-(Number(b.id)||0));
  movs.forEach(p=>{
    const t=String(p.ticker||'').trim().toUpperCase();
    if(!t) return;
    const q=Math.abs(Number(p.qty)||0), pr=Number(p.price)||0;
    const op=(p.operation||p.op||'compra').toLowerCase();
    if(!grouped[t]) grouped[t]={ticker:t, qty:0, total:0};

    if(op==='venda'){
      const atual=grouped[t].qty;
      const vendida=Math.min(q, atual);
      const avg=atual>0 ? grouped[t].total/atual : 0;
      grouped[t].qty = Math.max(0, atual-vendida);
      grouped[t].total = Math.max(0, grouped[t].total-(avg*vendida));
      return;
    }

    grouped[t].qty+=q;
    grouped[t].total+=q*pr;
  });

  S.assets=Object.values(grouped).filter(g=>g.qty>0.000001).map(g=>{
    const old=keep[g.ticker]||{};
    const m=metaTicker(g.ticker);
    const avg=g.qty>0?g.total/g.qty:0;
    return {
      id:old.id||Date.now()+Math.floor(Math.random()*999999),
      ticker:g.ticker,
      type:old.type||m.type,
      sector:old.sector||m.sector,
      qty:g.qty,
      avg_price:old.avg_manual ? Number(old.avg_price)||avg : avg,
      avg_manual:!!old.avg_manual,
      current_price:Number(old.current_price)||avg,
      dy:Number(old.dy)||0,
      dySource:old.dySource||'',
      price_target:Number(old.price_target)||0,
      ideal_pct:Number(old.ideal_pct)||0
    };
  }).sort((a,b)=>a.ticker.localeCompare(b.ticker));
  save();
  if(showMsg) alert('✅ Carteira reconstruída com base nas compras e vendas. Quantidade e preço médio foram recalculados.');
  render();
}
function findDy(q){
  const keys=['dividendYield','trailingAnnualDividendYield','yield','dy','regularMarketDividendYield','dividend_yield','dividendYieldAnnual','annualDividendYield'];
  const seen=new Set();
  function scan(obj){
    if(!obj || typeof obj!=='object' || seen.has(obj)) return 0;
    seen.add(obj);
    for(const k of keys){
      const raw=obj[k];
      if(raw!==undefined && raw!==null && raw!==''){
        const txt=String(raw).replace('%','').replace(',','.');
        const v=Number(txt);
        if(v>0) return v>1?v:v*100;
      }
    }
    for(const v of Object.values(obj)){
      const found=scan(v);
      if(found>0) return found;
    }
    return 0;
  }
  return scan(q);
}

function cx(){
  const tI=S.assets.reduce((s,a)=>s+a.qty*a.avg_price,0);
  const tC=S.assets.reduce((s,a)=>s+a.qty*a.current_price,0);
  const tG=tC-tI, tGP=tI>0?(tG/tI)*100:0;
  const mD=S.assets.reduce((s,a)=>s+(a.qty*a.current_price*(a.dy/100))/12,0);
  const aD=mD*12, avgDY=tC>0?(aD/tC)*100:0;
  return{tI,tC,tG,tGP,mD,aD,avgDY};
}

// ── Cotações ─────────────────────────────────────────────
async function fetchQuotes(manual=false){
  if(!S.assets.length) return;
  if(!S.brapiToken){
    if(manual) alert('Configure o token da brapi.dev em ⚙️ brapi para atualizar cotações automaticamente.');
    return;
  }
  S.qLoad=true; render();
  const tks=[...new Set(S.assets.map(a=>a.ticker).filter(Boolean))].join(',');
  if(!tks){ S.qLoad=false; render(); return; }
  try{
    const r=await fetch(`https://brapi.dev/api/quote/${encodeURIComponent(tks)}?fundamental=true&token=${encodeURIComponent(S.brapiToken)}`);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json();
    if(j.results){
      j.results.forEach(q=>{
        if(!q.regularMarketPrice) return;
        S.quotes[q.symbol]={price:q.regularMarketPrice, change:q.regularMarketChangePercent||0};
        const a=S.assets.find(x=>x.ticker===q.symbol);
        if(a){
          a.current_price=q.regularMarketPrice;
          const dyApi=findDy(q);
          if(dyApi>0 && (manual || !a.dy || Number(a.dy)===0 || a.dySource==='api')){
            a.dy=Number(dyApi.toFixed(2));
            a.dySource='api';
          }
          const m=metaTicker(a.ticker);
          if(!a.sector) a.sector=m.sector;
          if(!a.type) a.type=m.type;
        }
      });
      S.lastUpdate=new Date(); save();
    }
  }catch(e){
    console.warn('brapi:',e);
    if(manual) alert('Não consegui atualizar as cotações. Confira o token da brapi e sua conexão.');
  }
  S.qLoad=false; S.cd=QI; render();
}

// ── Pie SVG ───────────────────────────────────────────────
function pie(data){
  const tot=data.reduce((s,d)=>s+d.value,0);
  if(!tot) return'<div class="di" style="text-align:center;padding:24px;font-size:13px">Sem dados</div>';
  let p='', a=-Math.PI/2;
  data.forEach((d,i)=>{
    const ang=(d.value/tot)*2*Math.PI;
    const[x1,y1]=[80+68*Math.cos(a),80+68*Math.sin(a)];
    const[x2,y2]=[80+68*Math.cos(a+ang),80+68*Math.sin(a+ang)];
    p+=`<path d="M80,80 L${x1.toFixed(1)},${y1.toFixed(1)} A68,68 0 ${ang>Math.PI?1:0},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${CLRS[i%CLRS.length]}" stroke="#07090f" stroke-width="2"/>`;
    a+=ang;
  });
  return`<svg viewBox="0 0 160 160" width="140" height="140" style="display:block;margin:0 auto">${p}</svg>`;
}

// ── Render ────────────────────────────────────────────────
function render(){
  document.getElementById('root').innerHTML = app();
  bind();
}

function app(){
  const now=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
  const lu=S.lastUpdate?S.lastUpdate.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}):'—';
  const TABS=[['dashboard','📊 Dashboard'],['ativos','💼 Ativos'],['aportes','💰 Aportes'],['dividendos','📅 Dividendos'],['ajudar','⚖️ Ajudar'],['ia','🤖 IA']];
  return`
  <div class="hdr">
    <div class="hdr-logo">
      <div class="hdr-icon">📈</div>
      <div>
        <div class="hdr-title">Carteira de Investimentos</div>
        <div class="hdr-sub">Dados salvos localmente · Dividendos com objetivo livre · Backup disponível</div>
      </div>
    </div>
    <div class="hdr-right">

function dash(){

  const leg=ad.map((d,i)=>`<div class="pli"><div class="pd" style="background:${CLRS[i%CLRS.length]}"></div><span>${esc(d.name)} ${tC>0?((d.value/tC)*100).toFixed(0):'0'}%</span></div>`).join('');
  const sd=[...S.assets].sort((a,b)=>((b.qty*b.current_price*(b.dy/100))/12)-((a.qty*a.current_price*(a.dy/100))/12));

function ajudarTab(){
  const total=S.assets.reduce((s,a)=>s+a.qty*a.current_price,0);
  return`<div style="font-size:15px;font-weight:700;margin-bottom:4px">⚖️ Ajudar no rebalanceamento</div>
  <div class="mu" style="font-size:13px;margin-bottom:16px">Digite o valor do próximo aporte. O sistema analisa peso atual, % ideal, rentabilidade e DY para sugerir onde aportar.</div>

    <div class="fg">
      <div><div class="fl">Valor do aporte</div><input id="reb-val" type="number" step="0.01" placeholder="ex: 500"></div>
    </div>

  </div>
  <div id="reb-out">${!S.assets.length?'<div class="es" style="background:#0d111e;border:1px dashed #161e2e;border-radius:12px">Cadastre compras na aba Aportes para a análise funcionar.</div>':'<div class="es" style="background:#0d111e;border:1px dashed #161e2e;border-radius:12px">Informe um valor e clique em Analisar aporte.</div>'}</div>`;
}
function calcRebalance(){
  const aporte=Number(document.getElementById('reb-val')?.value)||0;
  const out=document.getElementById('reb-out');
  if(!out) return;
  if(aporte<=0){ out.innerHTML='<div class="es" style="background:#0d111e;border:1px solid #161e2e;border-radius:12px">Digite um valor de aporte maior que zero.</div>'; return; }
  const total=S.assets.reduce((s,a)=>s+a.qty*a.current_price,0);
  if(!S.assets.length||total<=0){ out.innerHTML='<div class="es" style="background:#0d111e;border:1px solid #161e2e;border-radius:12px">Ainda não há ativos suficientes para analisar.</div>'; return; }
  let list=S.assets.map(a=>{
    const valor=a.qty*a.current_price;
    const peso=valor/total*100;
    const ideal=Number(a.ideal_pct)||0;
    const faltaIdeal=ideal>0?Math.max(0,ideal-peso):0;
    const rent=a.avg_price>0?((a.current_price-a.avg_price)/a.avg_price)*100:0;
    let score=0, motivos=[];
    if(ideal>0 && faltaIdeal>0){ score+=faltaIdeal*4; motivos.push(`abaixo do ideal em ${faltaIdeal.toFixed(1)} p.p.`); }
    if(ideal===0 && peso<10){ score+=(10-peso)*1.2; motivos.push('baixo peso na carteira'); }
    if(rent<0){ score+=Math.min(20,Math.abs(rent))*1.1; motivos.push(`em baixa vs PM (${fmtP(rent)})`); }
    if((Number(a.dy)||0)>6){ score+=(Number(a.dy)||0)*0.8; motivos.push(`DY ${a.dy}%`); }
    if(peso>20){ score-=25; motivos.push('já tem peso alto'); }
    return {...a,valor,peso,ideal,faltaIdeal,rent,score,motivos};
  }).filter(a=>a.score>0).sort((a,b)=>b.score-a.score).slice(0,4);
  if(!list.length) list=[...S.assets].map(a=>({...a,valor:a.qty*a.current_price,peso:(a.qty*a.current_price/total*100),ideal:Number(a.ideal_pct)||0,rent:a.avg_price>0?((a.current_price-a.avg_price)/a.avg_price)*100:0,score:1,motivos:['menor concentração relativa']})).sort((a,b)=>a.peso-b.peso).slice(0,3);
  const sum=list.reduce((s,a)=>s+a.score,0)||1;
  const rows=list.map(a=>{
    const val=aporte*(a.score/sum);
    const qtd=a.current_price>0?Math.floor(val/a.current_price):0;
    const divMes=val*((Number(a.dy)||0)/100)/12;
    return`<tr><td style="font-weight:700;color:#e2eaf6">${esc(a.ticker)}</td><td>${esc(a.type)}</td><td class="mu">${esc(a.sector||'—')}</td><td>${a.peso.toFixed(1)}%</td><td>${a.ideal? a.ideal.toFixed(1)+'%':'—'}</td><td class="${a.rent<0?'rd':'gn'}">${fmtP(a.rent)}</td><td class="gn" style="font-weight:700">${fmt(val)}</td><td>${qtd}</td><td class="am">+${fmt(divMes)}/mês</td><td class="mu">${esc(a.motivos.join(', '))}</td></tr>`;
  }).join('');
  out.innerHTML=`<div class="tw"><div class="ts"><table><thead><tr><th>Ativo</th><th>Tipo</th><th>Setor</th><th>% Carteira</th><th>% Ideal</th><th>Rentab.</th><th>Sugestão</th><th>Qtd aprox.</th><th>Dividendo</th><th>Motivo</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

// ── IA ────────────────────────────────────────────────────
function iaTab(){
  const res=S.aiText
    ?`<div class="aic">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#312e81,#4c1d95);display:flex;align-items:center;justify-content:center;font-size:17px">🤖</div>
        <span style="font-size:14px;font-weight:700;color:#c4b5fd">Análise local</span>
      </div>
      <div class="air">${esc(S.aiText)}</div>
      <div style="margin-top:16px;padding-top:12px;border-top:1px solid #161e2e;font-size:11px;color:#2e3f58">⚠️ Caráter informativo. Não constitui recomendação de investimento. Consulte um profissional CFP/CNPI.</div>
    </div>`
    :(!S.aiLoad?`<div class="es" style="background:#0d111e;border:1px dashed #161e2e;border-radius:12px">🤖<br><br>Clique no botão para análise personalizada da sua carteira.</div>`:'');
  return`<div style="font-size:15px;font-weight:700;margin-bottom:4px">Análise automática da carteira</div>
  <div class="mu" style="font-size:13px;margin-bottom:18px">Análise local com base nos dados cadastrados, sem enviar sua carteira para APIs externas.</div>
  <button class="btn bp" onclick="getAI()" ${S.aiLoad?'disabled':''} style="display:flex;align-items:center;gap:8px;margin-bottom:18px;opacity:${S.aiLoad?.6:1}">
    <span ${S.aiLoad?'class="spn"':''}>${S.aiLoad?'⏳':'✨'}</span>${S.aiLoad?'Analisando...':'Gerar análise automática'}
  </button>${res}`;
}

// ── Ações ─────────────────────────────────────────────────
function go(t){ S.tab=t; render(); }

function tgA(){ S.showA=false; render(); }
function clA(){ S.showA=false; S.editId=null; S._fa=null; render(); }
function edA(id){ const a=S.assets.find(x=>x.id===id); if(!a)return; S._fa={...a}; S.editId=id; S.showA=true; render(); }

function svA(){
  if(!S.editId) return;
  const ap=parseNum(document.getElementById('f-ap')?.value);
  const cp=parseNum(document.getElementById('f-cp')?.value);
  const dy=parseNum(document.getElementById('f-dy')?.value);
  const pt=parseNum(document.getElementById('f-pt')?.value);
  const ip=parseNum(document.getElementById('f-ip')?.value);
  const se=document.getElementById('f-se')?.value?.trim()||'';
  const ty=document.getElementById('f-ty')?.value||'Ação';
  S.assets=S.assets.map(a=>{
    if(a.id!==S.editId) return a;
    const avgManual = ap>0 && Math.abs(ap-Number(a.avg_price||0))>0.0001;
    return {...a,avg_price:ap||a.avg_price,avg_manual:avgManual||a.avg_manual,current_price:cp||a.current_price,dy,dySource:'manual',price_target:pt,ideal_pct:ip,sector:se,type:ty};
  });
  S.showA=false; S.editId=null; S._fa=null;
  save(); render();
}

function rmA(id){
  alert('Para remover um ativo, apague os lançamentos correspondentes na aba Aportes e clique em Recalcular pelos aportes.');
}

function tgP(){ S.showP=!S.showP; S._fp={}; render(); setTimeout(applyMetaToAporte,50); }
function clP(){ S.showP=false; S._fp=null; render(); }

function svP(){
  const op=(document.getElementById('p-op')?.value||'compra').toLowerCase();
  const ti=document.getElementById('p-ti')?.value?.trim().toUpperCase();
  const qt=Math.abs(parseNum(document.getElementById('p-qt')?.value));
  const pr=parseNum(document.getElementById('p-pr')?.value);
  const dc=document.getElementById('p-dc')?.value?.trim()||'';
  let dt=document.getElementById('p-dt')?.value||'';
  if(dt){ const[y,m,d]=dt.split('-'); dt=`${d}/${m}/${y}`; }
  else { dt=new Date().toLocaleDateString('pt-BR'); }
  if(!ti||isNaN(qt)||qt<=0||isNaN(pr)||pr<=0){ alert('Preencha Ticker, Quantidade e Preço da operação.'); return; }

  if(op==='venda'){
    const atual=S.assets.find(a=>a.ticker===ti);
    const qtdAtual=Number(atual?.qty)||0;
    if(qtdAtual<=0){ alert('Este ativo não existe na carteira atual. Registre uma compra antes de lançar venda.'); return; }
    if(qt>qtdAtual){ alert(`Quantidade de venda maior que a posição atual. Você tem ${qtdAtual} de ${ti}.`); return; }
  }

  S.aportes.unshift({id:Date.now(), operation:op, ticker:ti, qty:qt, price:pr, date:dt, decision:dc});
  S.showP=false; S._fp=null;
  syncAssetsFromAportes(false);
  fetchQuotes(false);
}

function rmP(id){
  if(!confirm('Remover este aporte? A aba Ativos será recalculada automaticamente.')) return;
  S.aportes=S.aportes.filter(a=>a.id!==id);
  syncAssetsFromAportes(false);
}

function getAI(){
  const {tC,tGP,mD,aD,avgDY}=cx();
  if(!S.assets.length){
    S.aiText='Cadastre seus ativos primeiro para gerar uma análise da carteira.';
    render();
    return;
  }

  const linhas=[];
  const porTipo={};
  const porAtivo=S.assets.map(a=>({
    ticker:a.ticker,
    type:a.type,
    valor:a.qty*a.current_price,
    divMes:(a.qty*a.current_price*(a.dy/100))/12,
    dy:Number(a.dy)||0,
    varPct:a.avg_price>0?((a.current_price-a.avg_price)/a.avg_price)*100:0
  })).sort((a,b)=>b.valor-a.valor);

  porAtivo.forEach(a=>porTipo[a.type]=(porTipo[a.type]||0)+a.valor);
  const maior=porAtivo[0];
  const maiorPct=tC>0?(maior.valor/tC)*100:0;
  const fiisPct=tC>0?((porTipo['FII']||0)/tC)*100:0;
  const acoesPct=tC>0?((porTipo['Ação']||0)/tC)*100:0;
  const etfsPct=tC>0?((porTipo['ETF']||0)/tC)*100:0;
  const rendaFixaPct=tC>0?((porTipo['Renda Fixa']||0)/tC)*100:0;
  const divGoal=Number(S.divGoal)||4000;
  const alvoDividendos=(mD>0 && tC>0)?(divGoal/mD)*tC:0;
  const faltaDividendos=Math.max(0,divGoal-mD);

  linhas.push('📊 RESUMO DA CARTEIRA');
  linhas.push(`Patrimônio atual: ${fmt(tC)}`);
  linhas.push(`Resultado sobre preço médio: ${fmtP(tGP)}`);
  linhas.push(`Renda passiva estimada: ${fmt(mD)}/mês ou ${fmt(aD)}/ano`);
  linhas.push(`DY médio estimado: ${avgDY.toFixed(2)}% ao ano`);
  linhas.push('');

  linhas.push('⚖️ ALOCAÇÃO');
  Object.entries(porTipo).sort((a,b)=>b[1]-a[1]).forEach(([tipo,valor])=>{
    linhas.push(`• ${tipo}: ${((valor/tC)*100).toFixed(1)}% (${fmt(valor)})`);
  });
  linhas.push('');

  linhas.push('🔎 PONTOS DE ATENÇÃO');
  if(maiorPct>20) linhas.push(`• Concentração alta em ${maior.ticker}: ${maiorPct.toFixed(1)}% da carteira. Avaliar novos aportes em outros ativos antes de aumentar essa posição.`);
  else linhas.push(`• Maior posição é ${maior.ticker}, com ${maiorPct.toFixed(1)}% da carteira. Concentração parece controlada.`);

  if(S.assets.length<10) linhas.push('• Carteira ainda tem poucos ativos. Para renda passiva, normalmente faz sentido diversificar mais entre setores e emissores.');
  if(fiisPct>60) linhas.push('• FIIs estão com peso muito alto. Isso aumenta exposição a juros, vacância e riscos do setor imobiliário.');
  if(acoesPct>70) linhas.push('• Ações estão com peso muito alto. A renda mensal pode ficar mais irregular, pois dividendos de ações variam bastante.');
  if(rendaFixaPct<10) linhas.push('• Renda fixa abaixo de 10%. Uma reserva em pós-fixado ajuda a reduzir risco e aproveitar quedas do mercado.');
  if(etfsPct>35) linhas.push('• ETFs com peso relevante. Verifique se existe sobreposição com ações e fundos que já estão na carteira.');
  if(avgDY>12) linhas.push('• DY médio muito alto pode indicar risco. Confirme se os dividendos são recorrentes ou se houve evento extraordinário.');
  if(avgDY<6) linhas.push('• DY médio ainda baixo para foco em renda passiva. Novos aportes podem priorizar ativos pagadores de renda, sem ignorar qualidade.');
  linhas.push('');

  linhas.push(`💰 CAMINHO PARA ${fmt(divGoal)}/MÊS`);
  if(mD>=divGoal) linhas.push(`• A projeção atual já atinge ou supera ${fmt(divGoal)}/mês em renda passiva estimada. O foco passa a ser sustentabilidade e diversificação.`);
  else if(mD>0){
    linhas.push(`• Falta aproximadamente ${fmt(faltaDividendos)}/mês.`);
    linhas.push(`• Mantendo o DY médio atual, o patrimônio estimado para gerar ${fmt(divGoal)}/mês seria próximo de ${fmt(alvoDividendos)}.`);
  }else{
    linhas.push(`• Objetivo mensal salvo: ${fmt(divGoal)}. Ainda não há dividendos projetados; preencha o DY anual dos ativos para calcular o caminho até o objetivo.`);
  }
  linhas.push('');

  linhas.push('✅ SUGESTÃO PRÁTICA PARA NOVOS APORTES');
  linhas.push('• Priorizar ativos/setores abaixo do peso desejado, em vez de comprar sempre o ativo que mais caiu.');
  linhas.push('• Evitar aumentar posição que já esteja acima de 20% da carteira.');
  linhas.push('• Conferir se o dividendo mensal vem de lucro/resultado recorrente, não apenas de evento extraordinário.');
  linhas.push('• Registrar cada compra na aba Aportes com o motivo da decisão para acompanhar a estratégia.');
  linhas.push('');
  linhas.push('⚠️ Esta análise é automática e informativa. Não substitui uma recomendação individual feita por profissional habilitado.');

  S.aiText=linhas.join('\n');
  render();
}

function bind(){
  document.querySelectorAll('.fc input,.fc select').forEach(el=>{
    el.addEventListener('keydown',e=>{ if(e.key==='Enter'){ if(S.showA) svA(); else if(S.showP) svP(); } });
  });
}

// ── Init ──────────────────────────────────────────────────
load();
if(S.aportes.length) syncAssetsFromAportes(false); else render();
fetchQuotes(false);
setInterval(()=>{
  S.cd=Math.max(0,S.cd-1);
  if(S.cd<=0){ S.cd=QI; fetchQuotes(false); return; }
  const el=document.getElementById('cd-span');
  if(el) el.textContent=S.cd;
},1000);
</script>
