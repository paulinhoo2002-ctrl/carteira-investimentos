function applyB3MovementImported(rows, importDate){
  const importTag='[IMPORT_B3_MOVIMENTO]';
  const movKeys=new Set(rows.map(r=>String(r.movKey||'')));
  if(!movKeys.size) return;
  S.aportes=S.aportes.filter(a=>!(String(a.source||'')==='b3-movement' && movKeys.has(String(a.movKey||''))));
  S.proventos=S.proventos.filter(p=>!(String(p.source||'')==='b3-movement' && movKeys.has(String(p.movKey||''))));
  const now=Date.now();
  const addAportes=[];
  const addProventos=[];
  rows.forEach((r,i)=>{
    const date=r.date||importDate||new Date().toLocaleDateString('pt-BR');
    if(r.target==='proventos'){
      addProventos.push({
        id:now+i,
        ticker:r.ticker,
        value:Number(r.value)||0,
        type:r.movement||'Juros',
        date,
        note:`${importTag} ${r.movement||'provento'} · ${r.product||r.ticker}`,
        autoKey:r.movKey,
        movKey:r.movKey,
        source:'b3-movement'
      });
      return;
    }
    addAportes.push({
      id:now+i,
      operation:r.action||'compra',
      ticker:r.ticker,
      qty:Number(r.qty)||0,
      price:Number(r.price)||0,
      date,
      decision:`${importTag} ${r.movement||'movimentacao'} · ${r.product||r.ticker}`,
      type:normalizeType(r.type||metaTicker(r.ticker).type||'Renda Fixa','Renda Fixa'),
      sector:r.sector||metaTicker(r.ticker).sector||'',
      movKey:r.movKey,
      source:'b3-movement',
      movement:r.movement,
      entryExit:r.entryExit,
      product:r.product
    });
  });
  S.proventos=[...addProventos,...S.proventos];
  S.aportes=[...addAportes,...S.aportes];
  syncAssetsFromAportes(false);
  [...rows].forEach(r=>learnTickerMeta(r.ticker, r.type, r.sector, true));
  save();
  render();
  fetchQuotes(false);
  scheduleAutoProventosGratis('b3-mov');
  toast(`✅ ${addAportes.length} movimento(s) e ${addProventos.length} provento(s) importados da B3.`);
}

document.getElementById('b3-file').addEventListener('change',async e=>{
  const file=e.target.files[0]; if(!file) return;
  try{
    const fileName=String(file.name||'');
    const fileType=String(file.type||'').toLowerCase();
    const isPdf=/\.pdf$/i.test(fileName) || fileType.includes('pdf');
    const isCsv=/\.csv$/i.test(fileName) || fileType.includes('csv') || fileType.includes('comma-separated-values');
    let parsed;
    if(isPdf){
      const kind=await detectB3PdfKind(file);
      if(kind==='ambiguous'){
        const choice=(prompt('Não foi possível identificar o tipo do PDF da B3. Digite P para posição ou M para movimentação antes de importar:','P')||'').trim().toUpperCase();
        if(choice!=='P' && choice!=='M'){
          alert('Importação cancelada. Informe P para posição ou M para movimentação.');
          return;
        }
        parsed=choice==='M' ? await parseB3MovementPdf(file) : await parseB3PositionPdf(file);
      }else{
        parsed=kind==='movement' ? await parseB3MovementPdf(file) : await parseB3PositionPdf(file);
      }
    }else if(isCsv){
      if(typeof XLSX==='undefined'){ alert('Biblioteca de Excel não carregou. Verifique sua internet e tente novamente.'); return; }
      const csvText=await file.text();
      const wb=XLSX.read(csvText,{type:'string'});
      const kind=detectB3WorkbookKind(wb);
      parsed=kind==='movement' ? parseB3MovementWorkbook(wb,file.name) : parseB3PositionWorkbook(wb,file.name);
    }else{
      if(typeof XLSX==='undefined'){ alert('Biblioteca de Excel não carregou. Verifique sua internet e tente novamente.'); return; }
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf,{type:'array'});
      const kind=detectB3WorkbookKind(wb);
      parsed=kind==='movement' ? parseB3MovementWorkbook(wb,file.name) : parseB3PositionWorkbook(wb,file.name);
    }
    const {items,warnings,importDate,stats}=parsed;
    if(!items.length){ alert('Não encontrei itens válidos no arquivo. Tente exportar a posição ou movimentação da B3/corretora no formato correto.'); return; }
    if((parsed.kind||'position')==='movement'){
      openB3MovementReview({...parsed, sourceKind:isPdf?'pdf':'excel'}, file.name);
    }else{
      openB3Review({...parsed, sourceKind:isPdf?'pdf':'excel'}, file.name);
    }
    if(warnings.length) console.warn('Avisos importação B3:',warnings);
  }catch(err){ console.error(err); alert('Erro ao importar arquivo. Verifique o PDF/Excel e tente novamente.'); }
  e.target.value='';
});

function parseNum(v){
  if(v==null) return 0;
  let s=String(v).trim().replace(/R\$|%|\s/g,'');
  if(!s) return 0;
  if(s.includes(',')&&s.includes('.')) s=s.replace(/\./g,'').replace(',','.');
  else if(s.includes(',')) s=s.replace(',','.');
  const n=parseFloat(s); return isNaN(n)?0:n;
}

function inputDateValue(v){
  if(!v) return '';
  const s=String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(m){ const d=m[1].padStart(2,'0'),mo=m[2].padStart(2,'0'),y=String(m[3].length<3?2000+Number(m[3]):Number(m[3]));return `${y}-${mo}-${d}`; }
  return '';
}
function brDate(v){
  if(!v) return new Date().toLocaleDateString('pt-BR');
  if(/^\d{4}-\d{2}-\d{2}$/.test(v)){ const[y,m,d]=v.split('-');return`${d}/${m}/${y}`; }
  return v;
}
function parseAnyDate(v){
  if(!v) return null; if(v instanceof Date) return isNaN(v)?null:v;
  const s=String(v).trim();
  const a=s.match(/^(\d{4})-(\d{2})-(\d{2})/); if(a) return new Date(+a[1],+a[2]-1,+a[3]);
  const b=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/); if(b) return new Date(+b[3]<100?2000+ +b[3]:+b[3],+b[2]-1,+b[1]);
  const d=new Date(s); return isNaN(d)?null:d;
}

function toBRDate(d){ if(!d)return''; return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`; }
function normTypeKey(v){
  return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim().toUpperCase();
}
function normalizeType(v, fallback='Ação'){
  const raw=String(v||'').trim();
  if(!raw) return fallback || 'Ação';
  if(TYPE_CHOICES.includes(raw)) return raw;
  const key=normTypeKey(raw);
  if(TYPE_ALIAS_LOOKUP[key]) return TYPE_ALIAS_LOOKUP[key];
  const compact=key.replace(/[^A-Z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
  if(TYPE_ALIAS_LOOKUP[compact]) return TYPE_ALIAS_LOOKUP[compact];
  if(compact==='FUNDO DE INVESTIMENTO' || compact==='FUNDOS DE INVESTIMENTO') return 'Fundos de Investimento';
  if(compact==='RENDA FIXA') return 'Renda Fixa';
  if(compact==='TESOURO DIRETO') return 'Tesouro Direto';
  if(compact==='RESERVA DE EMERGENCIA') return 'Reserva de emergência';
  if(compact==='STOCK' || compact==='STOCKS') return 'Stock';
  if(compact==='REIT' || compact==='REITS') return 'Reit';
  return fallback || raw || 'Ação';
}

function learnedMetaFor(ticker){
  const t=cleanAssetCode(ticker||'');
  if(!t) return null;
  const m=S.learnMeta&&typeof S.learnMeta==='object' ? S.learnMeta[t] : null;
  if(!m) return null;
  return {
    type: normalizeType(m.type || '', ''),
    sector: String(m.sector || '').trim()
  };
}
function learnTickerMeta(ticker, type, sector, force=false){
  const t=cleanAssetCode(ticker||'');
  if(!t) return null;
  if(!S.learnMeta || typeof S.learnMeta!=='object') S.learnMeta={};
  const prev=S.learnMeta[t] || {};
  const next={...prev};
  const normType = normalizeType(type || prev.type || 'Ação', prev.type || 'Ação');
  const normSector = String(sector || prev.sector || '').trim();
  if(force || !next.type) next.type = normType;
  if(force || !next.sector) next.sector = normSector;
  if(!next.type) next.type = 'Ação';
  S.learnMeta[t]=next;
  return next;
}
function rebuildLearnMeta(){
  const learned={...(S.learnMeta&&typeof S.learnMeta==='object'?S.learnMeta:{})};
  const seed=(ticker,type,sector)=>{
    const t=cleanAssetCode(ticker||'');
    if(!t) return;
    if(!learned[t]){
      const nt=normalizeType(type||metaTicker(t).type||'Ação','Ação');
      learned[t]={type:nt, sector:String(sector||metaTicker(t).sector||'').trim()};
      return;
    }
    if(!learned[t].type) learned[t].type=normalizeType(type||metaTicker(t).type||'Ação','Ação');
    if(!learned[t].sector) learned[t].sector=String(sector||metaTicker(t).sector||'').trim();
  };
  (S.assets||[]).forEach(a=>seed(a.ticker,a.type,a.sector));
  (S.aportes||[]).forEach(a=>seed(a.ticker,a.type,a.sector));
  S.learnMeta=learned;
}
function normalizeGoals(goals){
  const base={
    patrimonio:{target:0, aporte:0, annualVar:0},
    ativos:{type:'Ação', ticker:'', aporte:0, annualVar:10, finalValue:0},
    proventos:{types:['Ação','FII','ETF','BDR','Stock'], monthly:0},
    allocation:{items:[
      {type:'FII', pct:40},
      {type:'ETF', pct:20},
      {type:'Ação', pct:25},
      {type:'BDR', pct:5},
      {type:'Renda Fixa', pct:10},
    ]}
  };
  const g=(goals && typeof goals==='object') ? JSON.parse(JSON.stringify(goals)) : {};
  g.patrimonio={...base.patrimonio, ...(g.patrimonio||{})};
  g.ativos={...base.ativos, ...(g.ativos||{}), type:normalizeType((g.ativos||{}).type||'Ação','Ação')};
  const rawTypes=Array.isArray(g.proventos?.types) ? g.proventos.types : base.proventos.types;
  g.proventos={...base.proventos, ...(g.proventos||{}), types:[...new Set(rawTypes.map(t=>normalizeType(t,'')).filter(Boolean))]};
  if(!g.proventos.types.length) g.proventos.types=[...base.proventos.types];
  const allocSrc=Array.isArray(g.allocation?.items)
    ? g.allocation.items
    : (g.allocation && typeof g.allocation==='object' ? Object.entries(g.allocation).map(([type,pct])=>({type,pct})) : base.allocation.items);
  const seen=new Set();
  g.allocation={items:allocSrc.map(it=>({
    type:normalizeType(it?.type||it?.label||'',''),
    pct:Math.max(0, Number(it?.pct ?? it?.value ?? it?.percent ?? it?.weight) || 0)
  })).filter(it=>{
    if(!it.type || seen.has(it.type)) return false;
    seen.add(it.type);
    return true;
  })};
  if(!g.allocation.items.length) g.allocation.items=[...base.allocation.items];
  return g;
}
function typeSelectOptions(selected, types=TYPE_FORM_CHOICES){
  const cur=normalizeType(selected||'Ação','Ação');
  return types.map(t=>`<option value="${esc(t)}" ${cur===t?'selected':''}>${esc(t)}</option>`).join('');
}

// ── DY automático: proventos reais → estimativa da tabela → manual
function autoDY(){
  const now=new Date();
  const oneYearAgo=new Date(now.getFullYear()-1,now.getMonth(),now.getDate());
  let updated=0;
  S.assets.forEach(a=>{
    if(a.dySource==='manual') return; // não sobrescreve DY manual
    // 1ª prioridade: calcula pelo histórico real de proventos (mais preciso)
    const provsAno=S.proventos.filter(p=>{
      const d=parseAnyDate(p.date);
      return String(p.ticker||'').toUpperCase()===a.ticker && d && d>=oneYearAgo;
    });
    if(provsAno.length>0 && a.qty>0 && a.current_price>0){
      const totalAnual=provsAno.reduce((s,p)=>s+(Number(p.value)||0),0);
      const dy=(totalAnual/(a.qty*a.current_price))*100;
      if(dy>0){ a.dy=Number(dy.toFixed(2)); a.dySource='proventos'; updated++; return; }
    }
    // 2ª prioridade: tabela de referência de mercado
    if(!a.dy || Number(a.dy)===0 || a.dySource==='estimate'){
      const ref=DY_REF[a.ticker];
      if(ref){ a.dy=ref; a.dySource='estimate'; updated++; }
    }
  });
  if(updated>0){ save(); }
  return updated;
}

function metaTicker(ticker){
  const t=String(ticker||'').trim().toUpperCase();
  const learned=learnedMetaFor(t);
  if(learned?.type){
    const learnedType=normalizeType(learned.type,'Ação');
    const base=META[t];
    const sector=learned.sector || (base && normalizeType(base[0],'Ação')===learnedType ? base[1] : '');
    return {type:learnedType, sector};
  }
  if(isRendaFixaText(t)) return rfMetaFromText(t);
  if(META[t]) return{type:META[t][0],sector:META[t][1]};
  if(/^[A-Z]{4}11$/.test(t)) return{type:'FII',sector:'FII'};
  if(/^[A-Z]{4}[34]$/.test(t)) return{type:'Ação',sector:'Ação'};
  return{type:'Ação',sector:''};
}

}

function findDy(q){
  const keys=['dividendYield','trailingAnnualDividendYield','yield','dy','regularMarketDividendYield','dividend_yield','dividendYieldAnnual','annualDividendYield'];
  const seen=new Set();
  function scan(obj){
    if(!obj||typeof obj!=='object'||seen.has(obj)) return 0; seen.add(obj);
    for(const k of keys){const raw=obj[k];if(raw!=null&&raw!==''){const v=Number(String(raw).replace('%','').replace(',','.'));if(v>0) return v>1?v:v*100;}}
    for(const v of Object.values(obj)){const f=scan(v);if(f>0) return f;}
    return 0;
  }
  return scan(q);
}
function cx(){
  const tI=S.assets.reduce((s,a)=>s+a.qty*a.avg_price,0);
  const tC=S.assets.reduce((s,a)=>s+a.qty*a.current_price,0);
  const tG=tC-tI,tGP=tI>0?(tG/tI)*100:0;
  const mD=S.assets.reduce((s,a)=>s+(a.qty*a.current_price*(a.dy/100))/12,0);
  const aD=mD*12,avgDY=tC>0?(aD/tC)*100:0;
  return{tI,tC,tG,tGP,mD,aD,avgDY};
}
function proventoStats(){

}

function proventoResumo(){
  const meses=new Map(),anos=new Map();
  S.proventos.forEach(p=>{
    const dt=parseAnyDate(p.date),v=Number(p.value)||0;
    if(!dt||v<=0) return;
    const y=dt.getFullYear(),m=String(dt.getMonth()+1).padStart(2,'0');
    const mk=`${y}-${m}`;
    if(!meses.has(mk)) meses.set(mk,{key:mk,ano:y,mes:dt.toLocaleDateString('pt-BR',{month:'long'}),valor:0,count:0});
    const mr=meses.get(mk); mr.valor+=v; mr.count++;
    if(!anos.has(y)) anos.set(y,{ano:y,valor:0,count:0});
    const ar=anos.get(y); ar.valor+=v; ar.count++;
  });
  return{
    meses:[...meses.values()].sort((a,b)=>b.key.localeCompare(a.key)),
    anos:[...anos.values()].sort((a,b)=>b.ano-a.ano)
  };
}
function proventoHistoricoMensal(){
  const byYear=new Map();
  S.proventos.forEach(p=>{
    const dt=parseAnyDate(p.date);
    const v=Number(p.value)||0;
    if(!dt||v<=0) return;
    const year=dt.getFullYear();
    const month=dt.getMonth();
    if(!byYear.has(year)) byYear.set(year, Array(12).fill(0));
    byYear.get(year)[month]+=v;
  });
  return [...byYear.entries()].sort((a,b)=>b[0]-a[0]).map(([year, months])=>{
    const total=months.reduce((s,v)=>s+v,0);
    const media=total/12;
    return { year, months, total, media };
  });
}
function reserveStats(){
  const out={bolsa:0,pessoal:0,total:0,entries:0};
  S.aportes.forEach(a=>{
    const type=String(a.type||a.asset_type||'').trim();
    const op=String(a.operation||a.op||'compra').toLowerCase();
    const isReserve=type==='Reserva de emergência' || op.startsWith('reserva');
    if(!isReserve) return;
    const raw=Number(a.price)||0;
    const qty=Math.max(1, Math.abs(Number(a.qty)||1));
    const value=raw*qty;
    const sign=(op.includes('saida') || op==='venda') ? -1 : 1;
    const target=String(a.reserveTarget||a.sector||a.asset_sector||'bolsa').toLowerCase();
    const bucket=target.includes('pess') ? 'pessoal' : 'bolsa';
    out[bucket]+=sign*value;
    out.entries++;
  });
  out.total=out.bolsa+out.pessoal;
  return out;
}

function irpfBuildYearReport(year){
  const y=Number(year)||new Date().getFullYear();
  const bucketOrder=['Ações','FII','ETF','BDR','Renda Fixa'];
  const months=Array.from({length:12},(_,idx)=>({
    key:`${y}-${String(idx+1).padStart(2,'0')}`,
    label:irpfMonthLabel(idx),
    buys:0,
    sells:0,
    salesByBucket:Object.fromEntries(bucketOrder.map(b=>[b,0])),
    realizedByBucket:Object.fromEntries(bucketOrder.map(b=>[b,0])),
    taxByBucket:Object.fromEntries(bucketOrder.map(b=>[b,0])),
    exemptByBucket:Object.fromEntries(bucketOrder.map(b=>[b,0])),
    carryByBucket:Object.fromEntries(bucketOrder.map(b=>[b,0])),
    lossUsedByBucket:Object.fromEntries(bucketOrder.map(b=>[b,0])),
    events:[]
  }));
  const holdings=new Map();
  const carryByBucket=Object.fromEntries(bucketOrder.map(b=>[b,0]));
  const txs=[...S.aportes]
    .map(a=>({...a,_dt:parseAnyDate(a.date)}))
    .filter(a=>a._dt && a._dt.getFullYear()===y)
    .sort((a,b)=>a._dt-b._dt||((Number(a.id)||0)-(Number(b.id)||0)));
  const provs=[...S.proventos]
    .map(p=>({...p,_dt:parseAnyDate(p.date)}))
    .filter(p=>p._dt && p._dt.getFullYear()===y && Number(p.value)>0)
    .sort((a,b)=>a._dt-b._dt||String(a.ticker||'').localeCompare(String(b.ticker||'')));

  const ensurePos=(ticker)=>{
    const tk=String(ticker||'').toUpperCase();
    if(!holdings.has(tk)){
      const meta=metaTicker(tk);
      holdings.set(tk,{ticker:tk,qty:0,cost:0,type:meta.type||'Ação',sector:meta.sector||''});
    }
    return holdings.get(tk);
  };

  txs.forEach(tx=>{
    const rawTicker=cleanAssetCode(tx.ticker||'')||String(tx.ticker||'').trim().toUpperCase();
    if(!rawTicker) return;
    const type=normalizeType(tx.type||tx.asset_type||metaTicker(rawTicker).type||'Ação','Ação');
    const isReserve=type==='Reserva de emergência' || String(tx.operation||tx.op||'').toLowerCase().startsWith('reserva');
    if(isReserve) return;

    const month=months[tx._dt.getMonth()];
    const qty=Math.abs(Number(tx.qty)||0);
    const price=Math.abs(Number(tx.price)||0);
    const op=String(tx.operation||tx.op||'compra').toLowerCase();
    const bucket=irpfTaxBucket(type);
    const pos=ensurePos(rawTicker);
    pos.type=type;
    pos.sector=tx.sector||tx.asset_sector||pos.sector||metaTicker(rawTicker).sector||'';

    if(op==='venda'){
      const avgBefore=pos.qty>0 ? (pos.cost/pos.qty) : 0;
      const saleValue=qty*price;
      const costBasis=avgBefore*qty;
      const realized=saleValue-costBasis;
      pos.qty=Math.max(0,pos.qty-qty);
      pos.cost=Math.max(0,pos.cost-costBasis);
      month.sells+=saleValue;
      month.salesByBucket[bucket]+=saleValue;
      month.events.push({bucket, realized, saleValue, type});
      return;
    }

    pos.qty+=qty;
    pos.cost+=qty*price;
    month.buys+=qty*price;
  });

  months.forEach(month=>{
    const equitySalesTotal=month.salesByBucket['Ações'];
    month.events.forEach(evt=>{
      const rate=irpfTaxRate(evt.bucket);
      const canUseExemption = evt.bucket==='Ações' && equitySalesTotal<=20000;
      if(canUseExemption){
        if(evt.realized>0) month.exemptByBucket[evt.bucket]+=evt.realized;
        else month.lossUsedByBucket[evt.bucket]+=evt.realized;
        month.realizedByBucket[evt.bucket]+=evt.realized;
        return;
      }

      const priorCarry=Number(carryByBucket[evt.bucket]||0);
      const net=evt.realized + priorCarry;
      month.realizedByBucket[evt.bucket]+=evt.realized;
      if(net>0){
        month.taxByBucket[evt.bucket]+=net*(rate/100);
        carryByBucket[evt.bucket]=0;
      }else{
        carryByBucket[evt.bucket]=net;
        month.lossUsedByBucket[evt.bucket]+=net;
      }
    });
    bucketOrder.forEach(bucket=>{
      month.carryByBucket[bucket]=carryByBucket[bucket];
    });
    delete month.events;
  });

  const finalPositions=[...holdings.values()]
    .filter(p=>p.qty>0.000001)
    .map(p=>{
      const avg=p.qty>0 ? p.cost/p.qty : 0;
      const current=Number((S.assets.find(a=>String(a.ticker||'').toUpperCase()===p.ticker)?.current_price)||0);
      const bucket=irpfTaxBucket(p.type);
      return {
        ticker:p.ticker,
        type:p.type,
        bucket,
        sector:p.sector||metaTicker(p.ticker).sector||'',
        qty:p.qty,
        cost:p.cost,
        avg,
        current,
        marketValue: current>0 ? p.qty*current : p.cost,
        note: bucket==='FII'
          ? 'Ficha Bens e Direitos'
          : bucket==='ETF'
            ? 'ETF: conferir enquadramento'
            : bucket==='BDR'
              ? 'BDR: verificar custo em reais'
              : bucket==='Renda Fixa'
                ? 'Renda fixa: apurar IR do resgate/vencimento'
                : 'Ações: posição em 31/12'
      };
    })
    .sort((a,b)=>a.bucket.localeCompare(b.bucket)||a.ticker.localeCompare(b.ticker));

  const yearProvents=provs.map(p=>{
    const type=String(p.type||'').trim();
    const bucket=irpfDividendBucketLabel(type);
    const value=Number(p.value)||0;
    return { ...p, bucket, value };
  });

  const positionsByBucket=finalPositions.reduce((acc,p)=>{
    if(!acc[p.bucket]) acc[p.bucket]=[];
    acc[p.bucket].push(p);
    return acc;
  },{});

  const totalsByBucket=months.reduce((acc,month)=>{
    bucketOrder.forEach(bucket=>{
      if(!acc[bucket]) acc[bucket]={sales:0, realized:0, exempt:0, tax:0, carry:0};
      acc[bucket].sales+=Number(month.salesByBucket[bucket]||0);
      acc[bucket].realized+=Number(month.realizedByBucket[bucket]||0);
      acc[bucket].exempt+=Number(month.exemptByBucket[bucket]||0);
      acc[bucket].tax+=Number(month.taxByBucket[bucket]||0);
      acc[bucket].carry=Number(month.carryByBucket[bucket]||0);
    });
    return acc;
  },{});

  const totalBuys=months.reduce((s,m)=>s+m.buys,0);
  const totalSells=months.reduce((s,m)=>s+m.sells,0);
  const totalTax=months.reduce((s,m)=>s+bucketOrder.reduce((x,b)=>x+Number(m.taxByBucket[b]||0),0),0);
  const totalTaxableGain=months.reduce((s,m)=>s+bucketOrder.reduce((x,b)=>x+Math.max(0, Number(m.realizedByBucket[b]||0)+Math.max(0,Number(m.carryByBucket[b]||0))),0),0);
  const totalExemptGain=months.reduce((s,m)=>s+Number(m.exemptByBucket['Ações']||0),0);
  const totalLossCarry=months.reduce((s,m)=>s+bucketOrder.reduce((x,b)=>x+Math.min(0, Number(m.carryByBucket[b]||0)),0),0);
  const liquidationYearEnd=finalPositions.reduce((s,p)=>s+p.cost,0);
  const totalProvents=yearProvents.reduce((s,p)=>s+(Number(p.value)||0),0);
  const taxableProvents=yearProvents.filter(p=>String(p.bucket).includes('Tributação')).reduce((s,p)=>s+(Number(p.value)||0),0);
  const exemptProvents=totalProvents-taxableProvents;

  return {
    year:y,
    months,
    positions:finalPositions,
    positionsByBucket,
    provents:yearProvents,
    bucketOrder,
    totalsByBucket,
    totals:{
      buys:totalBuys,
      sells:totalSells,
      taxableGain:totalTaxableGain,
      exemptGain:totalExemptGain,
      tax:totalTax,
      lossCarry:totalLossCarry,
      proventsTotal:totalProvents,
      proventsExempt:exemptProvents,
      proventsTaxable:taxableProvents,
      yearEndCost:liquidationYearEnd,
    }
  };
}
function irpfExportCSV(){
  return withVisibleValues(()=>{
  const year=irpfSelectedYear();
  const report=irpfBuildYearReport(year);
  const lines=[];
  lines.push(`IRPF;Ano-calendario;${year}`);
  lines.push(`Gerado em;${new Date().toLocaleString('pt-BR')}`);
  lines.push('');
  lines.push('RESUMO');
  lines.push(['Indicador','Valor'].map(irpfCsvEscape).join(';'));
  [
    ['Compras no ano', report.totals.buys],
    ['Vendas no ano', report.totals.sells],
    ['Ganhos tributáveis', report.totals.taxableGain],
    ['Ganhos isentos', report.totals.exemptGain],
    ['Proventos totais', report.totals.proventsTotal],
    ['Proventos isentos', report.totals.proventsExempt],
    ['Proventos tributáveis', report.totals.proventsTaxable],
    ['Imposto estimado', report.totals.tax],
    ['Posicao em 31/12', report.totals.yearEndCost],
  ].forEach(([k,v])=>lines.push([k, fmt(Number(v)||0)].map(irpfCsvEscape).join(';')));
  lines.push('');
  lines.push('APURACAO_MENSAL');
  lines.push(['Mes','Acoes vendas','Acoes ganho real','Acoes ganho isento','Acoes imposto','FII vendas','FII ganho real','FII imposto','ETF vendas','ETF ganho real','ETF imposto','BDR vendas','BDR ganho real','BDR imposto','RendaFixa vendas','RendaFixa ganho real','RendaFixa imposto','DARF total'].map(irpfCsvEscape).join(';'));
  report.months.forEach(m=>{
    const row=[
      m.label,
      m.salesByBucket['Ações'], m.realizedByBucket['Ações'], m.exemptByBucket['Ações'], m.taxByBucket['Ações'],
      m.salesByBucket['FII'], m.realizedByBucket['FII'], m.taxByBucket['FII'],
      m.salesByBucket['ETF'], m.realizedByBucket['ETF'], m.taxByBucket['ETF'],
      m.salesByBucket['BDR'], m.realizedByBucket['BDR'], m.taxByBucket['BDR'],
      m.salesByBucket['Renda Fixa'], m.realizedByBucket['Renda Fixa'], m.taxByBucket['Renda Fixa'],
      report.bucketOrder.reduce((s,b)=>s+Number(m.taxByBucket[b]||0),0)
    ];
    lines.push(row.map(v=>typeof v==='number'?fmt(v):String(v||'')).map(irpfCsvEscape).join(';'));
  });
  lines.push('');
  lines.push('POSICOES_31_12');
  lines.push(['Ticker','Bucket','Tipo','Setor','Qtd','Custo','PM','Preco atual','Valor de mercado','Observacao'].map(irpfCsvEscape).join(';'));
  report.positions.forEach(p=>{
    lines.push([
      p.ticker,p.bucket,p.type,p.sector,p.qty,p.cost,p.avg,p.current,p.marketValue,p.note
    ].map(v=>typeof v==='number'?fmt(v):String(v||'')).map(irpfCsvEscape).join(';'));
  });
  lines.push('');
  lines.push('PROVENTOS');
  lines.push(['Ticker','Data','Classificacao','Valor','Tipo'].map(irpfCsvEscape).join(';'));
  report.provents.forEach(p=>{

  });
  irpfDownloadText(`irpf-${year}.csv`, lines.join('\r\n'), 'text/csv;charset=utf-8');
  toast(`✅ CSV do IRPF ${year} exportado.`);

}

- Isentos: ${fmt(report.totals.proventsExempt)}
- Tributáveis: ${fmt(report.totals.proventsTaxable)}

- Ganhos tributáveis: ${fmt(report.totals.taxableGain)}
- Ganhos isentos: ${fmt(report.totals.exemptGain)}
- DARF estimado: ${fmt(taxDue)}
- Prejuízo acumulado: ${report.totals.lossCarry<0 ? fmt(Math.abs(report.totals.lossCarry)) : 'Nenhum'}

4) Quebra por tipo
${buckets}

Checklist final
- Conferir posição em 31/12 na ficha de Bens e Direitos.
- Conferir rendimentos isentos e tributáveis com os informes.
- Conferir meses com vendas tributáveis e eventual DARF.
- Validar tudo no programa oficial antes de enviar.
`;

function rentBenchRate(name){
  return Number(RENT_BENCH[String(name||'CDI').toUpperCase()] ?? RENT_BENCH.CDI);
}
function rentBenchSeries(length, bench='CDI'){
  const rate=rentBenchRate(bench);
  const out=[];
  for(let i=0;i<Math.max(0,length);i++){
    out.push(((Math.pow(1+rate/100,(i+1)/12)-1)*100));
  }
  return out;
}
function rentabilityHistory(typeFilter='all', period='all', bench='CDI'){
  const txs=[...S.aportes]
    .map(a=>({...a, _dt: parseAnyDate(a.date)}))
    .filter(a=>a._dt)
    .sort((a,b)=>a._dt-b._dt||((Number(a.id)||0)-(Number(b.id)||0)));
  const provs=[...S.proventos]
    .map(p=>({...p, _dt: parseAnyDate(p.date)}))
    .filter(p=>p._dt&&Number(p.value)>0)
    .sort((a,b)=>a._dt-b._dt||String(a.ticker||'').localeCompare(String(b.ticker||'')));
  if(!txs.length && !provs.length){
    return { points:[], view:[], bench:[], labels:[], months:[], years:[], current:null, prev12:null, totalMonths:0 };
  }

  const startDate=txs[0]?new Date(txs[0]._dt.getFullYear(),txs[0]._dt.getMonth(),1)
    :new Date(provs[0]._dt.getFullYear(),provs[0]._dt.getMonth(),1);
  const endDate=new Date();
  const priceByTicker=new Map();
  S.assets.forEach(a=>{
    const tk=cleanAssetCode(a.ticker||'');
    if(!tk) return;
    priceByTicker.set(tk, Number(a.current_price)||Number(a.price)||0);
  });
  const typeSet=typeFilter==='all'?null:new Set([typeFilter]);
  const holdings=new Map();
  const points=[];
  let txPos=0;
  let provPos=0;
  let provCum=0;
  let provPrevCum=0;
  let cursor=new Date(startDate.getFullYear(), startDate.getMonth(), 1);
  while(cursor<=endDate){
    const monthEnd=new Date(cursor.getFullYear(), cursor.getMonth()+1, 0, 23, 59, 59, 999);
    while(txPos<txs.length && txs[txPos]._dt<=monthEnd){
      const tx=txs[txPos++];
      const ticker=cleanAssetCode(tx.ticker||'');
      if(!ticker) continue;
      const type=normalizeType(tx.type || metaTicker(ticker).type || 'Ação','Ação');
      if(typeSet && !typeSet.has(type)) continue;
      const qty=Math.abs(Number(tx.qty)||0);
      const price=Math.max(0, Number(tx.price)||0);
      if(qty<=0) continue;
      const op=String(tx.operation||tx.op||'compra').toLowerCase();
      const cur=holdings.get(ticker)||{ticker, qty:0, cost:0, type, price:priceByTicker.get(ticker)||price};
      if(op.includes('venda')){
        const sellQty=Math.min(cur.qty, qty);
        if(cur.qty>0 && sellQty>0){
          const avg=cur.cost/cur.qty;
          cur.cost=Math.max(0, cur.cost-(avg*sellQty));
          cur.qty=Math.max(0, cur.qty-sellQty);
        }
      }else{
        cur.qty += qty;
        cur.cost += qty * price;
      }
      cur.type = type || cur.type || 'Ação';
      cur.price = priceByTicker.get(ticker)||cur.price||price;
      if(cur.qty<=0.0000001) holdings.delete(ticker);
      else holdings.set(ticker, cur);
    }
    while(provPos<provs.length && provs[provPos]._dt<=monthEnd){
      const p=provs[provPos++];
      const pType=normalizeType(p.type || metaTicker(cleanAssetCode(p.ticker||'')).type || 'Ação','Ação');
      if(typeSet && !typeSet.has(pType)) continue;
      provCum += Number(p.value)||0;
    }
    const provMonth = Math.max(0, provCum - provPrevCum);
    provPrevCum = provCum;
    const rows=[...holdings.values()].filter(h=>!typeSet || typeSet.has(String(h.type||'Ação')));
    const costBasis=rows.reduce((s,h)=>s+(Number(h.cost)||0),0);
    const currentValue=rows.reduce((s,h)=>{
      const qty=Number(h.qty)||0;
      const unitPrice=priceByTicker.get(h.ticker)||Number(h.price)|| (qty>0 ? (Number(h.cost)||0)/qty : 0);
      return s + qty * unitPrice;
    },0);
    const cumReturn=costBasis>0 ? (((currentValue + provCum - costBasis)/costBasis)*100) : 0;
    const delta=points.length ? cumReturn - points[points.length-1].cumReturn : cumReturn;
    points.push({
      key:`${cursor.getFullYear()}-${String(cursor.getMonth()+1).padStart(2,'0')}`,
      year:cursor.getFullYear(),
      month:cursor.getMonth(),
      label:cursor.toLocaleDateString('pt-BR',{month:'2-digit',year:'2-digit'}),
      costBasis,
      currentValue,
      proventos:provCum,
      provMonth,
      cumReturn,
      delta
    });
    cursor.setMonth(cursor.getMonth()+1);
  }

  const totalMonths = points.length;
  const periodCount = period==='all' ? totalMonths : Math.max(3, Number(period)||12);
  const view = totalMonths > periodCount ? points.slice(-periodCount) : points.slice();
  const benchSeries = rentBenchSeries(view.length, bench);
  const current = view[view.length-1] || points[points.length-1] || null;
  const prev12 = points.length>12 ? points[points.length-13] : null;
  const firstView = view[0] || null;
  const currentBench = benchSeries[benchSeries.length-1] || 0;
  const return12m = current && prev12 ? current.cumReturn - prev12.cumReturn : current ? current.cumReturn : 0;
  const lastMonth = current ? current.delta : 0;
  const aboveBench = current ? current.cumReturn - currentBench : 0;
  const yearsMap = new Map();
  points.forEach(p=>{
    if(!yearsMap.has(p.year)) yearsMap.set(p.year, Array(12).fill(null));
    yearsMap.get(p.year)[p.month] = p;
  });
  const years = [...yearsMap.entries()].sort((a,b)=>b[0]-a[0]).map(([year, months])=>{
    const filled=months.filter(Boolean);
    const annual=filled.reduce((s,p)=>s+p.delta,0);
    const acum=filled.length ? filled[filled.length-1].cumReturn : 0;
    const provAnnual=filled.reduce((s,p)=>s+(Number(p.provMonth)||0),0);
    const provAcum=filled.length ? Number(filled[filled.length-1].proventos)||0 : 0;
    return { year, months, annual, acum, provAnnual, provAcum };
  });
  return { points, view, benchSeries, current, prev12, firstView, currentBench, return12m, lastMonth, aboveBench, years, totalMonths };
}

function lineChart(series, labels){
  const width=1080, height=260;
  const padL=50, padR=18, padT=14, padB=28;
  const all=series.flatMap(s=>s.values.map(v=>Number(v)||0));
  if(!all.length) return '<div class="es" style="padding:36px 18px">Sem dados suficientes para desenhar o gráfico.</div>';
  let minY=Math.min(0,...all);
  let maxY=Math.max(0,...all);
  if(minY===maxY){ maxY=minY+1; }
  const span=maxY-minY;
  const extra=Math.max(2, span*0.12);
  minY-=extra; maxY+=extra;
  const xStep=(width-padL-padR)/Math.max(1, labels.length-1);
  const yAt=v=>height-padB-(((v-minY)/(maxY-minY))*(height-padT-padB));
  const xAt=i=>padL + i*xStep;
  const grid=[];
  for(let i=0;i<=5;i++){
    const y=padT + ((height-padT-padB)/5)*i;
    const value=maxY - ((maxY-minY)/5)*i;
    grid.push(`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${width-padR}" y2="${y.toFixed(1)}" stroke="#161e2e" stroke-width="1"/>`);
    grid.push(`<text x="${padL-8}" y="${(y+4).toFixed(1)}" text-anchor="end" fill="#64748b" font-size="10">${fmtP(value)}</text>`);
  }
  const paths=series.map((s,idx)=>{
    const color=s.color||CLRS[idx%CLRS.length];
    const values=s.values||[];
    if(!values.length) return '';
    const pts=values.map((v,i)=>`${xAt(i).toFixed(1)},${yAt(v).toFixed(1)}`);
    const path=`M ${pts.join(' L ')}`;
    const area=`M ${xAt(0).toFixed(1)},${(height-padB).toFixed(1)} L ${pts.join(' L ')} L ${xAt(values.length-1).toFixed(1)},${(height-padB).toFixed(1)} Z`;
    return `
      <path d="${area}" fill="${s.fill||'none'}" opacity="${s.fill?1:0}"/>
      <path d="${path}" fill="none" stroke="${color}" stroke-width="${s.width||2.2}" stroke-linecap="round" stroke-linejoin="round"/>
      ${s.points===false?'':values.map((v,i)=>`<circle cx="${xAt(i).toFixed(1)}" cy="${yAt(v).toFixed(1)}" r="2.5" fill="${color}" stroke="#090c15" stroke-width="1"/>`).join('')}
    `;
  }).join('');
  const labelStep=Math.max(1, Math.ceil(labels.length/8));
  const xLabels=labels.map((l,i)=>`<text x="${xAt(i).toFixed(1)}" y="${height-10}" text-anchor="middle" fill="${i%labelStep===0||i===labels.length-1?'#64748b':'transparent'}" font-size="10">${esc(l)}</text>`).join('');
  return `<svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}" style="display:block;overflow:visible">
    ${grid.join('')}
    ${paths}
    ${xLabels}
  </svg>`;
}

function syncAssetsFromAportes(showMsg=false){
  const keep={};
  S.assets.forEach(a=>keep[a.ticker]={...a});
  const grouped={};
  const movs=[...S.aportes].sort((a,b)=>{
    const da=parseAnyDate(a.date)?.getTime()||0,db=parseAnyDate(b.date)?.getTime()||0;
    return da-db||((Number(a.id)||0)-(Number(b.id)||0));
  });
  movs.forEach(p=>{
    const raw=String(p.ticker||'').trim().toUpperCase(); if(!raw) return;
    const t=cleanAssetCode(raw)||raw;
    const q=Math.abs(Number(p.qty)||0),pr=Number(p.price)||0;
    const op=(p.operation||p.op||'compra').toLowerCase();
    const type=String(p.type||p.asset_type||'').trim();
    if(type==='Reserva de emergência' || op.startsWith('reserva')) return;
    const m=metaTicker(t);
    const learned=learnedMetaFor(t);
    const tipo=normalizeType(learned?.type || p.type || p.asset_type || m.type || 'Ação','Ação');
    const setor=learned?.sector || p.sector || p.asset_sector || m.sector || '';
    if(!grouped[t]) grouped[t]={ticker:t,qty:0,total:0,type:tipo,sector:setor};
    if(!grouped[t].type && tipo) grouped[t].type=tipo;
    if(!grouped[t].sector && setor) grouped[t].sector=setor;
    if(op==='venda'){
      const atual=grouped[t].qty,vendida=Math.min(q,atual),avg=atual>0?grouped[t].total/atual:0;
      grouped[t].qty=Math.max(0,atual-vendida);
      grouped[t].total=Math.max(0,grouped[t].total-(avg*vendida)); return;
    }
    grouped[t].qty+=q; grouped[t].total+=q*pr;
  });
  S.assets=Object.values(grouped).filter(g=>g.qty>0.000001).map(g=>{
    const old=keep[g.ticker]||{},m=metaTicker(g.ticker),avg=g.qty>0?g.total/g.qty:0;
    const isRF=normalizeType(g.type||old.type||m.type||'Ação','Ação')==='Renda Fixa';
    learnTickerMeta(g.ticker, g.type||old.type||m.type, g.sector||old.sector||m.sector, false);
    return{
      id:old.id||Date.now()+Math.floor(Math.random()*999999),
      ticker:g.ticker, type:g.type||old.type||m.type, sector:g.sector||old.sector||m.sector, qty:g.qty,
      avg_price:old.avg_manual?Number(old.avg_price)||avg:avg, avg_manual:!!old.avg_manual,
      current_price:Number(old.current_price)||avg, dy:Number(old.dy)||0,
      dySource:old.dySource||'', price_target:Number(old.price_target)||0, ideal_pct:Number(old.ideal_pct)||0,
      quoteSource:old.quoteSource||(isRF?'manual':''), quoteUpdatedAt:old.quoteUpdatedAt||''
    };
  }).sort((a,b)=>a.ticker.localeCompare(b.ticker));
  autoDY();
  save();
  if(showMsg) toast('✅ Carteira recalculada pelos aportes!');
  render();
}
function qtyAtDate(ticker,refDate){
  const t=String(ticker||'').toUpperCase(); let qty=0;
  [...S.aportes].filter(a=>String(a.ticker||'').toUpperCase()===t).sort((a,b)=>(parseAnyDate(a.date)?.getTime()||0)-(parseAnyDate(b.date)?.getTime()||0)).forEach(a=>{
    const d=parseAnyDate(a.date);
    if(!d||!refDate||d.getTime()>refDate.getTime()) return;
    const q=Math.abs(Number(a.qty)||0),op=(a.operation||a.op||'compra').toLowerCase();
    qty+=op==='venda'?-q:q; if(qty<0) qty=0;
  });
  return qty;
}

function normalizeDividendItem(item,fallback){
  const symbol=String(item.symbol||item.ticker||fallback||'').toUpperCase();
  const payDate=parseAnyDate(item.paymentDate||item.pay_date||item.payableDate||item.date||item.dataPagamento||item.exDate||item.lastDatePrior);
  const posDate=parseAnyDate(item.lastDatePrior||item.recordDate||item.comDate||item.exDate||item.date||item.paymentDate);
  const rate=parseNum(item.rate??item.amount??item.value??item.dividend??item.cashAmount??item.valor);
  const label=String(item.label||item.type||item.tipo||'Provento').trim()||'Provento';
  return{symbol,payDate,posDate:posDate||payDate,rate,label};
}
function collectDividendItems(payload,fallback){
  const out=[]; const seen=new Set();
  function walk(x){
    if(!x) return; if(Array.isArray(x)){x.forEach(walk);return;} if(typeof x!=='object') return;
    const hasRate=['rate','amount','value','dividend','cashAmount','valor'].some(k=>x[k]!==undefined);
    const hasDate=['paymentDate','pay_date','payableDate','date','dataPagamento','exDate','lastDatePrior'].some(k=>x[k]!==undefined);
    if(hasRate&&hasDate){out.push(normalizeDividendItem(x,fallback));return;}
    Object.values(x).forEach(walk);
  }
  walk(payload); return out;
}

      nextAuto.unshift({id:Date.now()+Math.floor(Math.random()*999999),ticker:d.symbol,value:Number(value.toFixed(2)),type:d.label,date:toBRDate(d.payDate),note:`Auto ${origem}: ${q} cotas x R$ ${Number(d.rate).toFixed(4)}`,autoKey:key});
      existing.add(key); novos++;
    });
  };
  try{
    const tickers=[...new Set(S.assets.map(a=>a.ticker).filter(t=>t&&isMarketTicker(t)))];
    const apiBase=marketApiBase();
    const period1=Math.floor((parseAnyDate(start)||earliestAporteDate()).getTime()/1000);
    const period2=Math.floor(Date.now()/1000);
    for(let i=0;i<tickers.length;i+=30){
      const batch=tickers.slice(i,i+30).join(',');
      try{
        const r=await fetch(`${apiBase}/api/yahoo-quote?symbols=${encodeURIComponent(batch)}&dividends=1&period1=${period1}&period2=${period2}`,{cache:'no-store'});
        if(!r.ok){erros.push('Yahoo');continue;}
        const j=await r.json();
        const items=(j.results||[]).map(d=>normalizeDividendItem({symbol:String(d.symbol||'').replace('.SA',''),amount:d.amount,date:new Date(Number(d.date)*1000),label:'Yahoo'}));
        addItems(items,'Yahoo');
      }catch(e){erros.push('Yahoo');}
    }
    const cleaned=stripAutoProventos();
    S.proventos=[...nextAuto,...preserved];
    save(); render();
    toast(`✅ ${novos} provento(s) histórico(s) adicionados pelo Yahoo.${ignorados?' '+ignorados+' ignorados/duplicados.':''}`, erros.length?'#fbbf24':'#6ee7b7');
    if(erros.length) console.warn('Avisos proventos:',[...new Set(erros)].join(', '));
    return { added: novos, cleaned };
  }catch(e){
    console.warn(e); toast('❌ Erro ao buscar proventos históricos.','#f87171');
  }
}

// PIE SVG
// ══════════════════════════════════════
function pie(data, colors=CLRS){
  const tot=data.reduce((s,d)=>s+d.value,0);
  if(!tot) return'<div class="di" style="text-align:center;padding:24px;font-size:13px">Sem dados</div>';
  let p='',a=-Math.PI/2;
  data.forEach((d,i)=>{
    const ang=(d.value/tot)*2*Math.PI;
    const[x1,y1]=[90+74*Math.cos(a),90+74*Math.sin(a)];
    const[x2,y2]=[90+74*Math.cos(a+ang),90+74*Math.sin(a+ang)];
    p+=`<path d="M90,90 L${x1.toFixed(1)},${y1.toFixed(1)} A74,74 0 ${ang>Math.PI?1:0},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${colors[i%colors.length]}" stroke="#07090f" stroke-width="2"/>`;
    a+=ang;
  });
  return`<svg viewBox="0 0 180 180" width="180" height="180" style="display:block;margin:0 auto;overflow:visible">
    ${p}
    <circle cx="90" cy="90" r="38" fill="#0d111e" stroke="#111828" stroke-width="2"></circle>
    <text x="90" y="86" text-anchor="middle" fill="#e2eaf6" font-size="15" font-weight="700">${data.length}</text>
    <text x="90" y="103" text-anchor="middle" fill="#64748b" font-size="10">ativos</text>
  </svg>`;
}

function ativos(){
  const total=S.assets.reduce((s,a)=>s+(Number(a.qty)||0)*(Number(a.current_price)||0),0);
  const grouped=new Map();
  S.assets.forEach(a=>{
    const type=normalizeType(a.type||metaTicker(a.ticker).type||'Ação','Ação');
    if(!grouped.has(type)) grouped.set(type,[]);
    grouped.get(type).push(a);
  });
  const order=TYPE_ORDER;
  const groupNames=[...order.filter(t=>grouped.has(t)), ...[...grouped.keys()].filter(t=>!order.includes(t)).sort((a,b)=>a.localeCompare(b))];
  const sections=groupNames.map((type,idx)=>{
    const items=[...grouped.get(type)].sort((a,b)=>String(a.ticker||'').localeCompare(String(b.ticker||'')));
    const gTotal=items.reduce((s,a)=>s+(Number(a.qty)||0)*(Number(a.current_price)||0),0);
    const gCost=items.reduce((s,a)=>s+(Number(a.qty)||0)*(Number(a.avg_price)||0),0);
    const gDivMes=items.reduce((s,a)=>s+((Number(a.qty)||0)*(Number(a.current_price)||0)*(Number(a.dy)||0)/100)/12,0);
    const gVar=gCost>0?((gTotal-gCost)/gCost)*100:0;
    const gDY=gTotal>0?(gDivMes/gTotal)*100*12:0;
    const share=total>0?(gTotal/total)*100:0;
    const rows=items.map(a=>{
      const avg=Number(a.avg_price)||0;
      const current=Number(a.current_price)||0;
      const vr=avg>0?((current-avg)/avg)*100:0;
      const dm=((Number(a.qty)||0)*current*(Number(a.dy)||0))/1200;
      const peso=total>0?((Number(a.qty)||0)*current/total)*100:0;
      const alvo=Number(a.price_target)||0,ideal=Number(a.ideal_pct)||0,diff=ideal>0?ideal-peso:0;
      const q=S.quotes[a.ticker];
      const qtag=q?`<span style="font-size:10px;color:${q.change>=0?'#34d399':'#f87171'};margin-left:5px;font-weight:600">${fmtP(q.change)}</span>`:'';
      const qt=a.quoteUpdatedAt?new Date(a.quoteUpdatedAt).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'aguardando';
      const qs=a.quoteSource==='yahoo'?'Yahoo':a.quoteSource==='brapi'?'brapi':a.quoteSource==='importado'?'importado':'mercado';
      return`<tr>
        <td style="font-weight:700;color:#e2eaf6">${esc(a.ticker)}${qtag}</td>
        <td><span class="bdg ${bdg(a.type)}">${esc(a.type)}</span></td>
        <td class="mu">${esc(a.sector||'—')}</td>
        <td>${a.qty}</td>
        <td>${fmt(avg)}</td>
        <td style="font-weight:600;color:${current>=avg?'#34d399':'#f87171'}" class="${(S.quotes[a.ticker]?.flash==='up'?'flash-up':S.quotes[a.ticker]?.flash==='down'?'flash-down':'')}">
          ${fmt(current)}
          ${a.quoteSource==='brapi'?'<span style="font-size:9px;color:#34d399;margin-left:3px" title="brapi">●</span>':a.quoteSource==='yahoo'?'<span style="font-size:9px;color:#60a5fa;margin-left:3px" title="Yahoo Finance">●</span>':''}
          <div style="font-size:10px;color:#3d5472;font-weight:500;margin-top:2px">${qs} · ${qt}</div>
        </td>
        <td style="color:${vr>=0?'#34d399':'#f87171'};font-weight:700">${fmtP(vr)}</td>
        <td>${alvo>0?fmt(alvo):'—'}</td>
        <td style="font-weight:700;color:#e2eaf6">${fmt((Number(a.qty)||0)*current)}</td>
        <td class="bl" style="font-weight:600">${peso.toFixed(1)}%</td>
        <td class="${ideal>0?(diff>0?'gn':'rd'):'mu'}" style="font-weight:600">${ideal>0?ideal.toFixed(1)+'%':'—'}</td>
        <td class="am" style="font-weight:600">${fmt(dm)}</td>
        <td class="mu">${Number(a.dy)||0}%${a.dySource==='api'?'<span style="font-size:10px;color:#34d399;margin-left:4px" title="via brapi">API</span>':a.dySource==='proventos'?'<span style="font-size:10px;color:#818cf8;margin-left:4px" title="calculado pelos seus proventos reais">●Real</span>':a.dySource==='estimate'?'<span style="font-size:10px;color:#fbbf24;margin-left:4px" title="estimativa de mercado — atualize se necessário">~Est</span>':''}</td>
        <td><button class="bi" onclick="edA(${a.id})">✏️</button></td>
      </tr>`;
    }).join('');
    const isOpen=S.activeAssetsGroup===type;
    return`<details class="ag"${isOpen?' open':''}>
      <summary onclick="toggleAssetGroup(${JSON.stringify(type)}, event)">
        <div class="ag-left">
          <div class="ag-ico">${tipoIcon(type)}</div>
          <div>
            <div class="ag-name">${esc(type)}</div>
            <div class="ag-sub">${items.length} ativos · ${fmt(gTotal)} · ${share.toFixed(1)}% da carteira</div>
          </div>
        </div>
        <div class="ag-stats">
          <div class="ag-stat"><div class="ag-k">Ativos</div><div class="ag-v">${items.length}</div></div>
          <div class="ag-stat"><div class="ag-k">Valor total</div><div class="ag-v">${fmt(gTotal)}</div></div>
          <div class="ag-stat"><div class="ag-k">Variação</div><div class="ag-v" style="color:${gVar>=0?'#34d399':'#f87171'}">${fmtP(gVar)}</div></div>
          <div class="ag-stat"><div class="ag-k">Rentabilidade</div><div class="ag-v" style="color:${gDY>=0?'#34d399':'#f87171'}">${gDY.toFixed(2)}% <small>DY</small></div></div>
          <div class="ag-stat"><div class="ag-k">% na carteira</div><div class="ag-v" style="color:#c0cce0">${share.toFixed(1)}%</div></div>
        </div>
        <div class="ag-open">⌄</div>
      </summary>
      <div class="ag-body">
        <div class="ag-table">
          <div class="tw"><div class="ts"><table>
            <thead><tr><th>Ticker</th><th>Tipo</th><th>Setor</th><th>Qtd</th><th>PM</th>
              <th>
                <div style="display:flex;align-items:center;gap:5px">
                  ATUAL
                  <span class="qdot${S.qLoad?' spin':''}" title="Cotações ao vivo · atualiza a cada ${QI}s"></span>
                </div>
              </th>
              <th>Rentab.</th><th>Alvo</th><th>Total</th><th>% Cart.</th><th>% Ideal</th><th>Div/mês</th><th>DY</th><th></th></tr></thead>
            <tbody>${rows||'<tr><td colspan="14" style="text-align:center;padding:28px;color:#2e3f58">Nenhum ativo nesta categoria.</td></tr>'}</tbody>
          </table></div></div>
        </div>
      </div>
    </details>`;
  }).join('');
  return`<div class="sh">
    <div>
      <div class="st">Meus Ativos (${S.assets.length})</div>
      <div class="mu" style="font-size:12px;margin-top:4px">Ativos agrupados por categoria. Abra cada bloco para ver os detalhes e editar um item.</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn bgh" style="font-size:12px;padding:7px 12px" onclick="syncAssetsFromAportes(true)">🧮 Recalcular</button>
      <button class="btn bgh" style="font-size:12px;padding:7px 12px" onclick="fetchQuotes(true)">🔄 Atualizar mercado</button>
    </div>
  </div>
  ${frmA()}
  <div class="ag-wrap">${sections||'<div class="es" style="background:#0d111e;border:1px dashed #161e2e;border-radius:12px">Registre compras na aba 💰 Aportes para alimentar esta tela.</div>'}</div>`;
}

function estimateGoalMonths(startValue,targetValue,monthlyAporte,annualVar){
  const target=Math.max(0,Number(targetValue)||0);
  let value=Math.max(0,Number(startValue)||0);
  const aporte=Math.max(0,Number(monthlyAporte)||0);
  const yearly=Math.max(0,Number(annualVar)||0);
  if(!target) return null;
  if(value>=target) return 0;
  const rate=yearly>0 ? Math.pow(1+yearly/100,1/12)-1 : 0;
  if(aporte<=0 && rate<=0) return null;
  for(let m=1;m<=600;m++){
    value = value * (1 + rate) + aporte;
    if(value>=target) return m;
  }
  return null;
}
function formatGoalMonths(months){
  if(months===0) return 'agora';
  if(months===null||months===undefined) return 'sem estimativa';
  const y=Math.floor(months/12);
  const m=months%12;
  const parts=[];
  if(y) parts.push(`${y} ano${y>1?'s':''}`);
  if(m) parts.push(`${m} mês${m>1?'es':''}`);
  return parts.length?parts.join(' e '):'menos de 1 mês';
}
function goalProgressText(current,target){
  const t=Number(target)||0;
  const c=Number(current)||0;
  const falta=Math.max(0,t-c);
  const prog=t>0?Math.min(100,(c/t)*100):0;
  return {falta,prog};
}
const ALLOC_CHOICES = ['Ação','FII','ETF','BDR','Renda Fixa','Stock','Reit','Fundos de Investimento'];
const ALLOC_COLORS = ['#4f8cff','#7cfc9a','#ffd86b','#ff6b81','#8b5cf6','#22c55e','#38bdf8','#f59e0b'];
function normalizeAllocationItems(items){
  const defaults = [
    {type:'FII', pct:40},
    {type:'ETF', pct:20},
    {type:'Ação', pct:25},
    {type:'BDR', pct:5},
    {type:'Renda Fixa', pct:10},
  ];
  const src = Array.isArray(items)
    ? items
    : (items && typeof items==='object' ? Object.entries(items).map(([type,pct])=>({type,pct})) : defaults);
  const seen = new Set();
  const out = src.map(it=>({
    type: normalizeType(it?.type||it?.label||'',''),
    pct: Math.max(0, Number(it?.pct ?? it?.value ?? it?.percent ?? it?.weight) || 0)
  })).filter(it=>{
    if(!it.type || seen.has(it.type)) return false;
    seen.add(it.type);
    return true;
  });
  return out.length ? out : defaults;
}

}

function normalizeAllocationGoal(){
  const items=allocationGoalItems();
  if(!items.length) return toast('Adicione ao menos uma categoria antes de normalizar.');
  const total=items.reduce((s,it)=>s+Number(it.pct||0),0);
  if(total<=0){
    const share=100/items.length;
    let acc=0;
    items.forEach((it,idx)=>{
      if(idx===items.length-1) it.pct=Number((100-acc).toFixed(1));
      else{
        const v=Number(share.toFixed(1));
        it.pct=v;
        acc+=v;
      }
    });
  }else{
    let acc=0;
    items.forEach((it,idx)=>{
      if(idx===items.length-1) it.pct=Number((100-acc).toFixed(1));
      else{
        const v=Number(((Number(it.pct)||0)/total*100).toFixed(1));
        it.pct=v;
        acc+=v;
      }
    });
  }
  saveAllocationGoalItems(items);
  toast('✅ Distribuição normalizada para 100%');
}

function rentabilidadeTab(){
  const bench=String(S.rentBench||'CDI');
  const type=String(S.rentType||'all');
  const period=String(S.rentPeriod||'all');
  const data=rentabilityHistory(type, period, bench);
  const current=data.current || {cumReturn:0, delta:0, costBasis:0, currentValue:0, proventos:0};
  const benchNow=data.currentBench || 0;
  const gap=current.cumReturn - benchNow;
  const return12m=data.return12m || 0;
  const currentMonth=current.delta || 0;
  const provCurrent=Number(current.proventos)||0;
  const yearsList=(data.years||[]).filter(r=>Number.isFinite(Number(r.annual)));
  const bestYear=yearsList.reduce((best,row)=>!best || Number(row.annual||-999)>Number(best.annual||-999)?row:best,null);
  const worstYear=yearsList.reduce((worst,row)=>!worst || Number(row.annual||999)<Number(worst.annual||999)?row:worst,null);
  const assetsByValue=[...S.assets].map(a=>({
    ticker:a.ticker,
    value:(Number(a.qty)||0)*(Number(a.current_price)||0),
    dy:Number(a.dy)||0,
    type:normalizeType(a.type||'Ação','Ação'),
    sector:String(a.sector||'').trim()||'—'
  })).sort((a,b)=>b.value-a.value);
  const topAsset=assetsByValue[0];
  const top3Value=assetsByValue.slice(0,3).reduce((s,a)=>s+a.value,0);
  const top3Share=data.current?.currentValue>0 ? (top3Value/(Number(data.current.currentValue)||top3Value))*100 : 0;
  const actualByType=S.assets.reduce((acc,a)=>{
    const ty=normalizeType(a.type||'Ação','Ação');
    const v=(Number(a.qty)||0)*(Number(a.current_price)||0);
    acc[ty]=(acc[ty]||0)+v;
    return acc;
  },{});
  const allocItems=allocationGoalItems();
  const allocTarget=Object.fromEntries(allocItems.map(it=>[it.type, Number(it.pct)||0]));
  const allocWarning=Object.keys(allocTarget).map(ty=>{
    const total=Object.values(actualByType).reduce((s,v)=>s+v,0);
    const actual=total>0 ? ((actualByType[ty]||0)/total)*100 : 0;
    const diff=actual-(allocTarget[ty]||0);
    return {ty, actual, target:allocTarget[ty]||0, diff};
  }).sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff))[0];
  const sideCards=[
    {
      title:'Rentabilidade total',
      value:fmtP(current.cumReturn||0),
      foot:`Inclui proventos recebidos · ${gap>=0?'Acima':'Abaixo'} do ${bench}: ${fmtP(gap||0)}`,
      color:'#34d399',
      icon:'📈'
    },
    {
      title:'Últimos 12 meses',
      value:fmtP(return12m||0),
      foot:`Variação acumulada no recorte de 12 meses · proventos: ${fmt(provCurrent)}`,
      color:'#60a5fa',
      icon:'🗓️'
    },
    {
      title:'Último mês',
      value:fmtP(currentMonth||0),
      foot:'Mudança estimada no fechamento do mês',
      color:(currentMonth||0)>=0?'#34d399':'#f87171',
      icon:'📅'
    },
  ];
  const concentrationNote=topAsset
    ? `Concentração: top 3 com ${top3Share.toFixed(1)}% da carteira. Maior posição: ${topAsset.ticker} com ${fmt(topAsset.value)} (${normalizeType(topAsset.type||'Ação','Ação')}).`
    : 'Concentração: sem posições ainda.';

  const chartLabels=(data.view.length?data.view:data.points).map(p=>p.label);
  const chartSeries=[
    {name:'Carteira', values:(data.view.length?data.view:data.points).map(p=>p.cumReturn||0), color:'#8da2ff', fill:'rgba(141,162,255,.12)', width:2.5, points:false},
    {name:bench, values:data.benchSeries.length?data.benchSeries:rentBenchSeries((data.view.length?data.view:data.points).length, bench), color:'#fbbf24', width:2.2, points:false},
  ];

  const yearsRows=(data.years||[]).map(row=>{
    const cells=row.months.map((p,idx)=>{
      if(!p) return `<td style="color:#2e3f58">-</td>`;
      const v=p.delta||0;
      return `<td class="${v>=0?'gn':'rd'}" style="font-weight:${Math.abs(v)>0.005?700:500}">${fmtP(v)}</td>`;
    }).join('');
    return `<tr>

function calcRebalance(){
  const aporte=Number(document.getElementById('reb-val')?.value)||0;
  const out=document.getElementById('reb-out'); if(!out) return;
  if(aporte<=0){out.innerHTML='<div class="es" style="background:#0d111e;border:1px solid #161e2e;border-radius:12px">Digite um valor maior que zero.</div>';return;}
  const total=S.assets.reduce((s,a)=>s+a.qty*a.current_price,0);
  if(!S.assets.length||total<=0){out.innerHTML='<div class="es" style="background:#0d111e;border:1px solid #161e2e;border-radius:12px">Ainda não há ativos suficientes.</div>';return;}
  const allocItems=allocationGoalItems();
  const allocTarget=Object.fromEntries(allocItems.map(it=>[it.type, Number(it.pct)||0]));
  const allocActual = {};
  S.assets.forEach(a=>{
    const type=normalizeType(a.type||'Ação','Ação');
    const value=(Number(a.qty)||0)*(Number(a.current_price)||0);
    allocActual[type]=(allocActual[type]||0)+value;
  });
  Object.keys(allocActual).forEach(k=>{ allocActual[k] = total>0 ? (allocActual[k]/total)*100 : 0; });
  let list=S.assets.map(a=>{
    const valor=a.qty*a.current_price,peso=valor/total*100,ideal=Number(a.ideal_pct)||0,falta=ideal>0?Math.max(0,ideal-peso):0;
    const rent=a.avg_price>0?((a.current_price-a.avg_price)/a.avg_price)*100:0;
    const type=normalizeType(a.type||'Ação','Ação');
    const typeTarget=Number(allocTarget[type]||0);
    const typeActual=Number(allocActual[type]||0);
    const typeGap=typeTarget-typeActual;
    let score=0,motivos=[];
    if(ideal>0&&falta>0){score+=falta*4;motivos.push(`abaixo do ideal em ${falta.toFixed(1)} p.p.`);}
    if(ideal===0&&peso<10){score+=(10-peso)*1.2;motivos.push('baixo peso');}
    if(rent<0){score+=Math.min(20,Math.abs(rent))*1.1;motivos.push(`queda vs PM (${fmtP(rent)})`);}
    if((Number(a.dy)||0)>6){score+=(Number(a.dy)||0)*0.8;motivos.push(`DY ${a.dy}%`);}
    if(typeTarget>0){
      if(typeGap>0){ score += typeGap*3; motivos.push(`${type} abaixo da meta (${typeGap.toFixed(1)} p.p.)`); }
      else if(typeGap<0){ score -= Math.min(20, Math.abs(typeGap)*1.2); motivos.push(`${type} acima da meta (${Math.abs(typeGap).toFixed(1)} p.p.)`); }
    }
    if(peso>20){score-=25;motivos.push('peso já alto');}
    return{...a,valor,peso,ideal,rent,score,motivos};
  }).filter(a=>a.score>0).sort((a,b)=>b.score-a.score).slice(0,4);
  if(!list.length) list=[...S.assets].map(a=>({...a,valor:a.qty*a.current_price,peso:(a.qty*a.current_price/total*100),ideal:Number(a.ideal_pct)||0,rent:0,score:1,motivos:['menor concentração']})).sort((a,b)=>a.peso-b.peso).slice(0,3);
  const sum=list.reduce((s,a)=>s+a.score,0)||1;
  const rows=list.map(a=>{
    const val=aporte*(a.score/sum),qtd=a.current_price>0?Math.floor(val/a.current_price):0,divMes=val*((Number(a.dy)||0)/100)/12;
    return`<tr><td style="font-weight:700;color:#e2eaf6">${esc(a.ticker)}</td><td>${esc(normalizeType(a.type||'Ação','Ação'))}</td><td class="mu">${esc(a.sector||'—')}</td><td>${a.peso.toFixed(1)}%</td><td>${a.ideal?a.ideal.toFixed(1)+'%':'—'}</td><td class="${a.rent<0?'rd':'gn'}">${fmtP(a.rent)}</td><td class="gn" style="font-weight:700">${fmt(val)}</td><td>${qtd}</td><td class="am">+${fmt(divMes)}/mês</td><td class="mu">${esc(a.motivos.join(', '))}</td></tr>`;
  }).join('');
  out.innerHTML=`<div class="tw"><div class="ts"><table><thead><tr><th>Ativo</th><th>Tipo</th><th>Setor</th><th>% Cart.</th><th>% Ideal</th><th>Rentab.</th><th>Sugestão</th><th>Qtd aprox.</th><th>Dividendo</th><th>Motivo</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

  if(!S.assets.length){ S.aiText='Cadastre seus ativos primeiro para gerar uma análise.'; render(); return; }
  const focus=String(S.aiFocus||'geral');
  const porTipo={},por=S.assets.map(a=>({ticker:a.ticker,type:a.type,valor:a.qty*a.current_price,divMes:(a.qty*a.current_price*(a.dy/100))/12,dy:Number(a.dy)||0,var:a.avg_price>0?((a.current_price-a.avg_price)/a.avg_price)*100:0,sector:String(a.sector||'').trim()||'—'})).sort((a,b)=>b.valor-a.valor);
  por.forEach(a=>{const ty=normalizeType(a.type||'Ação','Ação'); porTipo[ty]=(porTipo[ty]||0)+a.valor;});
  const maior=por[0],maiorPct=tC>0?(maior.valor/tC)*100:0;
  const pior=por[por.length-1];
  const top3=por.slice(0,3);
  const top3Pct=tC>0?(top3.reduce((s,a)=>s+a.valor,0)/tC)*100:0;
  const fiisPct=tC>0?((porTipo['FII']||0)/tC)*100:0,acoesPct=tC>0?((porTipo['Ação']||0)/tC)*100:0;
  const divGoal=Number(S.divGoal)||0,faltaDiv=Math.max(0,divGoal-mD);
  const alvoPat=divGoal>0&&avgDY>0?(divGoal*12)/(avgDY/100):0;
  const lucroTotal=tG + rec.total;
  const retornoTotalPct=tI>0?(lucroTotal/tI)*100:0;
  const allocItems=allocationGoalItems();
  const allocTarget=Object.fromEntries(allocItems.map(it=>[it.type, Number(it.pct)||0]));
  const atualByType=S.assets.reduce((acc,a)=>{
    const ty=normalizeType(a.type||'Ação','Ação');
    const v=(Number(a.qty)||0)*(Number(a.current_price)||0);
    acc[ty]=(acc[ty]||0)+v;
    return acc;
  },{});
  const allocTotal=Object.values(atualByType).reduce((s,v)=>s+v,0);
  const allocDiffs=Object.keys(allocTarget).map(ty=>{
    const actual=allocTotal>0 ? ((atualByType[ty]||0)/allocTotal)*100 : 0;
    return {type:ty, target:allocTarget[ty], actual, diff:actual-(allocTarget[ty]||0)};
  }).sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
  const worstAlloc=allocDiffs[0];
  const benchmark=String(S.rentBench||'CDI');
  const rentData=rentabilityHistory(String(S.rentType||'all'), String(S.rentPeriod||'all'), benchmark);
  const rentGap=(rentData.current?.cumReturn||0)-(rentData.currentBench||0);
  const L=[];
  L.push('📊 ANÁLISE RÁPIDA DA CARTEIRA');
  L.push(`Patrimônio atual: ${fmt(tC)} | Resultado total: ${fmtP(retornoTotalPct)}`);
  L.push(`Lucro total: ${fmt(lucroTotal)} (ganho de capital + proventos)`);
  L.push(`Renda passiva estimada: ${fmt(mD)}/mês (${fmt(aD)}/ano)`);
  L.push(`Proventos recebidos: ${fmt(rec.mes)} no mês · ${fmt(rec.ano)} no ano · ${fmt(rec.total)} total`);
  L.push(`DY médio da carteira: ${avgDY.toFixed(2)}%`);
  L.push(`Top 3 posições concentram ${top3Pct.toFixed(1)}% da carteira.`);
  if(focus==='renda') L.push(`Foco atual: renda passiva e proventos.`);
  if(focus==='rebalancear') L.push(`Foco atual: rebalanceamento e aportes abaixo da meta.`);
  if(focus==='concentracao') L.push(`Foco atual: concentração e risco da carteira.`);
  L.push('');
  L.push('⚖️ ALOCAÇÃO ATUAL');
  Object.entries(porTipo).sort((a,b)=>b[1]-a[1]).forEach(([tipo,valor])=>L.push(`• ${tipo}: ${((valor/tC)*100).toFixed(1)}% (${fmt(valor)})`));
  if(worstAlloc) L.push(`• Maior desvio da meta: ${worstAlloc.type} com ${worstAlloc.diff>=0?'+':''}${worstAlloc.diff.toFixed(1)} p.p.`);
  L.push('');
  L.push('🔎 O QUE OBSERVAR');
  if(maiorPct>20) L.push(`• Concentração alta em ${maior.ticker}: ${maiorPct.toFixed(1)}% da carteira.`);
  else L.push(`• Maior posição: ${maior.ticker} com ${maiorPct.toFixed(1)}% — concentração sob controle.`);
  if(S.assets.length<8) L.push('• Poucos ativos. Para renda passiva consistente, 10+ ativos de setores diferentes ajudam a reduzir risco.');
  if(fiisPct>60) L.push('• FIIs com peso muito alto (>60%). Isso aumenta a sensibilidade a juros e imóveis.');
  if(acoesPct>70) L.push('• Ações com peso muito alto. A renda tende a oscilar mais com resultados trimestrais.');
  if(avgDY>12) L.push('• DY médio elevado (>12%). Vale conferir se os rendimentos são recorrentes e não pontuais.');
  if(avgDY>0&&avgDY<5) L.push('• DY médio baixo. Novos aportes em ativos de renda podem acelerar a renda passiva.');
  if(rentGap!==0) L.push(`• ${rentGap>=0?'Acima':'Abaixo'} do ${benchmark} em ${fmtP(rentGap)} no recorte atual de rentabilidade.`);
  L.push('');
  if(divGoal>0){
    L.push(`💰 OBJETIVO: ${fmt(divGoal)}/mês`);
    if(mD>=divGoal) L.push(`• ✅ Objetivo atingido! Foco agora é sustentabilidade e diversificação da renda.`);
    else{ L.push(`• Falta ${fmt(faltaDiv)}/mês para o objetivo.`); if(alvoPat>0) L.push(`• Patrimônio estimado para atingir o objetivo com DY atual: ${fmt(alvoPat)} (falta ${fmt(Math.max(0,alvoPat-tC))})`); }
    L.push('');
  }
  L.push('✅ PRIORIDADES PARA O PRÓXIMO APORTE');
  if(allocDiffs.length){
    allocDiffs.slice(0,3).forEach(a=>{
      if(Math.abs(a.diff)<0.5) return;
      if(a.diff<0) L.push(`• Reforçar ${a.type}: está ${Math.abs(a.diff).toFixed(1)} p.p. abaixo da meta.`);
      else L.push(`• Segurar ${a.type}: está ${a.diff.toFixed(1)} p.p. acima da meta.`);
    });
  }
  if(maiorPct>20) L.push(`• Evite aumentar ${maior.ticker} agora; ela já lidera a concentração.`);
  if(top3Pct>70) L.push('• Top 3 posições muito concentradas. Considere distribuir os próximos aportes entre categorias abaixo da meta.');
  if(pior) L.push(`• Posição menor e potencialmente negligenciada: ${pior.ticker} (${fmt(pior.valor)}) pode merecer revisão.`);
  if(focus==='renda'){
    L.push('• Priorize ativos com proventos recorrentes e boa previsibilidade de fluxo.');
    if(avgDY>0) L.push(`• Com DY médio atual de ${avgDY.toFixed(2)}%, a renda estimada continua sensível a novas compras nessa taxa.`);
  }
  if(focus==='rebalancear'){
    const under=allocDiffs.filter(a=>a.diff<0).sort((a,b)=>a.diff-b.diff)[0];
    if(under) L.push(`• Comece pelo maior déficit: ${under.type} está ${Math.abs(under.diff).toFixed(1)} p.p. abaixo da meta.`);
    L.push('• Seus próximos aportes podem servir para aproximar a carteira do desenho-alvo sem vender nada.');
  }
  if(focus==='concentracao'){
    L.push(`• ${top3Pct.toFixed(1)}% da carteira está no top 3. Vale olhar se isso está confortável para seu perfil.`);
    if(maiorPct>20) L.push(`• ${maior.ticker} sozinho já representa ${maiorPct.toFixed(1)}%.`);
  }
  L.push('• Registre o motivo de cada compra na aba Aportes para acompanhar a estratégia ao longo do tempo.');
  if(focus==='renda') L.push('• Quando olhar um ativo novo, compare sempre contribuição mensal estimada, volatilidade e peso na carteira.');
  L.push('');
  L.push('⚠️ Análise automática. Não constitui recomendação de investimento. Consulte um profissional habilitado.');
  S.aiText=L.join('\n'); render();
}

function bind(){
  document.querySelectorAll('.fc input:not([disabled]),.fc select').forEach(el=>{
    el.addEventListener('keydown',e=>{ if(e.key==='Enter'){ if(S.showA) svA(); else if(S.showP) svP(); else if(S.showD) svD(); } });
  });
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
load();
initFirebase();
if(S.aportes.length) syncAssetsFromAportes(false); else render();
fetchQuotes(false);
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) fetchQuotes(false); });
window.addEventListener('focus',()=>fetchQuotes(false));
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  PWA.prompt=e;
  render();
});
window.addEventListener('appinstalled',()=>{
  PWA.prompt=null;
  PWA.installed=true;
  toast('App instalado no dispositivo!');
  render();
});
if('serviceWorker' in navigator && location.protocol!=='file:'){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(reg=>{
      if(reg && reg.update) reg.update().catch(()=>{});
    }).catch(()=>{});
  });
}
setInterval(()=>{
  S.cd=Math.max(0,S.cd-1);
  if(S.cd<=0){ S.cd=QI; fetchQuotes(false); return; }
  const el=document.getElementById('cd-span');
  if(el) el.textContent=S.cd;
},1000);
</script>
