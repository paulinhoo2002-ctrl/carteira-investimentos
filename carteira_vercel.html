<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>📈 Carteira de Investimentos</title>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;font-size:14px}
button{cursor:pointer;font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:#161b22}::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
.hdr{background:#161b22;border-bottom:1px solid #30363d;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.tabs{background:#161b22;border-bottom:1px solid #30363d;padding:0 16px;display:flex;overflow-x:auto;position:sticky;top:57px;z-index:9}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:#8b949e;padding:10px 14px;font-size:13px;white-space:nowrap;transition:all .15s}
.tab:hover{color:#c9d1d9}.tab.on{border-bottom-color:#818cf8;color:#a5b4fc;font-weight:700}
.wrap{padding:16px;max-width:1100px;margin:0 auto}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:16px}
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:14px 16px}
.card.al{border-left:3px solid}
.cl{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.cv{font-size:19px;font-weight:700;margin-bottom:2px}.cs{font-size:11px;color:#6e7681}
.tw{background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden}
.ts{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:540px}
thead tr{background:#1c2128}
th{padding:9px 12px;text-align:left;color:#8b949e;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #21262d}
td{padding:9px 12px;border-bottom:1px solid #21262d;color:#c9d1d9}
tbody tr{transition:background .1s}tbody tr:hover{background:#1c2128}
.bdg{border-radius:4px;padding:2px 7px;font-size:11px;font-weight:600}
.bac{background:#0d2618;color:#34d399}.bfi{background:#0c2233;color:#60a5fa}
.bet{background:#1a1433;color:#a78bfa}.bxx{background:#1c2128;color:#8b949e}
.btn{border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.8}
.bp{background:#312e81;color:#c7d2fe}.bsv{background:#064e3b;color:#6ee7b7}
.bgh{background:#1c2128;color:#8b949e;border:1px solid #30363d}
.bi{background:transparent;border:1px solid #30363d;border-radius:6px;padding:3px 8px;color:#8b949e;font-size:13px}
.bdi{background:transparent;border:1px solid #7f1d1d;border-radius:6px;padding:3px 8px;color:#f87171;font-size:13px}
.fc{background:#1c2128;border:1px solid #4c1d95;border-radius:12px;padding:16px;margin-bottom:14px}
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.fl{font-size:11px;color:#8b949e;margin-bottom:4px}
input,select{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:7px 10px;color:#e6edf3;font-size:13px;width:100%}
input:focus,select:focus{border-color:#6366f1;outline:none}
input::placeholder{color:#6e7681}select option{background:#0d1117}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.cg{grid-template-columns:1fr}}
.cc{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:14px 16px}
.ct{font-size:13px;font-weight:500;color:#8b949e;margin-bottom:12px}
.db{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.dbl{font-size:12px;color:#c9d1d9;min-width:60px;font-weight:600}
.dbt{flex:1;background:#21262d;border-radius:4px;height:7px;overflow:hidden}
.dbf{height:100%;border-radius:4px}.dbv{font-size:12px;color:#8b949e;min-width:68px;text-align:right}
.pleg{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.pli{display:flex;align-items:center;gap:5px;font-size:12px;color:#8b949e}
.pd{width:9px;height:9px;border-radius:2px}
.gn{color:#34d399}.rd{color:#f87171}.am{color:#fbbf24}.pu{color:#818cf8}.bl{color:#60a5fa}.mu{color:#8b949e}.di{color:#6e7681}
.bwr{background:#21262d;border-radius:3px;height:5px;width:70px;overflow:hidden;display:inline-block}
.bfr{height:100%;background:#fbbf24}
.es{text-align:center;padding:36px 20px;color:#8b949e}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.st{font-size:15px;font-weight:700}
.qdot{width:7px;height:7px;border-radius:50%;background:#34d399;display:inline-block}
.qdot.spin{background:#fbbf24;animation:pulse 1s ease-in-out infinite}
.aic{background:#1c2128;border:1px solid #4c1d95;border-radius:12px;padding:18px}
.air{font-size:13px;line-height:1.8;color:#c9d1d9;white-space:pre-wrap}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes rota{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes ld{0%{left:-60%}100%{left:110%}}
.spn{display:inline-block;animation:rota 1s linear infinite}
</style>
</head>
<body>
<div id="root">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px">
    <div style="font-size:44px">📈</div>
    <div style="color:#8b949e">Conectando...</div>
    <div style="width:180px;height:3px;background:#21262d;border-radius:2px;overflow:hidden;position:relative">
      <div style="position:absolute;height:100%;width:60%;background:#818cf8;border-radius:2px;animation:ld 1.2s ease-in-out infinite"></div>
    </div>
  </div>
</div>
<script>
// ══════════════════════════════════════════════
//  CONFIGURAÇÃO
// ══════════════════════════════════════════════
const SB_URL   = 'https://lubnzqeuclzoiwapbcbgf.supabase.co';
const SB_KEY   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1Ym56cWV1Y2x6b2l3YXBjYmdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMzk2NjUsImV4cCI6MjA5NTgxNTY2NX0.l8Zqagui3dY2pppZvbdaajDX7-f_yXBLQXWJo1CTaVw';
const BRAPI    = 'bnZzRLy7SmaCMprZVTDqD7';
const QI       = 60; // segundos entre atualizações de cotação

// ══════════════════════════════════════════════
//  CLIENTE SUPABASE
// ══════════════════════════════════════════════
const db = supabase.createClient(SB_URL, SB_KEY);

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let S = {
  assets:[], aportes:[], quotes:{}, lastUpdate:null,
  tab:'dashboard', loading:true, qLoad:false, cd:QI,
  aiText:'', aiLoad:false,
  editId:null, showA:false, showP:false, _fa:null, _fp:null,
};

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
const fmt  = v => v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fmtP = v => `${v>=0?'+':''}${v.toFixed(2)}%`;
const esc  = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
const CLRS = ['#818cf8','#34d399','#fbbf24','#f472b6','#60a5fa','#a3e635','#fb923c','#a78bfa'];
const bdg  = t => t==='Ação'?'bac':t==='FII'?'bfi':t==='ETF'?'bet':'bxx';

function cx(){
  const tI=S.assets.reduce((s,a)=>s+a.qty*a.avg_price,0);
  const tC=S.assets.reduce((s,a)=>s+a.qty*a.current_price,0);
  const tG=tC-tI, tGP=tI>0?(tG/tI)*100:0;
  const mD=S.assets.reduce((s,a)=>s+(a.qty*a.current_price*(a.dy/100))/12,0);
  const aD=mD*12, avgDY=tC>0?(aD/tC)*100:0;
  return{tI,tC,tG,tGP,mD,aD,avgDY};
}

// ══════════════════════════════════════════════
//  BANCO DE DADOS (Supabase)
// ══════════════════════════════════════════════
async function loadData(){
  const [{data:a,error:e1},{data:p,error:e2}] = await Promise.all([
    db.from('assets').select('*').order('ticker'),
    db.from('aportes').select('*').order('id',{ascending:false})
  ]);
  if(e1) throw e1;
  if(e2) throw e2;
  S.assets=a||[]; S.aportes=p||[];
}

// ══════════════════════════════════════════════
//  COTAÇÕES (brapi.dev)
// ══════════════════════════════════════════════
async function fetchQuotes(){
  if(!S.assets.length) return;
  S.qLoad=true; render();
  const tks=[...new Set(S.assets.map(a=>a.ticker))].join(',');
  try{
    const r = await fetch(`https://brapi.dev/api/quote/${tks}?token=${BRAPI}`);
    const j = await r.json();
    if(j.results){
      j.results.forEach(q=>{
        if(!q.regularMarketPrice) return;
        S.quotes[q.symbol]={price:q.regularMarketPrice, change:q.regularMarketChangePercent||0};
        const a=S.assets.find(x=>x.ticker===q.symbol);
        if(a){ a.current_price=q.regularMarketPrice; db.from('assets').update({current_price:q.regularMarketPrice}).eq('id',a.id); }
      });
      S.lastUpdate=new Date();
    }
  }catch(e){ console.warn('brapi erro:',e); }
  S.qLoad=false; S.cd=QI; render();
}

// ══════════════════════════════════════════════
//  PIE CHART SVG
// ══════════════════════════════════════════════
function pie(data){
  const tot=data.reduce((s,d)=>s+d.value,0);
  if(!tot) return'<div class="di" style="text-align:center;padding:20px 0;font-size:13px">Sem dados</div>';
  let p='',a=-Math.PI/2;
  data.forEach((d,i)=>{
    const ang=(d.value/tot)*2*Math.PI;
    const [x1,y1]=[80+68*Math.cos(a),80+68*Math.sin(a)];
    const [x2,y2]=[80+68*Math.cos(a+ang),80+68*Math.sin(a+ang)];
    p+=`<path d="M80,80 L${x1.toFixed(1)},${y1.toFixed(1)} A68,68 0 ${ang>Math.PI?1:0},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${CLRS[i%CLRS.length]}" stroke="#0d1117" stroke-width="1.5"/>`;
    a+=ang;
  });
  return`<svg viewBox="0 0 160 160" width="140" height="140" style="display:block;margin:0 auto">${p}</svg>`;
}

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function render(){
  document.getElementById('root').innerHTML = S.loading ? tplLoad() : tplApp();
  if(!S.loading) bind();
}

function tplLoad(){
  return`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px">
    <div style="font-size:44px">📈</div><div style="color:#8b949e">Conectando ao banco de dados...</div>
    <div style="width:180px;height:3px;background:#21262d;border-radius:2px;overflow:hidden;position:relative">
      <div style="position:absolute;height:100%;width:60%;background:#818cf8;border-radius:2px;animation:ld 1.2s ease-in-out infinite"></div>
    </div></div>`;
}

function tplApp(){
  const now=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
  const lu=S.lastUpdate?S.lastUpdate.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}):'—';
  const TABS=[['dashboard','📊 Dashboard'],['ativos','💼 Ativos'],['aportes','💰 Aportes'],['dividendos','📅 Dividendos'],['ia','🤖 IA']];
  return`
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:22px">📈</span>
      <div><div style="font-size:16px;font-weight:700">Carteira de Investimentos</div>
      <div style="font-size:11px;color:#8b949e">Sincronizado em tempo real</div></div>
    </div>
    <div style="text-align:right">
      <div style="font-size:11px;color:#6e7681">${now}</div>
      <div style="display:flex;align-items:center;gap:5px;justify-content:flex-end;margin-top:3px">
        <span class="qdot${S.qLoad?' spin':''}"></span>
        <span style="font-size:10px;color:#6e7681">Cotações ${lu} · próx. ${S.cd}s</span>
      </div>
    </div>
  </div>
  <div class="tabs">${TABS.map(([k,l])=>`<button class="tab${S.tab===k?' on':''}" onclick="go('${k}')">${l}</button>`).join('')}</div>
  <div class="wrap">${content()}</div>`;
}

function content(){
  if(S.tab==='dashboard') return dash();
  if(S.tab==='ativos')    return ativos();
  if(S.tab==='aportes')   return aportes_tab();
  if(S.tab==='dividendos')return divs();
  if(S.tab==='ia')        return ia();
  return'';
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────
function dash(){
  const{tI,tC,tG,tGP,mD,aD,avgDY}=cx();
  const byType={};
  S.assets.forEach(a=>{const v=a.qty*a.current_price;byType[a.type]=(byType[a.type]||0)+v;});
  const ad=Object.entries(byType).map(([n,v])=>({name:n,value:v}));
  const p=pie(ad);
  const leg=ad.map((d,i)=>`<div class="pli"><div class="pd" style="background:${CLRS[i%CLRS.length]}"></div><span>${esc(d.name)} ${tC>0?((d.value/tC)*100).toFixed(0):'0'}%</span></div>`).join('');
  const sd=[...S.assets].sort((a,b)=>((b.qty*b.current_price*(b.dy/100))/12)-((a.qty*a.current_price*(a.dy/100))/12));
  const maxD=sd.length?Math.max(...sd.map(a=>(a.qty*a.current_price*(a.dy/100))/12)):0;
  const bars=sd.map((a,i)=>{const dm=(a.qty*a.current_price*(a.dy/100))/12;const pct=maxD>0?(dm/maxD)*100:0;
    return`<div class="db"><div class="dbl">${esc(a.ticker)}</div><div class="dbt"><div class="dbf" style="width:${pct.toFixed(0)}%;background:${CLRS[i%CLRS.length]}"></div></div><div class="dbv am">${fmt(dm)}</div></div>`;
  }).join('');
  return`<div class="cards">
    <div class="card al" style="border-left-color:#818cf8"><div class="cl">💼 Patrimônio</div><div class="cv pu">${fmt(tC)}</div><div class="cs">Investido: ${fmt(tI)}</div></div>
    <div class="card al" style="border-left-color:${tG>=0?'#34d399':'#f87171'}"><div class="cl">📈 Resultado</div><div class="cv" style="color:${tG>=0?'#34d399':'#f87171'}">${fmt(tG)}</div><div class="cs">${fmtP(tGP)}</div></div>
    <div class="card al" style="border-left-color:#fbbf24"><div class="cl">💰 Div. / mês</div><div class="cv am">${fmt(mD)}</div><div class="cs">Anual: ${fmt(aD)}</div></div>
    <div class="card al" style="border-left-color:#60a5fa"><div class="cl">% DY médio</div><div class="cv bl">${avgDY.toFixed(2)}%</div><div class="cs">${S.assets.length} ativos</div></div>
  </div>
  <div class="cg">
    <div class="cc"><div class="ct">Alocação por tipo</div>${p}<div class="pleg">${leg}</div></div>
    <div class="cc"><div class="ct">Dividendos mensais</div>${bars||'<div class="di" style="font-size:13px;padding:20px 0">Cadastre seus ativos.</div>'}</div>
  </div>`;
}

// ── ATIVOS ─────────────────────────────────────────────────────────────────
function formA(){
  if(!S.showA) return'';
  const f=S._fa||{};
  return`<div class="fc">
    <div style="font-size:14px;font-weight:600;margin-bottom:12px;color:#c4b5fd">${S.editId?'Editar ativo':'Novo ativo'}</div>
    <div class="fg">
      <div><div class="fl">Ticker</div><input id="f-ti" placeholder="ex: ITSA4" value="${esc(f.ticker||'')}" oninput="this.value=this.value.toUpperCase()"></div>
      <div><div class="fl">Quantidade</div><input id="f-qt" type="number" placeholder="100" value="${esc(f.qty||'')}"></div>
      <div><div class="fl">Preço médio</div><input id="f-ap" type="number" step="0.01" placeholder="32.50" value="${esc(f.avg_price||'')}"></div>
      <div><div class="fl">Cotação atual</div><input id="f-cp" type="number" step="0.01" placeholder="38.00" value="${esc(f.current_price||'')}"></div>
      <div><div class="fl">DY anual %</div><input id="f-dy" type="number" step="0.1" placeholder="8.5" value="${esc(f.dy||'')}"></div>
      <div><div class="fl">Setor</div><input id="f-se" placeholder="ex: Petróleo" value="${esc(f.sector||'')}"></div>
      <div><div class="fl">Tipo</div><select id="f-ty">${['Ação','FII','ETF','Renda Fixa','BDR','Crypto'].map(t=>`<option ${(f.type||'Ação')===t?'selected':''}>${t}</option>`).join('')}</select></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn bsv" onclick="svA()">Salvar</button>
      <button class="btn bgh" onclick="clA()">Cancelar</button>
    </div>
  </div>`;
}

function ativos(){
  const rows=S.assets.map(a=>{
    const vr=((a.current_price-a.avg_price)/a.avg_price)*100;
    const dm=(a.qty*a.current_price*(a.dy/100))/12;
    const q=S.quotes[a.ticker];
    const qtag=q?`<span style="font-size:10px;color:${q.change>=0?'#34d399':'#f87171'};margin-left:4px">${fmtP(q.change)}</span>`:'';
    return`<tr>
      <td style="font-weight:700;color:#e6edf3">${esc(a.ticker)}${qtag}</td>
      <td><span class="bdg ${bdg(a.type)}">${esc(a.type)}</span></td>
      <td class="mu">${esc(a.sector||'—')}</td>
      <td>${a.qty}</td>
      <td>R$ ${Number(a.avg_price).toFixed(2)}</td>
      <td style="font-weight:600;color:${a.current_price>=a.avg_price?'#34d399':'#f87171'}">R$ ${Number(a.current_price).toFixed(2)}</td>
      <td style="color:${vr>=0?'#34d399':'#f87171'};font-weight:600">${fmtP(vr)}</td>
      <td style="font-weight:600;color:#e6edf3">${fmt(a.qty*a.current_price)}</td>
      <td class="am">${fmt(dm)}</td>
      <td class="mu">${a.dy}%</td>
      <td><div style="display:flex;gap:4px">
        <button class="bi" onclick="edA(${a.id})">✏️</button>
        <button class="bdi" onclick="rmA(${a.id})">🗑️</button>
      </div></td>
    </tr>`;
  }).join('');
  return`<div class="sh"><div class="st">Minha carteira</div><button class="btn bp" onclick="tgA()">+ Adicionar ativo</button></div>
  ${formA()}
  <div class="tw"><div class="ts"><table>
    <thead><tr><th>Ticker</th><th>Tipo</th><th>Setor</th><th>Qtd</th><th>PM</th><th>Atual</th><th>Var.</th><th>Total</th><th>Div/mês</th><th>DY</th><th></th></tr></thead>
    <tbody>${rows||'<tr><td colspan="11" style="text-align:center;padding:24px;color:#6e7681">Nenhum ativo cadastrado.</td></tr>'}</tbody>
  </table></div></div>`;
}

// ── APORTES ────────────────────────────────────────────────────────────────
function formP(){
  if(!S.showP) return'';
  const f=S._fp||{};
  return`<div class="fc">
    <div style="font-size:14px;font-weight:600;margin-bottom:12px;color:#c4b5fd">Registrar aporte</div>
    <div class="fg">
      <div><div class="fl">Data</div><input id="p-dt" type="date" value="${esc(f.date||'')}"></div>
      <div><div class="fl">Ticker</div><input id="p-ti" placeholder="ex: MXRF11" value="${esc(f.ticker||'')}" oninput="this.value=this.value.toUpperCase()"></div>
      <div><div class="fl">Quantidade</div><input id="p-qt" type="number" placeholder="100" value="${esc(f.qty||'')}"></div>
      <div><div class="fl">Preço</div><input id="p-pr" type="number" step="0.01" placeholder="10.15" value="${esc(f.price||'')}"></div>
    </div>
    <div style="margin-top:10px"><div class="fl">Decisão / motivo</div><input id="p-dc" placeholder="ex: rebalanceamento, aproveitei queda, dividendos recebidos..." value="${esc(f.decision||'')}"></div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn bsv" onclick="svP()">Salvar</button>
      <button class="btn bgh" onclick="clP()">Cancelar</button>
    </div>
  </div>`;
}

function aportes_tab(){
  const tot=S.aportes.reduce((s,a)=>s+a.qty*a.price,0);
  const sum=S.aportes.length?`<div class="card" style="margin-bottom:12px;display:flex;gap:28px">
    <div><div class="cl">Total aportado</div><div style="font-size:18px;font-weight:700;color:#818cf8">${fmt(tot)}</div></div>
    <div><div class="cl">Operações</div><div style="font-size:18px;font-weight:700">${S.aportes.length}</div></div>
  </div>`:'';
  const rows=S.aportes.map(a=>`<tr>
    <td class="mu">${esc(a.date)}</td>
    <td style="font-weight:700;color:#e6edf3">${esc(a.ticker)}</td>
    <td>${a.qty}</td>
    <td>R$ ${Number(a.price).toFixed(2)}</td>
    <td class="gn" style="font-weight:600">${fmt(a.qty*a.price)}</td>
    <td class="mu">${esc(a.decision||'—')}</td>
    <td><button class="bdi" onclick="rmP(${a.id})">🗑️</button></td>
  </tr>`).join('');
  return`<div class="sh"><div class="st">Histórico de aportes</div><button class="btn bp" onclick="tgP()">+ Registrar aporte</button></div>
  ${formP()}
  ${!S.aportes.length
    ?`<div class="es">💰<br><br>Nenhum aporte registrado ainda.</div>`
    :`${sum}<div class="tw"><div class="ts"><table>
      <thead><tr><th>Data</th><th>Ticker</th><th>Qtd</th><th>Preço</th><th>Total</th><th>Decisão</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div></div>`}`;
}

// ── DIVIDENDOS ─────────────────────────────────────────────────────────────
function divs(){
  const{mD,aD,avgDY}=cx();
  const sd=[...S.assets].sort((a,b)=>((b.qty*b.current_price*(b.dy/100))/12)-((a.qty*a.current_price*(a.dy/100))/12));
  const rows=sd.map(a=>{
    const dm=(a.qty*a.current_price*(a.dy/100))/12;
    const pct=mD>0?(dm/mD)*100:0;
    return`<tr>
      <td style="font-weight:700;color:#e6edf3">${esc(a.ticker)}</td>
      <td>${esc(a.type)}</td><td>${a.qty}</td>
      <td>R$ ${Number(a.current_price).toFixed(2)}</td>
      <td class="am">${a.dy}%</td>
      <td class="am" style="font-weight:700">${fmt(dm)}</td>
      <td>${fmt(dm*12)}</td>
      <td><div style="display:flex;align-items:center;gap:7px">
        <div class="bwr"><div class="bfr" style="width:${Math.min(pct,100).toFixed(0)}%"></div></div>
        <span class="mu" style="font-size:11px">${pct.toFixed(1)}%</span>
      </div></td>
    </tr>`;
  }).join('');
  return`<div style="font-size:15px;font-weight:700;margin-bottom:14px">Projeção de dividendos</div>
  <div class="cards" style="margin-bottom:16px">
    <div class="card al" style="border-left-color:#fbbf24"><div class="cl">Estimativa do mês</div><div class="cv am">${fmt(mD)}</div></div>
    <div class="card al" style="border-left-color:#34d399"><div class="cl">Projeção anual</div><div class="cv gn">${fmt(aD)}</div></div>
    <div class="card al" style="border-left-color:#818cf8"><div class="cl">DY médio</div><div class="cv pu">${avgDY.toFixed(2)}%</div></div>
  </div>
  <div class="tw"><div class="ts"><table>
    <thead><tr><th>Ativo</th><th>Tipo</th><th>Qtd</th><th>Cotação</th><th>DY</th><th>Div. mês</th><th>Div. ano</th><th>% renda</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="8" style="text-align:center;padding:24px;color:#6e7681">Nenhum ativo.</td></tr>'}</tbody>
  </table></div></div>`;
}

// ── IA ─────────────────────────────────────────────────────────────────────
function ia(){
  const res=S.aiText
    ?`<div class="aic">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:18px">🤖</span><span style="font-size:14px;font-weight:600;color:#c4b5fd">Análise da IA</span></div>
      <div class="air">${esc(S.aiText)}</div>
      <div style="margin-top:14px;padding-top:12px;border-top:1px solid #21262d;font-size:11px;color:#6e7681">⚠️ Caráter informativo. Não constitui recomendação de investimento. Consulte um CFP/CNPI.</div>
    </div>`
    :(!S.aiLoad?`<div class="es" style="border:1px dashed #21262d;border-radius:12px;background:#161b22">🤖<br><br>Clique no botão para análise personalizada da sua carteira.</div>`:'');
  return`<div style="font-size:15px;font-weight:700;margin-bottom:4px">Sugestões com Inteligência Artificial</div>
  <div class="mu" style="font-size:13px;margin-bottom:16px">Análise e sugestões de rebalanceamento com base na sua carteira atual.</div>
  <button class="btn bp" onclick="getAI()" ${S.aiLoad?'disabled':''} style="display:flex;align-items:center;gap:8px;margin-bottom:18px;opacity:${S.aiLoad?.6:1}">
    <span ${S.aiLoad?'class="spn"':''}>${S.aiLoad?'⏳':'✨'}</span>${S.aiLoad?'Analisando...':'Analisar carteira com IA'}
  </button>${res}`;
}

// ══════════════════════════════════════════════
//  AÇÕES
// ══════════════════════════════════════════════
function go(t){ S.tab=t; render(); }

function tgA(){ S.showA=!S.showA; S.editId=null; S._fa={type:'Ação'}; render(); }
function clA(){ S.showA=false; S.editId=null; S._fa=null; render(); }
function edA(id){ const a=S.assets.find(x=>x.id===id); if(!a)return; S._fa={...a}; S.editId=id; S.showA=true; render(); }

async function svA(){
  const ti=document.getElementById('f-ti')?.value?.trim().toUpperCase();
  const qt=parseFloat(document.getElementById('f-qt')?.value);
  const ap=parseFloat(document.getElementById('f-ap')?.value);
  const cp=parseFloat(document.getElementById('f-cp')?.value)||ap;
  const dy=parseFloat(document.getElementById('f-dy')?.value)||0;
  const se=document.getElementById('f-se')?.value?.trim()||'';
  const ty=document.getElementById('f-ty')?.value||'Ação';
  if(!ti||isNaN(qt)||isNaN(ap)){ alert('Preencha Ticker, Quantidade e Preço Médio.'); return; }
  const row={ticker:ti,type:ty,sector:se,qty:qt,avg_price:ap,current_price:cp,dy};
  if(S.editId){ await db.from('assets').update(row).eq('id',S.editId); }
  else { await db.from('assets').insert({id:Date.now(),...row}); }
  S.showA=false; S.editId=null; S._fa=null;
  await loadData(); await fetchQuotes();
}

async function rmA(id){
  if(!confirm('Remover este ativo da carteira?')) return;
  await db.from('assets').delete().eq('id',id);
  await loadData(); render();
}

function tgP(){ S.showP=!S.showP; S._fp={}; render(); }
function clP(){ S.showP=false; S._fp=null; render(); }

async function svP(){
  const ti=document.getElementById('p-ti')?.value?.trim().toUpperCase();
  const qt=parseFloat(document.getElementById('p-qt')?.value);
  const pr=parseFloat(document.getElementById('p-pr')?.value);
  const dc=document.getElementById('p-dc')?.value?.trim()||'';
  let dt=document.getElementById('p-dt')?.value||'';
  if(dt){ const[y,m,d]=dt.split('-'); dt=`${d}/${m}/${y}`; }
  else { dt=new Date().toLocaleDateString('pt-BR'); }
  if(!ti||isNaN(qt)||isNaN(pr)){ alert('Preencha Ticker, Quantidade e Preço.'); return; }
  await db.from('aportes').insert({id:Date.now(),ticker:ti,qty:qt,price:pr,date:dt,decision:dc});
  S.showP=false; S._fp=null; await loadData(); render();
}

async function rmP(id){
  if(!confirm('Remover este aporte?')) return;
  await db.from('aportes').delete().eq('id',id);
  await loadData(); render();
}

async function getAI(){
  if(S.aiLoad) return;
  S.aiLoad=true; S.aiText=''; render();
  const{tC,tGP,mD,avgDY}=cx();
  try{
    const sum=S.assets.map(a=>`${a.ticker} (${a.type}/${a.sector}): ${a.qty} cotas, PM R$${a.avg_price}, cotação R$${a.current_price}, DY ${a.dy}%`).join('\n');
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:'Você é um analista de investimentos brasileiro especialista em renda variável, FIIs e renda passiva. Seja direto, use tópicos curtos, português claro. Não dê recomendações como verdade absoluta.',
        messages:[{role:'user',content:`Carteira:\n\n${sum}\n\nPatrimônio: ${fmt(tC)} | Ganho: ${fmtP(tGP)} | Div. mês: ${fmt(mD)} | DY médio: ${avgDY.toFixed(2)}%\n\nAnalise e sugira rebalanceamento, diversificação e como aumentar minha renda passiva mensal.`}]})
    });
    const d=await res.json();
    S.aiText=d.content?.map(i=>i.text||'').join('\n')||'Sem resposta.';
  }catch(e){ S.aiText='Erro ao consultar IA. Verifique sua conexão.'; }
  S.aiLoad=false; render();
}

function bind(){
  document.querySelectorAll('.fc input,.fc select').forEach(el=>{
    el.addEventListener('keydown',e=>{ if(e.key==='Enter'){ if(S.showA) svA(); else if(S.showP) svP(); } });
  });
}

// ══════════════════════════════════════════════
//  INICIALIZAÇÃO
// ══════════════════════════════════════════════
async function init(){
  S.loading=true; render();
  try{
    await loadData();
    S.loading=false; render();
    await fetchQuotes();
    // Countdown + auto-refresh
    setInterval(()=>{
      S.cd=Math.max(0,S.cd-1);
      if(S.cd<=0){ S.cd=QI; fetchQuotes(); }
      const el=document.querySelector('.qdot');
      if(el){ el.nextSibling && (el.parentNode.querySelector('span').textContent=`Cotações ${S.lastUpdate?S.lastUpdate.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}):'—'} · próx. ${S.cd}s`); }
    },1000);
  }catch(err){
    document.getElementById('root').innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px;text-align:center;padding:24px">
      <div style="font-size:36px">⚠️</div>
      <div style="color:#f87171;font-weight:600;font-size:16px">Erro ao conectar ao banco de dados</div>
      <div style="color:#8b949e;font-size:13px;max-width:420px">${esc(err.message||String(err))}</div>
      <div style="color:#6e7681;font-size:12px;max-width:420px">Verifique se as tabelas foram criadas e se o RLS está desativado no Supabase.</div>
      <button class="btn bp" onclick="init()" style="margin-top:8px">🔄 Tentar novamente</button>
    </div>`;
  }
}

init();
</script>
</body>
</html>
