<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>📈 Carteira de Investimentos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2eaf6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;font-size:14px}
button{cursor:pointer;font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:#0d111e}::-webkit-scrollbar-thumb{background:#1e2a3d;border-radius:2px}
.hdr{background:#0d111e;border-bottom:1px solid #161e2e;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.hdr-logo{display:flex;align-items:center;gap:12px}
.hdr-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#4f46e5,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 2px 12px rgba(99,102,241,.4)}
.hdr-title{font-size:16px;font-weight:700;letter-spacing:-.01em}
.hdr-sub{font-size:11px;color:#3d5472;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:10px}
.tabs{background:#0d111e;border-bottom:1px solid #161e2e;padding:0 16px;display:flex;overflow-x:auto;position:sticky;top:62px;z-index:9}
.tabs::-webkit-scrollbar{display:none}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:#3d5472;padding:11px 14px;font-size:13px;white-space:nowrap;transition:all .2s}
.tab:hover{color:#7a8fa8}.tab.on{border-bottom-color:#6366f1;color:#a5b4fc;font-weight:700}
.wrap{padding:20px;max-width:1100px;margin:0 auto}
@media(max-width:640px){.wrap{padding:14px}}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:16px}
.card{background:#0d111e;border:1px solid #161e2e;border-radius:12px;padding:14px 16px;transition:border-color .2s,box-shadow .2s}
.card.al{border-left:3px solid}.card:hover{border-color:#1e2a3d;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.cl{font-size:10px;color:#3d5472;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.cv{font-size:21px;font-weight:700;margin-bottom:2px;letter-spacing:-.02em}.cs{font-size:11px;color:#2e3f58}
.tw{background:#0d111e;border:1px solid #161e2e;border-radius:12px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.25)}
.ts{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:560px}
thead tr{background:#090c15}
th{padding:9px 12px;text-align:left;color:#3d5472;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #161e2e}
td{padding:9px 12px;border-bottom:1px solid #0f1520;color:#b8c8de}
tbody tr{transition:background .1s}tbody tr:hover{background:#0f1728}tbody tr:last-child td{border-bottom:none}
.bdg{border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600}
.bac{background:rgba(52,211,153,.08);color:#34d399;border:1px solid rgba(52,211,153,.18)}
.bfi{background:rgba(96,165,250,.08);color:#60a5fa;border:1px solid rgba(96,165,250,.18)}
.bet{background:rgba(167,139,250,.08);color:#a78bfa;border:1px solid rgba(167,139,250,.18)}
.bxx{background:rgba(148,163,184,.05);color:#64748b;border:1px solid rgba(148,163,184,.12)}
.btn{border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:600;transition:all .15s}
.btn:hover{opacity:.85;transform:translateY(-1px)}.btn:active{transform:translateY(0)}
.bp{background:linear-gradient(135deg,#3730a3,#4f46e5);color:#c7d2fe;box-shadow:0 2px 14px rgba(99,102,241,.3)}
.bsv{background:linear-gradient(135deg,#065f46,#047857);color:#6ee7b7;box-shadow:0 2px 14px rgba(16,185,129,.2)}
.bgh{background:#111828;color:#64748b;border:1px solid #1e2a3d}
.bexp{background:#111828;color:#fbbf24;border:1px solid rgba(251,191,36,.2);font-size:12px;padding:7px 12px}
.bimp{background:#111828;color:#60a5fa;border:1px solid rgba(96,165,250,.2);font-size:12px;padding:7px 12px}
.bi{background:transparent;border:1px solid #1e2a3d;border-radius:7px;padding:3px 9px;color:#64748b;font-size:13px}
.bdi{background:transparent;border:1px solid rgba(127,29,29,.5);border-radius:7px;padding:3px 9px;color:#f87171;font-size:13px}
.fc{background:#090c15;border:1px solid #312e81;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 4px 20px rgba(99,102,241,.08)}
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.fl{font-size:11px;color:#3d5472;margin-bottom:4px;font-weight:500}
input,select{background:#0d111e;border:1px solid #1e2a3d;border-radius:9px;padding:8px 11px;color:#e2eaf6;font-size:13px;width:100%;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus{border-color:#4f46e5;outline:none;box-shadow:0 0 0 3px rgba(79,70,229,.15)}
input::placeholder{color:#2e3f58}select option{background:#0d111e}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.cg{grid-template-columns:1fr}}
.cc{background:#0d111e;border:1px solid #161e2e;border-radius:12px;padding:14px 16px}
.ct{font-size:11px;font-weight:600;color:#3d5472;margin-bottom:12px;text-transform:uppercase;letter-spacing:.07em}
.db{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.dbl{font-size:12px;color:#c0cce0;min-width:62px;font-weight:600}
.dbt{flex:1;background:#111828;border-radius:4px;height:6px;overflow:hidden}
.dbf{height:100%;border-radius:4px}.dbv{font-size:12px;color:#64748b;min-width:70px;text-align:right}
.pleg{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.pli{display:flex;align-items:center;gap:5px;font-size:12px;color:#64748b}
.pd{width:8px;height:8px;border-radius:2px}
.gn{color:#34d399}.rd{color:#f87171}.am{color:#fbbf24}.pu{color:#818cf8}.bl{color:#60a5fa}.mu{color:#64748b}.di{color:#3d5472}
.bwr{background:#111828;border-radius:3px;height:5px;width:70px;overflow:hidden;display:inline-block}
.bfr{height:100%;background:#fbbf24}
.es{text-align:center;padding:40px 20px;color:#3d5472;line-height:1.7}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.st{font-size:15px;font-weight:700}
.qdot{width:7px;height:7px;border-radius:50%;background:#34d399;display:inline-block;box-shadow:0 0 6px rgba(52,211,153,.6)}
.qdot.spin{background:#fbbf24;box-shadow:0 0 6px rgba(251,191,36,.6);animation:pulse 1s ease-in-out infinite}
.aic{background:#090c15;border:1px solid #2d2a7a;border-radius:12px;padding:20px;box-shadow:0 4px 24px rgba(99,102,241,.12)}
.air{font-size:13px;line-height:1.9;color:#b8c8de;white-space:pre-wrap}
.bkp{background:#090c15;border:1px solid #1e2a3d;border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.bkp-info{font-size:12px;color:#3d5472}
.bkp-btns{display:flex;gap:8px;align-items:center}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes rota{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spn{display:inline-block;animation:rota 1s linear infinite}
</style>
</head>
<body>
<div id="root"></div>
<input type="file" id="imp-file" accept=".json" style="display:none">
<script>
const BRAPI  = 'bnZzRLy7SmaCMprZVTDqD7';
const QI     = 60;
const CLRS   = ['#818cf8','#34d399','#fbbf24','#f472b6','#60a5fa','#a3e635','#fb923c','#a78bfa'];

let S = {
  assets:[], aportes:[], quotes:{}, lastUpdate:null,
  tab:'dashboard', qLoad:false, cd:QI,
  aiText:'', aiLoad:false,
  editId:null, showA:false, showP:false, _fa:null, _fp:null,
};

// ── Storage ──────────────────────────────────────────────
function load(){
  try{
    const d=JSON.parse(localStorage.getItem('civ4')||'{}');
    if(d.assets)  S.assets  = d.assets;
    if(d.aportes) S.aportes = d.aportes;
  }catch(e){}
}
function save(){
  try{ localStorage.setItem('civ4', JSON.stringify({assets:S.assets, aportes:S.aportes})); }catch(e){}
}

// ── Backup ───────────────────────────────────────────────
function exportBackup(){
  const data = JSON.stringify({assets:S.assets, aportes:S.aportes, exportedAt:new Date().toISOString()}, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `carteira-backup-${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.json`;
  a.click();
}
function importBackup(){
  document.getElementById('imp-file').click();
}
document.getElementById('imp-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try{
      const d = JSON.parse(ev.target.result);
      if(d.assets)  S.assets  = d.assets;
      if(d.aportes) S.aportes = d.aportes;
      save(); render();
      alert(`✅ Backup importado! ${S.assets.length} ativos e ${S.aportes.length} aportes carregados.`);
    }catch(err){ alert('Erro ao importar. Verifique o arquivo.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ── Helpers ───────────────────────────────────────────────
const fmt  = v => v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fmtP = v => `${v>=0?'+':''}${v.toFixed(2)}%`;
const esc  = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
const bdg  = t => t==='Ação'?'bac':t==='FII'?'bfi':t==='ETF'?'bet':'bxx';

function cx(){
  const tI=S.assets.reduce((s,a)=>s+a.qty*a.avg_price,0);
  const tC=S.assets.reduce((s,a)=>s+a.qty*a.current_price,0);
  const tG=tC-tI, tGP=tI>0?(tG/tI)*100:0;
  const mD=S.assets.reduce((s,a)=>s+(a.qty*a.current_price*(a.dy/100))/12,0);
  const aD=mD*12, avgDY=tC>0?(aD/tC)*100:0;
  return{tI,tC,tG,tGP,mD,aD,avgDY};
}

// ── Cotações ─────────────────────────────────────────────
async function fetchQuotes(){
  if(!S.assets.length) return;
  S.qLoad=true; render();
  const tks=[...new Set(S.assets.map(a=>a.ticker))].join(',');
  try{
    const r=await fetch(`https://brapi.dev/api/quote/${tks}?token=${BRAPI}`);
    const j=await r.json();
    if(j.results){
      j.results.forEach(q=>{
        if(!q.regularMarketPrice) return;
        S.quotes[q.symbol]={price:q.regularMarketPrice, change:q.regularMarketChangePercent||0};
        const a=S.assets.find(x=>x.ticker===q.symbol);
        if(a){ a.current_price=q.regularMarketPrice; }
      });
      S.lastUpdate=new Date(); save();
    }
  }catch(e){ console.warn('brapi:',e); }
  S.qLoad=false; S.cd=QI; render();
}

// ── Pie SVG ───────────────────────────────────────────────
function pie(data){
  const tot=data.reduce((s,d)=>s+d.value,0);
  if(!tot) return'<div class="di" style="text-align:center;padding:24px;font-size:13px">Sem dados</div>';
  let p='', a=-Math.PI/2;
  data.forEach((d,i)=>{
    const ang=(d.value/tot)*2*Math.PI;
    const[x1,y1]=[80+68*Math.cos(a),80+68*Math.sin(a)];
    const[x2,y2]=[80+68*Math.cos(a+ang),80+68*Math.sin(a+ang)];
    p+=`<path d="M80,80 L${x1.toFixed(1)},${y1.toFixed(1)} A68,68 0 ${ang>Math.PI?1:0},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${CLRS[i%CLRS.length]}" stroke="#07090f" stroke-width="2"/>`;
    a+=ang;
  });
  return`<svg viewBox="0 0 160 160" width="140" height="140" style="display:block;margin:0 auto">${p}</svg>`;
}

// ── Render ────────────────────────────────────────────────
function render(){
  document.getElementById('root').innerHTML = app();
  bind();
}

function app(){
  const now=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
  const lu=S.lastUpdate?S.lastUpdate.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}):'—';
  const TABS=[['dashboard','📊 Dashboard'],['ativos','💼 Ativos'],['aportes','💰 Aportes'],['dividendos','📅 Dividendos'],['ia','🤖 IA']];
  return`
  <div class="hdr">
    <div class="hdr-logo">
      <div class="hdr-icon">📈</div>
      <div>
        <div class="hdr-title">Carteira de Investimentos</div>
        <div class="hdr-sub">Dados salvos localmente · Backup disponível</div>
      </div>
    </div>
    <div class="hdr-right">
      <button class="btn bexp" onclick="exportBackup()" title="Exportar backup">💾 Backup</button>
      <button class="btn bimp" onclick="importBackup()" title="Importar backup">📂 Importar</button>
      <div style="text-align:right">
        <div style="font-size:11px;color:#2e3f58">${now}</div>
        <div style="display:flex;align-items:center;gap:5px;justify-content:flex-end;margin-top:2px">
          <span class="qdot${S.qLoad?' spin':''}"></span>
          <span style="font-size:10px;color:#2e3f58">Cotações ${lu} · <span id="cd-span">${S.cd}</span>s</span>
        </div>
      </div>
    </div>
  </div>
  <div class="tabs">${TABS.map(([k,l])=>`<button class="tab${S.tab===k?' on':''}" onclick="go('${k}')">${l}</button>`).join('')}</div>
  <div class="wrap">${content()}</div>`;
}

function content(){
  if(S.tab==='dashboard') return dash();
  if(S.tab==='ativos')    return ativos();
  if(S.tab==='aportes')   return apTab();
  if(S.tab==='dividendos')return divs();
  if(S.tab==='ia')        return iaTab();
  return'';
}

// ── Dashboard ─────────────────────────────────────────────
function dash(){
  const{tI,tC,tG,tGP,mD,aD,avgDY}=cx();
  const byT={};
  S.assets.forEach(a=>{const v=a.qty*a.current_price;byT[a.type]=(byT[a.type]||0)+v;});
  const ad=Object.entries(byT).map(([n,v])=>({name:n,value:v}));
  const p=pie(ad);
  const leg=ad.map((d,i)=>`<div class="pli"><div class="pd" style="background:${CLRS[i%CLRS.length]}"></div><span>${esc(d.name)} ${tC>0?((d.value/tC)*100).toFixed(0):'0'}%</span></div>`).join('');
  const sd=[...S.assets].sort((a,b)=>((b.qty*b.current_price*(b.dy/100))/12)-((a.qty*a.current_price*(a.dy/100))/12));
  const maxD=sd.length?Math.max(...sd.map(a=>(a.qty*a.current_price*(a.dy/100))/12)):0;
  const bars=sd.map((a,i)=>{const dm=(a.qty*a.current_price*(a.dy/100))/12;const pct=maxD>0?(dm/maxD)*100:0;
    return`<div class="db"><div class="dbl">${esc(a.ticker)}</div><div class="dbt"><div class="dbf" style="width:${pct.toFixed(0)}%;background:${CLRS[i%CLRS.length]}"></div></div><div class="dbv am">${fmt(dm)}</div></div>`;
  }).join('');
  return`<div class="cards">
    <div class="card al" style="border-left-color:#818cf8"><div class="cl">💼 Patrimônio</div><div class="cv pu">${fmt(tC)}</div><div class="cs">Investido: ${fmt(tI)}</div></div>
    <div class="card al" style="border-left-color:${tG>=0?'#34d399':'#f87171'}"><div class="cl">📈 Resultado</div><div class="cv" style="color:${tG>=0?'#34d399':'#f87171'}">${fmt(tG)}</div><div class="cs">${fmtP(tGP)}</div></div>
    <div class="card al" style="border-left-color:#fbbf24"><div class="cl">💰 Div. / mês</div><div class="cv am">${fmt(mD)}</div><div class="cs">Anual: ${fmt(aD)}</div></div>
    <div class="card al" style="border-left-color:#60a5fa"><div class="cl">% DY médio</div><div class="cv bl">${avgDY.toFixed(2)}%</div><div class="cs">${S.assets.length} ativos · ${S.aportes.length} aportes</div></div>
  </div>
  <div class="cg">
    <div class="cc"><div class="ct">Alocação por tipo</div>${p}<div class="pleg">${leg}</div></div>
    <div class="cc"><div class="ct">Dividendos mensais</div>${bars||'<div class="di" style="font-size:13px;padding:20px 0;text-align:center">Cadastre seus ativos na aba 💼 Ativos.</div>'}</div>
  </div>`;
}

// ── Ativos ────────────────────────────────────────────────
function frmA(){
  if(!S.showA) return'';
  const f=S._fa||{};
  return`<div class="fc">
    <div style="font-size:14px;font-weight:700;margin-bottom:14px;color:#c4b5fd">${S.editId?'✏️ Editar ativo':'➕ Novo ativo'}</div>
    <div class="fg">
      <div><div class="fl">Ticker</div><input id="f-ti" placeholder="ex: PETR4" value="${esc(f.ticker||'')}" oninput="this.value=this.value.toUpperCase()"></div>
      <div><div class="fl">Quantidade</div><input id="f-qt" type="number" placeholder="100" value="${esc(f.qty||'')}"></div>
      <div><div class="fl">Preço médio</div><input id="f-ap" type="number" step="0.01" placeholder="32.50" value="${esc(f.avg_price||'')}"></div>
      <div><div class="fl">Cotação atual</div><input id="f-cp" type="number" step="0.01" placeholder="38.00" value="${esc(f.current_price||'')}"></div>
      <div><div class="fl">DY anual %</div><input id="f-dy" type="number" step="0.1" placeholder="8.5" value="${esc(f.dy||'')}"></div>
      <div><div class="fl">Setor</div><input id="f-se" placeholder="ex: Petróleo" value="${esc(f.sector||'')}"></div>
      <div><div class="fl">Tipo</div><select id="f-ty">${['Ação','FII','ETF','Renda Fixa','BDR','Crypto'].map(t=>`<option ${(f.type||'Ação')===t?'selected':''}>${t}</option>`).join('')}</select></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn bsv" onclick="svA()">Salvar</button>
      <button class="btn bgh" onclick="clA()">Cancelar</button>
    </div>
  </div>`;
}

function ativos(){
  const rows=S.assets.map(a=>{
    const vr=((a.current_price-a.avg_price)/a.avg_price)*100;
    const dm=(a.qty*a.current_price*(a.dy/100))/12;
    const q=S.quotes[a.ticker];
    const qtag=q?`<span style="font-size:10px;color:${q.change>=0?'#34d399':'#f87171'};margin-left:5px;font-weight:600">${fmtP(q.change)}</span>`:'';
    return`<tr>
      <td style="font-weight:700;color:#e2eaf6">${esc(a.ticker)}${qtag}</td>
      <td><span class="bdg ${bdg(a.type)}">${esc(a.type)}</span></td>
      <td class="mu">${esc(a.sector||'—')}</td>
      <td style="color:#e2eaf6">${a.qty}</td>
      <td>R$ ${Number(a.avg_price).toFixed(2)}</td>
      <td style="font-weight:600;color:${a.current_price>=a.avg_price?'#34d399':'#f87171'}">R$ ${Number(a.current_price).toFixed(2)}</td>
      <td style="color:${vr>=0?'#34d399':'#f87171'};font-weight:700">${fmtP(vr)}</td>
      <td style="font-weight:700;color:#e2eaf6">${fmt(a.qty*a.current_price)}</td>
      <td class="am" style="font-weight:600">${fmt(dm)}</td>
      <td class="mu">${a.dy}%</td>
      <td><div style="display:flex;gap:4px">
        <button class="bi" onclick="edA(${a.id})">✏️</button>
        <button class="bdi" onclick="rmA(${a.id})">🗑️</button>
      </div></td>
    </tr>`;
  }).join('');
  return`<div class="sh"><div class="st">Minha carteira</div>
    <div style="display:flex;gap:8px">
      <button class="btn bgh" style="font-size:12px;padding:7px 12px" onclick="fetchQuotes()">🔄 Atualizar cotações</button>
      <button class="btn bp" onclick="tgA()">+ Adicionar ativo</button>
    </div>
  </div>
  ${frmA()}
  <div class="tw"><div class="ts"><table>
    <thead><tr><th>Ticker</th><th>Tipo</th><th>Setor</th><th>Qtd</th><th>PM</th><th>Atual</th><th>Var.</th><th>Total</th><th>Div/mês</th><th>DY</th><th></th></tr></thead>
    <tbody>${rows||'<tr><td colspan="11" style="text-align:center;padding:28px;color:#2e3f58">Nenhum ativo cadastrado ainda. Clique em "+ Adicionar ativo".</td></tr>'}</tbody>
  </table></div></div>`;
}

// ── Aportes ───────────────────────────────────────────────
function frmP(){
  if(!S.showP) return'';
  const f=S._fp||{};
  return`<div class="fc">
    <div style="font-size:14px;font-weight:700;margin-bottom:14px;color:#c4b5fd">➕ Registrar aporte</div>
    <div class="fg">
      <div><div class="fl">Data</div><input id="p-dt" type="date" value="${esc(f.date||'')}"></div>
      <div><div class="fl">Ticker</div><input id="p-ti" placeholder="ex: MXRF11" value="${esc(f.ticker||'')}" oninput="this.value=this.value.toUpperCase()"></div>
      <div><div class="fl">Quantidade</div><input id="p-qt" type="number" placeholder="100" value="${esc(f.qty||'')}"></div>
      <div><div class="fl">Preço</div><input id="p-pr" type="number" step="0.01" placeholder="10.15" value="${esc(f.price||'')}"></div>
    </div>
    <div style="margin-top:10px"><div class="fl">Decisão / motivo</div><input id="p-dc" placeholder="ex: rebalanceamento, aproveitei queda, dividendos recebidos..." value="${esc(f.decision||'')}"></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn bsv" onclick="svP()">Salvar</button>
      <button class="btn bgh" onclick="clP()">Cancelar</button>
    </div>
  </div>`;
}

function apTab(){
  const tot=S.aportes.reduce((s,a)=>s+a.qty*a.price,0);
  const sum=S.aportes.length?`<div class="card" style="margin-bottom:12px;display:flex;gap:28px">
    <div><div class="cl">Total aportado</div><div style="font-size:20px;font-weight:700;color:#818cf8">${fmt(tot)}</div></div>
    <div><div class="cl">Operações</div><div style="font-size:20px;font-weight:700">${S.aportes.length}</div></div>
  </div>`:'';
  const rows=S.aportes.map(a=>`<tr>
    <td class="mu">${esc(a.date)}</td>
    <td style="font-weight:700;color:#e2eaf6">${esc(a.ticker)}</td>
    <td>${a.qty}</td>
    <td>R$ ${Number(a.price).toFixed(2)}</td>
    <td class="gn" style="font-weight:700">${fmt(a.qty*a.price)}</td>
    <td class="mu">${esc(a.decision||'—')}</td>
    <td><button class="bdi" onclick="rmP(${a.id})">🗑️</button></td>
  </tr>`).join('');
  return`<div class="sh"><div class="st">Histórico de aportes</div><button class="btn bp" onclick="tgP()">+ Registrar aporte</button></div>
  ${frmP()}
  ${!S.aportes.length
    ?`<div class="es" style="background:#0d111e;border:1px solid #161e2e;border-radius:12px">💰<br><br>Nenhum aporte registrado ainda.</div>`
    :`${sum}<div class="tw"><div class="ts"><table>
      <thead><tr><th>Data</th><th>Ticker</th><th>Qtd</th><th>Preço</th><th>Total</th><th>Decisão</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div></div>`}`;
}

// ── Dividendos ────────────────────────────────────────────
function divs(){
  const{mD,aD,avgDY}=cx();
  const sd=[...S.assets].sort((a,b)=>((b.qty*b.current_price*(b.dy/100))/12)-((a.qty*a.current_price*(a.dy/100))/12));
  const rows=sd.map(a=>{
    const dm=(a.qty*a.current_price*(a.dy/100))/12;
    const pct=mD>0?(dm/mD)*100:0;
    return`<tr>
      <td style="font-weight:700;color:#e2eaf6">${esc(a.ticker)}</td>
      <td>${esc(a.type)}</td><td>${a.qty}</td>
      <td>R$ ${Number(a.current_price).toFixed(2)}</td>
      <td class="am" style="font-weight:600">${a.dy}%</td>
      <td class="am" style="font-weight:700">${fmt(dm)}</td>
      <td>${fmt(dm*12)}</td>
      <td><div style="display:flex;align-items:center;gap:7px">
        <div class="bwr"><div class="bfr" style="width:${Math.min(pct,100).toFixed(0)}%"></div></div>
        <span class="mu" style="font-size:11px">${pct.toFixed(1)}%</span>
      </div></td>
    </tr>`;
  }).join('');
  return`<div style="font-size:15px;font-weight:700;margin-bottom:14px">Projeção de dividendos</div>
  <div class="cards" style="margin-bottom:16px">
    <div class="card al" style="border-left-color:#fbbf24"><div class="cl">Estimativa do mês</div><div class="cv am">${fmt(mD)}</div></div>
    <div class="card al" style="border-left-color:#34d399"><div class="cl">Projeção anual</div><div class="cv gn">${fmt(aD)}</div></div>
    <div class="card al" style="border-left-color:#818cf8"><div class="cl">DY médio</div><div class="cv pu">${avgDY.toFixed(2)}%</div></div>
  </div>
  <div class="tw"><div class="ts"><table>
    <thead><tr><th>Ativo</th><th>Tipo</th><th>Qtd</th><th>Cotação</th><th>DY</th><th>Div. mês</th><th>Div. ano</th><th>% renda</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="8" style="text-align:center;padding:24px;color:#2e3f58">Nenhum ativo cadastrado.</td></tr>'}</tbody>
  </table></div></div>`;
}

// ── IA ────────────────────────────────────────────────────
function iaTab(){
  const res=S.aiText
    ?`<div class="aic">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#312e81,#4c1d95);display:flex;align-items:center;justify-content:center;font-size:17px">🤖</div>
        <span style="font-size:14px;font-weight:700;color:#c4b5fd">Análise da IA</span>
      </div>
      <div class="air">${esc(S.aiText)}</div>
      <div style="margin-top:16px;padding-top:12px;border-top:1px solid #161e2e;font-size:11px;color:#2e3f58">⚠️ Caráter informativo. Não constitui recomendação de investimento. Consulte um profissional CFP/CNPI.</div>
    </div>`
    :(!S.aiLoad?`<div class="es" style="background:#0d111e;border:1px dashed #161e2e;border-radius:12px">🤖<br><br>Clique no botão para análise personalizada da sua carteira.</div>`:'');
  return`<div style="font-size:15px;font-weight:700;margin-bottom:4px">Sugestões com Inteligência Artificial</div>
  <div class="mu" style="font-size:13px;margin-bottom:18px">Análise e sugestões de rebalanceamento com base na sua carteira atual.</div>
  <button class="btn bp" onclick="getAI()" ${S.aiLoad?'disabled':''} style="display:flex;align-items:center;gap:8px;margin-bottom:18px;opacity:${S.aiLoad?.6:1}">
    <span ${S.aiLoad?'class="spn"':''}>${S.aiLoad?'⏳':'✨'}</span>${S.aiLoad?'Analisando...':'Analisar carteira com IA'}
  </button>${res}`;
}

// ── Ações ─────────────────────────────────────────────────
function go(t){ S.tab=t; render(); }

function tgA(){ S.showA=!S.showA; S.editId=null; S._fa={type:'Ação'}; render(); }
function clA(){ S.showA=false; S.editId=null; S._fa=null; render(); }
function edA(id){ const a=S.assets.find(x=>x.id===id); if(!a)return; S._fa={...a}; S.editId=id; S.showA=true; render(); }

function svA(){
  const ti=document.getElementById('f-ti')?.value?.trim().toUpperCase();
  const qt=parseFloat(document.getElementById('f-qt')?.value);
  const ap=parseFloat(document.getElementById('f-ap')?.value);
  const cp=parseFloat(document.getElementById('f-cp')?.value)||ap;
  const dy=parseFloat(document.getElementById('f-dy')?.value)||0;
  const se=document.getElementById('f-se')?.value?.trim()||'';
  const ty=document.getElementById('f-ty')?.value||'Ação';
  if(!ti||isNaN(qt)||isNaN(ap)){ alert('Preencha Ticker, Quantidade e Preço Médio.'); return; }
  const row={ticker:ti, type:ty, sector:se, qty:qt, avg_price:ap, current_price:cp, dy};
  if(S.editId){ S.assets=S.assets.map(a=>a.id===S.editId?{...a,...row}:a); }
  else { S.assets.push({id:Date.now(),...row}); }
  S.showA=false; S.editId=null; S._fa=null;
  save(); fetchQuotes();
}

function rmA(id){
  if(!confirm('Remover este ativo da carteira?')) return;
  S.assets=S.assets.filter(a=>a.id!==id);
  save(); render();
}

function tgP(){ S.showP=!S.showP; S._fp={}; render(); }
function clP(){ S.showP=false; S._fp=null; render(); }

function svP(){
  const ti=document.getElementById('p-ti')?.value?.trim().toUpperCase();
  const qt=parseFloat(document.getElementById('p-qt')?.value);
  const pr=parseFloat(document.getElementById('p-pr')?.value);
  const dc=document.getElementById('p-dc')?.value?.trim()||'';
  let dt=document.getElementById('p-dt')?.value||'';
  if(dt){ const[y,m,d]=dt.split('-'); dt=`${d}/${m}/${y}`; }
  else { dt=new Date().toLocaleDateString('pt-BR'); }
  if(!ti||isNaN(qt)||isNaN(pr)){ alert('Preencha Ticker, Quantidade e Preço.'); return; }
  S.aportes.unshift({id:Date.now(), ticker:ti, qty:qt, price:pr, date:dt, decision:dc});
  S.showP=false; S._fp=null; save(); render();
}

function rmP(id){
  if(!confirm('Remover este aporte?')) return;
  S.aportes=S.aportes.filter(a=>a.id!==id);
  save(); render();
}

async function getAI(){
  if(S.aiLoad) return;
  S.aiLoad=true; S.aiText=''; render();
  const{tC,tGP,mD,avgDY}=cx();
  try{
    const sum=S.assets.map(a=>`${a.ticker} (${a.type}/${a.sector}): ${a.qty} cotas, PM R$${a.avg_price}, cotação R$${a.current_price}, DY ${a.dy}%`).join('\n');
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514', max_tokens:1000,
        system:'Você é um analista de investimentos brasileiro especialista em renda variável, FIIs e renda passiva. Seja direto, use tópicos curtos, português claro. Não dê recomendações como verdade absoluta.',
        messages:[{role:'user',content:`Carteira:\n\n${sum}\n\nPatrimônio: ${fmt(tC)} | Ganho: ${fmtP(tGP)} | Div. mês: ${fmt(mD)} | DY médio: ${avgDY.toFixed(2)}%\n\nAnalise e sugira rebalanceamento e como aumentar minha renda passiva.`}]})
    });
    const d=await res.json();
    S.aiText=d.content?.map(i=>i.text||'').join('\n')||'Sem resposta.';
  }catch(e){ S.aiText='Erro ao consultar IA. Verifique sua conexão.'; }
  S.aiLoad=false; render();
}

function bind(){
  document.querySelectorAll('.fc input,.fc select').forEach(el=>{
    el.addEventListener('keydown',e=>{ if(e.key==='Enter'){ if(S.showA) svA(); else if(S.showP) svP(); } });
  });
}

// ── Init ──────────────────────────────────────────────────
load();
render();
fetchQuotes();
setInterval(()=>{
  S.cd=Math.max(0,S.cd-1);
  if(S.cd<=0){ S.cd=QI; fetchQuotes(); return; }
  const el=document.getElementById('cd-span');
  if(el) el.textContent=S.cd;
},1000);
</script>
</body>
</html>
